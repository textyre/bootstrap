---
# Shared Vagrant prepare — import at the TOP of every role's
# molecule/vagrant/prepare.yml to ensure package databases are fresh.
#
# Usage in role prepare.yml:
#
#   - name: Bootstrap Vagrant VM
#     ansible.builtin.import_playbook: ../../../../molecule/shared/prepare-vagrant.yml
#
#   - name: Prepare (role-specific)
#     hosts: all
#     become: true
#     gather_facts: true
#     tasks:
#       - name: Install role-specific deps
#         ...

- name: Bootstrap Vagrant VM
  hosts: all
  become: true
  gather_facts: true
  tasks:
    # ---- Arch Linux ----
    - name: Pin pacman mirrorlist to Fastly CDN during Vagrant prepare (Arch)
      ansible.builtin.copy:
        dest: /etc/pacman.d/mirrorlist
        owner: root
        group: root
        mode: "0644"
        content: |
          # Managed by molecule/shared/prepare-vagrant.yml.
          # Use Arch's CDN-backed Fastly mirror to avoid geo mirror 404s in CI.
          Server = https://fastly.mirror.pkgbuild.com/$repo/os/$arch
      when: ansible_facts['os_family'] == 'Archlinux'

    - name: Force-refresh pacman package database (Arch)
      community.general.pacman:
        update_cache: true
        force: true
      when: ansible_facts['os_family'] == 'Archlinux'

    # ---- Ubuntu/Debian ----
    - name: Update apt cache (Ubuntu)
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600
      when: ansible_facts['os_family'] == 'Debian'
