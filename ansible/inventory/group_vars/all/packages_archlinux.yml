---
# === Пакеты Arch Linux — роль roles/packages ===
# Берет из центрального реестра packages.yml имена, которые устанавливаются через
# pacman, и дополняет их отдельными pacman-only пакетами.

packages_archlinux_from_packages: >-
  {{ packages_base
     + packages_editors
     + packages_docker
     + packages_xorg
     + packages_wm
     + packages_filemanager
     + packages_network
     + packages_media
     + packages_desktop
     + packages_graphics
     + packages_session
     + packages_terminal
     + packages_fonts
     + packages_theming
     + packages_search
     + packages_viewers }}

packages_archlinux_pacman_only:
  - base-devel       # компиляция, makepkg
  - pacman-contrib   # paccache, checkupdates, pacdiff
  - perl             # pod2man и др., нужен для сборки AUR пакетов (i3, etc.)

packages_archlinux: "{{ packages_archlinux_from_packages + packages_archlinux_pacman_only }}"
