# Test inventory example — copy to test.ini and update with real values
# This file should NOT be committed to git (see .gitignore)

[workstations]
# Single test VM for verification
# ansible_host: IP address or hostname (e.g., 127.0.0.1, 10.0.2.2 from NAT, or remote IP)
# ansible_port: SSH port (e.g., 2222 for NAT, 22 for direct connection)
# ansible_user: Username on target VM
# ansible_ssh_private_key_file: Path to SSH key (e.g., ~/.ssh/id_ed25519, ~/.ssh/bootstrap_test)
arch-test ansible_host=127.0.0.1 ansible_port=2222 ansible_user=YOUR_USER ansible_ssh_private_key_file=~/.ssh/YOUR_KEY

[test_vms]
# Reference to the test VM for role-specific tasks
arch-test
