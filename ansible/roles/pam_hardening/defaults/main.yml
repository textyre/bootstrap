---
# === PAM hardening ===
# Конфигурация PAM-модулей безопасности

# Supported OS families for this role
_pam_hardening_supported_os:
  - Archlinux
  - Debian
  - RedHat
  - Void
  - Gentoo

# PAM faillock (защита от brute-force)
pam_hardening_faillock_enabled: true
pam_hardening_faillock_deny: 3              # Блокировка после N попыток
pam_hardening_faillock_fail_interval: 900   # Окно отслеживания (секунды)
pam_hardening_faillock_unlock_time: 900     # Время блокировки (секунды)
# root_unlock_time: 900 = автоматическая разблокировка через 15 мин
# -1 = перманентная блокировка (требует другой admin аккаунт)
pam_hardening_faillock_root_unlock_time: 900
pam_hardening_faillock_audit: true          # Логировать попытки в audit log
pam_hardening_faillock_silent: false        # Не показывать сообщение при блокировке

# even_deny_root: root аккаунт тоже подпадает под блокировку
# Стандарт: dev-sec (5223★), Kicksecure (576★), vmware/photon (3166★)
pam_hardening_faillock_even_deny_root: true

# local_users_only: faillock применяется только к локальным пользователям
# Установить true при наличии LDAP/SSO, чтобы избежать ложных блокировок
pam_hardening_faillock_local_users_only: false

# nodelay: убрать задержку после неудачного входа (pam >= 1.5.1)
pam_hardening_faillock_nodelay: false

# Per-distro PAM control flags for pam_faillock.so in system-auth.
# Each distro ships different defaults in pambase — we preserve them.
#   preauth_control  — control field for the preauth line
#   authfail_control — control field for the authfail line
#   needs_account    — whether account pam_faillock.so is needed
#                      (false when distro uses authsucc in auth stack)
_pam_hardening_faillock_pam:
  Archlinux:
    preauth_control: "required"
    authfail_control: "[default=die]"
    needs_account: false          # Arch pambase uses authsucc instead
  Gentoo:
    preauth_control: "requisite"
    authfail_control: "[default=die]"
    needs_account: true           # Gentoo pambase uses account, not authsucc
  Void:
    preauth_control: "required"
    authfail_control: "[default=die]"
    needs_account: true           # Void has no faillock by default — full insert
