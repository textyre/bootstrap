---
# === PAM faillock — Red Hat family (Fedora) ===
# authselect manages PAM symlinks — direct /etc/pam.d/ edits are overwritten
# Pattern: authselect enable-feature with-faillock
# Source: ansible/product-demos (280+), ansible-lockdown/RHEL9-STIG (30+)

- name: "CIS 5.4.2 | Check current authselect features (RedHat)"
  ansible.builtin.command: authselect current
  register: _pam_hardening_authselect_current
  changed_when: false
  failed_when: false
  tags: ['pam_hardening', 'pam', 'security', 'faillock', 'cis_5.4.2']

- name: "CIS 5.4.2 | Enable faillock feature via authselect (RedHat)"
  ansible.builtin.command: authselect enable-feature with-faillock
  when: "'with-faillock' not in (_pam_hardening_authselect_current.stdout | default(''))"
  register: _pam_hardening_authselect_enable
  changed_when: true
  tags: ['pam_hardening', 'pam', 'security', 'faillock', 'cis_5.4.2']

- name: "CIS 5.4.2 | Apply authselect changes (RedHat)"  # noqa: no-handler
  ansible.builtin.command: authselect apply-changes
  when: _pam_hardening_authselect_enable.changed
  changed_when: true
  tags: ['pam_hardening', 'pam', 'security', 'faillock', 'cis_5.4.2']
