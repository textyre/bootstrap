---
# === PAM faillock — Debian/Ubuntu ===
# Managed via pam-auth-update (correct flag: --package, not --enable)
# Two separate profiles: pattern from dev-sec (5223+), canonical/core-base

- name: "CIS 5.4.2 | Deploy pam-auth-update faillock preauth profile (Debian)"
  ansible.builtin.copy:
    dest: /usr/share/pam-configs/faillock
    content: |
      Name: Enforce failed login attempt counter (preauth)
      Default: yes
      Priority: 0
      Auth-Type: Primary
      Auth:
        requisite  pam_faillock.so preauth
      Account-Type: Primary
      Account:
        required   pam_faillock.so
    owner: root
    group: root
    mode: '0644'
  notify: Update PAM (Debian)
  tags: ['pam_hardening', 'pam', 'security', 'faillock', 'cis_5.4.2']

- name: "CIS 5.4.2 | Deploy pam-auth-update faillock authfail profile (Debian)"
  ansible.builtin.copy:
    dest: /usr/share/pam-configs/faillock-authfail
    content: |
      Name: Enforce failed login attempt counter (authfail)
      Default: yes
      Priority: 0
      Auth-Type: Primary
      Auth-Final:
        authfail   pam_faillock.so authfail
    owner: root
    group: root
    mode: '0644'
  notify: Update PAM (Debian)
  tags: ['pam_hardening', 'pam', 'security', 'faillock', 'cis_5.4.2']
