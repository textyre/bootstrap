---
# === PAM faillock — Arch Linux (also used by Void, Gentoo) ===
# No pam-auth-update or authselect — direct management of /etc/pam.d/system-auth
# Parameters read from /etc/security/faillock.conf (not inline)
# Pattern: ataraxialinux, getsolus/packages (confirmed via supergrep)

# preauth: insert before pam_unix.so in auth section
- name: "CIS 5.4.2 | Insert pam_faillock preauth into system-auth"
  ansible.builtin.lineinfile:
    path: /etc/pam.d/system-auth
    line: 'auth       required                    pam_faillock.so      preauth'
    insertbefore: '^auth.*pam_unix\.so'
    state: present
  tags: ['pam_hardening', 'pam', 'security', 'faillock', 'cis_5.4.2']

# authfail: insert after pam_unix.so in auth section
- name: "CIS 5.4.2 | Insert pam_faillock authfail into system-auth"
  ansible.builtin.lineinfile:
    path: /etc/pam.d/system-auth
    line: 'auth       required                    pam_faillock.so      authfail'
    insertafter: '^auth.*pam_unix\.so'
    state: present
  tags: ['pam_hardening', 'pam', 'security', 'faillock', 'cis_5.4.2']

# account: add to account section
- name: "CIS 5.4.2 | Insert pam_faillock account into system-auth"
  ansible.builtin.lineinfile:
    path: /etc/pam.d/system-auth
    line: 'account    required                    pam_faillock.so'
    insertafter: '^account'
    state: present
  tags: ['pam_hardening', 'pam', 'security', 'faillock', 'cis_5.4.2']
