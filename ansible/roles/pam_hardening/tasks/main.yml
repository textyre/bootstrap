---
# === PAM hardening ===
# Brute-force protection via pam_faillock across five platform families

- name: PAM hardening
  when: pam_hardening_faillock_enabled | bool
  tags: ['pam_hardening']
  block:

    # ======================================================================
    # ---- Preflight ----
    # ======================================================================

    - name: Assert supported operating system
      ansible.builtin.assert:
        that:
          - ansible_facts['os_family'] in _pam_hardening_supported_os
        fail_msg: >-
          OS family '{{ ansible_facts['os_family'] }}' is not supported.
          Supported: {{ _pam_hardening_supported_os | join(', ') }}
        success_msg: "OS family '{{ ansible_facts['os_family'] }}' is supported"
      tags: ['pam_hardening']

    # ======================================================================
    # ---- Configure ----
    # ======================================================================

    - name: Configure PAM faillock
      ansible.builtin.include_tasks: faillock.yml
      tags: ['pam_hardening', 'pam', 'security', 'faillock']

    # ======================================================================
    # ---- Flush handlers before verify ----
    # ======================================================================

    - name: Flush handlers to apply PAM changes before verification
      ansible.builtin.meta: flush_handlers
      tags: ['pam_hardening']

    # ======================================================================
    # ---- Verify ----
    # ======================================================================

    - name: Verify PAM hardening
      ansible.builtin.include_tasks: verify.yml
      tags: ['pam_hardening']

    # ======================================================================
    # ---- Report ----
    # ======================================================================

    - name: "Report: PAM hardening"
      ansible.builtin.include_role:
        name: common
        tasks_from: report_phase.yml
      vars:
        common_rpt_fact: "_pam_hardening_phases"
        common_rpt_phase: "Configure PAM faillock"
        common_rpt_detail: >-
          deny={{ pam_hardening_faillock_deny }}
          unlock={{ pam_hardening_faillock_unlock_time }}s
          {{ ansible_facts['os_family'] }}
      tags: ['pam_hardening', 'report']

    - name: "Pam_hardening — Execution Report"
      ansible.builtin.include_role:
        name: common
        tasks_from: report_render.yml
      vars:
        common_rpt_fact: "_pam_hardening_phases"
        common_rpt_title: "pam_hardening"
      tags: ['pam_hardening', 'report']
