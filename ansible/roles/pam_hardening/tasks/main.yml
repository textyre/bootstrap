---
# === PAM hardening ===
# validate -> configure -> verify -> report

- name: PAM hardening
  when: pam_hardening_faillock_enabled | bool
  tags: ['pam_hardening']
  block:

    - name: Validate PAM hardening role inputs
      ansible.builtin.include_tasks: validate/main.yml
      tags: ['pam_hardening']

    - name: Configure PAM hardening
      ansible.builtin.include_tasks: configure/main.yml
      tags: ['pam_hardening', 'pam', 'security', 'faillock']

    - name: Verify PAM hardening
      ansible.builtin.include_tasks: verify/main.yml
      tags: ['pam_hardening']

    - name: Render PAM hardening execution report
      ansible.builtin.include_tasks: report/main.yml
      tags: ['pam_hardening', 'report']
