---
# === PAM faillock — dispatcher ===
# 1. Deploy faillock.conf (cross-platform)
# 2. Activate faillock in PAM stack (platform-specific dispatch)

- name: "CIS 5.4.2 | Deploy faillock.conf"
  ansible.builtin.template:
    src: faillock.conf.j2
    dest: /etc/security/faillock.conf
    owner: root
    group: root
    mode: '0644'
  tags: ['pam_hardening', 'pam', 'security', 'faillock', 'cis_5.4.2']

# Platform-specific PAM stack activation via os_family dispatch
- name: "Configure PAM stack ({{ ansible_facts['os_family'] }})"
  ansible.builtin.include_tasks: "faillock_{{ ansible_facts['os_family'] | lower }}.yml"
  tags: ['pam_hardening', 'pam', 'security', 'faillock']
