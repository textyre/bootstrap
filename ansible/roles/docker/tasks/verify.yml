---
# Verification entrypoint. Keep concrete checks in focused files.

- name: Verify Docker daemon files
  ansible.builtin.include_tasks: verify_daemon.yml

- name: Verify Docker runtime storage driver
  ansible.builtin.include_tasks: verify_runtime.yml
  when:
    - docker_enable_service | bool
    - ansible_facts['virtualization_type'] | default('') != 'docker'

- name: Verify Docker runtime smoke behavior
  ansible.builtin.include_tasks: verify_smoke.yml
  when:
    - docker_enable_service | bool
    - docker_runtime_smoke_enabled | bool
    - ansible_facts['virtualization_type'] | default('') != 'docker'

- name: Docker verify complete
  ansible.builtin.debug:
    msg: >-
      Docker configuration verified on
      {{ ansible_facts['distribution'] }} {{ ansible_facts['distribution_version'] }}.
      daemon.json: OK. Storage: {{ _docker_storage_driver_selected }}.
      Service: {{ 'enabled' if docker_enable_service | bool else 'skipped' }}.
      Runtime smoke: {{ 'enabled' if docker_runtime_smoke_enabled | bool else 'skipped' }}.
