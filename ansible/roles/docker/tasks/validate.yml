---
- name: Validate Docker operating system
  ansible.builtin.assert:
    that:
      - ansible_facts['os_family'] in _docker_supported_os
    fail_msg: >-
      Docker does not support {{ ansible_facts['os_family'] }}.
      Supported OS families: {{ _docker_supported_os | join(', ') }}.

- name: Validate Docker storage driver
  ansible.builtin.assert:
    that:
      - docker_storage_driver in _docker_storage_supported_drivers
    fail_msg: >-
      docker_storage_driver={{ docker_storage_driver }} is not supported.
      Allowed values: {{ _docker_storage_supported_drivers | join(', ') }}.

- name: Validate additional Docker daemon settings
  vars:
    _docker_conflicting_daemon_keys: >-
      {{ docker_daemon_extra.keys() | intersect(_docker_managed_daemon_keys) | list }}
  ansible.builtin.assert:
    that:
      - _docker_conflicting_daemon_keys | length == 0
    fail_msg: >-
      docker_daemon_extra repeats settings already managed by dedicated
      docker_* variables: {{ _docker_conflicting_daemon_keys | join(', ') }}.
      Configure each listed setting through its dedicated variable only.

- name: Report Docker validation phase
  ansible.builtin.include_role:
    name: common
    tasks_from: report_phase.yml
  vars:
    common_rpt_fact: "_docker_phases"
    common_rpt_phase: "Validate inputs"
    common_rpt_detail: "{{ docker_storage_driver }} on {{ ansible_facts['os_family'] }}"
