---
# Shared storage preflight context. Driver-specific checks are dispatched below.

- name: Determine Docker data root
  ansible.builtin.set_fact:
    _docker_data_root_selected: "{{ docker_daemon_overwrite.get('data-root', '/var/lib/docker') }}"

- name: Determine Docker data root parent
  ansible.builtin.set_fact:
    _docker_data_root_parent: "{{ _docker_data_root_selected | dirname }}"

- name: Stat Docker data root
  ansible.builtin.stat:
    path: "{{ _docker_data_root_selected }}"
  register: _docker_data_root_stat

- name: Stat Docker data root parent
  ansible.builtin.stat:
    path: "{{ _docker_data_root_parent }}"
  register: _docker_data_root_parent_stat

- name: Assert Docker data root mount target exists
  ansible.builtin.assert:
    that:
      - _docker_data_root_stat.stat.exists or _docker_data_root_parent_stat.stat.exists
    fail_msg: >-
      Neither Docker data root '{{ _docker_data_root_selected }}' nor its parent
      '{{ _docker_data_root_parent }}' exists. Cannot preflight storage driver
      '{{ _docker_storage_driver_selected }}'.
    success_msg: >-
      Docker storage preflight target exists for {{ _docker_data_root_selected }}.

- name: Select Docker data root mount target
  ansible.builtin.set_fact:
    _docker_data_root_mount_target: >-
      {{ _docker_data_root_selected
         if _docker_data_root_stat.stat.exists
         else _docker_data_root_parent }}

- name: Detect Docker data root filesystem  # noqa: command-instead-of-module
  ansible.builtin.command:
    argv:
      - findmnt
      - -T
      - "{{ _docker_data_root_mount_target }}"
      - -no
      - FSTYPE
  register: _docker_data_root_findmnt
  changed_when: false
  failed_when: _docker_data_root_findmnt.rc != 0

- name: Record Docker data root filesystem
  ansible.builtin.set_fact:
    _docker_data_root_fstype: "{{ _docker_data_root_findmnt.stdout | trim }}"

- name: Run selected Docker storage-driver preflight
  ansible.builtin.include_tasks: "storage_preflight_{{ _docker_storage_driver_selected | replace('-', '_') }}.yml"

- name: Report Docker storage preflight
  ansible.builtin.debug:
    msg: >-
      Docker storage preflight passed:
      driver={{ _docker_storage_driver_selected }},
      data_root={{ _docker_data_root_selected }},
      fstype={{ _docker_data_root_fstype }}.

- name: "Report: Storage preflight"
  ansible.builtin.include_role:
    name: common
    tasks_from: report_phase.yml
  vars:
    common_rpt_fact: "_docker_phases"
    common_rpt_phase: "Storage preflight"
    common_rpt_detail: "{{ _docker_storage_driver_selected }}"
  tags: ['docker', 'report']
