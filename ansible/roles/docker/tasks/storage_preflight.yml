---
# Storage preflight belongs to the implementation boundary: it proves that the
# host can start Docker with the validated storage driver before service start.

- name: Verify Docker storage implementation prerequisites
  vars:
    _docker_storage_driver: "{{ docker_storage_driver | string | trim }}"
    _docker_data_root: "{{ docker_daemon_overwrite.get('data-root', '/var/lib/docker') }}"
    _docker_data_root_parent: "{{ _docker_data_root | dirname }}"
  block:

    - name: Stat Docker data root
      ansible.builtin.stat:
        path: "{{ _docker_data_root }}"
      register: _docker_data_root_stat

    - name: Stat Docker data root parent
      ansible.builtin.stat:
        path: "{{ _docker_data_root_parent }}"
      register: _docker_data_root_parent_stat

    - name: Assert Docker data root mount target exists
      ansible.builtin.assert:
        that:
          - _docker_data_root_stat.stat.exists or _docker_data_root_parent_stat.stat.exists
        fail_msg: >-
          Neither Docker data root '{{ _docker_data_root }}' nor its parent
          '{{ _docker_data_root_parent }}' exists. Cannot preflight storage
          driver '{{ _docker_storage_driver }}'.
        success_msg: >-
          Docker storage preflight target exists for {{ _docker_data_root }}.

    - name: Detect Docker data root filesystem
      ansible.builtin.command:
        argv:
          - findmnt
          - -T
          - "{{ _docker_data_root if _docker_data_root_stat.stat.exists else _docker_data_root_parent }}"
          - -no
          - FSTYPE
      register: _docker_data_root_findmnt
      changed_when: false
      failed_when: _docker_data_root_findmnt.rc != 0

    - name: Run selected Docker storage-driver preflight
      ansible.builtin.include_tasks: "storage_preflight_{{ _docker_storage_driver | replace('-', '_') }}.yml"
      vars:
        _docker_data_root_selected: "{{ _docker_data_root }}"
        _docker_data_root_fstype: "{{ _docker_data_root_findmnt.stdout | trim }}"

    - name: Report Docker storage preflight
      ansible.builtin.debug:
        msg: >-
          Docker storage preflight passed:
          driver={{ _docker_storage_driver }},
          data_root={{ _docker_data_root }},
          fstype={{ _docker_data_root_findmnt.stdout | trim }}.

    - name: "Report: Storage preflight"
      ansible.builtin.include_role:
        name: common
        tasks_from: report_phase.yml
      vars:
        common_rpt_fact: "_docker_phases"
        common_rpt_phase: "Storage preflight"
        common_rpt_detail: "{{ _docker_storage_driver }}"
      tags: ['docker', 'report']
