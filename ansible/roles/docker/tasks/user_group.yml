---
# Docker group management is separate because membership grants root-equivalent access.

- name: Ensure docker group exists
  ansible.builtin.group:
    name: docker
    state: present
  when: docker_add_user_to_group | bool

- name: Check target user exists before group addition  # noqa: command-instead-of-module
  ansible.builtin.command: "id {{ docker_user }}"
  register: _docker_user_check
  changed_when: false
  failed_when: false
  when: docker_add_user_to_group | bool

- name: Assert target user exists
  ansible.builtin.assert:
    that:
      - _docker_user_check.rc == 0
    fail_msg: >-
      User '{{ docker_user }}' does not exist.
      Cannot add non-existent user to docker group.
    success_msg: "User '{{ docker_user }}' exists"
  when: docker_add_user_to_group | bool

- name: Add user to docker group
  ansible.builtin.user:
    name: "{{ docker_user }}"
    groups: docker
    append: true
  when: docker_add_user_to_group | bool

- name: "Report: User group"
  ansible.builtin.include_role:
    name: common
    tasks_from: report_phase.yml
  vars:
    common_rpt_fact: "_docker_phases"
    common_rpt_phase: "User group"
    common_rpt_status: "{{ 'done' if docker_add_user_to_group | bool else 'skip' }}"
    common_rpt_detail: >-
      {{ docker_user | default('n/a') if docker_add_user_to_group | bool else 'disabled' }}
  tags: ['docker', 'report']
