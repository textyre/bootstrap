---
# Docker role entrypoint.
# Keep this file as the orchestration map; domain logic lives in phase files.

- name: Docker preflight
  ansible.builtin.include_tasks: preflight.yml
  tags: ['docker', 'docker:configure', 'docker:service', 'security']

- name: Docker storage preflight
  ansible.builtin.include_tasks: storage_preflight.yml
  when:
    - docker_manage_daemon | bool
    - docker_enable_service | bool
  tags: ['docker', 'docker:service']

- name: Configure Docker daemon
  ansible.builtin.include_tasks: configure_daemon.yml
  when: docker_manage_daemon | bool
  tags: ['docker', 'docker:configure', 'security']

- name: Configure Docker group membership
  ansible.builtin.include_tasks: user_group.yml
  tags: ['docker', 'docker:configure']

- name: Manage Docker service
  ansible.builtin.include_tasks: service.yml
  tags: ['docker', 'docker:service']

- name: Apply pending Docker handlers before verify
  ansible.builtin.meta: flush_handlers
  when: docker_enable_service | bool
  tags: ['docker']

- name: Verify Docker configuration
  ansible.builtin.include_tasks: verify.yml
  when: docker_manage_daemon | bool
  tags: ['docker']

- name: "Report: Verify"
  ansible.builtin.include_role:
    name: common
    tasks_from: report_phase.yml
  vars:
    common_rpt_fact: "_docker_phases"
    common_rpt_phase: "Verify"
    common_rpt_detail: "daemon.json + permissions"
  tags: ['docker', 'report']

- name: "Docker — Execution Report"
  ansible.builtin.include_role:
    name: common
    tasks_from: report_render.yml
  vars:
    common_rpt_fact: "_docker_phases"
    common_rpt_title: "docker"
  tags: ['docker', 'report']
