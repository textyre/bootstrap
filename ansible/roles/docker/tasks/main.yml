---
# Docker role entrypoint. The flow is deliberately layered:
# core validates the role contract, apply mutates the host, verify observes
# the applied implementation. Tests live under molecule/.

- name: Establish Docker core contract
  ansible.builtin.include_tasks: core.yml
  tags: ['docker', 'docker:configure', 'docker:service', 'security']

- name: Apply Docker core implementation
  ansible.builtin.include_tasks: apply.yml
  tags: ['docker', 'docker:configure', 'docker:service', 'security']

- name: Verify Docker core implementation
  ansible.builtin.include_tasks: verify.yml
  when: docker_manage_daemon | bool
  tags: ['docker']

- name: "Report: Verify"
  ansible.builtin.include_role:
    name: common
    tasks_from: report_phase.yml
  vars:
    common_rpt_fact: "_docker_phases"
    common_rpt_phase: "Verify"
    common_rpt_detail: "daemon.json + runtime driver"
  tags: ['docker', 'report']

- name: "Docker — Execution Report"
  ansible.builtin.include_role:
    name: common
    tasks_from: report_render.yml
  vars:
    common_rpt_fact: "_docker_phases"
    common_rpt_title: "docker"
  tags: ['docker', 'report']
