---
# === docker — Docker Engine configuration ===
# validate -> configure -> service -> report

- name: Validate Docker role inputs
  ansible.builtin.include_tasks:
    file: validate.yml

- name: Configure Docker Engine
  ansible.builtin.include_tasks:
    file: configure/main.yml

- name: Apply Docker service policy
  ansible.builtin.include_tasks:
    file: service.yml

- name: Render Docker execution report
  ansible.builtin.include_role:
    name: common
    tasks_from: report_render.yml
  vars:
    common_rpt_fact: "_docker_phases"
    common_rpt_title: "docker"
