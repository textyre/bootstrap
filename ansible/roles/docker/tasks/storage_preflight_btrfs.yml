---
# btrfs driver requires Docker's data root to live on a btrfs filesystem.

- name: Assert Docker data root is on btrfs for btrfs driver
  ansible.builtin.assert:
    that:
      - _docker_data_root_fstype == 'btrfs'
    fail_msg: >-
      btrfs storage driver requires Docker data root
      '{{ _docker_data_root_selected }}' to be on btrfs.
      Detected filesystem: '{{ _docker_data_root_fstype }}'.
    success_msg: "Docker data root filesystem is btrfs."
