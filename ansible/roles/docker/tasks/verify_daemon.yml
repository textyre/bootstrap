---
# Verify that daemon.json exists, parses, and reflects the core storage choice.

- name: Stat /etc/docker directory
  ansible.builtin.stat:
    path: /etc/docker
  register: _docker_verify_dir

- name: Stat /etc/docker/daemon.json
  ansible.builtin.stat:
    path: /etc/docker/daemon.json
  register: _docker_verify_daemon_json

- name: Read /etc/docker/daemon.json
  ansible.builtin.slurp:
    src: /etc/docker/daemon.json
  register: _docker_verify_daemon_raw

- name: Assert Docker daemon implementation matches core contract
  vars:
    _docker_daemon_json: "{{ _docker_verify_daemon_raw.content | b64decode | from_json }}"
    _docker_storage_driver: "{{ docker_storage_driver | string | trim }}"
  ansible.builtin.assert:
    that:
      - _docker_verify_dir.stat.exists
      - _docker_verify_dir.stat.isdir
      - _docker_verify_dir.stat.pw_name == 'root'
      - _docker_verify_dir.stat.gr_name == 'root'
      - _docker_verify_dir.stat.mode == '0755'
      - _docker_verify_daemon_json.stat.exists
      - _docker_verify_daemon_json.stat.isreg
      - _docker_verify_daemon_json.stat.pw_name == 'root'
      - _docker_verify_daemon_json.stat.gr_name == 'root'
      - _docker_verify_daemon_json.stat.mode == '0644'
      - _docker_daemon_json.get('storage-driver', '') == _docker_storage_driver
    fail_msg: >-
      Docker daemon implementation does not match the core contract:
      expected /etc/docker root:root 0755, daemon.json root:root 0644,
      and storage-driver '{{ _docker_storage_driver }}'.
      Actual storage-driver:
      {{ _docker_daemon_json.get('storage-driver', 'ABSENT') }}.
    success_msg: >-
      Docker daemon implementation matches core contract:
      storage-driver={{ _docker_daemon_json['storage-driver'] }}.
