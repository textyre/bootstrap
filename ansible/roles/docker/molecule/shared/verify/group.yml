---
- name: Lookup docker group
  ansible.builtin.getent:
    database: group
    key: docker
  register: _docker_verify_group
  failed_when: false

- name: Assert docker group exists when group management is enabled
  ansible.builtin.assert:
    that:
      - (_docker_verify_group.ansible_facts.getent_group | default({})).get('docker') is not none
    fail_msg: "docker group does not exist"
    success_msg: "docker group exists"
  when: docker_add_user_to_group | bool

- name: Check user group membership
  ansible.builtin.command: "id -nG {{ docker_user }}"
  register: _docker_verify_user_groups
  changed_when: false
  failed_when: false

- name: Assert user docker group membership matches role input
  ansible.builtin.assert:
    that:
      - (docker_add_user_to_group | bool and 'docker' in _docker_verify_user_groups.stdout.split())
        or (not (docker_add_user_to_group | bool) and 'docker' not in _docker_verify_user_groups.stdout.split())
    fail_msg: >-
      Docker group membership does not match docker_add_user_to_group={{
      docker_add_user_to_group }}. groups={{ _docker_verify_user_groups.stdout | default('') }}
    success_msg: "Docker group membership matches role input"
