---
- name: Remove stale Docker storage smoke volume
  ansible.builtin.command:
    argv:
      - docker
      - volume
      - rm
      - -f
      - bootstrap-docker-storage-smoke
  changed_when: false
  failed_when: false

- name: Run Docker process smoke container
  ansible.builtin.command:
    argv:
      - docker
      - run
      - --rm
      - "{{ docker_test_runtime_smoke_image | default('busybox:latest') }}"
      - sh
      - -c
      - "echo docker-runtime-ok"
  register: _docker_runtime_process_smoke
  changed_when: false
  failed_when: _docker_runtime_process_smoke.rc != 0

- name: Assert Docker process smoke worked
  ansible.builtin.assert:
    that:
      - _docker_runtime_process_smoke.stdout | trim == 'docker-runtime-ok'
    fail_msg: >-
      Docker process smoke failed:
      {{ _docker_runtime_process_smoke.stdout | default('') }}
      {{ _docker_runtime_process_smoke.stderr | default('') }}
    success_msg: "Docker process smoke passed"

- name: Create Docker storage smoke volume
  ansible.builtin.command:
    argv:
      - docker
      - volume
      - create
      - bootstrap-docker-storage-smoke
  changed_when: false
  failed_when: false

- name: Write through Docker named volume
  ansible.builtin.command:
    argv:
      - docker
      - run
      - --rm
      - -v
      - bootstrap-docker-storage-smoke:/data
      - "{{ docker_test_runtime_smoke_image | default('busybox:latest') }}"
      - sh
      - -c
      - "printf storage-ok > /data/probe"
  register: _docker_runtime_volume_write
  changed_when: false
  failed_when: _docker_runtime_volume_write.rc != 0

- name: Read through Docker named volume
  ansible.builtin.command:
    argv:
      - docker
      - run
      - --rm
      - -v
      - bootstrap-docker-storage-smoke:/data
      - "{{ docker_test_runtime_smoke_image | default('busybox:latest') }}"
      - cat
      - /data/probe
  register: _docker_runtime_volume_read
  changed_when: false
  failed_when: _docker_runtime_volume_read.rc != 0

- name: Assert Docker named volume smoke worked
  ansible.builtin.assert:
    that:
      - _docker_runtime_volume_read.stdout | trim == 'storage-ok'
    fail_msg: >-
      Docker named volume smoke failed:
      {{ _docker_runtime_volume_read.stdout | default('') }}
      {{ _docker_runtime_volume_read.stderr | default('') }}
    success_msg: "Docker named volume smoke passed"

- name: Ensure Docker bind smoke directory exists
  ansible.builtin.file:
    path: /tmp/bootstrap-docker-bind-smoke
    state: directory
    mode: '0755'

- name: Write through Docker bind mount
  ansible.builtin.command:
    argv:
      - docker
      - run
      - --rm
      - -v
      - /tmp/bootstrap-docker-bind-smoke:/data
      - "{{ docker_test_runtime_smoke_image | default('busybox:latest') }}"
      - sh
      - -c
      - "printf bind-ok > /data/probe"
  register: _docker_runtime_bind_write
  changed_when: false
  failed_when: _docker_runtime_bind_write.rc != 0

- name: Read Docker bind mount result
  ansible.builtin.command:
    argv:
      - cat
      - /tmp/bootstrap-docker-bind-smoke/probe
  register: _docker_runtime_bind_read
  changed_when: false
  failed_when: _docker_runtime_bind_read.rc != 0

- name: Assert Docker bind mount smoke worked
  ansible.builtin.assert:
    that:
      - _docker_runtime_bind_read.stdout | trim == 'bind-ok'
    fail_msg: >-
      Docker bind mount smoke failed:
      {{ _docker_runtime_bind_read.stdout | default('') }}
      {{ _docker_runtime_bind_read.stderr | default('') }}
    success_msg: "Docker bind mount smoke passed"

- name: Clean Docker storage smoke volume
  ansible.builtin.command:
    argv:
      - docker
      - volume
      - rm
      - -f
      - bootstrap-docker-storage-smoke
  changed_when: false
  failed_when: false

- name: Clean Docker bind smoke directory
  ansible.builtin.file:
    path: /tmp/bootstrap-docker-bind-smoke
    state: absent
