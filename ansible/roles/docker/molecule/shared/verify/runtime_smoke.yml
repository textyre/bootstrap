---
- name: Remove stale Docker storage smoke volume
  ansible.builtin.command:
    argv:
      - docker
      - volume
      - rm
      - -f
      - bootstrap-docker-storage-smoke
  changed_when: false
  failed_when: false

- name: Run Docker process smoke container
  ansible.builtin.command:
    argv:
      - docker
      - run
      - --rm
      - "{{ docker_test_runtime_smoke_image | default('busybox:latest') }}"
      - sh
      - -c
      - "echo docker-runtime-ok"
  register: _docker_runtime_process_smoke
  changed_when: false
  failed_when: _docker_runtime_process_smoke.rc != 0

- name: Assert Docker process smoke worked
  ansible.builtin.assert:
    that:
      - _docker_runtime_process_smoke.stdout | trim == 'docker-runtime-ok'
    fail_msg: >-
      Docker process smoke failed:
      {{ _docker_runtime_process_smoke.stdout | default('') }}
      {{ _docker_runtime_process_smoke.stderr | default('') }}
    success_msg: "Docker process smoke passed"

- name: Verify Docker user namespace remap behavior
  when: docker_userns_remap | string | trim | length > 0
  block:
    - name: Remove stale Docker userns smoke container
      ansible.builtin.command:
        argv:
          - docker
          - rm
          - -f
          - bootstrap-docker-userns-smoke
      changed_when: false
      failed_when: false

    - name: Start Docker userns smoke container
      ansible.builtin.command:
        argv:
          - docker
          - run
          - -d
          - --name
          - bootstrap-docker-userns-smoke
          - "{{ docker_test_runtime_smoke_image | default('busybox:latest') }}"
          - sleep
          - "60"
      register: _docker_userns_smoke_container
      changed_when: false
      failed_when: _docker_userns_smoke_container.rc != 0

    - name: Inspect Docker userns smoke container PID
      ansible.builtin.command:
        argv:
          - docker
          - inspect
          - --format
          - "{{ '{{' }}.State.Pid{{ '}}' }}"
          - bootstrap-docker-userns-smoke
      register: _docker_userns_smoke_pid
      changed_when: false
      failed_when:
        - _docker_userns_smoke_pid.rc != 0
          or (_docker_userns_smoke_pid.stdout | trim | int) <= 0

    - name: Read host UID for Docker userns smoke process
      ansible.builtin.command:
        argv:
          - ps
          - -o
          - uid=
          - -p
          - "{{ _docker_userns_smoke_pid.stdout | trim }}"
      register: _docker_userns_smoke_host_uid
      changed_when: false
      failed_when: _docker_userns_smoke_host_uid.rc != 0

    - name: Assert Docker userns remaps container root away from host root
      ansible.builtin.assert:
        that:
          - (_docker_userns_smoke_host_uid.stdout | trim) != '0'
        fail_msg: >-
          Docker userns-remap is configured but the container process is still
          running as host UID 0. Host UID:
          {{ _docker_userns_smoke_host_uid.stdout | default('UNKNOWN') }}.
        success_msg: >-
          Docker userns-remap is active: container root process maps to host
          UID {{ _docker_userns_smoke_host_uid.stdout | trim }}.
  always:
    - name: Clean Docker userns smoke container
      ansible.builtin.command:
        argv:
          - docker
          - rm
          - -f
          - bootstrap-docker-userns-smoke
      changed_when: false
      failed_when: false

- name: Create Docker storage smoke volume
  ansible.builtin.command:
    argv:
      - docker
      - volume
      - create
      - bootstrap-docker-storage-smoke
  changed_when: false
  failed_when: false

- name: Write through Docker named volume
  ansible.builtin.command:
    argv:
      - docker
      - run
      - --rm
      - -v
      - bootstrap-docker-storage-smoke:/data
      - "{{ docker_test_runtime_smoke_image | default('busybox:latest') }}"
      - sh
      - -c
      - "printf storage-ok > /data/probe"
  register: _docker_runtime_volume_write
  changed_when: false
  failed_when: _docker_runtime_volume_write.rc != 0

- name: Read through Docker named volume
  ansible.builtin.command:
    argv:
      - docker
      - run
      - --rm
      - -v
      - bootstrap-docker-storage-smoke:/data
      - "{{ docker_test_runtime_smoke_image | default('busybox:latest') }}"
      - cat
      - /data/probe
  register: _docker_runtime_volume_read
  changed_when: false
  failed_when: _docker_runtime_volume_read.rc != 0

- name: Assert Docker named volume smoke worked
  ansible.builtin.assert:
    that:
      - _docker_runtime_volume_read.stdout | trim == 'storage-ok'
    fail_msg: >-
      Docker named volume smoke failed:
      {{ _docker_runtime_volume_read.stdout | default('') }}
      {{ _docker_runtime_volume_read.stderr | default('') }}
    success_msg: "Docker named volume smoke passed"

- name: Clean Docker storage smoke volume
  ansible.builtin.command:
    argv:
      - docker
      - volume
      - rm
      - -f
      - bootstrap-docker-storage-smoke
  changed_when: false
  failed_when: false
