---
- name: Assert empty Docker storage driver is rejected before mutation
  block:

    - name: Try docker role with empty storage driver
      ansible.builtin.include_role:
        name: docker
      vars:
        docker_manage_daemon: false
        docker_enable_service: false
        docker_add_user_to_group: false
        docker_storage_driver: ""

    - name: Mark empty storage driver validation as unexpectedly accepted
      ansible.builtin.set_fact:
        _docker_empty_storage_rejected: false

  rescue:

    - name: Mark empty storage driver validation as rejected
      ansible.builtin.set_fact:
        _docker_empty_storage_rejected: true

- name: Assert empty Docker storage driver was rejected
  ansible.builtin.assert:
    that:
      - _docker_empty_storage_rejected | bool
    fail_msg: "docker_storage_driver='' should be rejected before host mutation"
    success_msg: "docker_storage_driver='' is rejected"

- name: Assert legacy vfs Docker storage driver is rejected before mutation
  block:

    - name: Try docker role with legacy vfs storage driver
      ansible.builtin.include_role:
        name: docker
      vars:
        docker_manage_daemon: false
        docker_enable_service: false
        docker_add_user_to_group: false
        docker_storage_driver: "vfs"

    - name: Mark legacy vfs storage driver validation as unexpectedly accepted
      ansible.builtin.set_fact:
        _docker_vfs_storage_rejected: false

  rescue:

    - name: Mark legacy vfs storage driver validation as rejected
      ansible.builtin.set_fact:
        _docker_vfs_storage_rejected: true

- name: Assert legacy vfs Docker storage driver was rejected
  ansible.builtin.assert:
    that:
      - _docker_vfs_storage_rejected | bool
    fail_msg: "docker_storage_driver='vfs' should be rejected before host mutation"
    success_msg: "docker_storage_driver='vfs' is rejected"

- name: Assert storage-driver daemon overwrite is rejected before mutation
  block:

    - name: Try docker role with storage-driver daemon overwrite
      ansible.builtin.include_role:
        name: docker
      vars:
        docker_manage_daemon: false
        docker_enable_service: false
        docker_add_user_to_group: false
        docker_storage_driver: "overlay2"
        docker_daemon_overwrite:
          storage-driver: "btrfs"

    - name: Mark storage-driver daemon overwrite validation as unexpectedly accepted
      ansible.builtin.set_fact:
        _docker_storage_overwrite_rejected: false

  rescue:

    - name: Mark storage-driver daemon overwrite validation as rejected
      ansible.builtin.set_fact:
        _docker_storage_overwrite_rejected: true

- name: Assert storage-driver daemon overwrite was rejected
  ansible.builtin.assert:
    that:
      - _docker_storage_overwrite_rejected | bool
    fail_msg: "docker_daemon_overwrite.storage-driver should be rejected before host mutation"
    success_msg: "docker_daemon_overwrite.storage-driver is rejected"
