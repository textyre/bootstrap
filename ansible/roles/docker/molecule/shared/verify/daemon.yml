---
- name: Stat /etc/docker directory
  ansible.builtin.stat:
    path: /etc/docker
  register: _docker_verify_dir

- name: Stat /etc/docker/daemon.json
  ansible.builtin.stat:
    path: /etc/docker/daemon.json
  register: _docker_verify_daemon_json

- name: Read daemon.json
  ansible.builtin.slurp:
    src: /etc/docker/daemon.json
  register: _docker_verify_daemon_raw

- name: Assert daemon files match implementation contract
  ansible.builtin.assert:
    that:
      - _docker_verify_dir.stat.exists
      - _docker_verify_dir.stat.isdir
      - _docker_verify_dir.stat.pw_name == 'root'
      - _docker_verify_dir.stat.gr_name == 'root'
      - _docker_verify_dir.stat.mode == '0755'
      - _docker_verify_daemon_json.stat.exists
      - _docker_verify_daemon_json.stat.isreg
      - _docker_verify_daemon_json.stat.pw_name == 'root'
      - _docker_verify_daemon_json.stat.gr_name == 'root'
      - _docker_verify_daemon_json.stat.mode == '0644'
    fail_msg: "/etc/docker or daemon.json missing or has wrong permissions"
    success_msg: "/etc/docker and daemon.json permissions match role contract"

- name: Assert daemon.json logging contract
  vars:
    _docker_daemon_config: "{{ _docker_verify_daemon_raw.content | b64decode | from_json }}"
    _docker_log_opts: "{{ (_docker_verify_daemon_raw.content | b64decode | from_json).get('log-opts', {}) }}"
  ansible.builtin.assert:
    that:
      - _docker_daemon_config.get('log-driver', '') == docker_log_driver
      - docker_log_driver == 'journald' or _docker_log_opts.get('max-size', '') == docker_log_max_size
      - docker_log_driver == 'journald' or _docker_log_opts.get('max-file', '') == docker_log_max_file
      - docker_log_driver != 'journald' or 'max-size' not in _docker_log_opts
      - docker_log_driver != 'journald' or 'max-file' not in _docker_log_opts
    fail_msg: "daemon.json logging settings do not match Docker role inputs"
    success_msg: "daemon.json logging settings match Docker role inputs"

- name: Assert daemon.json storage contract
  vars:
    _docker_daemon_config: "{{ _docker_verify_daemon_raw.content | b64decode | from_json }}"
    _docker_storage_driver: "{{ docker_storage_driver | string | trim }}"
  ansible.builtin.assert:
    that:
      - _docker_daemon_config.get('storage-driver', '') == _docker_storage_driver
    fail_msg: "storage-driver not set to '{{ _docker_storage_driver }}' in daemon.json"
    success_msg: "storage-driver={{ _docker_daemon_config['storage-driver'] }}"
