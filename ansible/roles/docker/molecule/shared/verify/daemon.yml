---
- name: Stat /etc/docker directory
  ansible.builtin.stat:
    path: /etc/docker
  register: _docker_verify_dir

- name: Assert /etc/docker exists with correct permissions
  ansible.builtin.assert:
    that:
      - _docker_verify_dir.stat.exists
      - _docker_verify_dir.stat.isdir
      - _docker_verify_dir.stat.pw_name == 'root'
      - _docker_verify_dir.stat.gr_name == 'root'
      - _docker_verify_dir.stat.mode == '0755'
    fail_msg: "/etc/docker missing or wrong permissions (expected root:root 0755)"
    success_msg: >-
      /etc/docker exists: owner={{ _docker_verify_dir.stat.pw_name }},
      group={{ _docker_verify_dir.stat.gr_name }},
      mode={{ _docker_verify_dir.stat.mode }}

- name: Stat /etc/docker/daemon.json
  ansible.builtin.stat:
    path: /etc/docker/daemon.json
  register: _docker_verify_daemon_json

- name: Assert daemon.json exists with correct permissions
  ansible.builtin.assert:
    that:
      - _docker_verify_daemon_json.stat.exists
      - _docker_verify_daemon_json.stat.isreg
      - _docker_verify_daemon_json.stat.pw_name == 'root'
      - _docker_verify_daemon_json.stat.gr_name == 'root'
      - _docker_verify_daemon_json.stat.mode == '0644'
    fail_msg: "/etc/docker/daemon.json missing or wrong permissions (expected root:root 0644)"
    success_msg: >-
      daemon.json exists: owner={{ _docker_verify_daemon_json.stat.pw_name }},
      group={{ _docker_verify_daemon_json.stat.gr_name }},
      mode={{ _docker_verify_daemon_json.stat.mode }}

- name: Validate daemon.json is valid JSON  # noqa: command-instead-of-module
  ansible.builtin.command: python3 -c "import json; json.load(open('/etc/docker/daemon.json'))"
  register: _docker_verify_json_valid
  changed_when: false
  failed_when: _docker_verify_json_valid.rc != 0

- name: Read daemon.json
  ansible.builtin.slurp:
    src: /etc/docker/daemon.json
  register: _docker_verify_daemon_raw

- name: Parse daemon.json into dict
  ansible.builtin.set_fact:
    _docker_verify_daemon_dict: "{{ _docker_verify_daemon_raw.content | b64decode | from_json }}"

- name: Normalize daemon log options for assertions
  ansible.builtin.set_fact:
    _docker_verify_log_opts: "{{ _docker_verify_daemon_dict['log-opts'] | default({}) }}"
    _docker_verify_log_opt_max_size: "{{ (_docker_verify_daemon_dict['log-opts'] | default({})).get('max-size', '') }}"
    _docker_verify_log_opt_max_file: "{{ (_docker_verify_daemon_dict['log-opts'] | default({})).get('max-file', '') }}"

- name: Assert log-driver matches expected value
  ansible.builtin.assert:
    that:
      - "'log-driver' in _docker_verify_daemon_dict"
      - "_docker_verify_daemon_dict['log-driver'] == _docker_expected_log_driver"
    fail_msg: >-
      log-driver not set to '{{ _docker_expected_log_driver }}' in daemon.json
    success_msg: >-
      log-driver={{ _docker_verify_daemon_dict['log-driver'] }}
      (expected {{ _docker_expected_log_driver }})

- name: Assert log-opts max-size matches expected value
  ansible.builtin.assert:
    that:
      - "'log-opts' in _docker_verify_daemon_dict"
      - "'max-size' in _docker_verify_log_opts"
      - "_docker_verify_log_opt_max_size == _docker_expected_log_max_size"
    fail_msg: >-
      log-opts.max-size not set to '{{ _docker_expected_log_max_size }}' in daemon.json
    success_msg: >-
      log-opts.max-size={{ _docker_verify_log_opt_max_size }}
      (expected {{ _docker_expected_log_max_size }})
  when: _docker_expected_log_driver != 'journald'

- name: Assert log-opts max-file matches expected value
  ansible.builtin.assert:
    that:
      - "'max-file' in _docker_verify_log_opts"
      - "_docker_verify_log_opt_max_file == _docker_expected_log_max_file"
    fail_msg: >-
      log-opts.max-file not set to '{{ _docker_expected_log_max_file }}' in daemon.json
    success_msg: >-
      log-opts.max-file={{ _docker_verify_log_opt_max_file }}
      (expected {{ _docker_expected_log_max_file }})
  when: _docker_expected_log_driver != 'journald'

- name: Assert journald driver does not set file rotation log-opts
  ansible.builtin.assert:
    that:
      - "'max-size' not in _docker_verify_log_opts"
      - "'max-file' not in _docker_verify_log_opts"
    fail_msg: >-
      journald logging should not set file rotation log-opts in daemon.json
    success_msg: >-
      journald logging correctly omits file rotation log-opts
  when: _docker_expected_log_driver == 'journald'

- name: Assert storage-driver in daemon.json
  ansible.builtin.assert:
    that:
      - "'storage-driver' in _docker_verify_daemon_dict"
      - "_docker_verify_daemon_dict['storage-driver'] == _docker_expected_storage_driver"
    fail_msg: "storage-driver not set to '{{ _docker_expected_storage_driver }}' in daemon.json"
    success_msg: >-
      storage-driver={{ _docker_verify_daemon_dict['storage-driver'] }}
      (expected {{ _docker_expected_storage_driver }})
