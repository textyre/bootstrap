---
- name: Assert empty Docker storage driver is rejected before mutation
  block:

    - name: Try docker role with empty storage driver
      ansible.builtin.include_role:
        name: docker
      vars:
        docker_manage_daemon: false
        docker_enable_service: false
        docker_add_user_to_group: false
        docker_storage_driver: ""

    - name: Fail when empty Docker storage driver is accepted
      ansible.builtin.fail:
        msg: "docker_storage_driver='' should be rejected before host mutation"

  rescue:

    - name: Assert empty Docker storage driver failed in validation
      ansible.builtin.assert:
        that:
          - ansible_failed_result.msg is search('docker_storage_driver must be one of')
        fail_msg: >-
          Empty storage driver failed for an unexpected reason:
          {{ ansible_failed_result.msg | default(ansible_failed_result) }}
        success_msg: "docker_storage_driver='' is rejected by role core"

- name: Assert legacy vfs Docker storage driver is rejected before mutation
  block:

    - name: Try docker role with legacy vfs storage driver
      ansible.builtin.include_role:
        name: docker
      vars:
        docker_manage_daemon: false
        docker_enable_service: false
        docker_add_user_to_group: false
        docker_storage_driver: "vfs"

    - name: Fail when legacy vfs Docker storage driver is accepted
      ansible.builtin.fail:
        msg: "docker_storage_driver='vfs' should be rejected before host mutation"

  rescue:

    - name: Assert legacy vfs Docker storage driver failed in validation
      ansible.builtin.assert:
        that:
          - ansible_failed_result.msg is search('docker_storage_driver must be one of')
        fail_msg: >-
          Legacy vfs storage driver failed for an unexpected reason:
          {{ ansible_failed_result.msg | default(ansible_failed_result) }}
        success_msg: "docker_storage_driver='vfs' is rejected by role core"

- name: Assert Docker managed daemon keys are rejected in daemon overwrite
  block:

    - name: Try docker role with managed storage-driver daemon overwrite
      ansible.builtin.include_role:
        name: docker
      vars:
        docker_manage_daemon: false
        docker_enable_service: false
        docker_add_user_to_group: false
        docker_storage_driver: "overlay2"
        docker_daemon_overwrite:
          storage-driver: "btrfs"

    - name: Fail when managed daemon key overwrite is accepted
      ansible.builtin.fail:
        msg: "docker_daemon_overwrite.storage-driver should be rejected before host mutation"

  rescue:

    - name: Assert managed daemon key overwrite failed in validation
      ansible.builtin.assert:
        that:
          - ansible_failed_result.msg is search('docker_daemon_overwrite is only for daemon settings')
        fail_msg: >-
          Managed daemon key overwrite failed for an unexpected reason:
          {{ ansible_failed_result.msg | default(ansible_failed_result) }}
        success_msg: "docker_daemon_overwrite.storage-driver is rejected by role core"
