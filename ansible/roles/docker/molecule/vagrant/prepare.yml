---
- name: Prepare Docker virtual machines
  ansible.builtin.import_playbook: ../../../../molecule/shared/prepare-vagrant.yml

- name: Install Docker test prerequisite
  hosts: all
  become: true
  gather_facts: true
  vars:
    _docker_test_packages:
      Archlinux: docker
      Debian: docker.io
  tasks:
    - name: Install Docker Engine for role testing
      ansible.builtin.package:
        name: "{{ _docker_test_packages[ansible_facts['os_family']] }}"
        state: present
