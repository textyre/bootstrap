---
# Deploy and validate /etc/docker/daemon.json.
docker_manage_daemon: true

# Container logging driver. Non-systemd hosts use Docker's local driver because
# they do not provide the journald socket.
docker_log_driver: "{{ 'journald' if ansible_facts['service_mgr'] == 'systemd' else 'local' }}"

# Maximum container log size for drivers that support rotation options.
docker_log_max_size: "10m"

# Number of rotated container log files to retain.
docker_log_max_file: "3"

# Docker storage driver. Changing it on a populated host requires data migration.
# Allowed: overlay2, btrfs, zfs, fuse-overlayfs.
docker_storage_driver: "overlay2"

# Remap container UIDs away from host UIDs. Empty string disables remapping.
# The default can affect writable bind mounts; named volumes are preferred.
docker_userns_remap: "default"

# Allow communication between containers on the same Docker network.
# Isolate workloads with separate user-defined networks.
docker_icc: true

# Keep running containers alive while the Docker daemon restarts.
docker_live_restore: true

# Prevent containers from gaining additional privileges through setuid binaries.
docker_no_new_privileges: true

# Additional daemon settings not represented by dedicated docker_* variables.
# Keys already managed by this role are rejected during validation.
docker_daemon_extra: {}
# Example:
# docker_daemon_extra:
#   dns: ["8.8.8.8"]
#   default-address-pools:
#     - {base: "172.80.0.0/16", size: 24}
