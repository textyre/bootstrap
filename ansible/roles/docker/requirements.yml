---
# Role dependencies for docker (TEST-010).
# The 'common' role is used via include_role for report_phase and report_render.
#
# Resolution: molecule provisioner sets ANSIBLE_ROLES_PATH to the monorepo
# ansible/roles directory, so 'common' is resolved directly from source.
# The common role is local to this monorepo and is resolved without Galaxy.
roles:
  - name: common
