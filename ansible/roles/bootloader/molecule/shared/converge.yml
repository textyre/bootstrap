---
- name: Converge bootloader role
  hosts: all
  become: true
  gather_facts: true
  vars:
    bootloader_type: limine
    bootloader_limine_bios_install_target: /tmp/bootloader-test/dev/disk/by-id/test-system-disk
    bootloader_limine_validate_target_block_device: false
    bootloader_install_target_file: /tmp/bootloader-test/etc/limine/install-target
    bootloader_limine_pacman_hook_file: /tmp/bootloader-test/etc/pacman.d/hooks/99-limine.hook
    bootloader_limine_boot_dir: /tmp/bootloader-test/boot/limine
    bootloader_limine_config_file: /tmp/bootloader-test/boot/limine/limine.conf
    bootloader_limine_binary: /tmp/bootloader-test/usr/bin/limine
    bootloader_limine_bios_sys_source: /tmp/bootloader-test/usr/share/limine/limine-bios.sys
  pre_tasks:
    - name: Create fake Limine test directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        owner: root
        group: root
        mode: "0755"
      loop:
        - /tmp/bootloader-test/boot/limine
        - /tmp/bootloader-test/usr/bin
        - /tmp/bootloader-test/usr/share/limine
        - /tmp/bootloader-test/etc/pacman.d/hooks
        - /tmp/bootloader-test/dev/disk/by-id

    - name: Create fake Limine artifacts
      ansible.builtin.copy:
        dest: "{{ item.dest }}"
        content: "{{ item.content }}"
        owner: root
        group: root
        mode: "{{ item.mode }}"
      loop:
        - dest: /tmp/bootloader-test/boot/limine/limine.conf
          content: "timeout: 5\n"
          mode: "0644"
        - dest: /tmp/bootloader-test/usr/bin/limine
          content: "#!/usr/bin/env sh\nexit 0\n"
          mode: "0755"
        - dest: /tmp/bootloader-test/usr/share/limine/limine-bios.sys
          content: "fake-limine-bios\n"
          mode: "0644"

    - name: Seed stale archinstall Limine hook
      ansible.builtin.copy:
        dest: /tmp/bootloader-test/etc/pacman.d/hooks/99-limine.hook
        force: false
        owner: root
        group: root
        mode: "0644"
        content: |
          [Trigger]
          Operation = Install
          Operation = Upgrade
          Type = Package
          Target = limine

          [Action]
          Description = Deploying Limine after upgrade...
          When = PostTransaction
          Exec = /bin/sh -c "/usr/bin/limine bios-install /dev/disk/by-id/ata-VBOX_HARDDISK_VBold && /usr/bin/cp /usr/share/limine/limine-bios.sys /boot/limine/"

  roles:
    - role: bootloader
