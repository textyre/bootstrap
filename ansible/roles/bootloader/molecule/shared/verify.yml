---
- name: Verify bootloader role source boundary
  hosts: localhost
  gather_facts: false
  vars:
    _bootloader_test_project_dir: "{{ lookup('env', 'MOLECULE_PROJECT_DIRECTORY') }}"
    _bootloader_test_role_dir: >-
      {{
        _bootloader_test_project_dir
        if (_bootloader_test_project_dir | basename) == 'bootloader'
        else _bootloader_test_project_dir ~ '/roles/bootloader'
      }}
  tasks:
    - name: Read bootloader task sources
      ansible.builtin.set_fact:
        _bootloader_task_sources: >-
          {{
            lookup('ansible.builtin.file', _bootloader_test_role_dir ~ '/tasks/main.yml')
            ~ '\n'
            ~ lookup('ansible.builtin.file', _bootloader_test_role_dir ~ '/tasks/validate.yml')
            ~ '\n'
            ~ lookup('ansible.builtin.file', _bootloader_test_role_dir ~ '/tasks/detect.yml')
            ~ '\n'
            ~ lookup('ansible.builtin.file', _bootloader_test_role_dir ~ '/tasks/detect_backend.yml')
          }}

    - name: Assert bootloader role stays generic
      ansible.builtin.assert:
        that:
          - "'limine bios-install' not in _bootloader_task_sources"
          - "'limine_bios_install_target' not in _bootloader_task_sources"
          - "'pacman' not in _bootloader_task_sources"
          - "'ansible.builtin.reboot' not in _bootloader_task_sources"
          - "'upgrade: true' not in _bootloader_task_sources"
          - "'role: system_update' not in _bootloader_task_sources"
          - "'role: workstation' not in _bootloader_task_sources"
        fail_msg: "bootloader role must stay generic and delegate backend-specific behavior."
        success_msg: "bootloader role delegates backend-specific behavior."
