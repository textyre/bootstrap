---
# ---- Verify Limine backend state ----

- name: Stat Limine install target file
  ansible.builtin.stat:
    path: "{{ bootloader_install_target_file }}"
  register: _bootloader_verify_target_file
  tags: ['bootloader', 'bootloader:verify']

- name: Read Limine install target file
  ansible.builtin.slurp:
    src: "{{ bootloader_install_target_file }}"
  register: _bootloader_verify_target_raw
  when: _bootloader_verify_target_file.stat.exists
  tags: ['bootloader', 'bootloader:verify']

- name: Set Limine verify target fact
  ansible.builtin.set_fact:
    _bootloader_verify_target_text: "{{ _bootloader_verify_target_raw.content | b64decode | trim }}"
  when: _bootloader_verify_target_file.stat.exists
  tags: ['bootloader', 'bootloader:verify']

- name: Assert Limine install target file is valid
  ansible.builtin.assert:
    that:
      - _bootloader_verify_target_file.stat.exists
      - _bootloader_verify_target_file.stat.isreg
      - _bootloader_verify_target_file.stat.pw_name == 'root'
      - _bootloader_verify_target_file.stat.gr_name == 'root'
      - _bootloader_verify_target_file.stat.mode == '0644'
      - _bootloader_verify_target_text | length > 0
    fail_msg: "{{ bootloader_install_target_file }} is missing, empty, or has wrong permissions."
    success_msg: "Limine install target file is present"
  tags: ['bootloader', 'bootloader:verify']

- name: Stat Limine install target block device
  ansible.builtin.stat:
    path: "{{ _bootloader_verify_target_text }}"
    follow: true
  register: _bootloader_verify_target_stat
  when: bootloader_limine_validate_target_block_device | bool
  tags: ['bootloader', 'bootloader:verify']

- name: Assert Limine install target points to block device
  ansible.builtin.assert:
    that:
      - _bootloader_verify_target_stat.stat.exists
      - _bootloader_verify_target_stat.stat.isblk
    fail_msg: "{{ _bootloader_verify_target_text }} is not a block device."
    success_msg: "Limine install target points to a block device"
  when: bootloader_limine_validate_target_block_device | bool
  tags: ['bootloader', 'bootloader:verify']

- name: Stat Limine pacman hook
  ansible.builtin.stat:
    path: "{{ bootloader_limine_pacman_hook_file }}"
  register: _bootloader_verify_hook_file
  when: bootloader_manage_update_hook | bool
  tags: ['bootloader', 'bootloader:verify']

- name: Read Limine pacman hook
  ansible.builtin.slurp:
    src: "{{ bootloader_limine_pacman_hook_file }}"
  register: _bootloader_verify_hook_raw
  when:
    - bootloader_manage_update_hook | bool
    - _bootloader_verify_hook_file.stat.exists
  tags: ['bootloader', 'bootloader:verify']

- name: Set Limine hook text fact
  ansible.builtin.set_fact:
    _bootloader_verify_hook_text: "{{ _bootloader_verify_hook_raw.content | b64decode }}"
  when:
    - bootloader_manage_update_hook | bool
    - _bootloader_verify_hook_file.stat.exists
  tags: ['bootloader', 'bootloader:verify']

- name: Assert Limine hook content is clone-safe
  ansible.builtin.assert:
    that:
      - _bootloader_verify_hook_file.stat.exists
      - _bootloader_verify_hook_file.stat.isreg
      - _bootloader_verify_hook_file.stat.pw_name == 'root'
      - _bootloader_verify_hook_file.stat.gr_name == 'root'
      - _bootloader_verify_hook_file.stat.mode == '0644'
      - bootloader_install_target_file in _bootloader_verify_hook_text
      - _bootloader_verify_hook_text is regex('(?m)^Target = limine$')
      - _bootloader_verify_hook_text is regex('(?m)^When = PostTransaction$')
      - not (_bootloader_verify_hook_text is regex('Exec = .*\\/dev\\/disk\\/by-id\\/ata-VBOX_HARDDISK_'))
    fail_msg: "{{ bootloader_limine_pacman_hook_file }} is missing or still embeds a disk id."
    success_msg: "Limine hook reads the machine-local install target"
  when: bootloader_manage_update_hook | bool
  tags: ['bootloader', 'bootloader:verify']

- name: Stat Limine binary
  ansible.builtin.stat:
    path: "{{ bootloader_limine_binary }}"
  register: _bootloader_verify_limine_binary
  tags: ['bootloader', 'bootloader:verify']

- name: Stat Limine BIOS system file
  ansible.builtin.stat:
    path: "{{ bootloader_limine_bios_sys_source }}"
  register: _bootloader_verify_limine_bios_sys
  tags: ['bootloader', 'bootloader:verify']

- name: Stat Limine boot directory
  ansible.builtin.stat:
    path: "{{ bootloader_limine_boot_dir }}"
  register: _bootloader_verify_limine_boot_dir
  tags: ['bootloader', 'bootloader:verify']

- name: Assert Limine files exist
  ansible.builtin.assert:
    that:
      - _bootloader_verify_limine_binary.stat.exists
      - _bootloader_verify_limine_bios_sys.stat.exists
      - _bootloader_verify_limine_boot_dir.stat.exists
      - _bootloader_verify_limine_boot_dir.stat.isdir
    fail_msg: "Limine binary, limine-bios.sys, or boot directory is missing."
    success_msg: "Limine files are present"
  tags: ['bootloader', 'bootloader:verify']

- name: "Report: Verify Limine backend"
  ansible.builtin.include_role:
    name: common
    tasks_from: report_phase.yml
  vars:
    common_rpt_fact: "_bootloader_phases"
    common_rpt_phase: "Verify Limine backend"
    common_rpt_detail: "{{ _bootloader_verify_target_text }}"
  tags: ['bootloader', 'report']
