---
# ---- Preflight ----

- name: Assert supported operating system
  ansible.builtin.include_role:
    name: common
    tasks_from: assert_supported_os.yml
  vars:
    common_assert_role: bootloader
    common_assert_supported_os: "{{ bootloader_supported_os }}"
    common_assert_actual_os: "{{ ansible_facts['os_family'] }}"
  tags: ['bootloader', 'bootloader:validate']

- name: Assert bootloader_type is valid
  ansible.builtin.assert:
    that:
      - bootloader_type in (['auto', 'none'] + (bootloader_backends | map(attribute='name') | list))
    fail_msg: >-
      bootloader_type must be auto, none, or one of:
      {{ bootloader_backends | map(attribute='name') | join(', ') }}.
    success_msg: "bootloader_type={{ bootloader_type }} is valid"
  tags: ['bootloader', 'bootloader:validate']

- name: Assert bootloader backend definitions are valid
  ansible.builtin.assert:
    that:
      - item.name is defined
      - item.name | length > 0
      - item.role is defined
      - item.role | length > 0
      - item.detection is defined
      - item.detection.paths is defined
      - item.detection.paths | length > 0
    fail_msg: >-
      Each bootloader backend must declare name, role and detection.paths.
      Invalid backend: {{ item }}.
    success_msg: "Bootloader backend '{{ item.name }}' definition is valid"
  loop: "{{ bootloader_backends }}"
  tags: ['bootloader', 'bootloader:validate']

- name: "Report: Validate inputs"
  ansible.builtin.include_role:
    name: common
    tasks_from: report_phase.yml
  vars:
    common_rpt_fact: "_bootloader_phases"
    common_rpt_phase: "Validate inputs"
    common_rpt_detail: "{{ bootloader_type }}"
  tags: ['bootloader', 'report']
