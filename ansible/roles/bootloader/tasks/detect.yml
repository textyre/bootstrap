---
# ---- Generic bootloader detection ----

- name: Reset detected bootloader backend list
  ansible.builtin.set_fact:
    bootloader_detected_backends: []
  tags: ['bootloader', 'bootloader:detect']

- name: Check known bootloader backend artifacts
  ansible.builtin.include_tasks: detect_backend.yml
  loop: "{{ bootloader_backends }}"
  loop_control:
    loop_var: _bootloader_backend
    label: "{{ _bootloader_backend.name }}"
  tags: ['bootloader', 'bootloader:detect']

- name: Set effective bootloader type
  ansible.builtin.set_fact:
    bootloader_effective_type: >-
      {% if bootloader_type == 'none' %}
      none
      {% elif bootloader_type != 'auto' %}
      {{ bootloader_type }}
      {% elif bootloader_detected_backends | length > 0 %}
      {{ bootloader_detected_backends | first }}
      {% else %}
      none
      {% endif %}
  tags: ['bootloader', 'bootloader:detect']

- name: Normalize effective bootloader type
  ansible.builtin.set_fact:
    bootloader_effective_type: "{{ bootloader_effective_type | trim }}"
  tags: ['bootloader', 'bootloader:detect']

- name: Set selected bootloader backend
  ansible.builtin.set_fact:
    bootloader_selected_backend: >-
      {{
        (bootloader_backends
          | selectattr('name', 'equalto', bootloader_effective_type)
          | list
          | first)
        if bootloader_effective_type != 'none'
        else {}
      }}
  tags: ['bootloader', 'bootloader:detect']

- name: Assert selected bootloader backend exists
  ansible.builtin.assert:
    that:
      - bootloader_effective_type == 'none' or bootloader_selected_backend.role is defined
    fail_msg: "No backend role is configured for bootloader type '{{ bootloader_effective_type }}'."
    success_msg: "Bootloader backend selection is valid"
  tags: ['bootloader', 'bootloader:detect']

- name: "Report: Detect bootloader"
  ansible.builtin.include_role:
    name: common
    tasks_from: report_phase.yml
  vars:
    common_rpt_fact: "_bootloader_phases"
    common_rpt_phase: "Detect bootloader"
    common_rpt_detail: "{{ bootloader_effective_type }}"
  tags: ['bootloader', 'report']
