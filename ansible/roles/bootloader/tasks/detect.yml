---
# ---- Generic bootloader backend selection ----

- name: Reset detected bootloader backend list
  ansible.builtin.set_fact:
    bootloader_detected_backends: []
  tags: ['bootloader', 'bootloader:detect']

- name: Stat bootloader backend detection artifacts
  ansible.builtin.stat:
    path: "{{ item.1 }}"
  loop: "{{ bootloader_backends | subelements('detection.paths') }}"
  loop_control:
    label: "{{ item.0.name }}:{{ item.1 }}"
  register: _bootloader_backend_artifacts
  tags: ['bootloader', 'bootloader:detect']

- name: Record detected bootloader backends
  ansible.builtin.set_fact:
    bootloader_detected_backends: >-
      {{ (bootloader_detected_backends + [item.item.0.name]) | unique | list }}
  loop: "{{ _bootloader_backend_artifacts.results }}"
  loop_control:
    label: "{{ item.item.0.name }}"
  when: item.stat.exists
  tags: ['bootloader', 'bootloader:detect']

- name: Select bootloader backend type
  ansible.builtin.set_fact:
    bootloader_selected_type: >-
      {{
        (
          'none'
          if bootloader_type == 'none'
          else bootloader_type
          if bootloader_type != 'auto'
          else (bootloader_detected_backends | first | default('none'))
        ) | trim
      }}
  tags: ['bootloader', 'bootloader:detect']

- name: Set selected bootloader backend
  ansible.builtin.set_fact:
    bootloader_selected_backend: >-
      {{
        (bootloader_backends
          | selectattr('name', 'equalto', bootloader_selected_type)
          | list
          | first)
        if bootloader_selected_type != 'none'
        else {}
      }}
  tags: ['bootloader', 'bootloader:detect']

- name: Assert selected bootloader backend exists
  ansible.builtin.assert:
    that:
      - bootloader_selected_type == 'none' or bootloader_selected_backend.role is defined
    fail_msg: "No backend role is configured for bootloader type '{{ bootloader_selected_type }}'."
    success_msg: "Bootloader backend selection is valid"
  tags: ['bootloader', 'bootloader:detect']

- name: "Report: Detect bootloader"
  ansible.builtin.include_role:
    name: common
    tasks_from: report_phase.yml
  vars:
    common_rpt_fact: "_bootloader_phases"
    common_rpt_phase: "Detect bootloader"
    common_rpt_detail: "{{ bootloader_selected_type }}"
  tags: ['bootloader', 'report']
