---
- name: Verify power_management role
  hosts: all
  become: true
  gather_facts: true

  vars:
    # Expected values must match the converge.yml role configuration.
    # Defined here because set_fact in converge post_tasks does not persist
    # across Molecule plays (converge → verify are separate Ansible runs).
    power_management_verify_expected_governor: schedutil
    power_management_verify_expected_hibernate_mode: platform
    power_management_verify_expected_lid_switch: suspend
    power_management_verify_expected_lid_switch_ac: suspend
    power_management_verify_expected_lid_switch_docked: ignore
    power_management_verify_expected_power_key: poweroff
    power_management_verify_expected_suspend_key: suspend
    power_management_verify_expected_hibernate_key: ignore
    power_management_verify_expected_idle_action: ignore
    power_management_verify_expected_idle_action_sec: 30min
    power_management_verify_expected_audit_schedule: daily

  tasks:

    # ==== Environment Detection ====

    - name: Read DMI chassis type
      ansible.builtin.slurp:
        src: /sys/class/dmi/id/chassis_type
      register: power_management_verify_chassis
      failed_when: false

    - name: Set laptop detection fact
      ansible.builtin.set_fact:
        power_management_verify_is_laptop: >-
          {{ (power_management_verify_force_laptop | default(false) | bool) or
             ('content' in power_management_verify_chassis and
              (power_management_verify_chassis.content | b64decode | trim) in ['8', '9', '10', '14', '30', '31', '32']) }}

    - name: Check if cpufreq is available
      ansible.builtin.stat:
        path: /sys/devices/system/cpu/cpu0/cpufreq/scaling_governor
      register: power_management_verify_cpufreq_available

    # ==== Package Checks ====

    - name: Gather package facts
      ansible.builtin.package_facts:
        manager: auto

    - name: Assert cpupower is installed (Arch)
      ansible.builtin.assert:
        that: "'cpupower' in ansible_facts.packages"
        fail_msg: "cpupower package not installed"
        success_msg: "cpupower package installed"
      when: ansible_facts['os_family'] == 'Archlinux'

    - name: Assert linux-cpupower or linux-tools-common is installed (Debian)
      ansible.builtin.assert:
        that: >-
          'linux-cpupower' in ansible_facts.packages or
          'linux-tools-common' in ansible_facts.packages
        fail_msg: "Neither linux-cpupower nor linux-tools-common installed"
        success_msg: "cpupower tooling installed (Debian)"
      when: ansible_facts['os_family'] == 'Debian'

    # ---- TLP (laptop path) ----

    - name: Assert TLP package is installed (laptop)
      ansible.builtin.assert:
        that: "'tlp' in ansible_facts.packages"
        fail_msg: "TLP not installed on laptop"
        success_msg: "TLP package installed"
      when: power_management_verify_is_laptop

    - name: Gather service facts for TLP verification
      ansible.builtin.service_facts:
      when: power_management_verify_is_laptop

    - name: Assert TLP service is active (laptop)
      ansible.builtin.assert:
        that:
          - "'tlp.service' in ansible_facts.services"
          - ansible_facts.services['tlp.service'].state | default('unknown') != 'failed'
        fail_msg: >-
          TLP service is not active
          (state: {{ ansible_facts.services['tlp.service'].state | default('not found') }})
        success_msg: "TLP service is active"
      when: power_management_verify_is_laptop

    - name: Stat /etc/tlp.conf (laptop)
      ansible.builtin.stat:
        path: /etc/tlp.conf
      register: power_management_verify_tlp_conf
      when: power_management_verify_is_laptop

    - name: Assert /etc/tlp.conf deployed with correct permissions (laptop)
      ansible.builtin.assert:
        that:
          - power_management_verify_tlp_conf.stat.exists
          - power_management_verify_tlp_conf.stat.pw_name == 'root'
          - power_management_verify_tlp_conf.stat.gr_name == 'root'
          - power_management_verify_tlp_conf.stat.mode == '0644'
        fail_msg: "/etc/tlp.conf missing or wrong permissions (mode={{ power_management_verify_tlp_conf.stat.mode | default('?') }})"
        success_msg: "/etc/tlp.conf deployed with correct permissions"
      when:
        - power_management_verify_is_laptop
        - power_management_verify_tlp_conf is not skipped

    - name: Read /etc/tlp.conf content (laptop)
      ansible.builtin.slurp:
        src: /etc/tlp.conf
      register: power_management_verify_tlp_conf_content
      when:
        - power_management_verify_is_laptop
        - power_management_verify_tlp_conf.stat.exists | default(false)

    - name: Assert /etc/tlp.conf is Ansible-managed with expected CPU directives (laptop)
      ansible.builtin.assert:
        that:
          - "'Managed by Ansible' in (power_management_verify_tlp_conf_content.content | b64decode)"
          - "'CPU_SCALING_GOVERNOR_ON_AC=' in (power_management_verify_tlp_conf_content.content | b64decode)"
          - "'CPU_SCALING_GOVERNOR_ON_BAT=' in (power_management_verify_tlp_conf_content.content | b64decode)"
        fail_msg: "/etc/tlp.conf missing Ansible header or CPU governor directives"
        success_msg: "/etc/tlp.conf contains Ansible header and CPU directives"
      when:
        - power_management_verify_is_laptop
        - power_management_verify_tlp_conf_content is not skipped

    # ==== Config File Deployment Checks ====

    # ---- sleep.conf ----

    - name: Stat /etc/systemd/sleep.conf
      ansible.builtin.stat:
        path: /etc/systemd/sleep.conf
      register: power_management_verify_sleep

    - name: Assert sleep.conf exists with correct permissions
      ansible.builtin.assert:
        that:
          - power_management_verify_sleep.stat.exists
          - power_management_verify_sleep.stat.pw_name == 'root'
          - power_management_verify_sleep.stat.gr_name == 'root'
          - power_management_verify_sleep.stat.mode == '0644'
        fail_msg: "sleep.conf missing or wrong permissions"
        success_msg: "sleep.conf deployed with correct permissions"

    - name: Read sleep.conf content
      ansible.builtin.slurp:
        src: /etc/systemd/sleep.conf
      register: power_management_verify_sleep_content

    - name: Set sleep.conf text fact
      ansible.builtin.set_fact:
        power_management_verify_sleep_text: "{{ power_management_verify_sleep_content.content | b64decode }}"

    - name: Assert sleep.conf contains Ansible header
      ansible.builtin.assert:
        that: "'Managed by Ansible' in power_management_verify_sleep_text"
        fail_msg: "sleep.conf missing Ansible managed header"

    - name: Assert sleep.conf contains expected HibernateMode
      ansible.builtin.assert:
        that: "'HibernateMode=' ~ power_management_verify_expected_hibernate_mode in power_management_verify_sleep_text"
        fail_msg: >-
          sleep.conf does not contain HibernateMode={{ power_management_verify_expected_hibernate_mode }}.
          Content: {{ power_management_verify_sleep_text | regex_search('HibernateMode=.*') | default('not found') }}
        success_msg: "sleep.conf HibernateMode={{ power_management_verify_expected_hibernate_mode }} confirmed"

    - name: Assert sleep.conf contains [Sleep] section
      ansible.builtin.assert:
        that: "'[Sleep]' in power_management_verify_sleep_text"
        fail_msg: "sleep.conf missing [Sleep] section header"

    # ---- logind.conf ----

    - name: Stat /etc/systemd/logind.conf
      ansible.builtin.stat:
        path: /etc/systemd/logind.conf
      register: power_management_verify_logind

    - name: Assert logind.conf exists with correct permissions
      ansible.builtin.assert:
        that:
          - power_management_verify_logind.stat.exists
          - power_management_verify_logind.stat.pw_name == 'root'
          - power_management_verify_logind.stat.gr_name == 'root'
          - power_management_verify_logind.stat.mode == '0644'
        fail_msg: "logind.conf missing or wrong permissions"
        success_msg: "logind.conf deployed with correct permissions"

    - name: Read logind.conf content
      ansible.builtin.slurp:
        src: /etc/systemd/logind.conf
      register: power_management_verify_logind_content

    - name: Set logind.conf text fact
      ansible.builtin.set_fact:
        power_management_verify_logind_text: "{{ power_management_verify_logind_content.content | b64decode }}"

    - name: Assert logind.conf contains expected directives
      ansible.builtin.assert:
        that:
          - "'HandleLidSwitch=' ~ power_management_verify_expected_lid_switch in power_management_verify_logind_text"
          - "'HandleLidSwitchExternalPower=' ~ power_management_verify_expected_lid_switch_ac in power_management_verify_logind_text"
          - "'HandleLidSwitchDocked=' ~ power_management_verify_expected_lid_switch_docked in power_management_verify_logind_text"
          - "'HandlePowerKey=' ~ power_management_verify_expected_power_key in power_management_verify_logind_text"
          - "'HandleSuspendKey=' ~ power_management_verify_expected_suspend_key in power_management_verify_logind_text"
          - "'HandleHibernateKey=' ~ power_management_verify_expected_hibernate_key in power_management_verify_logind_text"
          - "'IdleAction=' ~ power_management_verify_expected_idle_action in power_management_verify_logind_text"
          - "'IdleActionSec=' ~ power_management_verify_expected_idle_action_sec in power_management_verify_logind_text"
        fail_msg: "logind.conf missing expected directives"
        success_msg: "logind.conf contains all expected power action directives"

    - name: Assert logind.conf contains [Login] section
      ansible.builtin.assert:
        that: "'[Login]' in power_management_verify_logind_text"
        fail_msg: "logind.conf missing [Login] section header"

    # ---- udev governor rule (desktop path) ----

    - name: Stat /etc/udev/rules.d/50-cpu-governor.rules
      ansible.builtin.stat:
        path: /etc/udev/rules.d/50-cpu-governor.rules
      register: power_management_verify_udev_rule
      when: not power_management_verify_is_laptop

    - name: Assert udev governor rule exists (desktop)
      ansible.builtin.assert:
        that:
          - power_management_verify_udev_rule.stat.exists
          - power_management_verify_udev_rule.stat.mode == '0644'
        fail_msg: "50-cpu-governor.rules missing or wrong permissions"
        success_msg: "udev governor rule deployed"
      when: not power_management_verify_is_laptop

    - name: Read udev governor rule content
      ansible.builtin.slurp:
        src: /etc/udev/rules.d/50-cpu-governor.rules
      register: power_management_verify_udev_content
      when:
        - not power_management_verify_is_laptop
        - power_management_verify_udev_rule.stat.exists | default(false)

    - name: Assert udev rule contains correct governor
      ansible.builtin.assert:
        that:
          - "'SUBSYSTEM==\"cpu\"' in (power_management_verify_udev_content.content | b64decode)"
          - "'scaling_governor' in (power_management_verify_udev_content.content | b64decode)"
          - "power_management_verify_expected_governor in (power_management_verify_udev_content.content | b64decode)"
        fail_msg: >-
          udev rule does not contain expected governor '{{ power_management_verify_expected_governor }}'.
          Content: {{ power_management_verify_udev_content.content | b64decode }}
        success_msg: "udev rule contains correct governor ({{ power_management_verify_expected_governor }})"
      when:
        - not power_management_verify_is_laptop
        - power_management_verify_udev_content is not skipped

    # ==== Audit Infrastructure Checks ====

    - name: Stat /usr/local/bin/power-audit.sh
      ansible.builtin.stat:
        path: /usr/local/bin/power-audit.sh
      register: power_management_verify_audit_script

    - name: Assert power-audit.sh deployed and executable
      ansible.builtin.assert:
        that:
          - power_management_verify_audit_script.stat.exists
          - power_management_verify_audit_script.stat.mode == '0755'
          - power_management_verify_audit_script.stat.pw_name == 'root'
        fail_msg: "power-audit.sh missing or wrong permissions"
        success_msg: "power-audit.sh deployed with mode 0755"

    - name: Read power-audit.sh content
      ansible.builtin.slurp:
        src: /usr/local/bin/power-audit.sh
      register: power_management_verify_audit_content

    - name: Assert audit script contains expected checks
      ansible.builtin.assert:
        that:
          - "'#!/usr/bin/env bash' in (power_management_verify_audit_content.content | b64decode)"
          - "'power-audit' in (power_management_verify_audit_content.content | b64decode)"
          - "'scaling_governor' in (power_management_verify_audit_content.content | b64decode)"
          - "'tlp-stat' in (power_management_verify_audit_content.content | b64decode)"
        fail_msg: "power-audit.sh missing expected content"
        success_msg: "power-audit.sh contains expected audit checks"

    - name: Verify audit script has valid bash syntax
      ansible.builtin.command: bash -n /usr/local/bin/power-audit.sh
      changed_when: false

    - name: Stat /etc/systemd/system/power-audit.service
      ansible.builtin.stat:
        path: /etc/systemd/system/power-audit.service
      register: power_management_verify_audit_service

    - name: Assert power-audit.service unit deployed
      ansible.builtin.assert:
        that:
          - power_management_verify_audit_service.stat.exists
          - power_management_verify_audit_service.stat.mode == '0644'
        fail_msg: "power-audit.service unit missing"
        success_msg: "power-audit.service unit deployed"

    - name: Read power-audit.service content
      ansible.builtin.slurp:
        src: /etc/systemd/system/power-audit.service
      register: power_management_verify_audit_service_content

    - name: Assert power-audit.service ExecStart points to correct script
      ansible.builtin.assert:
        that: "'ExecStart=/usr/local/bin/power-audit.sh' in (power_management_verify_audit_service_content.content | b64decode)"
        fail_msg: "power-audit.service ExecStart does not reference /usr/local/bin/power-audit.sh"
        success_msg: "power-audit.service ExecStart verified"

    - name: Stat /etc/systemd/system/power-audit.timer
      ansible.builtin.stat:
        path: /etc/systemd/system/power-audit.timer
      register: power_management_verify_audit_timer

    - name: Assert power-audit.timer unit deployed
      ansible.builtin.assert:
        that:
          - power_management_verify_audit_timer.stat.exists
          - power_management_verify_audit_timer.stat.mode == '0644'
        fail_msg: "power-audit.timer unit missing"
        success_msg: "power-audit.timer unit deployed"

    - name: Read power-audit.timer content
      ansible.builtin.slurp:
        src: /etc/systemd/system/power-audit.timer
      register: power_management_verify_audit_timer_content

    - name: Assert power-audit.timer contains expected directives
      ansible.builtin.assert:
        that:
          - "'OnCalendar=' ~ power_management_verify_expected_audit_schedule in (power_management_verify_audit_timer_content.content | b64decode)"
          - "'RandomizedDelaySec=' in (power_management_verify_audit_timer_content.content | b64decode)"
          - "'Persistent=true' in (power_management_verify_audit_timer_content.content | b64decode)"
        fail_msg: "power-audit.timer missing expected timer directives (expected OnCalendar={{ power_management_verify_expected_audit_schedule }})"
        success_msg: "power-audit.timer contains OnCalendar={{ power_management_verify_expected_audit_schedule }} + RandomizedDelaySec + Persistent"

    - name: Gather service facts for timer and conflict checks
      ansible.builtin.service_facts:

    - name: Assert power-audit.timer is enabled
      ansible.builtin.assert:
        that:
          - "'power-audit.timer' in ansible_facts.services"
          - ansible_facts.services['power-audit.timer'].status | default('unknown') == 'enabled'
        fail_msg: "power-audit.timer is not enabled (status: {{ ansible_facts.services['power-audit.timer'].status | default('not found') }})"
        success_msg: "power-audit.timer is enabled"

    - name: Assert power-audit.timer is active
      ansible.builtin.assert:
        that:
          - "'power-audit.timer' in ansible_facts.services"
          - ansible_facts.services['power-audit.timer'].state | default('unknown') == 'active'
        fail_msg: "power-audit.timer is not active (state: {{ ansible_facts.services['power-audit.timer'].state | default('not found') }})"
        success_msg: "power-audit.timer is active"

    # ==== Conflicting Services Masked ====

    - name: Assert power-profiles-daemon is masked or absent
      ansible.builtin.assert:
        that: >-
          'power-profiles-daemon.service' not in ansible_facts.services or
          ansible_facts.services['power-profiles-daemon.service'].status | default('not-found') in ['masked', 'not-found']
        fail_msg: "power-profiles-daemon is not masked (status: {{ ansible_facts.services['power-profiles-daemon.service'].status | default('not found') }})"
        success_msg: "power-profiles-daemon is masked or absent"

    - name: Assert auto-cpufreq is masked or absent
      ansible.builtin.assert:
        that: >-
          'auto-cpufreq.service' not in ansible_facts.services or
          ansible_facts.services['auto-cpufreq.service'].status | default('not-found') in ['masked', 'not-found']
        fail_msg: "auto-cpufreq is not masked (status: {{ ansible_facts.services['auto-cpufreq.service'].status | default('not found') }})"
        success_msg: "auto-cpufreq is masked or absent"

    # ==== Drift Detection State ====

    - name: Stat /var/lib/ansible-power-management
      ansible.builtin.stat:
        path: /var/lib/ansible-power-management
      register: power_management_verify_drift_dir

    - name: Assert drift state directory exists with correct permissions
      ansible.builtin.assert:
        that:
          - power_management_verify_drift_dir.stat.exists
          - power_management_verify_drift_dir.stat.isdir
          - power_management_verify_drift_dir.stat.mode == '0700'
          - power_management_verify_drift_dir.stat.pw_name == 'root'
        fail_msg: "Drift state directory missing or wrong permissions"
        success_msg: "Drift state directory exists (mode 0700, root-owned)"

    - name: Stat drift state file
      ansible.builtin.stat:
        path: /var/lib/ansible-power-management/last_state.json
      register: power_management_verify_drift_state

    - name: Assert drift state file exists with correct permissions
      ansible.builtin.assert:
        that:
          - power_management_verify_drift_state.stat.exists
          - power_management_verify_drift_state.stat.mode == '0600'
        fail_msg: "Drift state file missing or wrong mode"
        success_msg: "Drift state file exists (mode 0600)"

    - name: Read drift state file
      ansible.builtin.slurp:
        src: /var/lib/ansible-power-management/last_state.json
      register: power_management_verify_drift_content

    - name: Assert drift state file is valid JSON with expected keys
      ansible.builtin.assert:
        that:
          - (power_management_verify_drift_content.content | b64decode | from_json).governor is defined
          - (power_management_verify_drift_content.content | b64decode | from_json).is_laptop is defined
          - (power_management_verify_drift_content.content | b64decode | from_json).init_system is defined
          - (power_management_verify_drift_content.content | b64decode | from_json).battery is defined
        fail_msg: "Drift state JSON missing expected keys"
        success_msg: "Drift state JSON contains required fields"

    - name: Set drift state parsed fact
      ansible.builtin.set_fact:
        power_management_verify_drift_json: "{{ power_management_verify_drift_content.content | b64decode | from_json }}"

    - name: Assert drift governor field contains a valid value
      ansible.builtin.assert:
        that:
          - power_management_verify_drift_json.governor in ['schedutil', 'performance', 'powersave', 'ondemand', 'conservative', 'unknown']
        fail_msg: "Drift state has unexpected governor value: '{{ power_management_verify_drift_json.governor }}'"
        success_msg: "Drift state governor: '{{ power_management_verify_drift_json.governor }}'"

    - name: Assert drift state governor matches deployed value (desktop, when cpufreq available)
      ansible.builtin.assert:
        that: power_management_verify_drift_json.governor == power_management_verify_expected_governor
        fail_msg: >-
          Drift state governor='{{ power_management_verify_drift_json.governor }}',
          expected '{{ power_management_verify_expected_governor }}' for desktop
        success_msg: "Drift state governor matches deployed value: {{ power_management_verify_expected_governor }}"
      when:
        - not power_management_verify_is_laptop
        - power_management_verify_cpufreq_available.stat.exists | default(false)

    - name: Assert drift state records correct device type (desktop)
      ansible.builtin.assert:
        that: not (power_management_verify_drift_json.is_laptop | bool)
        fail_msg: "Drift state is_laptop='{{ power_management_verify_drift_json.is_laptop }}', expected false for desktop"
        success_msg: "Drift state device type: desktop"
      when: not power_management_verify_is_laptop

    - name: Assert drift state records init system
      ansible.builtin.assert:
        that: power_management_verify_drift_json.init_system == 'systemd'
        fail_msg: "Drift state init_system='{{ power_management_verify_drift_json.init_system }}', expected 'systemd'"
        success_msg: "Drift state init_system: systemd"

    # ==== CPU Governor (hardware-dependent, conditional) ====

    - name: Read current CPU governor
      ansible.builtin.slurp:
        src: /sys/devices/system/cpu/cpu0/cpufreq/scaling_governor
      register: power_management_verify_governor
      failed_when: false
      when: power_management_verify_cpufreq_available.stat.exists | default(false)

    - name: Assert governor is set (when cpufreq available)
      ansible.builtin.assert:
        that:
          - "'content' in power_management_verify_governor"
          - (power_management_verify_governor.content | b64decode | trim) in ['schedutil', 'performance', 'powersave', 'ondemand', 'conservative']
        fail_msg: "CPU governor not set to a valid value"
        success_msg: "CPU governor: {{ power_management_verify_governor.content | b64decode | trim }}"
      when:
        - power_management_verify_cpufreq_available.stat.exists | default(false)
        - "'content' in power_management_verify_governor"

    - name: Assert governor matches configured value (desktop, when cpufreq available)
      ansible.builtin.assert:
        that:
          - (power_management_verify_governor.content | b64decode | trim) == power_management_verify_expected_governor
        fail_msg: >-
          CPU governor is '{{ power_management_verify_governor.content | b64decode | trim }}',
          expected '{{ power_management_verify_expected_governor }}' (converge configures desktop default).
          Run 'cpupower frequency-info' to diagnose.
        success_msg: "CPU governor '{{ power_management_verify_expected_governor }}' confirmed"
      when:
        - not power_management_verify_is_laptop
        - power_management_verify_cpufreq_available.stat.exists | default(false)
        - "'content' in power_management_verify_governor"

    # ==== Arch-specific: systemd-rfkill masked (laptop path only, informational) ====

    - name: Assert systemd-rfkill masked (Arch laptop)
      ansible.builtin.assert:
        that: >-
          'systemd-rfkill.service' not in ansible_facts.services or
          ansible_facts.services['systemd-rfkill.service'].status | default('not-found') in ['masked', 'not-found']
        fail_msg: "systemd-rfkill not masked on Arch laptop"
        success_msg: "systemd-rfkill is masked"
      when:
        - ansible_facts['os_family'] == 'Archlinux'
        - power_management_verify_is_laptop

    # ==== Summary ====

    - name: Show verification summary
      ansible.builtin.debug:
        msg:
          - "All power_management verification checks passed."
          - "OS: {{ ansible_facts['os_family'] }}"
          - "Device: {{ 'laptop' if power_management_verify_is_laptop else 'desktop' }}"
          - "cpufreq available: {{ power_management_verify_cpufreq_available.stat.exists | default(false) }}"
          - "Expected governor: {{ power_management_verify_expected_governor }}"
          - "Expected hibernate mode: {{ power_management_verify_expected_hibernate_mode }}"
          - "Configs: sleep.conf, logind.conf deployed with correct content"
          - "Udev rule: {{ 'deployed' if not power_management_verify_is_laptop else 'skipped (laptop)' }}"
          - "Audit: script + service + timer deployed, enabled and active"
          - "TLP: {{ 'active' if power_management_verify_is_laptop else 'not applicable (desktop)' }}"
          - "Drift: state directory and file present with correct permissions"
          - "Conflicts: power-profiles-daemon + auto-cpufreq masked/absent"
