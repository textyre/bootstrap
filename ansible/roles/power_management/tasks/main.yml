---
# === power_management — orchestrator ===
# validate -> load vars -> detect -> configure -> report

- name: Configure power management
  when: power_management_enabled | bool
  tags: ['power']
  block:

    - name: Validate role prerequisites
      ansible.builtin.include_tasks:
        file: validate.yml

    - name: Load platform variables
      ansible.builtin.include_tasks:
        file: load_vars.yml

    - name: Detect hardware environment
      ansible.builtin.include_tasks:
        file: detect.yml

    - name: Configure power management stack
      ansible.builtin.include_tasks:
        file: configure/main.yml

    - name: Render power management execution report
      ansible.builtin.include_role:
        name: common
        tasks_from: report_render.yml
      vars:
        common_rpt_fact: "_power_management_phases"
        common_rpt_title: "power_management"
