---
# === power_management / validate ===
# Validate platform prerequisites before mutation.

- name: Assert supported operating system
  ansible.builtin.assert:
    that:
      - ansible_facts['os_family'] in _power_management_supported_os
    fail_msg: >-
      OS family '{{ ansible_facts['os_family'] }}' is not supported.
      Supported: {{ _power_management_supported_os | join(', ') }}
    success_msg: "OS family '{{ ansible_facts['os_family'] }}' is supported"

- name: Assert supported init system
  ansible.builtin.assert:
    that:
      - ansible_facts['service_mgr'] is defined
      - ansible_facts.get('service_mgr', '') in _power_management_supported_init_systems
    fail_msg: >-
      Init system '{{ ansible_facts.get('service_mgr', 'undefined') }}' is not supported.
      Supported: {{ _power_management_supported_init_systems | join(', ') }}
    success_msg: "Init system '{{ ansible_facts['service_mgr'] }}' is supported"

- name: "Report: Validate platform"
  ansible.builtin.include_role:
    name: common
    tasks_from: report_phase.yml
  vars:
    common_rpt_fact: "_power_management_phases"
    common_rpt_phase: "Validate platform"
