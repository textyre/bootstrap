---
# === power_management / detect ===
# Detect the hardware signal needed to choose laptop or desktop mode.

# ---- DMI chassis type ----

- name: Check DMI chassis type path
  ansible.builtin.stat:
    path: /sys/class/dmi/id/chassis_type
  register: _power_management_chassis_path
  when: power_management_device_type == 'auto'

- name: Read DMI chassis type
  ansible.builtin.slurp:
    src: /sys/class/dmi/id/chassis_type
  register: _power_management_chassis_raw
  when:
    - power_management_device_type == 'auto'
    - _power_management_chassis_path.stat.exists | default(false)

# ---- Report ----

- name: "Report: Detect hardware"
  ansible.builtin.include_role:
    name: common
    tasks_from: report_phase.yml
  vars:
    common_rpt_fact: "_power_management_phases"
    common_rpt_phase: "Detect hardware"
    common_rpt_detail: >-
      {{ 'laptop' if _power_management_is_laptop | bool else 'desktop' }}
      (config={{ power_management_device_type }}),
      init={{ ansible_facts['service_mgr'] | default('unknown') }}
