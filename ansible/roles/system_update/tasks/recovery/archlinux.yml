---
- name: "Arch Linux | Check pacman database lock after upgrade"
  ansible.builtin.stat:
    path: "{{ system_update_arch_pacman_lock_file }}"
  register: _system_update_arch_lock
  tags: ['system_update', 'recovery', 'pacman']

- name: "Arch Linux | Wait for package-manager lock holders to finish"
  ansible.builtin.command:
    cmd: ps -eo comm=
  register: _system_update_arch_process_names
  changed_when: false
  failed_when: _system_update_arch_process_names.rc != 0
  until: >-
    (
      _system_update_arch_process_names.stdout_lines
      | default([])
      | map('trim')
      | list
      | intersect(system_update_arch_pacman_lock_process_names)
      | unique
      | length
    ) == 0
  retries: "{{ system_update_arch_pacman_lock_wait_retries }}"
  delay: "{{ system_update_arch_pacman_lock_wait_delay }}"
  when: _system_update_arch_lock.stat.exists
  tags: ['system_update', 'recovery', 'pacman']

- name: "Arch Linux | Re-check pacman database lock after waiting"
  ansible.builtin.stat:
    path: "{{ system_update_arch_pacman_lock_file }}"
  register: _system_update_arch_lock_after_wait
  tags: ['system_update', 'recovery', 'pacman']

- name: "Arch Linux | Remove stale pacman database lock"
  ansible.builtin.file:
    path: "{{ system_update_arch_pacman_lock_file }}"
    state: absent
  when: _system_update_arch_lock_after_wait.stat.exists
  tags: ['system_update', 'recovery', 'pacman']

- name: "Arch Linux | Check pacman database consistency"
  ansible.builtin.command:
    cmd: pacman -Dk
  register: _system_update_arch_database_check
  changed_when: false
  failed_when: false
  tags: ['system_update', 'recovery', 'pacman']

- name: "Arch Linux | Extract packages from interrupted pacman transaction"
  ansible.builtin.command:
    argv:
      - awk
      - >-
        /\[ALPM\] transaction started/ { delete pkgs; in_tx=1; next }
        /\[ALPM\] transaction completed/ { delete pkgs; in_tx=0; next }
        in_tx && /\[ALPM\] (installed|upgraded|downgraded|reinstalled) / { pkgs[$4]=1 }
        END { for (pkg in pkgs) print pkg }
      - "{{ system_update_arch_pacman_log_file }}"
  register: _system_update_arch_interrupted_packages_raw
  changed_when: false
  failed_when: _system_update_arch_interrupted_packages_raw.rc != 0
  when: _system_update_arch_database_check.rc != 0
  tags: ['system_update', 'recovery', 'pacman']

- name: "Arch Linux | Record interrupted transaction package list"
  ansible.builtin.set_fact:
    _system_update_arch_interrupted_packages: >-
      {{
        _system_update_arch_interrupted_packages_raw.stdout_lines
        | default([])
        | map('trim')
        | reject('equalto', '')
        | unique
        | sort
        | list
      }}
  when: _system_update_arch_database_check.rc != 0
  tags: ['system_update', 'recovery', 'pacman']

- name: "Arch Linux | Repair pacman database until consistency check passes"
  ansible.builtin.include_tasks: recovery/archlinux_pacman_repair_attempt.yml
  loop: "{{ range(1, (system_update_arch_pacman_database_repair_attempts | int) + 1) | list }}"
  loop_control:
    loop_var: _system_update_arch_repair_attempt
  when: _system_update_arch_database_check.rc != 0
  tags: ['system_update', 'recovery', 'pacman']

- name: "Arch Linux | Assert pacman database is consistent after recovery"
  ansible.builtin.assert:
    that:
      - _system_update_arch_database_check.rc == 0
    fail_msg: >-
      pacman database is not consistent after system_update recovery.
      rc={{ _system_update_arch_database_check.rc }};
      stdout={{ _system_update_arch_database_check.stdout | default('') }};
      stderr={{ _system_update_arch_database_check.stderr | default('') }}.
    success_msg: "pacman database is consistent after system_update."
  tags: ['system_update', 'recovery', 'pacman']
