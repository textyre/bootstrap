---
- name: "Debian | Stop until package transaction recovery backend is implemented"
  ansible.builtin.fail:
    msg: >-
      system_update package transaction recovery backend for Debian/Ubuntu is not implemented in this slice.
      Add an explicit apt/dpkg recovery backend before using task prepare:system on Debian family hosts.
  when: system_update_fail_unimplemented_backends | bool
  tags: ['system_update', 'recovery']
