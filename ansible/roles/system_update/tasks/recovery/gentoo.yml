---
- name: "Gentoo | Stop until package transaction recovery backend is implemented"
  ansible.builtin.fail:
    msg: >-
      system_update package transaction recovery backend for Gentoo is not implemented in this slice.
      Add an explicit portage recovery backend before using task prepare:system on Gentoo hosts.
  when: system_update_fail_unimplemented_backends | bool
  tags: ['system_update', 'recovery']
