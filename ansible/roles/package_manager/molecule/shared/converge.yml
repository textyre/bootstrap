---
- name: Converge
  hosts: all
  become: true
  gather_facts: true

  roles:
    - role: "{{ lookup('env', 'MOLECULE_PROJECT_DIRECTORY') | basename }}"

- name: Converge — edge cases (non-default vars)
  hosts: all
  become: true
  gather_facts: true

  tasks:
    - name: Include OS-family-specific package_manager Molecule converge cases
      ansible.builtin.include_tasks: "{{ item }}"
      with_first_found:
        - files:
            - "converge/{{ ansible_facts['os_family'] | lower }}.yml"
          skip: true
