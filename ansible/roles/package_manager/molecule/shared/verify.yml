---
# Общий verify-playbook Molecule для роли package_manager.
# Он выбирает проверки по ОС, а сами проверки лежат в отдельных файлах.
- name: Verify package_manager role
  hosts: all
  become: true
  gather_facts: true
  vars_files:
    - "../../defaults/main.yml"

  tasks:
    # Проверяем, что для текущей ОС есть реальный файл Molecule-проверок.
    # Это не дает добавить новую test platform без явных assertions.
    - name: Assert package_manager Molecule verification exists for this OS
      ansible.builtin.assert:
        that:
          - ansible_facts['os_family'] in ['Archlinux', 'Debian', 'RedHat', 'Void']
        fail_msg: >-
          package_manager Molecule verification is not implemented for
          {{ ansible_facts['os_family'] }}. Add molecule/shared/verify/
          {{ ansible_facts['os_family'] | lower }}.yml before enabling this
          platform in Molecule.
        success_msg: "package_manager Molecule verification supports {{ ansible_facts['os_family'] }}"

    # Подключаем проверки именно для текущей ОС.
    # Так Arch, Debian, RedHat и Void проверяются по своим собственным контрактам.
    - name: Include OS-family-specific package_manager Molecule verification
      ansible.builtin.include_tasks: "verify/{{ ansible_facts['os_family'] | lower }}.yml"

    # В конце выводим короткую человеческую сводку, на какой системе verify прошел.
    # Это помогает быстро понять результат в длинном Molecule-логе.
    - name: Show verify result
      ansible.builtin.debug:
        msg: >-
          package_manager verify passed on
          {{ ansible_facts['distribution'] }} {{ ansible_facts['distribution_version'] }}
