---
# === Internal OS-family mappings (not for user override) ===

# SigLevel tokens accepted by this role for the global pacman SigLevel line.
# The list is intentionally conservative: official package signatures must
# stay required, while database signatures may remain optional.
_package_manager_pacman_safe_siglevel_tokens:
  - Required
  - TrustedOnly
  - PackageRequired
  - PackageTrustedOnly
  - DatabaseRequired
  - DatabaseOptional
  - DatabaseTrustedOnly
