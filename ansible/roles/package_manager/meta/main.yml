---
galaxy_info:
  role_name: package_manager
  author: textyre
  description: Configure system package manager (pacman, apt, dnf, xbps, portage)
  license: MIT
  min_ansible_version: "2.15"
  platforms:
    - name: ArchLinux
      versions: [all]
    - name: Debian
      versions: [all]
    - name: Fedora
      versions: [all]
    - name: Void Linux
      versions: [all]
    - name: Gentoo
      versions: [all]
  galaxy_tags: [packages, pacman, apt, dnf, xbps, portage, system]
# Runtime deps: yay is imported from tasks/archlinux/yay.yml in setup-only mode.
# reflector is an ordering assumption in workstation playbooks, not orchestrated here.
# Available via ANSIBLE_ROLES_PATH, not declared here
# to avoid auto-execution before the role.
dependencies: []
