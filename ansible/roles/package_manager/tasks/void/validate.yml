---
# === Void Linux: package_manager validation ===

# Проверяем поля cron-расписания до создания задачи.
# Некорректное расписание привело бы к неработающей или неожиданной очистке кэша.
- name: Assert xbps cache schedule is valid
  ansible.builtin.assert:
    that:
      - package_manager_xbps_cache_cron_minute is match('^(\\*|\\*/[1-9][0-9]*|[0-5]?[0-9])$')
      - package_manager_xbps_cache_cron_hour is match('^(\\*|\\*/[1-9][0-9]*|[01]?[0-9]|2[0-3])$')
      - package_manager_xbps_cache_cron_weekday is match('^(\\*|\\*/[1-9][0-9]*|[0-7])$')
    fail_msg: >-
      xbps cache cron fields must be '*', '*/N', or a numeric value in the
      valid cron range.
    success_msg: "xbps cache schedule settings are valid"
  when: package_manager_xbps_cache_cleanup_enabled | bool
  tags: ['package_manager']
