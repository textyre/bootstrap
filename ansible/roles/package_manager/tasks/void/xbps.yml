---
# === Void Linux: xbps configuration ===

# Убеждаемся, что каталог для xbps drop-in файлов существует.
# Это безопасное место для настроек роли без переписывания системных файлов xbps.
- name: Ensure /etc/xbps.d directory exists
  ansible.builtin.file:
    path: /etc/xbps.d
    state: directory
    owner: root
    group: root
    mode: '0755'
  tags: ['package_manager']

# Записываем настройки xbps, которыми управляет эта роль.
# Отдельный файл легче проверить и безопаснее обновлять повторными запусками.
- name: Deploy xbps ansible settings
  ansible.builtin.template:
    src: void/xbps.conf.j2
    dest: /etc/xbps.d/ansible.conf
    owner: root
    group: root
    mode: '0644'
  tags: ['package_manager']
