---
# === Package Manager — in-role verification ===
# Called from main.yml after configuration. Verifies deployed configs
# contain expected values on the target host.

# ---- Arch Linux ----

- name: "Verify: pacman.conf deployed correctly"
  when: ansible_facts['os_family'] == 'Archlinux'
  tags: ['packages', 'pacman']
  block:
    - name: Slurp /etc/pacman.conf
      ansible.builtin.slurp:
        src: /etc/pacman.conf
      register: _package_manager_verify_pacman_raw

    - name: Set pacman.conf content fact
      ansible.builtin.set_fact:
        _package_manager_verify_pacman_text: "{{ _package_manager_verify_pacman_raw.content | b64decode }}"
      when: "'content' in _package_manager_verify_pacman_raw"

    - name: Assert pacman.conf is managed by Ansible
      ansible.builtin.assert:
        that:
          - "'Managed by Ansible' in _package_manager_verify_pacman_text"
          - "'ParallelDownloads = ' ~ package_manager_pacman_parallel_downloads | string in _package_manager_verify_pacman_text"
        fail_msg: "pacman.conf verification failed — not managed by Ansible or ParallelDownloads mismatch"
        success_msg: "pacman.conf verified: managed by Ansible, ParallelDownloads={{ package_manager_pacman_parallel_downloads }}"

- name: "Verify: makepkg drop-in deployed correctly"
  when:
    - ansible_facts['os_family'] == 'Archlinux'
    - package_manager_makepkg_enabled | bool
  tags: ['packages', 'makepkg']
  block:
    - name: Stat /etc/makepkg.conf.d/ansible.conf
      ansible.builtin.stat:
        path: /etc/makepkg.conf.d/ansible.conf
      register: _package_manager_verify_makepkg_stat

    - name: Assert makepkg drop-in exists
      ansible.builtin.assert:
        that:
          - _package_manager_verify_makepkg_stat.stat.exists
        fail_msg: "/etc/makepkg.conf.d/ansible.conf does not exist"
        success_msg: "/etc/makepkg.conf.d/ansible.conf exists (mode={{ _package_manager_verify_makepkg_stat.stat.mode }})"

- name: "Verify: paccache.timer enabled"
  when:
    - ansible_facts['os_family'] == 'Archlinux'
    - package_manager_paccache_enabled | bool
    - ansible_facts['service_mgr'] == 'systemd'
  tags: ['packages', 'paccache']
  block:
    - name: Check paccache.timer is enabled  # noqa: command-instead-of-module
      ansible.builtin.command:
        cmd: systemctl is-enabled paccache.timer
      register: _package_manager_verify_paccache_timer
      changed_when: false

    - name: Assert paccache.timer is enabled
      ansible.builtin.assert:
        that:
          - _package_manager_verify_paccache_timer.stdout | trim == 'enabled'
        fail_msg: "paccache.timer is not enabled (got: {{ _package_manager_verify_paccache_timer.stdout | trim }})"
        success_msg: "paccache.timer is enabled"

# ---- Debian ----

- name: "Verify: apt config deployed correctly"
  when: ansible_facts['os_family'] == 'Debian'
  tags: ['packages', 'apt']
  block:
    - name: Stat apt parallel config
      ansible.builtin.stat:
        path: /etc/apt/apt.conf.d/10-ansible-parallel.conf
      register: _package_manager_verify_apt_stat

    - name: Assert apt parallel config exists
      ansible.builtin.assert:
        that:
          - _package_manager_verify_apt_stat.stat.exists
        fail_msg: "/etc/apt/apt.conf.d/10-ansible-parallel.conf does not exist"
        success_msg: "/etc/apt/apt.conf.d/10-ansible-parallel.conf deployed"

    - name: Stat dpkg config
      ansible.builtin.stat:
        path: /etc/apt/apt.conf.d/20-ansible-dpkg.conf
      register: _package_manager_verify_dpkg_stat

    - name: Assert dpkg config exists
      ansible.builtin.assert:
        that:
          - _package_manager_verify_dpkg_stat.stat.exists
        fail_msg: "/etc/apt/apt.conf.d/20-ansible-dpkg.conf does not exist"
        success_msg: "/etc/apt/apt.conf.d/20-ansible-dpkg.conf deployed"

# ---- RedHat ----

- name: "Verify: dnf.conf deployed correctly"
  when: ansible_facts['os_family'] == 'RedHat'
  tags: ['packages', 'dnf']
  block:
    - name: Slurp /etc/dnf/dnf.conf
      ansible.builtin.slurp:
        src: /etc/dnf/dnf.conf
      register: _package_manager_verify_dnf_raw

    - name: Set dnf.conf content fact
      ansible.builtin.set_fact:
        _package_manager_verify_dnf_text: "{{ _package_manager_verify_dnf_raw.content | b64decode }}"
      when: "'content' in _package_manager_verify_dnf_raw"

    - name: Assert dnf.conf is managed by Ansible
      ansible.builtin.assert:
        that:
          - "'Managed by Ansible' in _package_manager_verify_dnf_text"
        fail_msg: "dnf.conf verification failed — not managed by Ansible"
        success_msg: "dnf.conf verified: managed by Ansible"

# ---- Void ----

- name: "Verify: xbps config deployed correctly"
  when: ansible_facts['os_family'] == 'Void'
  tags: ['packages', 'xbps']
  block:
    - name: Stat /etc/xbps.d/ansible.conf
      ansible.builtin.stat:
        path: /etc/xbps.d/ansible.conf
      register: _package_manager_verify_xbps_stat

    - name: Assert xbps config exists
      ansible.builtin.assert:
        that:
          - _package_manager_verify_xbps_stat.stat.exists
        fail_msg: "/etc/xbps.d/ansible.conf does not exist"
        success_msg: "/etc/xbps.d/ansible.conf deployed"

# ---- Summary ----

- name: "Verify: package_manager configuration complete"
  ansible.builtin.debug:
    msg: >-
      package_manager in-role verification passed on
      {{ ansible_facts['os_family'] }} ({{ ansible_facts['distribution'] }})
  tags: ['packages']
