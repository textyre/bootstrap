---
# === Package Manager: preflight validation dispatcher ===

- name: Assert OS is supported by package_manager role
  ansible.builtin.assert:
    that:
      - ansible_facts['os_family'] in _package_manager_supported_os
    fail_msg: >-
      package_manager role is not supported on {{ ansible_facts['os_family'] }}.
      Supported: {{ _package_manager_supported_os | join(', ') }}.
    success_msg: "package_manager supports {{ ansible_facts['os_family'] }}"
  tags: ['package_manager']

- name: Include OS-family-specific package_manager validation
  ansible.builtin.include_tasks: "{{ ansible_facts['os_family'] | lower }}/validate.yml"
  tags: ['package_manager']
