---
# === Package Manager — конфигурация пакетного менеджера ===
# pacman (Archlinux), apt (Debian), dnf (RedHat), xbps (Void), portage (Gentoo)

- name: Package Manager role
  when: package_manager_enabled | bool
  tags: ['package_manager']
  block:

    # ---- Валидация ----

    - name: Validate package_manager inputs
      ansible.builtin.include_tasks: validate.yml
      tags: ['package_manager']

    # ---- Конфигурация ----

    - name: Include OS-family-specific package manager configuration
      ansible.builtin.include_tasks: "{{ ansible_facts['os_family'] | lower }}/main.yml"
      tags: ['package_manager']

    # ---- Верификация ----

    - name: Verify package_manager configuration
      ansible.builtin.include_tasks: verify.yml
      tags: ['package_manager']

    # ---- Логирование ----

    - name: "Report: Package Manager"
      ansible.builtin.include_role:
        name: common
        tasks_from: report_phase.yml
      vars:
        common_rpt_fact: "_package_manager_phases"
        common_rpt_phase: "Configure package manager"
        common_rpt_detail: >-
          os_family={{ ansible_facts['os_family'] }}
      tags: ['package_manager']

    - name: "Package Manager — Execution Report"
      ansible.builtin.include_role:
        name: common
        tasks_from: report_render.yml
      vars:
        common_rpt_fact: "_package_manager_phases"
        common_rpt_title: "package_manager"
      tags: ['package_manager']
