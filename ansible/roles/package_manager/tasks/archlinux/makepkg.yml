---
# === Arch Linux: makepkg configuration ===

# Создаем каталог для makepkg drop-in конфигураций.
# Так роль добавляет свои настройки отдельно и не переписывает весь системный makepkg.conf.
- name: Ensure /etc/makepkg.conf.d directory exists
  ansible.builtin.file:
    path: /etc/makepkg.conf.d
    state: directory
    owner: root
    group: root
    mode: '0755'
  when: package_manager_makepkg_enabled
  tags: ['package_manager']

# Записываем настройки сборки пакетов: параллельность и формат архива.
# Эти параметры влияют на AUR-сборки и должны быть одинаковыми между запусками.
- name: Deploy makepkg drop-in config
  ansible.builtin.template:
    src: archlinux/makepkg.conf.j2
    dest: /etc/makepkg.conf.d/ansible.conf
    owner: root
    group: root
    mode: '0644'
  when: package_manager_makepkg_enabled
  tags: ['package_manager']
