---
# === Arch Linux: paccache timer ===

- name: Assert paccache timer is supported only on systemd
  ansible.builtin.assert:
    that:
      - ansible_facts['service_mgr'] == 'systemd'
    fail_msg: >-
      package_manager_paccache_enabled is true, but paccache.timer is a systemd
      timer and this host uses '{{ ansible_facts['service_mgr'] }}'. Disable
      package_manager_paccache_enabled or add an init-specific cache cleanup
      implementation for this init system.
    success_msg: "paccache.timer is supported on systemd"
  when: package_manager_paccache_enabled | bool
  tags: ['package_manager']

- name: Configure paccache timer for systemd
  ansible.builtin.include_tasks: archlinux/systemd/paccache.yml
  when: package_manager_paccache_enabled | bool
  tags: ['package_manager']
