---
# === Arch Linux: package_manager validation ===

# Проверяем базовые числовые настройки pacman до изменения конфигурации.
# Если parallel downloads или путь к cache root сломаны, лучше остановиться до записи pacman.conf.
- name: Assert pacman numeric and path settings are valid
  ansible.builtin.assert:
    that:
      - package_manager_pacman_parallel_downloads | string is match('^[0-9]+$')
      - package_manager_pacman_parallel_downloads | int > 0
      - not (package_manager_pacman_external_cache | bool) or package_manager_pacman_cache_root is match('^/')
    fail_msg: >-
      Invalid pacman settings. Require positive numeric ParallelDownloads and
      an absolute package_manager_pacman_cache_root when external cache is enabled.
    success_msg: "pacman numeric and path settings are valid"
  tags: ['package_manager']

# Проверяем политику подписи пакетов отдельно от остальных настроек.
# Это supply-chain защита: роль не должна молча принять режим без проверки подписей.
- name: Assert pacman signature policy is safe
  vars:
    _package_manager_pacman_siglevel_text: "{{ package_manager_pacman_siglevel | string | trim }}"
    _package_manager_pacman_siglevel_tokens: "{{ (package_manager_pacman_siglevel | string | trim).split() }}"
    _package_manager_pacman_unknown_siglevel_tokens: >-
      {{
        _package_manager_pacman_siglevel_tokens
        | difference(_package_manager_pacman_safe_siglevel_tokens)
      }}
    _package_manager_pacman_required_siglevel_tokens:
      - Required
      - PackageRequired
  ansible.builtin.assert:
    that:
      - _package_manager_pacman_siglevel_text | length > 0
      - _package_manager_pacman_siglevel_text is match('^[A-Za-z]+( [A-Za-z]+)*$')
      - _package_manager_pacman_unknown_siglevel_tokens | length == 0
      - >-
        (_package_manager_pacman_siglevel_tokens
        | intersect(_package_manager_pacman_required_siglevel_tokens)
        | length) > 0
    fail_msg: >-
      package_manager_pacman_siglevel must keep official package signatures
      required and may only use safe tokens:
      {{ _package_manager_pacman_safe_siglevel_tokens | join(', ') }}.
      Current value: {{ package_manager_pacman_siglevel }}.
      Unsafe or unknown tokens:
      {{ _package_manager_pacman_unknown_siglevel_tokens | default([]) | join(', ') }}.
    success_msg: "pacman signature policy is safe"
  tags: ['package_manager']

# Проверяем, что paccache будет оставлять хотя бы одну версию пакета.
# Нулевое или отрицательное значение могло бы привести к слишком агрессивной очистке кэша.
- name: Assert paccache settings are valid
  ansible.builtin.assert:
    that:
      - package_manager_paccache_keep | int > 0
    fail_msg: "package_manager_paccache_keep must be a positive integer"
    success_msg: "paccache input settings are valid"
  when: package_manager_paccache_enabled | bool
  tags: ['package_manager']

# Проверяем настройки makepkg до записи drop-in файла.
# Сборка AUR-пакетов должна иметь понятные flags и корректное расширение пакета.
- name: Assert makepkg settings are valid
  ansible.builtin.assert:
    that:
      - package_manager_makepkg_makeflags | length > 0
      - not (package_manager_makepkg_makeflags is search('[\r\n"]'))
      - package_manager_makepkg_pkgext is match('^\\.pkg\\.tar(\\.[A-Za-z0-9][A-Za-z0-9_-]*)*$')
    fail_msg: >-
      package_manager_makepkg_makeflags must be non-empty and
      must not contain newlines or double quotes.
      package_manager_makepkg_pkgext must start with .pkg.tar and contain only
      safe suffix characters, for example .pkg.tar or .pkg.tar.zst.
    success_msg: "makepkg input settings are valid"
  when: package_manager_makepkg_enabled | bool
  tags: ['package_manager']
