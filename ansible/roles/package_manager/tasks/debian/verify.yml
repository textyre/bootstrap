---
# === Debian/Ubuntu: package_manager verification ===

# Просим apt прочитать итоговую конфигурацию.
# Это независимая read-only проверка: apt должен принять общий набор своих конфигов.
- name: Verify apt can parse configuration  # noqa: command-instead-of-module
  ansible.builtin.command:
    cmd: apt-config dump
  register: _package_manager_verify_apt_parse
  changed_when: false
  failed_when: _package_manager_verify_apt_parse.rc != 0
  tags: ['package_manager']
