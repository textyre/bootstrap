---
# === apt configuration (Debian/Ubuntu) ===

# Убеждаемся, что каталог drop-in конфигураций apt существует.
# Без этого роли некуда безопасно положить свой отдельный конфигурационный файл.
- name: Ensure /etc/apt/apt.conf.d exists
  ansible.builtin.file:
    path: /etc/apt/apt.conf.d
    state: directory
    owner: root
    group: root
    mode: '0755'
  tags: ['package_manager']

# Записываем отдельный apt drop-in с настройками параллельной загрузки и retry.
# Так роль не переписывает основной apt.conf и держит свои изменения изолированными.
- name: Deploy apt parallel downloads config
  ansible.builtin.template:
    src: debian/10-parallel.conf.j2
    dest: /etc/apt/apt.conf.d/10-ansible-parallel.conf
    owner: root
    group: root
    mode: '0644'
  tags: ['package_manager']
