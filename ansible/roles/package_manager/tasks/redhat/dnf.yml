---
# === RedHat (Fedora): dnf configuration ===

# Полностью управляем dnf.conf из шаблона роли.
# Это фиксирует download/cache/security-настройки dnf в воспроизводимом виде.
- name: Deploy dnf.conf from template
  ansible.builtin.template:
    src: redhat/dnf.conf.j2
    dest: /etc/dnf/dnf.conf
    owner: root
    group: root
    mode: '0644'
    backup: true
  tags: ['package_manager']
