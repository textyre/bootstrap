---
# === git role — defaults ===

# Primary user whose global git config is managed.
# signing_method controls automatic commit signing: none disables it, ssh or gpg enables it.
# signing_key is a public key path for ssh or a key ID for gpg.
git_owner:
  name: "{{ target_user }}"
  user_name: ""
  user_email: ""
  signing_method: none
  signing_key: ""
  credential_helper: ""

# Additional users managed with the same git configuration contract.
# Each entry uses the same fields as git_owner.
git_additional_users: []
# - name: alice
#   user_name: "Alice"
#   user_email: "alice@example.com"
#   signing_method: none
#   signing_key: ""
#   credential_helper: ""

# Default branch used by `git init`.
git_default_branch: main

# Editor written to `core.editor`.
git_editor: vim

# Whether `git pull` rebases by default.
git_pull_rebase: true

# Whether `git push` automatically creates upstream tracking for new branches.
git_push_autosetup_remote: true

# Line-ending policy. `input` keeps LF in repository content on Unix hosts.
git_core_autocrlf: input

# Manage convenience aliases.
git_manage_aliases: true

# Manage credential helper.
git_manage_credential: true

# Manage a global hooks directory and `core.hooksPath`.
git_manage_hooks: false

# Built-in aliases applied when `git_manage_aliases` is true.
git_aliases_preset:
  st: status
  co: checkout
  br: branch
  ci: commit
  lg: "log --graph --pretty=format:'%Cred%h%Creset -%C(yellow)%d%Creset %s %Cgreen(%cr) %C(bold blue)<%an>%Creset' --abbrev-commit"
  unstage: "reset HEAD --"
  last: "log -1 HEAD"
  amend: "commit --amend --no-edit"
# Alias values merged on top of `git_aliases_preset`.
git_aliases_extra: {}

# Default credential helper used when a user does not override it.
git_credential_helper: "cache --timeout=3600"

# Global hooks directory configured when `git_manage_hooks` is true.
git_hooks_path: "~/.config/git/hooks"

# Additional arbitrary git config values.
git_config_extra: {}
# Recommended settings (uncomment or add to group_vars):
#   color.ui: auto
#   diff.colorMoved: zebra
#   merge.conflictstyle: diff3
#   rerere.enabled: "true"
# Repositories trusted despite ownership boundaries.
git_safe_directories: []
