---
# === git: role orchestration ===

- name: Validate git platform
  ansible.builtin.include_tasks: validate.yml

- name: Load git platform variables
  ansible.builtin.include_tasks: load_vars.yml

- name: Configure git
  ansible.builtin.include_tasks: configure/main.yml

- name: Verify git contract
  ansible.builtin.include_tasks: verify.yml

- name: Render git execution report
  ansible.builtin.include_role:
    name: common
    tasks_from: report_render.yml
  vars:
    common_rpt_fact: "_git_phases"
    common_rpt_title: "git"
