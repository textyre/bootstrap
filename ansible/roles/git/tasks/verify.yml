---
# === git: final contract verification ===

- name: Verify git binary is usable
  ansible.builtin.command:
    cmd: git --version
  register: _git_verify_binary
  changed_when: false
  failed_when: _git_verify_binary.rc != 0

- name: Verify git-lfs binary is usable
  ansible.builtin.command:
    cmd: git lfs version
  register: _git_verify_lfs_binary
  changed_when: false
  failed_when: _git_verify_lfs_binary.rc != 0

- name: "Report: Verify git contract"
  ansible.builtin.include_role:
    name: common
    tasks_from: report_phase.yml
  vars:
    common_rpt_fact: "_git_phases"
    common_rpt_phase: "Verify"
    common_rpt_detail: >-
      git={{ _git_verify_binary.stdout | default('unavailable') }}
      lfs={{ _git_verify_lfs_binary.stdout | default('unavailable') }}
