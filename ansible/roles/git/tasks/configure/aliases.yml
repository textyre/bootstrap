---
# === git — aliases (per-user layer) ===
# User aliases override entries from the built-in preset.

- name: Set git aliases
  community.general.git_config:
    name: "alias.{{ item.key }}"
    value: "{{ item.value }}"
    scope: global
  loop: "{{ git_aliases_preset | combine(git_aliases_extra) | dict2items }}"
  loop_control:
    label: "{{ item.key }}"
