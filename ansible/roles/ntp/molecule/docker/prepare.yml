---
- name: Prepare
  hosts: all
  become: true
  gather_facts: true
  tasks:
    - name: Update pacman package cache (Arch)
      community.general.pacman:
        update_cache: true
      when: ansible_facts['os_family'] == 'Archlinux'

    - name: Update apt cache (Ubuntu)
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600
      when: ansible_facts['os_family'] == 'Debian'

    # Ubuntu chrony.service uses ProtectSystem=strict and other sandboxing
    # that conflicts with Docker's filesystem and namespace model.
    # Chrony runs but cannot make outbound NTP/NTS connections.
    # Arch chronyd.service has no sandboxing → works in Docker as-is.
    - name: Create chrony.service.d directory (Debian — Docker workaround)
      ansible.builtin.file:
        path: /etc/systemd/system/chrony.service.d
        state: directory
        mode: "0755"
      when: ansible_facts['os_family'] == 'Debian'

    - name: Disable chrony sandboxing for Docker (Debian)
      ansible.builtin.copy:
        dest: /etc/systemd/system/chrony.service.d/docker.conf
        mode: "0644"
        content: |
          # Relax systemd sandboxing — incompatible with Docker
          [Service]
          ProtectSystem=
          ProtectHome=
          ProtectKernelTunables=
          ProtectKernelModules=
          ProtectKernelLogs=
          ProtectControlGroups=
          ProtectHostname=
          ProtectProc=
          PrivateTmp=
          MemoryDenyWriteExecute=
          RestrictNamespaces=
          RestrictSUIDSGID=
          LockPersonality=
          ProcSubset=
      when: ansible_facts['os_family'] == 'Debian'
