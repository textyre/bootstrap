---
- name: "Verify fail2ban is running"
  ansible.builtin.command:
    cmd: "fail2ban-client status"
  register: fail2ban_verify_status
  changed_when: false
  failed_when: false
  retries: 5
  delay: 2
  until: >-
    fail2ban_verify_status.rc == 0 or
    ansible_virtualization_type | default('') in ['docker', 'container', 'lxc']
  tags: [fail2ban]

- name: "Assert fail2ban is running"
  ansible.builtin.assert:
    that: fail2ban_verify_status.rc == 0
    fail_msg: >-
      fail2ban is not running (rc={{ fail2ban_verify_status.rc }},
      stderr={{ fail2ban_verify_status.stderr | default('') }}).
      iptables-multiport banaction may require kernel netfilter modules.
  when: ansible_virtualization_type | default('') not in ['docker', 'container', 'lxc']
  tags: [fail2ban]

- name: "Warn if fail2ban not running in container"
  ansible.builtin.debug:
    msg: >-
      WARNING: fail2ban not running in container environment (rc={{ fail2ban_verify_status.rc }}).
      iptables-multiport banaction requires kernel netfilter modules not available in containers.
      Config file deployment was verified; runtime checks skipped.
  when:
    - ansible_virtualization_type | default('') in ['docker', 'container', 'lxc']
    - fail2ban_verify_status.rc != 0
  tags: [fail2ban]

- name: "Verify SSH jail is active"
  ansible.builtin.command:
    cmd: "fail2ban-client status sshd"
  register: fail2ban_verify_sshd
  changed_when: false
  failed_when: false
  when:
    - fail2ban_sshd_enabled | bool
    - fail2ban_verify_status.rc == 0
  tags: [fail2ban]

- name: "Assert SSH jail reports correctly"
  ansible.builtin.assert:
    that:
      - "'sshd' in fail2ban_verify_sshd.stdout"
    fail_msg: "fail2ban sshd jail is not active"
  when:
    - fail2ban_sshd_enabled | bool
    - fail2ban_verify_status.rc == 0
  tags: [fail2ban]
