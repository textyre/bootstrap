---
# === fail2ban: runtime contract verification ===

- name: Check fail2ban server status
  block:
    - name: Check fail2ban server status
      ansible.builtin.command:
        cmd: fail2ban-client ping
      register: _fail2ban_server_status
      changed_when: false

    - name: Check fail2ban sshd jail status
      ansible.builtin.command:
        cmd: fail2ban-client status sshd
      register: _fail2ban_sshd_jail_status
      changed_when: false
      when: fail2ban_sshd_enabled | bool

  rescue:
    - name: Collect fail2ban configuration dump
      ansible.builtin.command:
        cmd: fail2ban-client --dp
      register: _fail2ban_configuration_dump
      changed_when: false
      failed_when: false

    - name: Collect init-specific fail2ban diagnostics
      ansible.builtin.include_tasks:
        file: "init/{{ ansible_facts['service_mgr'] }}/verify_diagnostics.yml"

    - name: Fail fail2ban runtime contract
      ansible.builtin.fail:
        msg:
          fail2ban_verify_failed: true
          server:
            command: fail2ban-client ping
            rc: "{{ _fail2ban_server_status.rc | default('not-run') }}"
            stdout: "{{ _fail2ban_server_status.stdout | default('') }}"
            stderr: "{{ _fail2ban_server_status.stderr | default('') }}"
          sshd_jail:
            command: fail2ban-client status sshd
            rc: "{{ _fail2ban_sshd_jail_status.rc | default('not-run') }}"
            stdout: "{{ _fail2ban_sshd_jail_status.stdout | default('') }}"
            stderr: "{{ _fail2ban_sshd_jail_status.stderr | default('') }}"
          configuration_dump:
            command: fail2ban-client --dp
            stdout: "{{ _fail2ban_configuration_dump.stdout | default('not collected') }}"
            stderr: "{{ _fail2ban_configuration_dump.stderr | default('') }}"
          init_diagnostics: "{{ _fail2ban_init_diagnostics | default({}) }}"

- name: "Report: Verify fail2ban runtime"
  ansible.builtin.include_role:
    name: common
    tasks_from: report_phase.yml
  vars:
    common_rpt_fact: "_fail2ban_phases"
    common_rpt_phase: "Verify runtime"
    common_rpt_detail: "fail2ban-client ping + sshd jail status"
  tags: ['report']
