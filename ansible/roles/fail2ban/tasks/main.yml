---
# === fail2ban — SSH brute-force protection ===
# validate -> load vars -> configure -> service -> verify -> report

- name: Fail2ban role
  tags: ['fail2ban', 'security']
  block:
    - name: Validate fail2ban role inputs
      ansible.builtin.include_tasks:
        file: validate.yml

    - name: Load fail2ban platform variables
      ansible.builtin.include_tasks:
        file: load_vars.yml

    - name: Configure fail2ban
      ansible.builtin.include_tasks:
        file: configure/main.yml

    - name: Apply fail2ban service policy
      ansible.builtin.include_tasks:
        file: configure/service.yml
      tags: ['fail2ban_runtime']

    - name: Verify fail2ban runtime contract
      ansible.builtin.include_tasks:
        file: verify.yml
      tags: ['fail2ban_runtime']

    - name: Render fail2ban execution report
      ansible.builtin.include_role:
        name: common
        tasks_from: report_render.yml
      vars:
        common_rpt_fact: "_fail2ban_phases"
        common_rpt_title: "fail2ban"
      tags: ['report']
