---
- name: Prepare Docker hosts
  ansible.builtin.import_playbook: ../../../../molecule/shared/prepare-docker.yml

- name: Prepare fail2ban Docker fixture
  hosts: all
  become: true
  gather_facts: true
  tasks:
    - name: Create auth log for fail2ban config validation
      ansible.builtin.file:
        path: /var/log/auth.log
        state: touch
        owner: root
        group: root
        mode: "0640"
        modification_time: preserve
        access_time: preserve
