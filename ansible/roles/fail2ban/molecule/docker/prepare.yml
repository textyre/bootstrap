---
- name: Prepare
  hosts: all
  become: true
  gather_facts: true
  tasks:
    - name: Update pacman package cache (Arch)
      community.general.pacman:
        update_cache: true
      when: ansible_facts['os_family'] == 'Archlinux'

    - name: Update apt cache (Ubuntu)
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600
      when: ansible_facts['os_family'] == 'Debian'

    # ---- fail2ban needs iptables for its default ban action (iptables-multiport) ----
    # iptables-nft conflicts with iptables. --ask=4 (ALPM_QUESTION_CONFLICT_PKG) makes
    # pacman auto-confirm the replacement in a single transaction so iproute2's
    # libxtables.so=12-64 dependency stays satisfied (iptables-nft provides it too).
    - name: Install iptables-nft for fail2ban backend, replacing iptables (Arch)
      community.general.pacman:
        name: iptables-nft
        state: present
        extra_args: --ask=4
      when: ansible_facts['os_family'] == 'Archlinux'

    - name: Install iptables for fail2ban backend (Ubuntu)
      ansible.builtin.apt:
        name: iptables
        state: present
      when: ansible_facts['os_family'] == 'Debian'
