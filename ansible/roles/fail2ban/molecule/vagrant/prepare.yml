---
- name: Bootstrap Vagrant VM
  ansible.builtin.import_playbook: ../../../../molecule/shared/prepare-vagrant.yml

- name: Prepare (role-specific)
  hosts: all
  become: true
  gather_facts: true
  tasks:
    # Arch test fixture for Fail2Ban's default iptables ban action.
    - name: Install iptables-nft for fail2ban backend, replacing iptables (Arch)
      community.general.pacman:
        name: iptables-nft
        state: present
        extra_args: --ask=4
      when: ansible_facts['os_family'] == 'Archlinux'

    # Arch test fixture for the polling backend used by this scenario.
    - name: Create /var/log/auth.log for fail2ban polling backend (Arch)
      ansible.builtin.file:
        path: /var/log/auth.log
        state: touch
        owner: root
        group: root
        mode: "0640"
        modification_time: preserve
        access_time: preserve
      when: ansible_facts['os_family'] == 'Archlinux'
