---
- name: Converge — default configuration
  hosts: all
  become: true
  gather_facts: true
  roles:
    - role: "{{ lookup('env', 'MOLECULE_PROJECT_DIRECTORY') | basename }}"
      # No vars — test with pure defaults (TEST-011)

- name: Converge — custom configuration
  hosts: all
  become: true
  gather_facts: true
  vars_files:
    - vars.yml
  roles:
    - role: "{{ lookup('env', 'MOLECULE_PROJECT_DIRECTORY') | basename }}"
