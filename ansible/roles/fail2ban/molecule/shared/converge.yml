---
# TEST-011: Verify defaults don't crash (check_mode avoids writing files
# that would conflict with the custom-vars run and break idempotence).
- name: Converge — default configuration (check mode)
  hosts: all
  become: true
  gather_facts: true
  check_mode: true
  roles:
    - role: "{{ lookup('env', 'MOLECULE_PROJECT_DIRECTORY') | basename }}"

- name: Converge — custom configuration
  hosts: all
  become: true
  gather_facts: true
  vars_files:
    - vars.yml
  roles:
    - role: "{{ lookup('env', 'MOLECULE_PROJECT_DIRECTORY') | basename }}"
