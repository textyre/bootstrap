---
- name: Read configured shell version
  ansible.builtin.command:
    argv:
      - "{{ _shell_bin[shell_type] }}"
      - --version
  register: _shell_verify_version
  changed_when: false

- name: Report shell verification phase
  ansible.builtin.include_role:
    name: common
    tasks_from: report_phase.yml
  vars:
    common_rpt_fact: "_shell_phases"
    common_rpt_phase: "Verify shell runtime"
    common_rpt_detail: "{{ _shell_verify_version.stdout_lines[0] | default(shell_type) }}"
