---
- name: Load shell platform mappings
  ansible.builtin.include_vars:
    file: "distro/{{ ansible_facts['os_family'] | lower }}/main.yml"

- name: Report shell platform phase
  ansible.builtin.include_role:
    name: common
    tasks_from: report_phase.yml
  vars:
    common_rpt_fact: "_shell_phases"
    common_rpt_phase: "Load platform variables"
    common_rpt_detail: "{{ ansible_facts['os_family'] }}"
