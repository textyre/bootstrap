---
# === shell — orchestrator ===
# validate -> load vars -> detect -> configure -> verify -> report

- name: Validate shell role inputs
  ansible.builtin.include_tasks:
    file: validate.yml

- name: Load shell platform variables
  ansible.builtin.include_tasks:
    file: load_vars.yml

- name: Detect target user
  ansible.builtin.include_tasks:
    file: detect.yml

- name: Configure login shell
  ansible.builtin.include_tasks:
    file: configure/main.yml

- name: Verify shell runtime contract
  ansible.builtin.include_tasks:
    file: verify.yml

- name: Render shell execution report
  ansible.builtin.include_role:
    name: common
    tasks_from: report_render.yml
  vars:
    common_rpt_fact: "_shell_phases"
    common_rpt_title: "shell"
