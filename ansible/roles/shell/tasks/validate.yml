---
- name: Validate shell role contract
  ansible.builtin.assert:
    that:
      - ansible_facts['os_family'] in _shell_supported_os
      - shell_type in _shell_supported_types
    fail_msg: >-
      shell requires one of {{ _shell_supported_os | join(', ') }},
      and shell_type={{ _shell_supported_types | join(', ') }}.

- name: Report shell validation phase
  ansible.builtin.include_role:
    name: common
    tasks_from: report_phase.yml
  vars:
    common_rpt_fact: "_shell_phases"
    common_rpt_phase: "Validate inputs"
    common_rpt_detail: "{{ shell_type }} for {{ shell_user }}"
