---
galaxy_info:
  role_name: shell
  author: textyre
  description: >-
    Installs bash, zsh, or fish and assigns it as the login shell
    for an existing user. PATH, environment variables, and per-user
    dotfiles are managed outside this role.
  license: MIT
  min_ansible_version: "2.15"
  platforms:
    - name: ArchLinux
      versions: [all]
    - name: Ubuntu
      versions: [all]
    - name: Fedora
      versions: [all]
    - name: Void Linux
      versions: [all]
    - name: Gentoo
      versions: [all]
  galaxy_tags: [shell, bash, zsh, fish]
dependencies: []
