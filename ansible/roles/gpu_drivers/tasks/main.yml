---
# === GPU driver stack (gpu_drivers role) ===
# Validates -> loads vars -> detects GPU -> configures driver stack -> reports.

- name: Configure GPU drivers
  tags: ['gpu', 'drivers']
  block:

    - name: Validate role prerequisites
      ansible.builtin.include_tasks:
        file: validate.yml

    - name: Load OS-specific variables
      ansible.builtin.include_tasks:
        file: load_vars.yml

    - name: Detect GPU vendor
      ansible.builtin.include_tasks:
        file: detect.yml

    - name: Configure GPU driver stack
      ansible.builtin.include_tasks:
        file: configure/main.yml

    - name: Render execution report
      ansible.builtin.include_role:
        name: common
        tasks_from: report_render.yml
      vars:
        common_rpt_fact: "_gpu_drivers_phases"
        common_rpt_title: "gpu_drivers"
