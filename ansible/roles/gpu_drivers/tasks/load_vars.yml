---
# === gpu_drivers / load_vars — OS-specific internal variable mappings ===
# The OS family is validated before this phase.

- name: "Load package mappings"
  ansible.builtin.include_vars: archlinux.yml
  when: ansible_facts['os_family'] == 'Archlinux'

- name: "Load package mappings"
  ansible.builtin.include_vars: debian.yml
  when: ansible_facts['os_family'] == 'Debian'

- name: "Report: Load OS variables"
  ansible.builtin.include_role:
    name: common
    tasks_from: report_phase.yml
  vars:
    common_rpt_fact: "_gpu_drivers_phases"
    common_rpt_phase: "Load OS variables"
    common_rpt_detail: >-
      {{ (ansible_facts['os_family'] | lower) ~ '.yml'
         if ansible_facts['os_family'] in ['Archlinux', 'Debian']
         else 'none required' }}
