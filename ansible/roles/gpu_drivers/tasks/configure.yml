---
# === gpu_drivers / configure — Kernel module config and VA-API environment ===
# SRP: only deploys config files (modprobe.d, environment.d) and enables services; never installs packages.

# ---- NVIDIA: DRM KMS modprobe options ----
# Security: nvidia-drm.modeset=1 enables kernel mode setting required for Wayland DRM leasing
# and prevents display buffer access without DRM authentication (workstation security best practice,
# analogous to CIS 3.5 kernel module hardening). Controlled by gpu_drivers_manage_security.
# Tags: security, gpu_security_kms

- name: "Security — NVIDIA DRM KMS modeset enforcement"
  ansible.builtin.template:
    src: nvidia-modprobe.conf.j2
    dest: /etc/modprobe.d/nvidia.conf
    owner: root
    group: root
    mode: '0644'
  notify: regenerate initramfs
  when:
    - gpu_drivers_manage_security | bool
    - gpu_drivers_has_nvidia
    - gpu_drivers_nvidia_variant in ['proprietary', 'open-kernel']
    - gpu_drivers_nvidia_kms
  tags: ['gpu', 'nvidia', 'security', 'gpu_security_kms']

- name: Remove NVIDIA modprobe options (not applicable)
  ansible.builtin.file:
    path: /etc/modprobe.d/nvidia.conf
    state: absent
  when: >-
    not gpu_drivers_manage_security | bool
    or not gpu_drivers_has_nvidia
    or gpu_drivers_nvidia_variant == 'nouveau'
    or not gpu_drivers_nvidia_kms
  tags: ['gpu', 'nvidia']

# ---- NVIDIA: blacklist nouveau ----
# Security: blacklisting the nouveau kernel module when the proprietary driver is active prevents
# module substitution and ensures only the intended driver manages the GPU.
# Analogous to CIS 3.5.x (disable unused kernel modules). Controlled by gpu_drivers_manage_security.
# Tags: security, gpu_security_blacklist

- name: "Security — Blacklist nouveau kernel module"
  ansible.builtin.template:
    src: nvidia-blacklist.conf.j2
    dest: /etc/modprobe.d/nvidia-blacklist.conf
    owner: root
    group: root
    mode: '0644'
  when:
    - gpu_drivers_manage_security | bool
    - gpu_drivers_has_nvidia
    - gpu_drivers_nvidia_variant in ['proprietary', 'open-kernel']
    - gpu_drivers_nvidia_blacklist_nouveau
  tags: ['gpu', 'nvidia', 'security', 'gpu_security_blacklist']

- name: Remove nouveau blacklist (not applicable)
  ansible.builtin.file:
    path: /etc/modprobe.d/nvidia-blacklist.conf
    state: absent
  when: >-
    not gpu_drivers_manage_security | bool
    or not gpu_drivers_has_nvidia
    or gpu_drivers_nvidia_variant == 'nouveau'
    or not gpu_drivers_nvidia_blacklist_nouveau
  tags: ['gpu', 'nvidia']

# ---- NVIDIA: suspend/resume services (ROLE-002: init-specific dispatch) ----
# nvidia_services_systemd.yml handles systemd service units.
# Non-systemd inits (runit, openrc, s6, dinit) have no systemd unit equivalent;
# NVIDIA module suspend/resume on non-systemd is handled by the init's power hooks.
# with_first_found + skip: true ensures non-systemd systems are a no-op.

- name: Manage NVIDIA suspend/resume services (init-specific dispatch)
  ansible.builtin.include_tasks: "{{ item }}"
  with_first_found:
    - files:
        - "nvidia_services_{{ ansible_facts['service_mgr'] }}.yml"
      skip: true
  when:
    - gpu_drivers_has_nvidia
    - gpu_drivers_nvidia_variant in ['proprietary', 'open-kernel']
  tags: ['gpu', 'nvidia']

# ---- VA-API environment variables ----

- name: Ensure /etc/environment.d directory exists
  ansible.builtin.file:
    path: /etc/environment.d
    state: directory
    owner: root
    group: root
    mode: '0755'
  when:
    - gpu_drivers_vaapi
    - gpu_drivers_has_nvidia or gpu_drivers_has_amd or gpu_drivers_has_intel
  tags: ['gpu', 'drivers']

- name: Deploy GPU VA-API environment configuration
  ansible.builtin.template:
    src: gpu-environment.conf.j2
    dest: /etc/environment.d/gpu.conf
    owner: root
    group: root
    mode: '0644'
  when:
    - gpu_drivers_vaapi
    - gpu_drivers_has_nvidia or gpu_drivers_has_amd or gpu_drivers_has_intel
  tags: ['gpu', 'drivers']

- name: Remove GPU environment config when VA-API disabled or no GPU
  ansible.builtin.file:
    path: /etc/environment.d/gpu.conf
    state: absent
  when: >-
    not gpu_drivers_vaapi
    or not (gpu_drivers_has_nvidia or gpu_drivers_has_amd or gpu_drivers_has_intel)
  tags: ['gpu', 'drivers']
