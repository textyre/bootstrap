---
# === gpu_drivers / configure — Kernel module config and VA-API environment ===
# SRP: only deploys config files (modprobe.d, environment.d) and enables services; never installs packages.

# ---- NVIDIA: DRM KMS modprobe options ----

- name: Deploy NVIDIA DRM KMS modprobe options
  ansible.builtin.template:
    src: nvidia-modprobe.conf.j2
    dest: /etc/modprobe.d/nvidia.conf
    owner: root
    group: root
    mode: '0644'
  notify: regenerate initramfs
  when:
    - gpu_drivers_has_nvidia
    - gpu_drivers_nvidia_variant in ['proprietary', 'open-kernel']
    - gpu_drivers_nvidia_kms
  tags: ['gpu', 'nvidia']

- name: Remove NVIDIA modprobe options (not applicable)
  ansible.builtin.file:
    path: /etc/modprobe.d/nvidia.conf
    state: absent
  when: >-
    not gpu_drivers_has_nvidia
    or gpu_drivers_nvidia_variant == 'nouveau'
    or not gpu_drivers_nvidia_kms
  tags: ['gpu', 'nvidia']

# ---- NVIDIA: blacklist nouveau ----

- name: Deploy nouveau blacklist (proprietary/open-kernel)
  ansible.builtin.template:
    src: nvidia-blacklist.conf.j2
    dest: /etc/modprobe.d/nvidia-blacklist.conf
    owner: root
    group: root
    mode: '0644'
  when:
    - gpu_drivers_has_nvidia
    - gpu_drivers_nvidia_variant in ['proprietary', 'open-kernel']
    - gpu_drivers_nvidia_blacklist_nouveau
  tags: ['gpu', 'nvidia']

- name: Remove nouveau blacklist (not applicable)
  ansible.builtin.file:
    path: /etc/modprobe.d/nvidia-blacklist.conf
    state: absent
  when: >-
    not gpu_drivers_has_nvidia
    or gpu_drivers_nvidia_variant == 'nouveau'
    or not gpu_drivers_nvidia_blacklist_nouveau
  tags: ['gpu', 'nvidia']

# ---- NVIDIA: suspend/resume systemd services ----

- name: Enable NVIDIA suspend/resume systemd services
  ansible.builtin.systemd:
    name: "{{ item }}"
    enabled: true
    daemon_reload: false
  loop:
    - nvidia-suspend.service
    - nvidia-hibernate.service
    - nvidia-resume.service
  when:
    - gpu_drivers_has_nvidia
    - gpu_drivers_nvidia_variant in ['proprietary', 'open-kernel']
    - gpu_drivers_nvidia_suspend
    - ansible_facts['service_mgr'] == 'systemd'
  tags: ['gpu', 'nvidia']

- name: Disable NVIDIA suspend/resume systemd services (not applicable)
  ansible.builtin.systemd:
    name: "{{ item }}"
    enabled: false
    daemon_reload: false
  loop:
    - nvidia-suspend.service
    - nvidia-hibernate.service
    - nvidia-resume.service
  register: _gpu_drivers_disable_nvidia_services
  when: >-
    not gpu_drivers_has_nvidia
    or gpu_drivers_nvidia_variant == 'nouveau'
    or not gpu_drivers_nvidia_suspend
    or ansible_facts['service_mgr'] != 'systemd'
  failed_when: false
  tags: ['gpu', 'nvidia']

# ROLE-013: failed_when: false is acceptable here because the service units may
# not exist when the NVIDIA driver is not installed. The debug below makes the
# outcome visible rather than silently swallowing any systemd errors.
- name: Report NVIDIA suspend service disable outcome
  ansible.builtin.debug:
    msg: >-
      NVIDIA suspend/resume services disable: {{ _gpu_drivers_disable_nvidia_services.results
        | map(attribute='item') | list }} —
      {{ 'skipped (NVIDIA active or non-systemd)' if _gpu_drivers_disable_nvidia_services is skipped
         else 'attempted (services may not exist if driver not installed)' }}
  when: _gpu_drivers_disable_nvidia_services is defined
  tags: ['gpu', 'nvidia']

# ---- VA-API environment variables ----

- name: Ensure /etc/environment.d directory exists
  ansible.builtin.file:
    path: /etc/environment.d
    state: directory
    owner: root
    group: root
    mode: '0755'
  when:
    - gpu_drivers_vaapi
    - gpu_drivers_has_nvidia or gpu_drivers_has_amd or gpu_drivers_has_intel
  tags: ['gpu', 'drivers']

- name: Deploy GPU VA-API environment configuration
  ansible.builtin.template:
    src: gpu-environment.conf.j2
    dest: /etc/environment.d/gpu.conf
    owner: root
    group: root
    mode: '0644'
  when:
    - gpu_drivers_vaapi
    - gpu_drivers_has_nvidia or gpu_drivers_has_amd or gpu_drivers_has_intel
  tags: ['gpu', 'drivers']

- name: Remove GPU environment config when VA-API disabled or no GPU
  ansible.builtin.file:
    path: /etc/environment.d/gpu.conf
    state: absent
  when: >-
    not gpu_drivers_vaapi
    or not (gpu_drivers_has_nvidia or gpu_drivers_has_amd or gpu_drivers_has_intel)
  tags: ['gpu', 'drivers']
