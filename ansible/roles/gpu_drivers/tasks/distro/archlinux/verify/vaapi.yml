---
# === gpu_drivers / verify / VA-API ===

- name: "Assert NVIDIA VA-API packages are installed"
  ansible.builtin.include_tasks:
    file: common/verify_packages.yml
  vars:
    _gpu_drivers_package_stack: "{{ _gpu_drivers_archlinux_nvidia_vaapi }}"
  when: gpu_drivers_has_nvidia

- name: "Assert AMD VA-API packages are installed"
  ansible.builtin.include_tasks:
    file: common/verify_packages.yml
  vars:
    _gpu_drivers_package_stack:
      - libva-mesa-driver
  when: gpu_drivers_has_amd

- name: "Assert Intel VA-API packages are installed"
  ansible.builtin.include_tasks:
    file: common/verify_packages.yml
  vars:
    _gpu_drivers_package_stack:
      - intel-media-driver
  when: gpu_drivers_has_intel
