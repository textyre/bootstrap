---
driver:
  name: vagrant
  provider:
    name: libvirt

platforms:
  - name: arch-vm
    box: arch-base
    box_url: https://github.com/textyre/arch-images/releases/latest/download/arch-base.box
    memory: 2048
    cpus: 2
  - name: ubuntu-base
    box: ubuntu-base
    box_url: https://github.com/textyre/ubuntu-images/releases/latest/download/ubuntu-base.box
    memory: 2048
    cpus: 2

provisioner:
  name: ansible
  options:
    skip-tags: report
  env:
    ANSIBLE_ROLES_PATH: "${MOLECULE_PROJECT_DIRECTORY}/../"
  config_options:
    defaults:
      callbacks_enabled: profile_tasks
  # Vagrant platforms use the Intel happy-path (defaults in verify.yml).
  # Edge case platforms (vendor=none, vaapi=false) are covered by the Docker scenario.
  inventory:
    host_vars:
      arch-vm:
        gpu_drivers_vendor: intel
        gpu_drivers_vaapi: true
        gpu_drivers_vulkan_tools: true
      ubuntu-base:
        gpu_drivers_vendor: intel
        gpu_drivers_vaapi: true
        gpu_drivers_vulkan_tools: true
  playbooks:
    prepare: prepare.yml
    converge: ../shared/converge.yml
    verify: ../shared/verify.yml

verifier:
  name: ansible

scenario:
  test_sequence:
    - syntax
    - create
    - prepare
    - converge
    - idempotence
    - verify
    - destroy
