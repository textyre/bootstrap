---
# === LightDM display manager ===
# validate -> configure -> service -> report

- name: Validate LightDM prerequisites
  ansible.builtin.include_tasks:
    file: validate.yml

- name: Deploy LightDM configuration
  ansible.builtin.include_tasks:
    file: configure/main.yml

- name: Enable and start LightDM
  ansible.builtin.include_tasks:
    file: service/main.yml

- name: Record LightDM configuration
  ansible.builtin.include_role:
    name: common
    tasks_from: report_phase.yml
  vars:
    common_rpt_fact: "_lightdm_phases"
    common_rpt_phase: "Configure"
    common_rpt_detail: "files=1 service=started"

- name: Render LightDM execution report
  ansible.builtin.include_role:
    name: common
    tasks_from: report_render.yml
  vars:
    common_rpt_fact: "_lightdm_phases"
    common_rpt_title: "lightdm"
