---
- name: Prepare Vagrant guest
  ansible.builtin.import_playbook: ../../../../molecule/shared/prepare-vagrant.yml

- name: Prepare LightDM runtime
  hosts: all
  become: true
  gather_facts: true
  tasks:
    - name: Install LightDM runtime on Arch Linux
      community.general.pacman:
        name:
          - lightdm
          - lightdm-gtk-greeter
          - xorg-server
        state: present
      when: ansible_facts['os_family'] == 'Archlinux'

    - name: Install LightDM runtime on Ubuntu
      ansible.builtin.apt:
        name:
          - lightdm
          - lightdm-gtk-greeter
          - xserver-xorg
        state: present
      environment:
        DEBIAN_FRONTEND: noninteractive
      when: ansible_facts['os_family'] == 'Debian'

    - name: Create test dotfiles directory
      ansible.builtin.file:
        path: /tmp/lightdm_test_dotfiles/etc/lightdm/lightdm.conf.d
        state: directory
        mode: "0755"

    - name: Copy repository LightDM configuration into the test host
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../../../../../dotfiles/etc/lightdm/lightdm.conf.d/10-config.conf"
        dest: /tmp/lightdm_test_dotfiles/etc/lightdm/lightdm.conf.d/10-config.conf
        mode: "0644"
