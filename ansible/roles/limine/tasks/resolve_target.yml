---
# ---- Limine BIOS install target ----

- name: Use explicit Limine install target
  ansible.builtin.set_fact:
    limine_install_target_effective: "{{ limine_bios_install_target }}"
    _limine_target_source: "explicit"
  when: limine_bios_install_target | length > 0
  tags: ['limine', 'limine:target']

- name: Resolve Limine target from boot parent
  when:
    - limine_install_target_effective is not defined
    - limine_bios_install_target_auto | bool
  tags: ['limine', 'limine:target']
  block:

    - name: Detect boot mount source
      ansible.builtin.command:
        cmd: "findmnt -no SOURCE {{ limine_boot_mount }}"
      register: _limine_boot_source
      changed_when: false
      failed_when: _limine_boot_source.rc != 0 or (_limine_boot_source.stdout | trim | length == 0)

    - name: Detect boot parent disk
      ansible.builtin.command:
        cmd: "lsblk -no PKNAME {{ _limine_boot_source.stdout | trim }}"
      register: _limine_boot_parent
      changed_when: false
      failed_when: _limine_boot_parent.rc != 0 or (_limine_boot_parent.stdout | trim | length == 0)

    - name: Detect stable by-id path for boot parent disk
      ansible.builtin.shell: |
        set -euo pipefail
        parent="/dev/{{ _limine_boot_parent.stdout | trim }}"
        for path in /dev/disk/by-id/*; do
          [ -e "$path" ] || continue
          [ "$(readlink -f "$path")" = "$parent" ] || continue
          case "$path" in
            *-part*) continue ;;
          esac
          printf '%s\n' "$path"
          exit 0
        done
        exit 0
      args:
        executable: /usr/bin/bash
      register: _limine_boot_parent_by_id
      changed_when: false

    - name: Set auto-resolved Limine install target
      ansible.builtin.set_fact:
        limine_install_target_effective: >-
          {{
            (_limine_boot_parent_by_id.stdout | trim)
            if (_limine_boot_parent_by_id.stdout | trim | length > 0)
            else '/dev/' ~ (_limine_boot_parent.stdout | trim)
          }}
        _limine_target_source: "boot_parent"

- name: Assert Limine install target was resolved
  ansible.builtin.assert:
    that:
      - limine_install_target_effective is defined
      - limine_install_target_effective | length > 0
    fail_msg: >-
      Could not resolve Limine BIOS install target. Set
      limine_bios_install_target explicitly for this host.
    success_msg: "Limine install target resolved"
  tags: ['limine', 'limine:target']

- name: Stat resolved Limine install target
  ansible.builtin.stat:
    path: "{{ limine_install_target_effective }}"
    follow: true
  register: _limine_target_stat
  when: limine_validate_target_block_device | bool
  tags: ['limine', 'limine:target']

- name: Assert resolved Limine install target is a block device
  ansible.builtin.assert:
    that:
      - _limine_target_stat.stat.exists
      - _limine_target_stat.stat.isblk
    fail_msg: >-
      Limine install target '{{ limine_install_target_effective }}'
      is not a block device. Set limine_bios_install_target explicitly if
      this host has a custom boot topology.
    success_msg: "Limine install target is a block device"
  when: limine_validate_target_block_device | bool
  tags: ['limine', 'limine:target']

- name: "Report: Resolve Limine target"
  ansible.builtin.include_role:
    name: common
    tasks_from: report_phase.yml
  vars:
    common_rpt_fact: "_limine_phases"
    common_rpt_phase: "Resolve Limine target"
    common_rpt_detail: "{{ _limine_target_source }}: {{ limine_install_target_effective }}"
  tags: ['limine', 'report']
