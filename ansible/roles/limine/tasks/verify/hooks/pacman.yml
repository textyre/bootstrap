---
# ---- Pacman hook verification ----

- name: Assert Limine pacman hook file state
  ansible.builtin.include_role:
    name: common
    tasks_from: assert_path_state.yml
  vars:
    common_assert_path: "{{ limine_pacman_hook_file }}"
    common_assert_type: file
    common_assert_owner: root
    common_assert_group: root
    common_assert_mode: "0644"
    common_assert_label: "Limine pacman hook"
  tags: ['limine', 'limine:verify', 'limine:hook']

- name: Read Limine pacman hook
  ansible.builtin.slurp:
    src: "{{ limine_pacman_hook_file }}"
  register: _limine_verify_hook_raw
  tags: ['limine', 'limine:verify', 'limine:hook']

- name: Set Limine hook text fact
  ansible.builtin.set_fact:
    _limine_verify_hook_text: "{{ _limine_verify_hook_raw.content | b64decode }}"
  tags: ['limine', 'limine:verify', 'limine:hook']

- name: Assert Limine pacman hook content is clone-safe
  ansible.builtin.assert:
    that:
      - limine_install_target_file in _limine_verify_hook_text
      - _limine_verify_hook_text is regex('(?m)^Target = limine$')
      - _limine_verify_hook_text is regex('(?m)^When = PostTransaction$')
      - not (_limine_verify_hook_text is regex('Exec = .*\\/dev\\/disk\\/by-id\\/ata-VBOX_HARDDISK_'))
    fail_msg: "{{ limine_pacman_hook_file }} is missing, invalid, or still embeds a disk id."
    success_msg: "Limine pacman hook reads the machine-local install target"
  tags: ['limine', 'limine:verify', 'limine:hook']
