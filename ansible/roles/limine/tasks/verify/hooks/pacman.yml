---
# ---- Pacman hook verification ----

- name: Assert Limine pacman hook file state
  ansible.builtin.include_role:
    name: common
    tasks_from: assert_path_state.yml
  vars:
    common_assert_path: "{{ limine_pacman_hook_file }}"
    common_assert_type: file
    common_assert_owner: root
    common_assert_group: root
    common_assert_mode: "0644"
    common_assert_label: "Limine pacman hook"
  tags: ['limine', 'limine:verify', 'limine:hook']

- name: Read Limine pacman hook
  ansible.builtin.slurp:
    src: "{{ limine_pacman_hook_file }}"
  register: _limine_verify_hook_raw
  tags: ['limine', 'limine:verify', 'limine:hook']

- name: Set Limine hook text fact
  ansible.builtin.set_fact:
    _limine_verify_hook_text: "{{ _limine_verify_hook_raw.content | b64decode }}"
  tags: ['limine', 'limine:verify', 'limine:hook']

- name: Assert Limine pacman hook content is clone-safe
  vars:
    _limine_hook_target_index: "{{ _limine_verify_hook_text.find('target=\"$(cat \"$target_file\")\"') }}"
    _limine_hook_install_index: "{{ _limine_verify_hook_text.find('bios-install') }}"
    _limine_hook_copy_index: "{{ _limine_verify_hook_text.find('/usr/bin/install -Dm0644 \"$src\" \"$boot_stage\"') }}"
    _limine_hook_sync_index: "{{ _limine_verify_hook_text.find('/usr/bin/sync') }}"
  ansible.builtin.assert:
    that:
      - limine_install_target_file in _limine_verify_hook_text
      - _limine_verify_hook_text is regex('(?m)^Target = limine$')
      - _limine_verify_hook_text is regex('(?m)^When = PostTransaction$')
      - _limine_hook_target_index | int >= 0
      - _limine_hook_install_index | int >= 0
      - _limine_hook_copy_index | int >= 0
      - (_limine_hook_target_index | int) < (_limine_hook_install_index | int)
      - (_limine_hook_install_index | int) < (_limine_hook_copy_index | int)
      - (_limine_hook_copy_index | int) < (_limine_hook_sync_index | int)
      - not (_limine_verify_hook_text is regex('Exec = .*\\/dev\\/disk\\/by-id\\/ata-VBOX_HARDDISK_'))
    fail_msg: "{{ limine_pacman_hook_file }} is missing, invalid, embeds a disk id, skips sync, or does not install Limine before copying limine-bios.sys."
    success_msg: "Limine pacman hook reads the machine-local install target, installs Limine, copies limine-bios.sys, and syncs writes"
  tags: ['limine', 'limine:verify', 'limine:hook']
