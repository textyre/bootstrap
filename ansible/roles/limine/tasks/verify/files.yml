---
# ---- Limine artifact verification ----

- name: Assert Limine binary exists
  ansible.builtin.include_role:
    name: common
    tasks_from: assert_path_state.yml
  vars:
    common_assert_path: "{{ limine_binary }}"
    common_assert_type: file
    common_assert_follow: true
    common_assert_label: "Limine binary"
  tags: ['limine', 'limine:verify']

- name: Assert Limine BIOS system file exists
  ansible.builtin.include_role:
    name: common
    tasks_from: assert_path_state.yml
  vars:
    common_assert_path: "{{ limine_bios_sys_source }}"
    common_assert_type: file
    common_assert_follow: true
    common_assert_label: "Limine BIOS system file"
  tags: ['limine', 'limine:verify']

- name: Assert Limine boot directory exists
  ansible.builtin.include_role:
    name: common
    tasks_from: assert_path_state.yml
  vars:
    common_assert_path: "{{ limine_boot_dir }}"
    common_assert_type: directory
    common_assert_label: "Limine boot directory"
  tags: ['limine', 'limine:verify']
