---
# ---- Install target verification ----

- name: Stat Limine install target file
  ansible.builtin.stat:
    path: "{{ limine_install_target_file }}"
  register: _limine_verify_target_file
  tags: ['limine', 'limine:verify']

- name: Read Limine install target file
  ansible.builtin.slurp:
    src: "{{ limine_install_target_file }}"
  register: _limine_verify_target_raw
  when: _limine_verify_target_file.stat.exists
  tags: ['limine', 'limine:verify']

- name: Set Limine verify target fact
  ansible.builtin.set_fact:
    _limine_verify_target_text: "{{ _limine_verify_target_raw.content | b64decode | trim }}"
  when: _limine_verify_target_file.stat.exists
  tags: ['limine', 'limine:verify']

- name: Assert Limine install target file is valid
  ansible.builtin.assert:
    that:
      - _limine_verify_target_file.stat.exists
      - _limine_verify_target_file.stat.isreg
      - _limine_verify_target_file.stat.pw_name == 'root'
      - _limine_verify_target_file.stat.gr_name == 'root'
      - _limine_verify_target_file.stat.mode == '0644'
      - _limine_verify_target_text | length > 0
    fail_msg: "{{ limine_install_target_file }} is missing, empty, or has wrong permissions."
    success_msg: "Limine install target file is present"
  tags: ['limine', 'limine:verify']

- name: Stat Limine install target block device
  ansible.builtin.stat:
    path: "{{ _limine_verify_target_text }}"
    follow: true
  register: _limine_verify_target_stat
  when: limine_validate_target_block_device | bool
  tags: ['limine', 'limine:verify']

- name: Assert Limine install target points to block device
  ansible.builtin.assert:
    that:
      - _limine_verify_target_stat.stat.exists
      - _limine_verify_target_stat.stat.isblk
    fail_msg: "{{ _limine_verify_target_text }} is not a block device."
    success_msg: "Limine install target points to a block device"
  when: limine_validate_target_block_device | bool
  tags: ['limine', 'limine:verify']
