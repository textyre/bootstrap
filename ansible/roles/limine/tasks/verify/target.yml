---
# ---- Install target verification ----

- name: Assert Limine install target file state
  ansible.builtin.include_role:
    name: common
    tasks_from: assert_path_state.yml
  vars:
    common_assert_path: "{{ limine_install_target_file }}"
    common_assert_type: file
    common_assert_owner: root
    common_assert_group: root
    common_assert_mode: "0644"
    common_assert_label: "Limine install target file"
  tags: ['limine', 'limine:verify']

- name: Read Limine install target file
  ansible.builtin.slurp:
    src: "{{ limine_install_target_file }}"
  register: _limine_verify_target_raw
  tags: ['limine', 'limine:verify']

- name: Set Limine verify target fact
  ansible.builtin.set_fact:
    _limine_verify_target_text: "{{ _limine_verify_target_raw.content | b64decode | trim }}"
  tags: ['limine', 'limine:verify']

- name: Assert Limine install target file is not empty
  ansible.builtin.assert:
    that:
      - _limine_verify_target_text | length > 0
    fail_msg: "{{ limine_install_target_file }} is empty."
    success_msg: "Limine install target file is not empty"
  tags: ['limine', 'limine:verify']

- name: Assert Limine install target points to block device
  ansible.builtin.include_role:
    name: common
    tasks_from: assert_path_state.yml
  vars:
    common_assert_path: "{{ _limine_verify_target_text }}"
    common_assert_type: block
    common_assert_follow: true
    common_assert_label: "Limine install target block device"
  when: limine_validate_target_block_device | bool
  tags: ['limine', 'limine:verify']
