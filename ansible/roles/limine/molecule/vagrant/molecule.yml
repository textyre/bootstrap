---
driver:
  name: vagrant
  provider:
    name: libvirt

platforms:
  - name: arch-vm
    box: arch-base
    box_url: https://github.com/textyre/arch-images/releases/latest/download/arch-base.box
    memory: 2048
    cpus: 2
  - name: ubuntu-base
    box: ubuntu-base
    box_url: https://github.com/textyre/ubuntu-images/releases/latest/download/ubuntu-base.box
    memory: 2048
    cpus: 2

provisioner:
  name: ansible
  options:
    skip-tags: report
  inventory:
    group_vars:
      all:
        limine_bios_install_target: /var/lib/molecule/limine/dev/disk/by-id/test-system-disk
        limine_validate_target_block_device: false
        limine_install_target_file: /var/lib/molecule/limine/etc/limine/install-target
        limine_pacman_hook_file: /var/lib/molecule/limine/etc/pacman.d/hooks/99-limine.hook
        limine_pacman_hook_script_file: /var/lib/molecule/limine/usr/local/lib/bootstrap/limine-refresh-after-upgrade.sh
        limine_boot_dir: /var/lib/molecule/limine/boot/limine
        limine_config_file: /var/lib/molecule/limine/boot/limine/limine.conf
        limine_binary: /var/lib/molecule/limine/usr/bin/limine
        limine_bios_sys_source: /var/lib/molecule/limine/usr/share/limine/limine-bios.sys
  config_options:
    defaults:
      callbacks_enabled: profile_tasks
  env:
    ANSIBLE_ROLES_PATH: "${MOLECULE_PROJECT_DIRECTORY}/../"
  playbooks:
    prepare: prepare.yml
    converge: ../shared/converge.yml
    verify: ../shared/verify.yml

verifier:
  name: ansible

scenario:
  test_sequence:
    - syntax
    - create
    - prepare
    - converge
    - idempotence
    - verify
    - destroy
