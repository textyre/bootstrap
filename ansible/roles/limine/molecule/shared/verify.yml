---
- name: Verify Limine role behavior
  hosts: all
  become: true
  gather_facts: true
  vars:
    _limine_verify_target_file: /tmp/limine-test/etc/limine/install-target
    _limine_verify_hook_file: /tmp/limine-test/etc/pacman.d/hooks/99-limine.hook
    _limine_verify_expected_target: /tmp/limine-test/dev/disk/by-id/test-system-disk
    _limine_resolver_task_file: "{{ lookup('env', 'MOLECULE_PROJECT_DIRECTORY') }}/roles/limine/tasks/resolve_boot_parent_target.yml"
  tasks:
    - name: Stat test Limine install target file
      ansible.builtin.stat:
        path: "{{ _limine_verify_target_file }}"
      register: _limine_molecule_target_stat

    - name: Read test Limine install target file
      ansible.builtin.slurp:
        src: "{{ _limine_verify_target_file }}"
      register: _limine_molecule_target_raw

    - name: Set decoded target fact
      ansible.builtin.set_fact:
        _limine_molecule_target_text: "{{ _limine_molecule_target_raw.content | b64decode | trim }}"

    - name: Assert target file state
      ansible.builtin.assert:
        that:
          - _limine_molecule_target_stat.stat.exists
          - _limine_molecule_target_stat.stat.isreg
          - _limine_molecule_target_stat.stat.pw_name == 'root'
          - _limine_molecule_target_stat.stat.gr_name == 'root'
          - _limine_molecule_target_stat.stat.mode == '0644'
          - _limine_molecule_target_text == _limine_verify_expected_target
        fail_msg: "Limine install target file was not created with the expected content."
        success_msg: "Limine install target file is valid."

    - name: Verify Arch pacman hook
      when: ansible_facts['os_family'] == 'Archlinux'
      block:
        - name: Read test Limine hook
          ansible.builtin.slurp:
            src: "{{ _limine_verify_hook_file }}"
          register: _limine_molecule_hook_raw

        - name: Set decoded hook fact
          ansible.builtin.set_fact:
            _limine_molecule_hook_text: "{{ _limine_molecule_hook_raw.content | b64decode }}"

        - name: Assert hook was normalized
          ansible.builtin.assert:
            that:
              - _limine_verify_target_file in _limine_molecule_hook_text
              - _limine_molecule_hook_text is regex('(?m)^Target = limine$')
              - _limine_molecule_hook_text is regex('(?m)^When = PostTransaction$')
              - not (_limine_molecule_hook_text is regex('ata-VBOX_HARDDISK_VBold'))
              - not (_limine_molecule_hook_text is regex('Exec = .*\\/dev\\/disk\\/by-id\\/ata-VBOX_HARDDISK_'))
            fail_msg: "Limine pacman hook was not normalized to read the machine-local target file."
            success_msg: "Limine pacman hook is clone-safe."

    - name: Verify non-Arch hook no-op
      when: ansible_facts['os_family'] != 'Archlinux'
      block:
        - name: Stat non-Arch Limine hook
          ansible.builtin.stat:
            path: "{{ _limine_verify_hook_file }}"
          register: _limine_molecule_non_arch_hook

        - name: Assert non-Arch hook was not created
          ansible.builtin.assert:
            that:
              - not _limine_molecule_non_arch_hook.stat.exists
            fail_msg: "Non-Arch Limine scenario must not create a pacman hook."
            success_msg: "Non-Arch Limine scenario skipped package-manager hook management."

    - name: Prepare fake resolver command fixtures
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        owner: root
        group: root
        mode: "0755"
      loop:
        - /tmp/limine-test/bin
        - /tmp/limine-test/dev/disk/by-id

    - name: Create fake resolver device nodes
      ansible.builtin.file:
        path: "{{ item }}"
        state: touch
        owner: root
        group: root
        mode: "0644"
      loop:
        - /tmp/limine-test/dev/sda
        - /tmp/limine-test/dev/sda1
        - /tmp/limine-test/dev/sdb
        - /tmp/limine-test/dev/sdb1

    - name: Create fake stable by-id link
      ansible.builtin.file:
        src: ../../sda
        dest: /tmp/limine-test/dev/disk/by-id/test-system-disk
        state: link
        owner: root
        group: root

    - name: Create fake findmnt for resolver tests
      ansible.builtin.copy:
        dest: /tmp/limine-test/bin/findmnt
        owner: root
        group: root
        mode: "0755"
        content: |
          #!/usr/bin/env sh
          case "$*" in
            *"/multi-boot"*) printf '%s\n' '/tmp/limine-test/dev/md0' ;;
            *) printf '%s\n' '/tmp/limine-test/dev/sda1' ;;
          esac

    - name: Create fake lsblk for resolver tests
      ansible.builtin.copy:
        dest: /tmp/limine-test/bin/lsblk
        owner: root
        group: root
        mode: "0755"
        content: |
          #!/usr/bin/env sh
          case "$*" in
            *"/tmp/limine-test/dev/md0"*)
              printf '%s\n' '/tmp/limine-test/dev/md0 raid1'
              printf '%s\n' '/tmp/limine-test/dev/sda disk'
              printf '%s\n' '/tmp/limine-test/dev/sdb disk'
              ;;
            *)
              printf '%s\n' '/tmp/limine-test/dev/sda1 part'
              printf '%s\n' '/tmp/limine-test/dev/sda disk'
              ;;
          esac

    - name: Verify auto resolver chooses stable by-id path for one backing disk
      vars:
        limine_boot_mount: /boot
        limine_bios_install_target_by_id_dir: /tmp/limine-test/dev/disk/by-id
        _limine_resolver_path_env: "/tmp/limine-test/bin:{{ ansible_facts.env.PATH }}"
      block:
        - name: Run auto resolver with one backing disk
          ansible.builtin.include_tasks:
            file: "{{ _limine_resolver_task_file }}"
            apply:
              environment:
                PATH: "{{ _limine_resolver_path_env }}"

        - name: Assert auto resolver result
          ansible.builtin.assert:
            that:
              - limine_resolved_install_target == '/tmp/limine-test/dev/disk/by-id/test-system-disk'
              - limine_target_source == 'boot_parent'
            fail_msg: "Limine auto resolver did not choose the stable by-id target."
            success_msg: "Limine auto resolver chose the stable by-id target."

    - name: Verify auto resolver fails on ambiguous backing disks
      vars:
        limine_boot_mount: /multi-boot
        limine_bios_install_target_by_id_dir: /tmp/limine-test/dev/disk/by-id
        _limine_resolver_path_env: "/tmp/limine-test/bin:{{ ansible_facts.env.PATH }}"
      block:
        - name: Run auto resolver with multiple backing disks
          ansible.builtin.include_tasks:
            file: "{{ _limine_resolver_task_file }}"
            apply:
              environment:
                PATH: "{{ _limine_resolver_path_env }}"

        - name: Fail if ambiguous resolver did not stop
          ansible.builtin.fail:
            msg: "Limine auto resolver accepted multiple backing disks."
      rescue:
        - name: Assert ambiguous resolver failed for the expected reason
          ansible.builtin.assert:
            that:
              - ansible_failed_result is defined
              - (ansible_failed_result.msg | default('')) is regex('unique Limine BIOS install target')
            fail_msg: "Limine auto resolver failed, but not because the backing disk was ambiguous."
            success_msg: "Limine auto resolver rejects ambiguous backing disks."
