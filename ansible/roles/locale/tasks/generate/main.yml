---
# === locale: generate phase ===

- name: "Generate locales ({{ ansible_facts['os_family'] }})"
  ansible.builtin.include_tasks: "generate/{{ ansible_facts['os_family'] | lower }}.yml"
  tags: ['locale']

- name: Report locale generation
  ansible.builtin.include_tasks: report/phase.yml
  vars:
    _locale_report_phase: "Generate locales"
    _locale_report_detail: "{{ ansible_facts['os_family'] }}: {{ locale_list | join(', ') }}"
  tags: ['locale', 'report']
