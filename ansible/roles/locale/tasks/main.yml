---
# === Локализация ===
# validate → generate → verify → configure → report
# Fail-fast: invalid inputs and unsupported platforms stop before mutation.

- name: Locale role
  when: locale_enabled | bool
  tags: ['locale']
  block:

    - name: Validate locale phase
      ansible.builtin.include_tasks: validate/main.yml
      tags: ['locale']

    - name: Generate locale phase
      ansible.builtin.include_tasks: generate/main.yml
      tags: ['locale']

    - name: Verify locale phase
      ansible.builtin.include_tasks: verify/main.yml
      tags: ['locale']

    - name: Configure locale phase
      ansible.builtin.include_tasks: configure/main.yml
      tags: ['locale']

    - name: Render locale execution report
      ansible.builtin.include_tasks: report/main.yml
      tags: ['locale', 'report']
