---
# Проверка локалей (glibc)
# Нормализация нужна потому что locale -a выводит en_US.utf8,
# а стандартная запись — en_US.UTF-8.

- name: Get available locales
  ansible.builtin.command: locale -a
  register: locale_check
  changed_when: false
  failed_when: locale_check.rc != 0
  tags: ['locale']

- name: Assert requested locales are available
  ansible.builtin.assert:
    that:
      - normalized in available
    fail_msg: >-
      Locale {{ item }} was not generated. Available locales:
      {{ locale_check.stdout_lines | join(', ') }}
    success_msg: "Locale {{ item }} is available"
  vars:
    normalized: "{{ item | lower | replace('-', '') | replace('.', '') }}"
    available: >-
      {{ locale_check.stdout_lines
         | map('lower')
         | map('replace', '-', '')
         | map('replace', '.', '')
         | list }}
  loop: "{{ locale_list }}"
  loop_control:
    label: "{{ item }}"
  tags: ['locale']
