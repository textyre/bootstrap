---
# Проверка локалей (glibc)
# Soft-fail: выставляет locale_verify_ok (bool) и locale_verify_missing (list).
# НЕ крашит плей — main.yml читает locale_verify_ok для репорта и configure.
#
# Нормализация нужна потому что locale -a выводит en_US.utf8,
# а стандартная запись — en_US.UTF-8.

- name: Get available locales
  ansible.builtin.command: locale -a
  register: locale_check
  changed_when: false
  tags: ['locale']

- name: Check each requested locale is available
  ansible.builtin.set_fact:
    locale_verify_ok: false
    locale_verify_missing: "{{ locale_verify_missing + [item] }}"
  vars:
    normalized: "{{ item | lower | replace('-', '') | replace('.', '') }}"
    available: "{{ locale_check.stdout_lines | map('lower') | map('replace', '-', '') | map('replace', '.', '') }}"
  when: normalized not in available
  loop: "{{ locale_list }}"
  tags: ['locale']
