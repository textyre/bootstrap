---
# === locale: preflight validation ===
# Fail-fast preflight: validate platform and public API before mutating host.

- name: Assert supported operating system
  ansible.builtin.assert:
    that:
      - ansible_facts['os_family'] in _locale_supported_os
    fail_msg: >-
      OS family '{{ ansible_facts['os_family'] }}' is not supported.
      Supported: {{ _locale_supported_os | join(', ') }}
    success_msg: "OS family '{{ ansible_facts['os_family'] }}' is supported"
  tags: ['locale']

- name: Include OS-specific locale variables
  ansible.builtin.include_vars: "{{ ansible_facts['os_family'] | lower }}/main.yml"
  tags: ['locale']

- name: Assert locale_list is defined and not empty
  ansible.builtin.assert:
    that:
      - locale_list | default([]) | length > 0
    fail_msg: "locale_list must be a non-empty list of locale names"
    success_msg: "locale_list contains {{ locale_list | length }} locale(s)"
  tags: ['locale']

- name: Assert locale_default is defined and non-empty
  ansible.builtin.assert:
    that:
      - locale_default | default('') | trim | length > 0
    fail_msg: "locale_default must be a non-empty locale name"
    success_msg: "locale_default = '{{ locale_default | trim }}'"
  tags: ['locale']

- name: Assert locale_default is generated by this role
  ansible.builtin.assert:
    that:
      - locale_default in locale_list
    fail_msg: >-
      locale_default '{{ locale_default }}' must be present in locale_list
      {{ locale_list }}.
    success_msg: "locale_default is present in locale_list"
  tags: ['locale']

- name: Assert LC_* override values are generated by this role
  ansible.builtin.assert:
    that:
      - item.value in locale_list
    fail_msg: >-
      {{ item.key }}={{ item.value }} must be present in locale_list
      {{ locale_list }}.
    success_msg: "{{ item.key }}={{ item.value }} is present in locale_list"
  loop: "{{ locale_lc_overrides | default({}) | dict2items }}"
  loop_control:
    label: "{{ item.key }}"
  tags: ['locale']
