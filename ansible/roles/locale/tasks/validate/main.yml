---
# === locale: validate phase ===

- name: Run locale preflight checks
  ansible.builtin.include_tasks: validate/preflight.yml
  tags: ['locale']

- name: Report locale validation
  ansible.builtin.include_tasks: report/phase.yml
  vars:
    _locale_report_phase: "Validate config"
    _locale_report_detail: "{{ locale_default }} from {{ locale_list | join(', ') }}"
  tags: ['locale', 'report']
