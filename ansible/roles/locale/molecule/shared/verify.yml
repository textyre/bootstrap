---
- name: Verify locale
  hosts: all
  become: true
  gather_facts: true
  vars_files:
    - ../../defaults/main.yml

  tasks:
    - name: Verify locale.conf file contract
      ansible.builtin.include_tasks: verify/config.yml

    - name: Verify generated locale availability
      ansible.builtin.include_tasks: verify/generated.yml

    - name: Verify Ansible managed marker
      ansible.builtin.include_tasks: verify/managed.yml
