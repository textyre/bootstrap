---
- name: Prepare
  hosts: all
  become: true
  gather_facts: true

  tasks:
    # Debian/Ubuntu: install locales package (provides locale-gen)
    - name: Install locales package (Ubuntu)
      ansible.builtin.apt:
        name: locales
        state: present
        update_cache: true
      when: ansible_facts['os_family'] == 'Debian'

    # Debian/Ubuntu: ensure SUPPORTED file has locale entries
    # (locale_gen module reads this file to validate locale names)
    - name: Ensure locale entries exist in /usr/share/i18n/SUPPORTED
      ansible.builtin.lineinfile:
        path: /usr/share/i18n/SUPPORTED
        line: "{{ item }}"
        create: true
        mode: '0644'
      loop:
        - "en_US.UTF-8 UTF-8"
        - "ru_RU.UTF-8 UTF-8"
      when: ansible_facts['os_family'] == 'Debian'

    # Keep locale.gen present but do not pre-create target locale entries.
    # Arch/Gentoo generation tasks must add/enable these entries themselves.
    - name: Ensure /etc/locale.gen exists
      ansible.builtin.file:
        path: /etc/locale.gen
        state: touch
        mode: '0644'
