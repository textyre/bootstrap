---
# Validation assertions run in converge.yml because each invalid role include is
# intentionally wrapped in block/rescue.
- name: Verify — validation fail-fast
  hosts: all
  become: true
  gather_facts: false

  tasks:
    - name: Assert validation scenario completed
      ansible.builtin.assert:
        that:
          - true
        success_msg: "Validation failures were asserted during converge"
