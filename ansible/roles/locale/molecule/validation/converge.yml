---
# Тестирует fail-fast валидацию без root-доступа.

- name: "Converge — empty locale_list"
  hosts: all
  become: false
  gather_facts: true

  tasks:
    - name: Apply role with empty locale_list
      block:
        - name: Include locale role
          ansible.builtin.include_role:
            name: locale
          vars:
            locale_list: []
            locale_default: "en_US.UTF-8"
            locale_lc_overrides: {}
        - name: Fail if empty locale_list was accepted
          ansible.builtin.fail:
            msg: "Expected locale validation failure for empty locale_list"
      rescue:
        - name: Assert role failed for empty locale_list
          ansible.builtin.assert:
            that:
              - "'locale_list must be a non-empty list' in ansible_failed_result.msg"
            fail_msg: "Role failed without a useful empty-list validation message"

- name: "Converge — locale_default not in locale_list"
  hosts: all
  become: false
  gather_facts: true

  tasks:
    - name: Apply role with locale_default outside locale_list
      block:
        - name: Include locale role
          ansible.builtin.include_role:
            name: locale
          vars:
            locale_list:
              - "en_US.UTF-8"
            locale_default: "ru_RU.UTF-8"
            locale_lc_overrides: {}
        - name: Fail if invalid locale_default was accepted
          ansible.builtin.fail:
            msg: "Expected locale validation failure for locale_default outside locale_list"
      rescue:
        - name: Assert role failed for locale_default outside locale_list
          ansible.builtin.assert:
            that:
              - "'must be present in locale_list' in ansible_failed_result.msg"
            fail_msg: "Role failed without a useful locale_default validation message"

- name: "Converge — LC_* value not in locale_list"
  hosts: all
  become: false
  gather_facts: true

  tasks:
    - name: Apply role with LC_* override outside locale_list
      block:
        - name: Include locale role
          ansible.builtin.include_role:
            name: locale
          vars:
            locale_list:
              - "en_US.UTF-8"
            locale_default: "en_US.UTF-8"
            locale_lc_overrides:
              LC_TIME: "ru_RU.UTF-8"
        - name: Fail if invalid LC_* override was accepted
          ansible.builtin.fail:
            msg: "Expected locale validation failure for LC_* override outside locale_list"
      rescue:
        - name: Assert role failed for LC_* override outside locale_list
          ansible.builtin.assert:
            that:
              - "'LC_TIME=ru_RU.UTF-8 must be present in locale_list' in ansible_failed_result.msg"
            fail_msg: "Role failed without a useful LC_* validation message"
