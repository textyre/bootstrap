---
# Тестирует fail-fast валидацию без root-доступа.

- name: Converge validation negative cases
  hosts: all
  become: false
  gather_facts: true

  tasks:
    - name: Validate empty locale_list is rejected
      ansible.builtin.include_tasks: tests/empty_locale_list.yml

    - name: Validate locale_default outside locale_list is rejected
      ansible.builtin.include_tasks: tests/invalid_locale_default.yml

    - name: Validate LC_* override outside locale_list is rejected
      ansible.builtin.include_tasks: tests/invalid_lc_override.yml
