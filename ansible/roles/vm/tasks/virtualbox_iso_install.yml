---
# ===================================================================
# VirtualBox Guest Additions - ISO Installation
# ===================================================================
#
# Purpose:
#   Install VirtualBox Guest Additions from ISO when host/guest
#   versions mismatch. Includes block/always cleanup.
#
# Called from:
#   virtualbox_version.yml (only when versions mismatch and kernel ready)
#
# Expected variables:
#   - vm_vbox_host_ver: target version to install (from version detection)
#   - vm_vbox_iso_dirs_pre: find result for existing ISO dirs
#
# Sets facts:
#   - vm_vbox_iso_installed: true (on success)
#
# On failure:
#   Collects diagnostics and fails with actionable message.
#   No pacman fallback — pacman GA version will never match the host.
#
# ===================================================================

- name: "VirtualBox: Enforce version match via ISO"
  tags: ['vm', 'vbox', 'vm:install']
  block:
    - name: "VirtualBox: Detect kernel type for ISO build"
      ansible.builtin.command:
        cmd: uname -r
      register: vm_vbox_kernel_for_iso
      changed_when: false

    - name: "VirtualBox: Download VBoxGuestAdditions ISO"
      ansible.builtin.get_url:
        url: "https://download.virtualbox.org/virtualbox/{{ vm_vbox_host_ver }}/VBoxGuestAdditions_{{ vm_vbox_host_ver }}.iso"
        dest: "/tmp/VBoxGuestAdditions_{{ vm_vbox_host_ver }}.iso"
        mode: '0644'

    # Kernel headers package name differs per distro:
    #   Arch:   linux-headers  /  linux-lts-headers
    #   Debian: linux-headers-<uname -r>  (dynamic per running kernel)
    #   RedHat: kernel-devel
    #   Void:   linux-headers
    #   Gentoo: headers are part of kernel source — no separate package
    - name: "VirtualBox: Resolve kernel headers package for this OS"
      ansible.builtin.set_fact:
        _vm_vbox_kernel_headers: >-
          {{
            {
              'Archlinux': 'linux-lts-headers' if '-lts' in vm_vbox_kernel_for_iso.stdout else 'linux-headers',
              'Debian':    'linux-headers-' + vm_vbox_kernel_for_iso.stdout | trim,
              'RedHat':    'kernel-devel',
              'Void':      'linux-headers',
              'Gentoo':    ''
            }[ansible_facts['os_family']] | default('linux-headers')
          }}

    - name: "VirtualBox: Install build dependencies"
      ansible.builtin.package:
        name: "{{ ['gcc', 'make', 'perl'] + ([_vm_vbox_kernel_headers] if _vm_vbox_kernel_headers | length > 0 else []) }}"
        state: present
      retries: 3
      delay: 5
      until: vm_vbox_build_deps is succeeded
      register: vm_vbox_build_deps

    - name: "VirtualBox: Stop vboxservice"
      ansible.builtin.service:
        name: vboxservice
        state: stopped
      failed_when: false

    - name: "VirtualBox: Stop vboxadd-service"
      ansible.builtin.service:
        name: vboxadd-service
        state: stopped
      failed_when: false

    - name: "VirtualBox: Remove existing ISO Guest Additions"
      ansible.builtin.command:
        cmd: "{{ item.path }}/uninstall.sh"
      loop: "{{ vm_vbox_iso_dirs_pre.files }}"
      when: vm_vbox_iso_dirs_pre.matched > 0
      register: vm_vbox_old_iso_uninstall
      changed_when: vm_vbox_old_iso_uninstall.rc | default(1) == 0
      failed_when: false

    - name: "VirtualBox: Create ISO mount point"
      ansible.builtin.file:
        path: /mnt/vbox_iso
        state: directory
        mode: '0755'

    # iso9660 module may be absent when the kernel was upgraded during this
    # same playbook run (running kernel ≠ installed kernel). Explicit modprobe
    # gives a readable error instead of a cryptic mount failure.
    - name: "VirtualBox: Ensure iso9660 filesystem module is loaded"
      community.general.modprobe:
        name: iso9660
        state: present

    - name: "VirtualBox: Mount GA ISO"  # noqa: command-instead-of-module
      ansible.builtin.command:
        cmd: "mount -o loop,ro /tmp/VBoxGuestAdditions_{{ vm_vbox_host_ver }}.iso /mnt/vbox_iso"
      changed_when: true

    - name: "VirtualBox: Run VBoxLinuxAdditions.run"
      ansible.builtin.shell:
        # Use </dev/null to prevent the installer blocking on stdin under Ansible
        # (no TTY → pipe never closes → run hangs indefinitely without this).
        # timeout 300 kills the process if compilation takes > 5 minutes.
        cmd: timeout 300 /mnt/vbox_iso/VBoxLinuxAdditions.run --nox11 </dev/null
      register: vm_vbox_iso_install_result
      changed_when: true
      failed_when: false

    - name: "VirtualBox: Show ISO installer output"
      ansible.builtin.debug:
        msg: "{{ vm_vbox_iso_install_result.stdout_lines | default([]) }}"
      tags: ['vm', 'vbox', 'vm:install', 'vm:report']

    - name: "VirtualBox: Load vboxguest module"
      ansible.builtin.command:
        cmd: modprobe vboxguest
      changed_when: true
      failed_when: false

    - name: "VirtualBox: Create systemd service file for ISO GA"
      ansible.builtin.copy:
        dest: /usr/lib/systemd/system/vboxadd-service.service
        content: |
          [Unit]
          Description=VirtualBox Guest Additions Service
          ConditionVirtualization=oracle
          After=network.target

          [Service]
          Type=simple
          ExecStart=/usr/bin/VBoxService -f
          Restart=on-failure

          [Install]
          WantedBy=multi-user.target
        mode: '0644'
      notify: "Reload systemd daemon"

    - name: "VirtualBox: Reload systemd daemon"
      ansible.builtin.systemd:
        daemon_reload: true
      when: ansible_facts['service_mgr'] == 'systemd'

    - name: "VirtualBox: Enable vboxadd-service"
      ansible.builtin.systemd:
        name: vboxadd-service
        enabled: true
        state: started
      when: ansible_facts['service_mgr'] == 'systemd'
      failed_when: false

    - name: "VirtualBox: Mark ISO installation complete"
      ansible.builtin.set_fact:
        vm_vbox_iso_installed: true

  rescue:
    - name: "VirtualBox: Collect failure diagnostics"
      ansible.builtin.shell: |
        set -o pipefail
        echo "=== Kernel ===" && uname -r
        echo "=== VBoxGuestAdditions ISOs ===" && ls -la /opt/VBoxGuestAdditions-* 2>/dev/null || echo 'No ISO GA found'
        echo "=== Loaded vbox modules ===" && lsmod | grep vbox || echo 'No vbox modules'
        echo "=== dmesg vboxguest ===" && dmesg 2>/dev/null | grep vboxguest | tail -5 || echo 'dmesg unavailable'
      args:
        executable: /bin/bash
      register: vm_vbox_iso_diag
      changed_when: false
      failed_when: false

    - name: "VirtualBox: CRITICAL — ISO installation failed"
      ansible.builtin.fail:
        msg: >-
          Failed to install VBoxGuestAdditions {{ vm_vbox_host_ver }} from ISO.
          If the kernel was just upgraded, reboot the VM first, then re-run the playbook.
          Diagnostics: {{ vm_vbox_iso_diag.stdout }}

  always:
    - name: "VirtualBox: Unmount ISO"  # noqa: command-instead-of-module
      ansible.builtin.command:
        cmd: umount /mnt/vbox_iso
      changed_when: false
      failed_when: false

    - name: "VirtualBox: Remove ISO mount point"
      ansible.builtin.file:
        path: /mnt/vbox_iso
        state: absent

    - name: "VirtualBox: Remove downloaded ISO"
      ansible.builtin.file:
        path: "/tmp/VBoxGuestAdditions_{{ vm_vbox_host_ver }}.iso"
        state: absent
