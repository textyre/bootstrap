---
- name: "VirtualBox: Verify vboxguest module"
  ansible.builtin.command: modinfo vboxguest
  changed_when: false

- name: "VirtualBox: Verify vboxguest module is loaded"
  ansible.builtin.command: grep -q '^vboxguest ' /proc/modules
  changed_when: false

- name: "VirtualBox: Verify vboxsf module"
  ansible.builtin.command: modinfo vboxsf
  changed_when: false

- name: "VirtualBox: Check vboxvideo module"
  ansible.builtin.command: modinfo vboxvideo
  register: vm_vbox_vboxvideo_modinfo
  changed_when: false
  failed_when: vm_vbox_vboxvideo_modinfo.rc not in [0, 1]

- name: "VirtualBox: Report vboxvideo module status"
  ansible.builtin.debug:
    msg: "vboxvideo module: {{ 'available' if vm_vbox_vboxvideo_modinfo.rc == 0 else 'not available (optional)' }}"
