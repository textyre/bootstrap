---
# === VMware Guest Tools (open-vm-tools) ===
#
# Services:
#   vmtoolsd              -- core VMware Tools daemon (status, time sync, display resize)
#   vgauthd               -- guest authentication for vSphere operations
#   vmware-vmblock-fuse   -- drag-and-drop via FUSE (optional, desktop only)
#
# Kernel modules:
#   vmw_balloon -- dynamic memory management (host reclaims unused guest memory)
#   vmxnet3     -- paravirtual high-performance network adapter (optional, depends on VM NIC config)

# ---- Install packages ----

- name: "VMware: Install packages"
  ansible.builtin.include_tasks:
    file: _install_packages.yml
  vars:
    vm_pkg_list: "{{ vm_packages_vmware_guest }}"
    vm_pkg_label: "VMware"
    vm_notify_handler: "Restart vmware services"
  tags: ['vm', 'vmware']

# ---- Disable VMware timesync ----
# vmtoolsd runs a timeSync plugin that syncs guest clock to the host.
# We disable it via /etc/vmware-tools/tools.conf [timeSync] disable-all=true.
# Source: https://github.com/vmware/open-vm-tools/blob/master/open-vm-tools/tools.conf
# disable-all=true disables both periodic sync and one-off sync on resume/vMotion.
#
# Guard: only disable if an NTP daemon is active.

- name: "VMware: Disable guest timesync"
  tags: ['vm', 'vmware']
  block:
    - name: "Gather service facts for NTP guard"
      ansible.builtin.service_facts:
      when: vm_service_manager | default(ansible_facts['service_mgr'] | default('systemd')) != 'runit'

    - name: "Check if NTP daemon is active"
      ansible.builtin.include_tasks:
        file: _ntp_guard.yml
      vars:
        vm_ntp_guard_label: "VMware"
      when: vm_service_manager | default(ansible_facts['service_mgr'] | default('systemd')) != 'runit'

    # service_facts does not support runit. On Void guests, keep the previous
    # init-agnostic behavior and disable VMware timesync once the vm role runs.
    - name: "Decide whether VMware timesync should be disabled"
      ansible.builtin.set_fact:
        _vm_disable_vmware_timesync: >-
          {{ (vm_service_manager | default(ansible_facts['service_mgr'] | default('systemd')) == 'runit')
             or (_vm_ntp_active | default(false) | bool) }}

    - name: "Ensure /etc/vmware-tools directory exists"
      ansible.builtin.file:
        path: /etc/vmware-tools
        state: directory
        owner: root
        group: root
        mode: "0755"
      when: _vm_disable_vmware_timesync | bool

    - name: "Disable all VMware timesync in tools.conf"
      community.general.ini_file:
        path: /etc/vmware-tools/tools.conf
        section: timeSync
        option: disable-all
        value: "true"
        owner: root
        group: root
        mode: "0644"
      when: _vm_disable_vmware_timesync | bool
      notify: "Restart vmware services"

# ---- Manage services ----

- name: "VMware: Manage services"
  ansible.builtin.include_tasks:
    file: _manage_services.yml
  vars:
    vm_svc_list:
      - name: vgauthd
        description: "guest authentication for vSphere operations"
        required: true
      - name: vmtoolsd
        description: "core VMware Tools daemon (status, time sync, display resize)"
        required: true
      - name: vmware-vmblock-fuse
        description: "drag-and-drop via FUSE (optional, desktop only)"
        required: false
  tags: ['vm', 'vmware']

# ---- Verify kernel modules ----

- name: "VMware: Verify kernel modules"
  ansible.builtin.include_tasks:
    file: _verify_modules.yml
  vars:
    vm_mod_list:
      - name: vmw_balloon
        description: "dynamic memory management (host reclaims unused guest memory)"
        required: true
      - name: vmxnet3
        description: "paravirtual high-performance network adapter (optional, depends on VM NIC config)"
        required: false
    vm_mod_label: "VMware"
  tags: ['vm', 'vmware']

# ---- Version report ----

- name: "VMware: Version report"
  ansible.builtin.include_tasks:
    file: _version_report.yml
  vars:
    vm_ver_label: "VMware"
    vm_ver_command: "vmware-toolbox-cmd -v"
    vm_ver_extra_commands:
      - cmd: "vmware-toolbox-cmd stat raw text vmprovider"
        label: "Host platform"
  when: vm_vmware_version_report
  tags: ['vm', 'vmware']

# ---- Check X11 integration ----

- name: "VMware: Check X11 integration"
  ansible.builtin.include_tasks:
    file: _check_x11.yml
  vars:
    vm_x11_label: "VMware"
    vm_x11_paths:
      - path: /etc/xdg/autostart/vmware-user.desktop
        description: "VMware user agent autostart"
        content: |
          [Desktop Entry]
          Type=Application
          Name=VMware User Agent
          Exec=/usr/bin/vmware-user-suid-wrapper
          X-GNOME-Autostart-enabled=true
  tags: ['vm', 'vmware']

# ---- Check reboot requirement ----

- name: "VMware: Check if packages were installed"
  ansible.builtin.set_fact:
    _vm_pkg_changed: "{{ _vm_pkg_install_result is defined and _vm_pkg_install_result is changed }}"
  tags: ['vm', 'vmware']

- name: "VMware: Check if vmw_balloon module is loaded"
  ansible.builtin.set_fact:
    _vm_module_loaded: "{{ 'vmw_balloon' in _vm_lsmod_output.stdout }}"
  tags: ['vm', 'vmware']

- name: "VMware: Determine reboot requirement"
  ansible.builtin.set_fact:
    _vm_needs_reboot: "{{ _vm_pkg_changed and not _vm_module_loaded }}"
  tags: ['vm', 'vmware']

- name: "VMware: Check reboot requirement"
  ansible.builtin.include_tasks:
    file: _reboot_flag.yml
  vars:
    vm_reboot_label: "VMware"
    vm_reboot_condition: "{{ _vm_needs_reboot }}"
  tags: ['vm', 'vmware']
