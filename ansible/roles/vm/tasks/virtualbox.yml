---
# === VirtualBox Guest Additions ===
#
# Services:
#   vboxservice / vboxadd-service -- guest service (time sync, clipboard, seamless mode)
#     (vboxservice = pacman install, vboxadd-service = ISO install)
#
# Kernel modules:
#   vboxguest  -- core guest integration module (REQUIRED)
#   vboxsf     -- shared folders support (REQUIRED for shared folder functionality)
#   vboxvideo  -- graphics driver (optional, may use VMSVGA instead)
#
# Version enforcement:
#   Guest Additions version MUST match host VirtualBox version.
#   Mismatch causes shared folders, clipboard, and display resize to break.
#   If mismatch detected, role downloads and installs from ISO automatically.

# ---- Phase 1: Detect existing installation ----

- name: "VirtualBox: Detect existing installation"
  tags: ['vm', 'vbox', 'vm:install']
  block:
    - name: "Check if VBoxControl is available"
      ansible.builtin.command:
        cmd: which VBoxControl
      register: vm_vbox_control_check
      changed_when: false
      failed_when: false

    - name: "Check for existing ISO Guest Additions"
      ansible.builtin.find:
        paths: /opt
        patterns: 'VBoxGuestAdditions-*'
        file_type: directory
      register: vm_vbox_iso_dirs_pre
      changed_when: false
      failed_when: false

# ---- Phase 2: Initial install for detection (only if VBoxControl missing) ----

- name: "VirtualBox: Install pacman GA for version detection"
  ansible.builtin.package:
    name: "{{ vm_packages_virtualbox_guest }}"
    state: present
  when:
    - vm_vbox_control_check.rc != 0
    - vm_packages_virtualbox_guest | length > 0
  register: vm_vbox_initial_install
  retries: 3
  delay: 5
  until: vm_vbox_initial_install is succeeded
  notify: "Restart virtualbox services"
  tags: ['vm', 'vbox', 'vm:install']

# ---- Phase 3: Version detection and ISO enforcement ----

- name: "VirtualBox: Version detection and ISO enforcement"
  ansible.builtin.include_tasks: virtualbox_version.yml
  when: vm_vbox_version_check
  tags: ['vm', 'vbox', 'vm:verify', 'vm:install']

# ---- Phase 4: Pacman path (versions match OR version check disabled) ----

- name: "VirtualBox: Install packages (pacman path)"
  tags: ['vm', 'vbox', 'vm:install']
  block:
    - name: "Check if packages are defined"
      ansible.builtin.set_fact:
        _vm_vbox_has_packages: "{{ vm_packages_virtualbox_guest | length > 0 }}"

    - name: "Check if NOT on ISO install path"
      ansible.builtin.set_fact:
        _vm_vbox_not_iso_path: "{{ not (vm_vbox_iso_installed | default(false)) and (vm_vbox_iso_dirs_pre.matched | default(0) == 0) }}"

    - name: "Check version compatibility"
      ansible.builtin.set_fact:
        _vm_vbox_versions_ok: "{{ not vm_vbox_version_check or (vm_vbox_host_ver | default('') == vm_vbox_guest_ver | default('')) or vm_vbox_host_ver | default('') == 'unknown' }}"

    - name: "Determine if pacman path applies"
      ansible.builtin.set_fact:
        _vm_vbox_use_pacman_path: "{{ _vm_vbox_has_packages and _vm_vbox_not_iso_path and _vm_vbox_versions_ok }}"

    - name: "Ensure pacman GA packages installed"
      ansible.builtin.package:
        name: "{{ vm_packages_virtualbox_guest }}"
        state: present
      when: _vm_vbox_use_pacman_path | bool
      register: vm_vbox_pkg_install
      retries: 3
      delay: 5
      until: vm_vbox_pkg_install is succeeded
      notify: "Restart virtualbox services"

# ---- Phase 5: LTS kernel DKMS support (only for pacman path) ----

- name: "VirtualBox: LTS kernel DKMS support"
  ansible.builtin.include_tasks: virtualbox_lts_kernel.yml
  tags: ['vm', 'vbox', 'vm:install']

# ---- Phase 6: Determine active service name ----

- name: "VirtualBox: Determine active service name"
  tags: ['vm', 'vbox', 'vm:service']
  block:
    - name: "Check ISO installed flag"
      ansible.builtin.set_fact:
        _vm_vbox_iso_flag: "{{ vm_vbox_iso_installed | default(false) }}"

    - name: "Check ISO directories found"
      ansible.builtin.set_fact:
        _vm_vbox_iso_dirs_found: "{{ vm_vbox_iso_dirs_pre.matched | default(0) > 0 }}"

    - name: "Determine if ISO Guest Additions are present"
      ansible.builtin.set_fact:
        _vm_vbox_iso_present: "{{ _vm_vbox_iso_flag or _vm_vbox_iso_dirs_found }}"

    - name: "Set service name based on install path"
      ansible.builtin.set_fact:
        vm_vbox_service_name: "{{ 'vboxadd-service' if _vm_vbox_iso_present | bool else 'vboxservice' }}"

# ---- Phase 6b: /dev/vboxguest permissions ----
# ISO installer creates /etc/udev/rules.d/60-vboxadd.rules with:
#   KERNEL=="vboxguest", OWNER="vboxadd", MODE="0660"
# This gives access only to user vboxadd and group root.
# We add GROUP="vboxsf" so users in that group can run VBoxControl without sudo.

- name: "VirtualBox: Ensure /dev/vboxguest is accessible to vboxsf group"
  ansible.builtin.copy:
    dest: /etc/udev/rules.d/60-vboxadd.rules
    content: |
      KERNEL=="vboxguest", OWNER="vboxadd", GROUP="vboxsf", MODE="0660"
      KERNEL=="vboxuser", OWNER="vboxadd", MODE="0666"
    owner: root
    group: root
    mode: "0644"
  notify: "Reload vboxguest udev"
  tags: ['vm', 'vbox']

# ---- Phase 6c: User group membership ----
# vboxsf group is created by the ISO installer (shared_folder_setup) or
# by the virtualbox-guest-utils pacman package. Users must be in this group
# to access auto-mounted shared folders and /dev/vboxguest (after udev rule above).

- name: "VirtualBox: Warn — cannot add root to vboxsf, use sudo from regular user"
  ansible.builtin.debug:
    msg: >-
      Running as root (not via sudo from a regular user). The root user cannot be
      added to vboxsf. Re-run this role via sudo from the desktop user account:
      sudo ansible-playbook playbook.yml
    verbosity: 0
  when:
    - ansible_facts['env']['SUDO_USER'] | default('') | length == 0
    - ansible_facts['user_id'] == 'root'
  tags: ['vm', 'vbox', 'vm:report']

- name: "VirtualBox: Add user to vboxsf group"
  ansible.builtin.user:
    name: "{{ ansible_facts['env']['SUDO_USER'] | default(ansible_facts['user_id']) }}"
    groups: vboxsf
    append: true
  register: _vm_vbox_user_updated
  when:
    - ansible_facts['user_id'] != 'root' or ansible_facts['env']['SUDO_USER'] | default('') | length > 0
  tags: ['vm', 'vbox']

- name: "VirtualBox: Warn — user must logout/login for group membership to take effect"
  ansible.builtin.debug:
    msg: >-
      User {{ ansible_facts['env']['SUDO_USER'] | default(ansible_facts['user_id']) }}
      has been added to the vboxsf group. Logout and login again for this change to
      take effect. Shared folders and VBoxControl will not work until then.
    verbosity: 0
  when: _vm_vbox_user_updated is changed
  tags: ['vm', 'vbox', 'vm:report']

# ---- Phase 7: Disable VBoxService timesync ----
# VBoxService runs a timesync module by default that syncs guest clock to the
# VirtualBox host clock. This conflicts with chronyd/ntpd which are the
# authoritative time source. We disable VBoxService timesync via a systemd
# drop-in so VBoxService continues running (shared folders, clipboard, etc.)
# but stops managing the clock.
#
# Guard: only disable if an NTP daemon is active. If no NTP daemon is running,
# skipping the disable preserves the only time source available.

- name: "VirtualBox: Disable VBoxService timesync"
  when: ansible_facts['service_mgr'] == 'systemd'
  tags: ['vm', 'vbox']
  block:
    - name: "Gather service facts for NTP guard"
      ansible.builtin.service_facts:

    - name: "Check if NTP daemon is active"
      ansible.builtin.include_tasks:
        file: _ntp_guard.yml
      vars:
        vm_ntp_guard_label: "VirtualBox"

    - name: "Ensure VBoxService drop-in directory exists"
      ansible.builtin.file:
        path: "/etc/systemd/system/{{ vm_vbox_service_name }}.service.d"
        state: directory
        owner: root
        group: root
        mode: "0755"
      when: _vm_ntp_active | default(false) | bool

    - name: "Write drop-in to disable timesync"
      ansible.builtin.copy:
        dest: "/etc/systemd/system/{{ vm_vbox_service_name }}.service.d/disable-timesync.conf"
        content: |
          [Service]
          ExecStart=
          ExecStart=/usr/bin/VBoxService -f --disable-timesync
        owner: root
        group: root
        mode: "0644"
      when: _vm_ntp_active | default(false) | bool
      notify: "Restart virtualbox services"

- name: "VirtualBox: Note — timesync disable requires systemd (not available on openrc/runit)"
  ansible.builtin.debug:
    msg: >-
      VirtualBox timesync can only be disabled on systemd systems. On openrc/runit,
      use VBoxManage on the host to disable: VBoxManage guestproperty set <VM>
      /VirtualBox/GuestAdd/VBoxService/--disable-timesync 1
    verbosity: 0
  when: ansible_facts['service_mgr'] != 'systemd'
  tags: ['vm', 'vbox', 'vm:report']

# ---- Phase 8: Service management ----

- name: "VirtualBox: Manage guest services"
  ansible.builtin.include_tasks:
    file: _manage_services.yml
  vars:
    vm_svc_label: "VirtualBox - {{ vm_vbox_service_name }}"
    vm_svc_list:
      - name: "{{ vm_vbox_service_name }}"
        description: "guest service (time sync, clipboard, seamless mode)"
        required: true
  when: not (vm_vbox_iso_installed | default(false))
  tags: ['vm', 'vbox']

# ---- Phase 9: Module verification ----

- name: "VirtualBox: Verify kernel modules"
  ansible.builtin.include_tasks:
    file: _verify_modules.yml
  vars:
    vm_mod_label: "VirtualBox"
    vm_mod_list:
      - name: vboxguest
        description: "core guest integration module"
        required: true
      - name: vboxsf
        description: "shared folders support"
        required: true
      - name: vboxvideo
        description: "graphics driver (may use VMSVGA instead)"
        required: false
  tags: ['vm', 'vbox']

# ---- Phase 10: X11 autostart check ----

- name: "VirtualBox: Check desktop integration"
  ansible.builtin.include_tasks:
    file: _check_x11.yml
  vars:
    vm_x11_label: "VirtualBox"
    vm_x11_paths:
      - path: /etc/xdg/autostart/vboxclient.desktop
        description: "VBoxClient X11 autostart (clipboard, seamless, display resize)"
        content: |
          [Desktop Entry]
          Type=Application
          Name=VBoxClient
          Exec=/usr/bin/VBoxClient-all
          X-GNOME-Autostart-enabled=true
  tags: ['vm', 'vbox']

# ---- Phase 11: Final version verification ----

- name: "VirtualBox: Report version"
  ansible.builtin.include_tasks:
    file: _version_report.yml
  vars:
    vm_ver_label: "VirtualBox"
    vm_ver_command: "VBoxControl --version"
  when: vm_vbox_version_check
  tags: ['vm', 'vbox']

# ---- Phase 12: Reboot flag ----

- name: "VirtualBox: Check if packages were installed"
  ansible.builtin.set_fact:
    _vm_vbox_pkg_changed: "{{ vm_vbox_pkg_install is defined and vm_vbox_pkg_install is changed }}"
  tags: ['vm', 'vbox']

- name: "VirtualBox: Check if ISO path was used"
  ansible.builtin.set_fact:
    _vm_vbox_iso_used: "{{ vm_vbox_iso_installed | default(false) }}"
  tags: ['vm', 'vbox']

- name: "VirtualBox: Check if vboxguest module is loaded"
  ansible.builtin.set_fact:
    _vm_vbox_module_loaded: "{{ 'vboxguest' in (_vm_lsmod_output.stdout | default('')) }}"
  tags: ['vm', 'vbox']

- name: "VirtualBox: Determine reboot requirement"
  ansible.builtin.set_fact:
    _vm_needs_reboot: "{{ (_vm_vbox_pkg_changed or _vm_vbox_iso_used) and not _vm_vbox_module_loaded }}"
  tags: ['vm', 'vbox']

- name: "VirtualBox: Check reboot requirement"
  ansible.builtin.include_tasks:
    file: _reboot_flag.yml
  vars:
    vm_reboot_label: "VirtualBox"
    vm_reboot_condition: "{{ _vm_needs_reboot }}"
  tags: ['vm', 'vbox']
