---
# ===================================================================
# VirtualBox Guest Additions - Version Detection & ISO Trigger
# ===================================================================
#
# Purpose:
#   Detect host and guest VirtualBox versions, compare them, and
#   trigger ISO installation when versions mismatch.
#
# Called from:
#   virtualbox.yml (when vm_vbox_version_check is true)
#
# Expected variables:
#   - vm_vbox_version_check: boolean (should already be checked by caller)
#   - vm_vbox_iso_dirs_pre: result of find task for existing ISO dirs
#   - vm_packages_virtualbox_guest: package list from group_vars
#
# Sets facts:
#   - vm_vbox_host_ver: parsed host VirtualBox version
#   - vm_vbox_guest_ver: parsed installed GA version
#
# Calls:
#   - virtualbox_iso_install.yml (when versions mismatch)
#
# ===================================================================

- name: "VirtualBox: Get host VirtualBox version"
  ansible.builtin.command:
    cmd: VBoxControl guestproperty get /VirtualBox/HostInfo/VBoxVer
  register: vm_vbox_host_version_raw
  changed_when: false
  failed_when: false
  tags: ['vm', 'vbox', 'vm:verify']

- name: "VirtualBox: Get installed GA version"
  ansible.builtin.command:
    cmd: VBoxControl --version
  register: vm_vbox_guest_version_raw
  changed_when: false
  failed_when: false
  tags: ['vm', 'vbox', 'vm:verify']

- name: "VirtualBox: Parse and report versions"
  when:
    - (vm_vbox_host_version_raw.rc | default(1)) == 0
    - (vm_vbox_guest_version_raw.rc | default(1)) == 0
  tags: ['vm', 'vbox', 'vm:verify', 'vm:install']
  block:
    - name: "Get raw host version output"
      ansible.builtin.set_fact:
        _vm_vbox_host_raw: "{{ vm_vbox_host_version_raw.stdout | default('') }}"

    - name: "Extract version from 'Value: X.Y.Z' format"
      ansible.builtin.set_fact:
        _vm_vbox_host_match: "{{ _vm_vbox_host_raw | regex_search('Value:\\s*(.+)', '\\1') }}"

    - name: "Handle missing host version"
      ansible.builtin.set_fact:
        _vm_vbox_host_extracted: "{{ _vm_vbox_host_match | default(['unknown'], true) | first }}"

    - name: "Clean whitespace from host version"
      ansible.builtin.set_fact:
        vm_vbox_host_ver: "{{ _vm_vbox_host_extracted | trim }}"

    - name: "Get raw guest version output"
      ansible.builtin.set_fact:
        _vm_vbox_guest_raw: "{{ vm_vbox_guest_version_raw.stdout | default('') }}"

    - name: "Extract numeric guest version"
      ansible.builtin.set_fact:
        vm_vbox_guest_ver: "{{ _vm_vbox_guest_raw | regex_replace('[^0-9.].*', '') }}"

    - name: "Report detected versions"
      ansible.builtin.debug:
        msg: "Detected versions - Host: {{ vm_vbox_host_ver }}, Guest: {{ vm_vbox_guest_ver }}"

    - name: "Trigger ISO installation on version mismatch"
      ansible.builtin.include_tasks: virtualbox_iso_install.yml
      when:
        - vm_vbox_host_ver != 'unknown'
        - vm_vbox_host_ver != vm_vbox_guest_ver
