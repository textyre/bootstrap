---
# =========================================================================
# _remove_packages.yml
# =========================================================================
# Remove VM guest packages (per-package for granular reporting).
#
# Required parameters:
#   vm_pkg_list  (list)   - Package names to remove
#   vm_pkg_label (string) - Hypervisor name for task names
#
# Output:
#   _vm_pkg_remove_result (register) - Per-package results
# =========================================================================

- name: "Remove guest packages ({{ vm_pkg_label }})"
  ansible.builtin.package:
    name: "{{ item }}"
    state: absent
  loop: "{{ vm_pkg_list | default([]) }}"
  loop_control:
    label: "{{ item }}"
  register: vm_pkg_remove_result
  failed_when: false
  tags: ['vm', 'vm:install']

- name: "Assert no unexpected package removal failures ({{ vm_pkg_label }})"
  ansible.builtin.assert:
    that:
      - vm_pkg_remove_result.results | selectattr('failed', 'true') | list | length == 0
    fail_msg: >-
      Package removal failed for: {{
        vm_pkg_remove_result.results
        | selectattr('failed', 'true')
        | map(attribute='item')
        | list
      }}. Check package manager logs.
    success_msg: "All packages removed or not present ({{ vm_pkg_label }})"
  when: vm_pkg_remove_result.results is defined
  tags: ['vm', 'vm:install']
