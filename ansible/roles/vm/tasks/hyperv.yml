---
# === Hyper-V Guest Integration Services ===
#
# Daemons:
#   hv_fcopy_daemon  -- file copy between host and guest
#   hv_kvp_daemon    -- key-value pair exchange (network config, metadata)
#   hv_vss_daemon    -- Volume Shadow Copy (live backup support)
#
# Kernel modules:
#   hv_vmbus   -- VMBus communication layer (REQUIRED foundation)
#   hv_storvsc -- virtual storage controller
#   hv_netvsc  -- virtual network adapter
#   hv_utils   -- integration utilities (shutdown, heartbeat, time sync)

# ---- Install packages ----

- name: "Hyper-V: Install guest packages"
  ansible.builtin.include_tasks:
    file: _install_packages.yml
  vars:
    vm_pkg_list: "{{ vm_hyperv_packages }}"
    vm_pkg_label: "Hyper-V"
    vm_notify_handler: "Restart hyper-v services"
  tags: ['vm', 'hyperv']

# ---- Hyper-V timesync: not disableable from guest ----
# hv_utils kernel module handles Hyper-V timesync. It has no module_param
# for disabling the timesync channel. Source:
#   https://github.com/torvalds/linux/blob/master/drivers/hv/hv_util.c
#   Only module_param: timesync_implicit (bool) — changes SAMPLE→SYNC behavior,
#   does not disable the channel.
# Guest-side options: VMBus device unbind (not persistent, not declarative).
# Persistent option: PowerShell on Hyper-V host:
#   Disable-VMIntegrationService -VMName "..." -Name "Time Synchronization"
# This role cannot manage Hyper-V host-side configuration. Operator must
# disable Hyper-V time sync from the host before running this role.

- name: "Hyper-V: Note — timesync disable requires host-side action"
  ansible.builtin.debug:
    msg: >-
      Hyper-V timesync cannot be disabled from within the guest (no kernel module
      parameter exists). To disable: run on the Hyper-V host:
      Disable-VMIntegrationService -VMName "<vm-name>" -Name "Time Synchronization"
  tags: ['vm', 'hyperv']

# ---- Manage services ----

- name: "Hyper-V: Manage integration services"
  ansible.builtin.include_tasks:
    file: _manage_services.yml
  vars:
    vm_svc_list:
      - name: hv_fcopy_daemon
        description: "file copy between host and guest"
        required: true
      - name: hv_kvp_daemon
        description: "key-value pair exchange (network config, metadata)"
        required: true
      - name: hv_vss_daemon
        description: "Volume Shadow Copy (live backup support)"
        required: true
    vm_svc_label: "Hyper-V - {{ vm_svc_list | map(attribute='name') | join(', ') }}"
  tags: ['vm', 'hyperv']

# ---- Verify kernel modules ----

- name: "Hyper-V: Verify kernel modules"
  ansible.builtin.include_tasks:
    file: _verify_modules.yml
  vars:
    vm_mod_list:
      - name: hv_vmbus
        description: "VMBus communication layer (REQUIRED foundation)"
        required: true
      - name: hv_storvsc
        description: "virtual storage controller"
        required: false
      - name: hv_netvsc
        description: "virtual network adapter"
        required: false
      - name: hv_utils
        description: "integration utilities (shutdown, heartbeat, time sync)"
        required: false
    vm_mod_label: "Hyper-V"
  tags: ['vm', 'hyperv']

# ---- Version report ----

- name: "Hyper-V: Generate version report"
  ansible.builtin.include_tasks:
    file: _version_report.yml
  vars:
    vm_ver_label: "Hyper-V"
    vm_ver_command: "modinfo -F version hv_vmbus"
    vm_ver_extra_commands:
      - cmd: "modinfo -F vermagic hv_vmbus"
        label: "Kernel compatibility"
  tags: ['vm', 'hyperv']

# ---- Check X11 integration ----

- name: "Hyper-V: Check X11 integration"
  ansible.builtin.include_tasks:
    file: _check_x11.yml
  vars:
    vm_x11_label: "Hyper-V"
    vm_x11_paths:
      - path: /usr/bin/xrdp
        description: "xrdp remote desktop (Enhanced Session)"
  tags: ['vm', 'hyperv']

# ---- Check reboot requirement ----

- name: "Hyper-V: Check if packages were installed"
  ansible.builtin.set_fact:
    _vm_pkg_changed: "{{ _vm_pkg_install_result is defined and _vm_pkg_install_result is changed }}"
  tags: ['vm', 'hyperv']

- name: "Hyper-V: Check if hv_vmbus module is loaded"
  ansible.builtin.set_fact:
    _vm_module_loaded: "{{ 'hv_vmbus' in _vm_lsmod_output.stdout }}"
  tags: ['vm', 'hyperv']

- name: "Hyper-V: Determine reboot requirement"
  ansible.builtin.set_fact:
    _vm_needs_reboot: "{{ _vm_pkg_changed and not _vm_module_loaded }}"
  tags: ['vm', 'hyperv']

- name: "Hyper-V: Check reboot requirement"
  ansible.builtin.include_tasks:
    file: _reboot_flag.yml
  vars:
    vm_reboot_label: "Hyper-V"
    vm_reboot_condition: "{{ _vm_needs_reboot }}"
  tags: ['vm', 'hyperv']
