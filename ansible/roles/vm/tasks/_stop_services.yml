---
# =========================================================================
# _stop_services.yml
# =========================================================================
# Stop and disable VM guest services.
#
# Required parameters:
#   vm_svc_list  (list)   - Service names to stop
#   vm_pkg_label (string) - Hypervisor name for task names
#
# Output:
#   _vm_svc_stop_result (register) - Per-service results
# =========================================================================

- name: "Stop and disable services ({{ vm_pkg_label }})"
  ansible.builtin.service:
    name: "{{ item }}"
    enabled: false
    state: stopped
  loop: "{{ vm_svc_list | default([]) }}"
  loop_control:
    label: "{{ item }}"
  register: vm_svc_stop_result
  failed_when: false
  tags: ['vm', 'vm:service']

- name: "Assert no unexpected service stop failures ({{ vm_pkg_label }})"
  ansible.builtin.assert:
    that:
      - vm_svc_stop_result.results | selectattr('failed', 'true') | list | length == 0
    fail_msg: >-
      Service stop failed for: {{
        vm_svc_stop_result.results
        | selectattr('failed', 'true')
        | map(attribute='item')
        | list
      }}. Service may not exist or may require manual intervention.
    success_msg: "All services stopped or not found ({{ vm_pkg_label }})"
  when: vm_svc_stop_result.results is defined
  tags: ['vm', 'vm:service']
