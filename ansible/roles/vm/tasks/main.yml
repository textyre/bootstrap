---
# === Virtualization guest tools (VM role) ===
# Validates → loads vars → detects hypervisor → configures guest integration → reports.
# Supported: VirtualBox, VMware, Hyper-V, KVM

- name: Configure virtualization guest integration
  tags: ['vm']
  block:
    - name: Validate role prerequisites
      ansible.builtin.include_tasks:
        file: validate.yml

    - name: Load OS-specific variables
      ansible.builtin.include_tasks:
        file: load_vars.yml

    - name: Detect virtualization environment
      ansible.builtin.include_tasks:
        file: detect.yml

    - name: Configure guest integration
      ansible.builtin.include_tasks:
        file: configure/main.yml
      vars:
        vm_detected_hypervisor: "{{ ansible_facts['virtualization_type'] | lower }}"
        vm_is_container: "{{ (ansible_facts['virtualization_type'] | lower) in ['container', 'wsl'] }}"
        vm_is_guest: "{{ ansible_facts['virtualization_role'] == 'guest' }}"
        vm_supported_guest: >-
          {{
            ansible_facts['virtualization_role'] == 'guest'
            and (ansible_facts['virtualization_type'] | lower) in _vm_supported_hypervisors
          }}

    - name: Render execution report
      ansible.builtin.include_role:
        name: common
        tasks_from: report_render.yml
      vars:
        common_rpt_fact: "_vm_phases"
        common_rpt_title: "vm"
