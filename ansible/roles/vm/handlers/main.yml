---
# === VM role handlers ===
# These handlers are triggered by notify directives in task files.

- name: Reload udev rules for vboxguest
  ansible.builtin.command: udevadm control --reload-rules
  changed_when: true
  listen: "Reload vboxguest udev"

- name: Check vboxguest device exists
  ansible.builtin.stat:
    path: /dev/vboxguest
  register: vm_vboxguest_device
  listen: "Reload vboxguest udev"

- name: Apply udev rules to vboxguest device
  ansible.builtin.command: udevadm trigger /dev/vboxguest
  changed_when: true
  when: vm_vboxguest_device.stat.exists
  listen: "Reload vboxguest udev"

- name: Report VirtualBox vboxsf membership change
  ansible.builtin.debug:
    msg: >-
      User {{ target_user }} has been added to the vboxsf group. Logout and login
      again for this change to take effect. Shared folders and VBoxControl will
      not work until then.
    verbosity: 0
  listen: "Report VirtualBox vboxsf membership change"
