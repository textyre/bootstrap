---
# === Virtualization guest tools (VirtualBox, VMware, Hyper-V, KVM) ===
# Packages defined in group_vars/all/packages.yml

# VMware guest tools package. Distros that use the same name consume this
# directly; distro-specific overrides live in vars/<OsFamily>.yml.
vm_packages_vmware_guest:
  - open-vm-tools

# Hyper-V integration package default for distros that use the generic role
# contract directly. Distro-specific package names live in vars/<OsFamily>.yml.
vm_packages_hyperv_guest:
  - hyperv

# KVM/QEMU guest agent package default for distros that use the generic role
# contract directly. Distro-specific package names live in vars/<OsFamily>.yml.
vm_packages_kvm_guest:
  - qemu-guest-agent

# VBox host version override - set to bypass dmesg/journalctl detection.
# Use when the kernel ring buffer was cleared on a long-running system.
# Example: vm_vbox_host_version_override: "7.1.16"
vm_vbox_host_version_override: ""

# VBox version check: detect host version and enforce GA alignment via ISO
vm_vbox_version_check: true

# VMware version reporting: show vmware-toolbox-cmd version
vm_vmware_version_report: true

# Hyper-V version reporting: show hv_vmbus kernel metadata when available
vm_hyperv_version_report: true

# KVM version reporting: show qemu-ga version
vm_kvm_version_report: true
