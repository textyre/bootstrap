---
- name: Converge
  hosts: all
  become: true
  gather_facts: true

  roles:
    - role: "{{ lookup('env', 'MOLECULE_PROJECT_DIRECTORY') | basename }}"
      vars:
        teleport_mode: "agent"
        teleport_auth_server: "localhost:3025"
        teleport_join_token: "test-token-molecule"
        teleport_node_name: "molecule-test"
        teleport_session_recording: "node"
        teleport_export_ca_key: false
        # Service starts but cannot connect to auth server in molecule;
        # skip in-role service assertion to avoid false failure
        teleport_verify_service: false

# TEST-011: Edge case — teleport_enabled: false (skip path)
- name: Converge — disabled role
  hosts: all
  become: true
  gather_facts: true

  roles:
    - role: "{{ lookup('env', 'MOLECULE_PROJECT_DIRECTORY') | basename }}"
      vars:
        teleport_enabled: false
