---
# Verification categories skipped:
#   runtime — 'teleport status' requires a live auth server; not available in molecule.
#             Service start is verified (systemctl is-enabled), but active/running state
#             is not asserted because the service cannot join a cluster in CI.
#   ca_export — 'tctl auth export' requires authenticated access to a running auth server;
#               teleport_export_ca_key=false is set in converge vars for this reason.

- name: Verify
  hosts: all
  become: true
  gather_facts: true

  vars:
    # These defaults mirror the values set in molecule/shared/converge.yml.
    # Override via molecule.yml extra_vars to keep verify in sync with converge.
    molecule_teleport_node_name: "molecule-test"
    molecule_teleport_auth_server: "localhost:3025"
    molecule_teleport_session_recording: "node"

  tasks:
    # -----------------------------------------------------------------------
    # 1. Teleport binary
    # -----------------------------------------------------------------------
    - name: Check teleport binary is in PATH (which)
      ansible.builtin.command:
        cmd: which teleport
      register: _teleport_verify_which
      changed_when: false
      failed_when: _teleport_verify_which.rc != 0

    # NOTE: binary install path — all molecule scenarios use teleport_install_method: binary
    - name: Assert teleport binary path is /usr/local/bin/teleport
      ansible.builtin.assert:
        that:
          - _teleport_verify_which.stdout | trim == '/usr/local/bin/teleport'
        fail_msg: >
          Expected teleport binary at /usr/local/bin/teleport, got:
          '{{ _teleport_verify_which.stdout | trim }}'

    - name: Run teleport version
      ansible.builtin.command:
        cmd: teleport version
      register: _teleport_verify_version
      changed_when: false
      failed_when: false

    - name: Assert teleport version runs successfully
      ansible.builtin.assert:
        that:
          - _teleport_verify_version.rc == 0
        fail_msg: >
          'teleport version' failed with rc={{ _teleport_verify_version.rc }}:
          {{ _teleport_verify_version.stderr | default('') }}

    - name: Assert teleport version output contains Teleport
      ansible.builtin.assert:
        that:
          - _teleport_verify_version.stdout is regex('(?i)teleport')
        fail_msg: >
          'teleport version' output does not mention Teleport:
          {{ _teleport_verify_version.stdout }}
      when: _teleport_verify_version.rc == 0

    - name: Show teleport version output
      ansible.builtin.debug:
        msg: "{{ _teleport_verify_version.stdout }}"
      when: _teleport_verify_version.rc == 0

    # -----------------------------------------------------------------------
    # 2. Configuration file — existence and permissions
    # -----------------------------------------------------------------------
    - name: Stat /etc/teleport.yaml
      ansible.builtin.stat:
        path: /etc/teleport.yaml
      register: _teleport_verify_conf_stat

    - name: Assert /etc/teleport.yaml exists
      ansible.builtin.assert:
        that:
          - _teleport_verify_conf_stat.stat.exists
        fail_msg: "/etc/teleport.yaml does not exist"

    - name: Assert /etc/teleport.yaml owner and permissions
      ansible.builtin.assert:
        that:
          - _teleport_verify_conf_stat.stat.pw_name == 'root'
          - _teleport_verify_conf_stat.stat.gr_name == 'root'
          - _teleport_verify_conf_stat.stat.mode == '0600'
        fail_msg: >
          /etc/teleport.yaml has wrong owner/mode:
          owner={{ _teleport_verify_conf_stat.stat.pw_name }}
          group={{ _teleport_verify_conf_stat.stat.gr_name }}
          mode={{ _teleport_verify_conf_stat.stat.mode }}

    # -----------------------------------------------------------------------
    # 3. Configuration file — content validation
    # -----------------------------------------------------------------------
    - name: Slurp /etc/teleport.yaml
      ansible.builtin.slurp:
        src: /etc/teleport.yaml
      register: _teleport_verify_conf_raw
      when: _teleport_verify_conf_stat.stat.exists

    - name: Decode teleport config content
      ansible.builtin.set_fact:
        _teleport_verify_conf_content: "{{ _teleport_verify_conf_raw.content | b64decode }}"
      when:
        - _teleport_verify_conf_stat.stat.exists
        - _teleport_verify_conf_raw.content is defined

    - name: Assert config contains Ansible managed header
      ansible.builtin.assert:
        that:
          - _teleport_verify_conf_content is regex('(?i)(ansible.managed|managed.by.ansible)')
        fail_msg: "Config does not contain Ansible managed header"
      when: _teleport_verify_conf_content is defined

    - name: Assert config schema version is v3
      ansible.builtin.assert:
        that:
          - _teleport_verify_conf_content is regex('(?m)^version:\s+v3\s*$')
        fail_msg: >
          Config does not contain 'version: v3' at start of line.
          Content: {{ _teleport_verify_conf_content }}
      when: _teleport_verify_conf_content is defined

    - name: Assert config contains expected nodename
      ansible.builtin.assert:
        that:
          - _teleport_verify_conf_content is regex('(?m)^\s+nodename:\s+["\x27]?' ~ molecule_teleport_node_name ~ '["\x27]?\s*$')
        fail_msg: >
          Config does not contain nodename 'molecule-test'.
          Content: {{ _teleport_verify_conf_content }}
      when: _teleport_verify_conf_content is defined

    - name: Assert config contains data_dir /var/lib/teleport
      ansible.builtin.assert:
        that:
          - _teleport_verify_conf_content is regex('(?m)^\s+data_dir:\s+/var/lib/teleport\s*$')
        fail_msg: >
          Config does not contain 'data_dir: /var/lib/teleport'.
          Content: {{ _teleport_verify_conf_content }}
      when: _teleport_verify_conf_content is defined

    - name: Assert config contains auth_token
      ansible.builtin.assert:
        that:
          - _teleport_verify_conf_content is regex('(?m)^\s+auth_token:\s+\S+')
        fail_msg: >
          Config does not contain 'auth_token:' with a value.
          Content: {{ _teleport_verify_conf_content }}
      when: _teleport_verify_conf_content is defined

    - name: Assert config contains expected auth_server
      ansible.builtin.assert:
        that:
          - _teleport_verify_conf_content is regex('(?m)^\s+auth_server:\s+["\x27]?' ~ (molecule_teleport_auth_server | regex_escape) ~ '["\x27]?\s*$')
        fail_msg: >
          Config does not contain 'auth_server: {{ molecule_teleport_auth_server }}'.
          Content: {{ _teleport_verify_conf_content }}
      when: _teleport_verify_conf_content is defined

    - name: Assert ssh_service section is present and enabled
      ansible.builtin.assert:
        that:
          - _teleport_verify_conf_content is regex('(?m)^ssh_service:\s*$')
          - _teleport_verify_conf_content is regex('(?m)^\s+enabled:\s+true\s*$')
        fail_msg: >
          Config does not contain 'ssh_service:' section with 'enabled: true'.
          Content: {{ _teleport_verify_conf_content }}
      when: _teleport_verify_conf_content is defined

    - name: Assert proxy_service section is present
      ansible.builtin.assert:
        that:
          - _teleport_verify_conf_content is regex('(?m)^proxy_service:\s*$')
        fail_msg: >
          Config does not contain 'proxy_service:' section.
          Content: {{ _teleport_verify_conf_content }}
      when: _teleport_verify_conf_content is defined

    - name: Assert auth_service section is present
      ansible.builtin.assert:
        that:
          - _teleport_verify_conf_content is regex('(?m)^auth_service:\s*$')
        fail_msg: >
          Config does not contain 'auth_service:' section.
          Content: {{ _teleport_verify_conf_content }}
      when: _teleport_verify_conf_content is defined

    - name: Assert session_recording mode matches expected value
      ansible.builtin.assert:
        that:
          - _teleport_verify_conf_content is regex('(?m)^\s+mode:\s+["\x27]?' ~ molecule_teleport_session_recording ~ '["\x27]?\s*$')
        fail_msg: >
          Config does not contain session recording mode '{{ molecule_teleport_session_recording }}'.
          Content: {{ _teleport_verify_conf_content }}
      when: _teleport_verify_conf_content is defined

    # -----------------------------------------------------------------------
    # 4. Data directory
    # -----------------------------------------------------------------------
    - name: Stat /var/lib/teleport
      ansible.builtin.stat:
        path: /var/lib/teleport
      register: _teleport_verify_datadir

    - name: Assert /var/lib/teleport exists and is a directory
      ansible.builtin.assert:
        that:
          - _teleport_verify_datadir.stat.exists
          - _teleport_verify_datadir.stat.isdir
        fail_msg: "/var/lib/teleport does not exist or is not a directory"

    - name: Assert /var/lib/teleport owner and permissions
      ansible.builtin.assert:
        that:
          - _teleport_verify_datadir.stat.pw_name == 'root'
          - _teleport_verify_datadir.stat.gr_name == 'root'
          - _teleport_verify_datadir.stat.mode == '0750'
        fail_msg: >
          /var/lib/teleport has wrong owner/mode:
          owner={{ _teleport_verify_datadir.stat.pw_name }}
          group={{ _teleport_verify_datadir.stat.gr_name }}
          mode={{ _teleport_verify_datadir.stat.mode }}

    # -----------------------------------------------------------------------
    # 5. Systemd unit file (binary install, systemd only)
    # NOTE: All molecule scenarios use binary install method.
    # Unit file assertions are guarded by service_mgr to avoid failures on
    # non-systemd platforms (runit, openrc, s6, dinit).
    # -----------------------------------------------------------------------
    - name: Stat /etc/systemd/system/teleport.service
      ansible.builtin.stat:
        path: /etc/systemd/system/teleport.service
      register: _teleport_verify_unit_stat
      when: ansible_facts['service_mgr'] == 'systemd'

    - name: Assert teleport.service unit file exists
      ansible.builtin.assert:
        that:
          - _teleport_verify_unit_stat.stat.exists
          - _teleport_verify_unit_stat.stat.isreg
        fail_msg: >
          /etc/systemd/system/teleport.service does not exist.
          The binary install path must deploy a systemd unit file.
      when:
        - ansible_facts['service_mgr'] == 'systemd'
        - _teleport_verify_unit_stat is defined

    - name: Assert teleport.service unit file permissions
      ansible.builtin.assert:
        that:
          - _teleport_verify_unit_stat.stat.mode == '0644'
        fail_msg: >
          /etc/systemd/system/teleport.service has wrong mode:
          {{ _teleport_verify_unit_stat.stat.mode }} (expected 0644)
      when:
        - ansible_facts['service_mgr'] == 'systemd'
        - _teleport_verify_unit_stat is defined
        - _teleport_verify_unit_stat.stat.exists

    - name: Slurp /etc/systemd/system/teleport.service
      ansible.builtin.slurp:
        src: /etc/systemd/system/teleport.service
      register: _teleport_verify_unit_raw
      when:
        - ansible_facts['service_mgr'] == 'systemd'
        - _teleport_verify_unit_stat is defined
        - _teleport_verify_unit_stat.stat.exists

    - name: Decode teleport unit file content
      ansible.builtin.set_fact:
        _teleport_verify_unit_content: "{{ _teleport_verify_unit_raw.content | b64decode }}"
      when:
        - ansible_facts['service_mgr'] == 'systemd'
        - _teleport_verify_unit_stat is defined
        - _teleport_verify_unit_stat.stat.exists
        - _teleport_verify_unit_raw.content is defined

    - name: Assert unit file contains [Unit] section
      ansible.builtin.assert:
        that:
          - _teleport_verify_unit_content is regex('(?m)^\[Unit\]\s*$')
        fail_msg: >
          teleport.service does not contain [Unit] section.
          Content: {{ _teleport_verify_unit_content }}
      when: _teleport_verify_unit_content is defined

    - name: Assert unit file Description is correct
      ansible.builtin.assert:
        that:
          - _teleport_verify_unit_content is regex('(?m)^Description=Teleport')
        fail_msg: >
          teleport.service Description line not found or incorrect.
          Content: {{ _teleport_verify_unit_content }}
      when: _teleport_verify_unit_content is defined

    - name: Assert unit file ExecStart points to /usr/local/bin/teleport
      ansible.builtin.assert:
        that:
          - _teleport_verify_unit_content is regex('(?m)^ExecStart=/usr/local/bin/teleport\s+start\s+--config=/etc/teleport\.yaml')
        fail_msg: >
          teleport.service ExecStart does not reference
          /usr/local/bin/teleport start --config=/etc/teleport.yaml.
          Content: {{ _teleport_verify_unit_content }}
      when: _teleport_verify_unit_content is defined

    - name: Assert unit file contains [Install] section with WantedBy
      ansible.builtin.assert:
        that:
          - _teleport_verify_unit_content is regex('(?m)^\[Install\]\s*$')
          - _teleport_verify_unit_content is regex('(?m)^WantedBy=multi-user\.target\s*$')
        fail_msg: >
          teleport.service [Install] section or WantedBy=multi-user.target not found.
          Content: {{ _teleport_verify_unit_content }}
      when: _teleport_verify_unit_content is defined

    # -----------------------------------------------------------------------
    # 6. Service management verification
    # -----------------------------------------------------------------------
    - name: Check if teleport service unit exists
      ansible.builtin.command:
        cmd: systemctl cat teleport.service
      register: _teleport_verify_svc_unit
      changed_when: false
      failed_when: false
      when: ansible_facts['service_mgr'] == 'systemd'

    - name: Assert teleport service is known to systemd
      ansible.builtin.assert:
        that:
          - _teleport_verify_svc_unit.rc == 0
        fail_msg: >
          teleport.service is not known to systemd.
          stderr: {{ _teleport_verify_svc_unit.stderr | default('') }}
      when:
        - ansible_facts['service_mgr'] == 'systemd'
        - _teleport_verify_svc_unit is defined

    - name: Check teleport service enabled state
      ansible.builtin.command:
        cmd: systemctl is-enabled teleport.service
      register: _teleport_verify_svc_enabled
      changed_when: false
      failed_when: false
      when: ansible_facts['service_mgr'] == 'systemd'

    - name: Assert teleport service is enabled
      ansible.builtin.assert:
        that:
          - _teleport_verify_svc_enabled.stdout | trim == 'enabled'
        fail_msg: >
          teleport.service is not enabled:
          {{ _teleport_verify_svc_enabled.stdout | default('unknown') }}
      when:
        - ansible_facts['service_mgr'] == 'systemd'
        - _teleport_verify_svc_enabled is defined

    # NOTE: Service may not stay running without a real auth server,
    # so we verify it was started (attempted) but do not assert active state

    # -----------------------------------------------------------------------
    # 7. Diagnostic notes
    # -----------------------------------------------------------------------
    - name: Note -- CA export not tested (requires live cluster)
      ansible.builtin.debug:
        msg: >
          teleport_export_ca_key=false in converge vars, so CA export
          is not exercised. CA export requires tctl access to a running
          auth server -- out of scope for offline molecule tests.
