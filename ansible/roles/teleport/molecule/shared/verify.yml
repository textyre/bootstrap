---
- name: Verify Teleport behavior
  hosts: all
  become: true
  gather_facts: false

  tasks:
    - name: Wait for standalone Teleport proxy API
      ansible.builtin.uri:
        url: https://127.0.0.1:3080/webapi/ping
        method: GET
        status_code: 200
        validate_certs: false
      register: _teleport_proxy_api
      retries: 12
      delay: 5
      until: _teleport_proxy_api.status | default(0) == 200
      when: teleport_mode | default('standalone') == 'standalone'

    - name: Verify standalone Teleport cluster is initialized
      ansible.builtin.command:
        argv:
          - tctl
          - status
      changed_when: false
      when: teleport_mode | default('standalone') == 'standalone'

    - name: Verify exported Teleport user CA is a valid SSH key
      ansible.builtin.command:
        argv:
          - ssh-keygen
          - -l
          - -f
          - "{{ teleport_ca_keys_file | default('/etc/ssh/teleport_user_ca.pub') }}"
      changed_when: false
      when:
        - teleport_mode | default('standalone') == 'standalone'
        - teleport_export_ca_key | default(false) | bool
