---
# The default scenario runs on the disposable remote test host. It exercises the
# complete standalone contract; Docker and Vagrant provide the platform matrix.
driver:
  name: default
  options:
    managed: false

platforms:
  - name: Localhost

provisioner:
  name: ansible
  options:
    skip-tags: report
  config_options:
    defaults:
      callbacks_enabled: profile_tasks
      ansible_managed: "Managed by Ansible"
  inventory:
    host_vars:
      Localhost:
        ansible_connection: local
  env:
    ANSIBLE_ROLES_PATH: "${MOLECULE_PROJECT_DIRECTORY}/../"

verifier:
  name: ansible

scenario:
  test_sequence:
    - syntax
    - converge
    - idempotence
    - verify
