---
# === teleport: install phase ===

- name: Read installed Teleport version
  ansible.builtin.command:
    argv:
      - /usr/local/bin/teleport
      - version
  register: _teleport_installed_version
  changed_when: false
  # ansible.builtin.command reports a missing executable path as rc=2.
  failed_when: _teleport_installed_version.rc not in [0, 2]

- name: Install required Teleport version
  when: >-
    _teleport_installed_version.rc == 2
    or ('Teleport v' ~ teleport_version) not in
      _teleport_installed_version.stdout
  block:
    - name: Create temporary Teleport installation directory
      ansible.builtin.tempfile:
        state: directory
        prefix: teleport-
      register: _teleport_temp_directory

    - name: Download Teleport release
      ansible.builtin.get_url:
        url: >-
          https://cdn.teleport.dev/teleport-v{{ teleport_version }}-linux-{{ _teleport_architecture }}-bin.tar.gz
        dest: "{{ _teleport_temp_directory.path }}/teleport.tar.gz"
        checksum: >-
          sha256:https://cdn.teleport.dev/teleport-v{{ teleport_version }}-linux-{{ _teleport_architecture }}-bin.tar.gz.sha256
        mode: "0644"

    - name: Extract Teleport release
      ansible.builtin.unarchive:
        src: "{{ _teleport_temp_directory.path }}/teleport.tar.gz"
        dest: "{{ _teleport_temp_directory.path }}"
        remote_src: true

    - name: Install Teleport executables
      ansible.builtin.copy:
        src: "{{ _teleport_temp_directory.path }}/teleport/{{ item }}"
        dest: "/usr/local/bin/{{ item }}"
        owner: root
        group: root
        mode: "0755"
        remote_src: true
      loop: "{{ _teleport_binary_names }}"
      register: _teleport_binary_install
  always:
    - name: Remove temporary Teleport installation directory
      ansible.builtin.file:
        path: "{{ _teleport_temp_directory.path }}"
        state: absent
      when: _teleport_temp_directory.path is defined
