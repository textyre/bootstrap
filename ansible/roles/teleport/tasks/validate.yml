---
# === teleport: validate phase ===

- name: Assert supported operating system
  ansible.builtin.assert:
    that:
      - ansible_facts['os_family'] in _teleport_supported_os
    fail_msg: >-
      OS family '{{ ansible_facts['os_family'] }}' is not supported.
      Supported: {{ _teleport_supported_os | join(', ') }}

- name: Assert supported Teleport mode
  ansible.builtin.assert:
    that:
      - teleport_mode in _teleport_supported_modes
    fail_msg: >-
      Teleport mode '{{ teleport_mode }}' is not supported.
      Supported: {{ _teleport_supported_modes | join(', ') }}

- name: Assert supported installation method
  ansible.builtin.assert:
    that:
      - teleport_install_method in _teleport_supported_install_methods
      - teleport_install_method != 'package' or ansible_facts['os_family'] == 'Archlinux'
      - teleport_install_method != 'repo' or ansible_facts['os_family'] in ['Debian', 'RedHat']
      - >-
        teleport_install_method != 'binary'
        or ansible_facts['architecture'] in _teleport_architecture_map
      - >-
        teleport_install_method != 'repo'
        or ansible_facts['os_family'] != 'RedHat'
        or ansible_facts['distribution'] == 'RedHat'
    fail_msg: >-
      Installation method '{{ teleport_install_method }}' is not supported for
      {{ ansible_facts['distribution'] }} ({{ ansible_facts['os_family'] }} family).

- name: Assert systemd service support
  ansible.builtin.assert:
    that:
      - ansible_facts['service_mgr'] == 'systemd'
    fail_msg: >-
      Teleport service management is implemented only for systemd.
      Detected init system: {{ ansible_facts['service_mgr'] }}.
  when: teleport_manage_service | bool

- name: Assert agent join configuration
  ansible.builtin.assert:
    that:
      - teleport_auth_server | length > 0
      - teleport_join_token | length > 0
    fail_msg: >-
      Agent mode requires both teleport_auth_server and teleport_join_token.
  when: teleport_mode == 'agent'

- name: Assert supported session recording mode
  ansible.builtin.assert:
    that:
      - teleport_session_recording in _teleport_supported_recording_modes
    fail_msg: >-
      Session recording mode '{{ teleport_session_recording }}' is not supported.
      Supported: {{ _teleport_supported_recording_modes | join(', ') }}
