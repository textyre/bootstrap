---
# === teleport: OpenSSH CA integration ===

- name: Read Teleport user CA public key
  ansible.builtin.command:
    argv:
      - tctl
      - auth
      - export
      - --type=user
  register: _teleport_user_ca
  changed_when: false
  retries: 12
  delay: 5
  until: _teleport_user_ca.rc == 0

- name: Deploy Teleport user CA public key for OpenSSH
  ansible.builtin.copy:
    content: "{{ _teleport_user_ca.stdout | regex_replace('(?m)^cert-authority +', '') }}\n"
    dest: "{{ teleport_ca_keys_file }}"
    owner: root
    group: root
    mode: "0644"
