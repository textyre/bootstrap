---
# === teleport role defaults ===

# Operating mode:
#   standalone — auth + proxy + node on one machine; no external auth_server required
#   agent      — node-only; joins external cluster; teleport_auth_server + teleport_join_token required
teleport_mode: standalone

# Core configuration
teleport_version: "17.7.23"
teleport_auth_server: ""
teleport_join_token: ""
teleport_node_name: "{{ ansible_hostname }}"
teleport_labels: {}

# Standalone mode: listen / advertise addresses
teleport_auth_listen_addr: "0.0.0.0:3025"
teleport_proxy_listen_addr: "0.0.0.0:3080"
teleport_proxy_public_addr: "{{ ansible_hostname }}:3080"

# SSH / recording features
teleport_ssh_enabled: true
teleport_proxy_mode: false
teleport_session_recording: "node"
teleport_enhanced_recording: false

teleport_ca_keys_file: /etc/ssh/teleport_user_ca.pub

# Merged on top of the rendered config; allows injecting arbitrary
# teleport.yaml keys without modifying the template.
# Example:  teleport_config_overwrite: { teleport: { diag_addr: "0.0.0.0:3000" } }
teleport_config_overwrite: {}
