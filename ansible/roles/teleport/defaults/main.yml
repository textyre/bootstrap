---
# === teleport role defaults ===

# ROLE-003: Supported operating systems
teleport_supported_os:
  - Archlinux
  - Debian
  - RedHat
  - Void
  - Gentoo

# Installation method: package (Arch AUR), repo (Debian/RedHat APT/YUM), binary (CDN tarball)
# In defaults/ so molecule host_vars can override (include_vars has higher priority)
teleport_install_method: >-
  {{ {'Archlinux': 'package', 'Debian': 'repo', 'RedHat': 'repo'}[ansible_facts['os_family']]
     | default('binary') }}

# --- ROLE-010: Per-subsystem toggles ---
# Master toggle — set false to skip the entire role
teleport_enabled: true
# Per-phase toggles — control which phases execute independently
teleport_manage_install: true
teleport_manage_config: true
teleport_manage_service: true

# Core configuration
teleport_version: "17.4.10"
teleport_auth_server: ""
teleport_join_token: ""
teleport_node_name: "{{ ansible_hostname }}"
teleport_labels: {}

# SSH features
teleport_ssh_enabled: true
teleport_proxy_mode: false
teleport_session_recording: "node"
teleport_enhanced_recording: false

# CA integration with ssh role
teleport_export_ca_key: true
teleport_ca_keys_file: /etc/ssh/teleport_user_ca.pub

# --- ROLE-010: Override dict for teleport.yaml template ---
# Merged on top of the rendered config; allows injecting arbitrary
# teleport.yaml keys without modifying the template.
# Example:  teleport_config_overwrite: { teleport: { diag_addr: "0.0.0.0:3000" } }
teleport_config_overwrite: {}
