---
# === Hostname + /etc/hosts ===
# validate -> hostname -> hosts -> final report

- name: Validate hostname role inputs
  ansible.builtin.include_tasks: validate/main.yml
  tags: ['hostname']

- name: Manage system hostname
  ansible.builtin.include_tasks: hostname.yml
  tags: ['hostname']

- name: Manage hostname hosts entry
  ansible.builtin.include_tasks: hosts.yml
  tags: ['hostname']

- name: Render hostname execution report
  ansible.builtin.include_tasks: report/final.yml
  tags: ['hostname', 'report']
