---
# === /etc/hosts verification ===

- name: Read /etc/hosts
  ansible.builtin.slurp:
    src: /etc/hosts
  register: _hostname_hosts_file
  tags: ['hostname']

- name: Assert /etc/hosts has one hostname entry
  ansible.builtin.assert:
    that:
      - >-
        _hostname_hosts_text
        | regex_findall('^127\.0\.1\.1', multiline=True)
        | length == 1
    fail_msg: >-
      /etc/hosts must contain exactly one '127.0.1.1' line.
      Actual count: {{
        _hostname_hosts_text
        | regex_findall('^127\.0\.1\.1', multiline=True)
        | length
      }}
    quiet: true
  vars:
    _hostname_hosts_text: "{{ _hostname_hosts_file.content | b64decode }}"
  tags: ['hostname']

- name: Assert /etc/hosts contains FQDN hostname entry
  ansible.builtin.assert:
    that:
      - "('127.0.1.1 ' ~ hostname_name ~ '.' ~ hostname_domain ~ ' ' ~ hostname_name) in ((_hostname_hosts_file.content | b64decode).split('\n'))"
    fail_msg: >-
      /etc/hosts is missing expected line
      '127.0.1.1 {{ hostname_name }}.{{ hostname_domain }} {{ hostname_name }}'.
    success_msg: >-
      /etc/hosts contains
      '127.0.1.1 {{ hostname_name }}.{{ hostname_domain }} {{ hostname_name }}'
    quiet: true
  when: hostname_domain | length > 0
  tags: ['hostname']

- name: Assert /etc/hosts contains short hostname entry
  ansible.builtin.assert:
    that:
      - "('127.0.1.1 ' ~ hostname_name) in ((_hostname_hosts_file.content | b64decode).split('\n'))"
    fail_msg: >-
      /etc/hosts is missing expected line '127.0.1.1 {{ hostname_name }}'.
    success_msg: "/etc/hosts contains '127.0.1.1 {{ hostname_name }}'"
    quiet: true
  when: hostname_domain | length == 0
  tags: ['hostname']
