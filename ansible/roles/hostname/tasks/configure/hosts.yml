---
# === /etc/hosts configuration ===

- name: Ensure /etc/hosts contains FQDN hostname entry
  ansible.builtin.lineinfile:
    path: /etc/hosts
    regexp: '^127\.0\.1\.1'
    line: "127.0.1.1 {{ hostname_name }}.{{ hostname_domain }} {{ hostname_name }}"
    insertafter: '^127\.0\.0\.1'
    state: present
  when: hostname_domain | length > 0
  tags: ['hostname']

- name: Ensure /etc/hosts contains short hostname entry
  ansible.builtin.lineinfile:
    path: /etc/hosts
    regexp: '^127\.0\.1\.1'
    line: "127.0.1.1 {{ hostname_name }}"
    insertafter: '^127\.0\.0\.1'
    state: present
  when: hostname_domain | length == 0
  tags: ['hostname']
