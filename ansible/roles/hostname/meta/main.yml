  description: >-
    Set system hostname and configure the 127.0.1.1 entry in /etc/hosts.
    Supports Arch Linux, Debian, Ubuntu, RedHat/EL, Void Linux, Gentoo.
  license: MIT
  min_ansible_version: "2.15"
  platforms:
    - name: ArchLinux
      versions: [all]
    - name: Debian
      versions: [all]
    - name: Ubuntu
      versions: [all]
    - name: EL
      versions: [all]
    - name: Void Linux
      versions: [all]
    - name: Gentoo
      versions: [all]
  galaxy_tags: [system, hostname, hosts]
dependencies: []
