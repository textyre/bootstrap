---
# === ctOS greeter ===
# deploy -> report

- name: Deploy ctOS greeter
  ansible.builtin.include_tasks:
    file: deploy/main.yml

- name: Record greeter deployment
  ansible.builtin.include_role:
    name: common
    tasks_from: report_phase.yml
  vars:
    common_rpt_fact: "_greeter_phases"
    common_rpt_phase: "Deploy"
    common_rpt_detail: "artifact=ctos-greeter"

- name: Render greeter execution report
  ansible.builtin.include_role:
    name: common
    tasks_from: report_render.yml
  vars:
    common_rpt_fact: "_greeter_phases"
    common_rpt_title: "greeter"
