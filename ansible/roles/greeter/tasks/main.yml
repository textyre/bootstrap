---
# === Конфигурация ctOS Greeter ===
# Тема гритера, system-info, обои

- name: Greeter role
  tags: ['greeter']
  block:

# ---- Конфиг web-greeter ----

    - name: Deploy web-greeter.yml config
      ansible.builtin.template:
        src: web-greeter.yml.j2
        dest: /etc/lightdm/web-greeter.yml
        owner: root
        group: root
        mode: '0644'
      tags: ['greeter', 'display']

# ---- Тема ctOS ----

    - name: Resolve greeter dist directory
      ansible.builtin.stat:
        path: "{{ greeter_dist_dir }}"
      register: _greeter_dist_stat
      tags: ['greeter', 'display']

    - name: Assert greeter dist directory exists
      ansible.builtin.assert:
        that:
          - _greeter_dist_stat.stat.exists
          - _greeter_dist_stat.stat.isdir
        fail_msg: "Greeter dist не найден: {{ greeter_dist_dir }}. Запустите 'task greeter:build'."
      tags: ['greeter', 'display']

    - name: Create ctOS theme directory
      ansible.builtin.file:
        path: "/usr/share/web-greeter/themes/{{ greeter_theme }}"
        state: directory
        owner: root
        group: root
        mode: '0755'
      tags: ['greeter', 'display']

    - name: Remove stale theme artefacts before deploy
      ansible.builtin.file:
        path: "/usr/share/web-greeter/themes/{{ greeter_theme }}/{{ item }}"
        state: absent
      loop:
        - assets
        - dist
        - index.html
      tags: ['greeter', 'display']

    - name: Deploy ctOS greeter theme files
      ansible.builtin.copy:
        src: "{{ greeter_dist_dir }}/"
        dest: "/usr/share/web-greeter/themes/{{ greeter_theme }}/"
        owner: root
        group: root
        mode: '0644'
        directory_mode: '0755'
        remote_src: true
      tags: ['greeter', 'display']

    - name: Deploy index.yml theme metadata
      ansible.builtin.copy:
        src: "{{ greeter_index_yml }}"
        dest: "/usr/share/web-greeter/themes/{{ greeter_theme }}/index.yml"
        owner: root
        group: root
        mode: '0644'
        remote_src: true
      tags: ['greeter', 'display']

# ---- Сбор системной информации ----

    - name: Get system timezone
      ansible.builtin.command: timedatectl show -p Timezone --value
      register: _greeter_timezone_cmd
      changed_when: false
      failed_when: false
      tags: ['greeter', 'display']

    - name: Get systemd version
      ansible.builtin.command: systemctl --version
      register: _greeter_systemd_ver_cmd
      changed_when: false
      failed_when: false
      tags: ['greeter', 'display']

    - name: Get connected display name (DRM sysfs)
      ansible.builtin.shell: >
        set -o pipefail;
        for d in /sys/class/drm/card*-*; do
          [ "$(cat "$d/status" 2>/dev/null)" = "connected" ] && basename "$d" | sed 's/^card[0-9]*-//' && break;
        done
      register: _greeter_display_name_cmd
      changed_when: false
      failed_when: false
      tags: ['greeter', 'display']

    - name: Get display resolution (DRM sysfs)
      ansible.builtin.shell: >
        set -o pipefail;
        for d in /sys/class/drm/card*-*; do
          [ "$(cat "$d/status" 2>/dev/null)" = "connected" ] && head -1 "$d/modes" && break;
        done
      register: _greeter_display_res_cmd
      changed_when: false
      failed_when: false
      tags: ['greeter', 'display']

    - name: Get SSH host key fingerprint
      ansible.builtin.shell: >
        set -o pipefail;
        ssh-keygen -lf /etc/ssh/ssh_host_ed25519_key.pub -E sha256 2>/dev/null
        || ssh-keygen -lf /etc/ssh/ssh_host_rsa_key.pub -E sha256 2>/dev/null
        || echo "unknown"
      register: _greeter_ssh_fp_raw
      changed_when: false
      failed_when: false
      tags: ['greeter', 'display']

    - name: Normalize collected system info fields
      ansible.builtin.set_fact:
        _greeter_timezone: >-
          {{
            _greeter_timezone_cmd.stdout | trim
            if (_greeter_timezone_cmd.rc == 0 and (_greeter_timezone_cmd.stdout | trim | length > 0))
            else 'UTC'
          }}
        _greeter_systemd_ver: >-
          {{
            (_greeter_systemd_ver_cmd.stdout_lines[0].split()[1])
            if (_greeter_systemd_ver_cmd.rc == 0 and (_greeter_systemd_ver_cmd.stdout_lines | length > 0) and ((_greeter_systemd_ver_cmd.stdout_lines[0].split() | length) > 1))
            else 'unknown'
          }}
        _greeter_display_name: "{{ _greeter_display_name_cmd.stdout | trim | default('') or 'unknown' }}"
        _greeter_display_res: "{{ _greeter_display_res_cmd.stdout | trim | default('') or 'unknown' }}"
        _greeter_ssh_fp_hash: >-
          {{
            (_greeter_ssh_fp_raw.stdout | default('unknown')).split()[1]
            if ((_greeter_ssh_fp_raw.stdout | default('unknown')).split() | length > 1)
            else 'unknown'
          }}
      tags: ['greeter', 'display']

    - name: Assert normalized system info fields are available
      ansible.builtin.assert:
        that:
          - _greeter_timezone | length > 0
          - _greeter_systemd_ver | length > 0
          - _greeter_display_name | length > 0
          - _greeter_display_res | length > 0
          - _greeter_ssh_fp_hash | length > 0
        fail_msg: "One or more greeter system-info fields were normalized to an empty value"
        quiet: true
      tags: ['greeter', 'display']

# ---- Генерация system-info.json ----

    - name: Generate system-info.json for ctOS theme
      ansible.builtin.template:
        src: system-info.json.j2
        dest: "/usr/share/web-greeter/themes/{{ greeter_theme }}/system-info.json"
        owner: root
        group: root
        mode: '0644'
      tags: ['greeter', 'display']

# ---- Права доступа ----

    - name: Normalize ctOS theme ownership recursively
      ansible.builtin.file:
        path: "/usr/share/web-greeter/themes/{{ greeter_theme }}"
        state: directory
        owner: root
        group: root
        recurse: true
      tags: ['greeter', 'display']

# ---- Обои ----

    - name: Check wallpaper source directory exists
      ansible.builtin.stat:
        path: "{{ greeter_wallpaper_source_dir }}"
      register: _greeter_wallpaper_stat
      tags: ['greeter', 'display']

    - name: Create backgrounds directory
      ansible.builtin.file:
        path: /usr/share/backgrounds
        state: directory
        owner: root
        group: root
        mode: '0755'
      when: _greeter_wallpaper_stat.stat.exists | default(false)
      tags: ['greeter', 'display']

    - name: Copy wallpapers to system backgrounds
      ansible.builtin.copy:
        src: "{{ greeter_wallpaper_source_dir }}/"
        dest: /usr/share/backgrounds/
        owner: root
        group: root
        mode: '0644'
        directory_mode: '0755'
        remote_src: true
      when: _greeter_wallpaper_stat.stat.exists | default(false)
      tags: ['greeter', 'display']

    # ---- Верификация ----

    - name: Verify greeter deployment
      ansible.builtin.include_tasks: verify.yml
      tags: ['greeter', 'display']

# ---- Отчёт ----

    - name: "Report: Configure greeter"
      ansible.builtin.include_role:
        name: common
        tasks_from: report_phase.yml
      vars:
        common_rpt_fact: "_greeter_phases"
        common_rpt_phase: "Configure greeter"
        common_rpt_detail: >-
          theme={{ greeter_theme }} tz={{ _greeter_timezone }}
      tags: ['greeter', 'report']

    - name: "Greeter — Execution Report"
      ansible.builtin.include_role:
        name: common
        tasks_from: report_render.yml
      vars:
        common_rpt_fact: "_greeter_phases"
        common_rpt_title: "greeter"
      tags: ['greeter', 'report']
