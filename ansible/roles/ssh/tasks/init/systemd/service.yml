---
# === ssh: systemd service policy ===

- name: Disable Arch sshdgenkeys service before managed sshd service
  ansible.builtin.systemd:
    name: sshdgenkeys.service
    state: stopped
    enabled: false
  when: ansible_facts['os_family'] == 'Archlinux'

- name: Enable and start sshd
  ansible.builtin.systemd:
    name: "{{ ssh_service_name[ansible_facts['service_mgr']] | default('sshd') }}"
    enabled: true
    state: started
