---
# === ssh: load platform variables ===

- name: Include OS-specific ssh variables
  ansible.builtin.include_vars: "{{ ansible_facts['os_family'] | lower }}/main.yml"

- name: "Report: Load ssh variables"
  ansible.builtin.include_role:
    name: common
    tasks_from: report_phase.yml
  vars:
    common_rpt_fact: "_ssh_phases"
    common_rpt_phase: "Load variables"
    common_rpt_detail: "{{ ansible_facts['os_family'] | lower }}/main.yml"
  tags: ['report']
