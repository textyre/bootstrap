---
# === ssh: validate role inputs ===

- name: Assert supported operating system
  ansible.builtin.assert:
    that:
      - ansible_facts['os_family'] in _ssh_supported_os
    fail_msg: >-
      OS family '{{ ansible_facts['os_family'] }}' is not supported.
      Supported: {{ _ssh_supported_os | join(', ') }}
    success_msg: "OS family '{{ ansible_facts['os_family'] }}' is supported"

- name: Assert supported init system
  ansible.builtin.assert:
    that:
      - ansible_facts['service_mgr'] is defined
      - ansible_facts.get('service_mgr', '') in _ssh_supported_init_systems
    fail_msg: >-
      Init system '{{ ansible_facts.get('service_mgr', 'undefined') }}' is not supported.
      Supported: {{ _ssh_supported_init_systems | join(', ') }}
    success_msg: "Init system '{{ ansible_facts['service_mgr'] }}' is supported"

- name: "Report: Validate ssh inputs"
  ansible.builtin.include_role:
    name: common
    tasks_from: report_phase.yml
  vars:
    common_rpt_fact: "_ssh_phases"
    common_rpt_phase: "Validate inputs"
    common_rpt_detail: "{{ ansible_facts['os_family'] }}/{{ ansible_facts['service_mgr'] }}"
  tags: ['report']
