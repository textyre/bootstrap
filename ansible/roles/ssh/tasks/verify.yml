---
# ROLE-005: In-role verification
# Three verification techniques: config syntax, config content (lineinfile check_mode), service state

# 1. Config file verification (sshd -t — syntax check)
- name: "Verify sshd_config syntax"
  ansible.builtin.command:
    cmd: "sshd -t"
  register: _ssh_verify_syntax
  changed_when: false
  failed_when: _ssh_verify_syntax.rc != 0
  tags: [ssh]

# 2. Config content verification (lineinfile + check_mode)
- name: "Verify PermitRootLogin in sshd_config"
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^PermitRootLogin\s'
    line: "PermitRootLogin {{ ssh_permit_root_login }}"
  check_mode: true
  register: _ssh_verify_config
  failed_when: _ssh_verify_config is changed
  tags: [ssh]

# 3. Service state assertion (init-system agnostic via service_facts)
- name: "Gather service facts"
  ansible.builtin.service_facts:
  tags: [ssh]

- name: "Determine expected sshd service name"
  ansible.builtin.set_fact:
    _ssh_verify_svc: "{{ ssh_service_name[ansible_facts['service_mgr']] | default('sshd') }}"
  tags: [ssh]

- name: "Verify sshd service is running"
  ansible.builtin.assert:
    that:
      - >
        (ansible_facts.services[_ssh_verify_svc ~ '.service'] is defined and
         ansible_facts.services[_ssh_verify_svc ~ '.service'].state == 'running') or
        (ansible_facts.services[_ssh_verify_svc] is defined and
         ansible_facts.services[_ssh_verify_svc].state == 'running')
    fail_msg: >-
      sshd service '{{ _ssh_verify_svc }}' is not running
      (checked {{ _ssh_verify_svc }}.service and {{ _ssh_verify_svc }})
    success_msg: "sshd service '{{ _ssh_verify_svc }}' is running"
  tags: [ssh]
