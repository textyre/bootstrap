---
# === ssh: host key policy ===

- name: "CIS 5.2.8 | Ensure ed25519 host key exists"
  community.crypto.openssh_keypair:
    path: /etc/ssh/ssh_host_ed25519_key
    type: ed25519
    owner: root
    group: root
    mode: "0600"
  register: _ssh_ed25519_host_key

- name: "CIS 5.2.8 | Ensure RSA host key exists"
  community.crypto.openssh_keypair:
    path: /etc/ssh/ssh_host_rsa_key
    type: rsa
    size: 4096
    owner: root
    group: root
    mode: "0600"
  when: "'rsa-sha2-512' in ssh_host_key_algorithms or 'rsa-sha2-256' in ssh_host_key_algorithms"
  register: _ssh_rsa_host_key
