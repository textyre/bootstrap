---
# === ssh — hardened OpenSSH server ===
# validate -> load vars -> configure -> report

- name: SSH role
  tags: ['ssh']
  block:
    - name: Validate ssh role inputs
      ansible.builtin.include_tasks:
        file: validate.yml

    - name: Load ssh platform variables
      ansible.builtin.include_tasks:
        file: load_vars.yml

    - name: Configure ssh server
      ansible.builtin.include_tasks:
        file: configure/main.yml

    - name: Render ssh execution report
      ansible.builtin.include_role:
        name: common
        tasks_from: report_render.yml
      vars:
        common_rpt_fact: "_ssh_phases"
        common_rpt_title: "ssh"
      tags: ['report']
