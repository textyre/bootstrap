---
- name: Verify SSH role
  hosts: all
  become: true
  gather_facts: false

  tasks:
    - name: Validate sshd configuration syntax
      ansible.builtin.command:
        cmd: sshd -t
      register: _ssh_verify_syntax
      changed_when: false
      failed_when: _ssh_verify_syntax.rc != 0

    - name: Read effective sshd configuration
      ansible.builtin.command:
        cmd: sshd -T
      register: _ssh_verify_effective_config
      changed_when: false
      failed_when: _ssh_verify_effective_config.rc != 0
