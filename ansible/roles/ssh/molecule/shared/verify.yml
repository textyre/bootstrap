---
# Verification categories covered:
#   packages — openssh installed per distro
#   config_files — /etc/ssh/sshd_config exists, permissions, content
#   services — sshd enabled and running
#   permissions — host keys, /etc/ssh directory ownership
#   runtime — sshd config syntax validation (sshd -t) and extended test (sshd -T)
#
# Verification categories skipped:
#   runtime_network — sshd port listen check unreliable in Docker containers without real network stack

- name: Verify SSH role
  hosts: all
  become: true
  gather_facts: true
  vars_files:
    - ../../defaults/main.yml

  tasks:

    # ================================================================
    #  Package installation
    # ================================================================

    - name: Gather package facts
      ansible.builtin.package_facts:
        manager: auto

    - name: Gather service facts
      ansible.builtin.service_facts:

    - name: Assert openssh package installed (Arch)
      ansible.builtin.assert:
        that: "'openssh' in ansible_facts.packages"
        fail_msg: "openssh package not found on Archlinux"
        success_msg: "openssh package is installed on Archlinux"
      when: ansible_os_family == 'Archlinux'

    - name: Assert openssh-server package installed (Debian)
      ansible.builtin.assert:
        that: "'openssh-server' in ansible_facts.packages"
        fail_msg: "openssh-server package not found on Debian/Ubuntu"
        success_msg: "openssh-server package is installed on Debian/Ubuntu"
      when: ansible_os_family == 'Debian'

    # ================================================================
    #  Service enabled and running (data-driven via vars)
    # ================================================================

    - name: Load OS-specific variables for service name lookup
      ansible.builtin.include_vars: "../../vars/{{ ansible_os_family | lower }}.yml"

    - name: Determine expected sshd service unit name
      ansible.builtin.set_fact:
        _ssh_verify_svc_unit: "{{ ssh_service_name[ansible_facts['service_mgr']] | default('sshd') }}.service"

    - name: Assert sshd service is enabled
      ansible.builtin.assert:
        that:
          - ansible_facts.services[_ssh_verify_svc_unit] is defined
          - ansible_facts.services[_ssh_verify_svc_unit].status == 'enabled'
        fail_msg: "{{ _ssh_verify_svc_unit }} is not enabled (expected enabled, got {{ ansible_facts.services[_ssh_verify_svc_unit].status | default('undefined') }})"
        success_msg: "{{ _ssh_verify_svc_unit }} is enabled"

    - name: Assert sshd service is running
      ansible.builtin.assert:
        that:
          - ansible_facts.services[_ssh_verify_svc_unit] is defined
          - ansible_facts.services[_ssh_verify_svc_unit].state == 'running'
        fail_msg: "{{ _ssh_verify_svc_unit }} is not running (expected running, got {{ ansible_facts.services[_ssh_verify_svc_unit].state | default('undefined') }})"
        success_msg: "{{ _ssh_verify_svc_unit }} is running"

    # ================================================================
    #  sshd_config file permissions
    # ================================================================

    - name: Stat /etc/ssh/sshd_config
      ansible.builtin.stat:
        path: /etc/ssh/sshd_config
      register: _ssh_verify_sshd_perms

    - name: Assert sshd_config exists with correct permissions
      ansible.builtin.assert:
        that:
          - _ssh_verify_sshd_perms.stat.exists
          - _ssh_verify_sshd_perms.stat.mode == '0600'
          - _ssh_verify_sshd_perms.stat.pw_name == 'root'
        fail_msg: >-
          /etc/ssh/sshd_config missing or wrong permissions
          (expected root:root 0600, got {{ _ssh_verify_sshd_perms.stat.pw_name | default('?') }}:
          {{ _ssh_verify_sshd_perms.stat.mode | default('missing') }})
        success_msg: "/etc/ssh/sshd_config exists with correct permissions (root:root 0600)"

    # ================================================================
    #  sshd_config content -- slurp and check directives
    # ================================================================

    - name: Read sshd_config
      ansible.builtin.slurp:
        src: /etc/ssh/sshd_config
      register: _ssh_verify_config_raw

    - name: Assert sshd_config was read successfully
      ansible.builtin.assert:
        that: "'content' in _ssh_verify_config_raw"
        fail_msg: "Failed to slurp /etc/ssh/sshd_config"
        success_msg: "sshd_config read successfully"

    - name: Decode sshd_config
      ansible.builtin.set_fact:
        _ssh_verify_sshd_content: "{{ _ssh_verify_config_raw.content | b64decode }}"

    # ---- Critical security directives ----

    - name: Assert PermitRootLogin
      ansible.builtin.assert:
        that: _ssh_verify_sshd_content is regex('PermitRootLogin\s+' ~ ssh_permit_root_login)
        fail_msg: "PermitRootLogin is not set to '{{ ssh_permit_root_login }}'"
        success_msg: "PermitRootLogin correctly set to '{{ ssh_permit_root_login }}'"

    - name: Assert Port
      ansible.builtin.assert:
        that: _ssh_verify_sshd_content is regex('Port\s+' ~ ssh_port | string ~ '\\b')
        fail_msg: "Port is not set to {{ ssh_port }}"
        success_msg: "Port correctly set to {{ ssh_port }}"

    - name: Assert AddressFamily
      ansible.builtin.assert:
        that: _ssh_verify_sshd_content is regex('AddressFamily\s+' ~ ssh_address_family ~ '\\b')
        fail_msg: "AddressFamily is not set to '{{ ssh_address_family }}'"
        success_msg: "AddressFamily correctly set to '{{ ssh_address_family }}'"

    - name: Assert PasswordAuthentication
      ansible.builtin.assert:
        that: _ssh_verify_sshd_content is regex('PasswordAuthentication\s+' ~ ssh_password_authentication)
        fail_msg: "PasswordAuthentication is not set to '{{ ssh_password_authentication }}'"
        success_msg: "PasswordAuthentication correctly set to '{{ ssh_password_authentication }}'"

    - name: Assert PermitEmptyPasswords
      ansible.builtin.assert:
        that: _ssh_verify_sshd_content is regex('PermitEmptyPasswords\s+' ~ ssh_permit_empty_passwords)
        fail_msg: "PermitEmptyPasswords is not set to '{{ ssh_permit_empty_passwords }}'"
        success_msg: "PermitEmptyPasswords correctly set to '{{ ssh_permit_empty_passwords }}'"

    - name: Assert HostbasedAuthentication
      ansible.builtin.assert:
        that: _ssh_verify_sshd_content is regex('HostbasedAuthentication\s+' ~ ssh_hostbased_authentication)
        fail_msg: "HostbasedAuthentication is not set to '{{ ssh_hostbased_authentication }}'"
        success_msg: "HostbasedAuthentication correctly set to '{{ ssh_hostbased_authentication }}'"

    - name: Assert PermitUserEnvironment
      ansible.builtin.assert:
        that: _ssh_verify_sshd_content is regex('PermitUserEnvironment\s+' ~ ssh_permit_user_environment)
        fail_msg: "PermitUserEnvironment is not set to '{{ ssh_permit_user_environment }}'"
        success_msg: "PermitUserEnvironment correctly set to '{{ ssh_permit_user_environment }}'"

    - name: Assert StrictModes
      ansible.builtin.assert:
        that: _ssh_verify_sshd_content is regex('StrictModes\s+' ~ ssh_strict_modes)
        fail_msg: "StrictModes is not set to '{{ ssh_strict_modes }}'"
        success_msg: "StrictModes correctly set to '{{ ssh_strict_modes }}'"

    - name: Assert IgnoreRhosts
      ansible.builtin.assert:
        that: _ssh_verify_sshd_content is regex('IgnoreRhosts\s+' ~ ssh_ignore_rhosts)
        fail_msg: "IgnoreRhosts is not set to '{{ ssh_ignore_rhosts }}'"
        success_msg: "IgnoreRhosts correctly set to '{{ ssh_ignore_rhosts }}'"

    # ---- Authentication methods ----

    - name: Assert AuthenticationMethods
      ansible.builtin.assert:
        that: _ssh_verify_sshd_content is regex('AuthenticationMethods\s+' ~ ssh_authentication_methods)
        fail_msg: "AuthenticationMethods not set to '{{ ssh_authentication_methods }}'"
        success_msg: "AuthenticationMethods correctly set to '{{ ssh_authentication_methods }}'"

    - name: Assert PubkeyAuthentication
      ansible.builtin.assert:
        that: _ssh_verify_sshd_content is regex('PubkeyAuthentication\s+' ~ ssh_pubkey_authentication)
        fail_msg: "PubkeyAuthentication is not set to '{{ ssh_pubkey_authentication }}'"
        success_msg: "PubkeyAuthentication correctly set to '{{ ssh_pubkey_authentication }}'"

    - name: Assert UsePAM
      ansible.builtin.assert:
        that: _ssh_verify_sshd_content is regex('UsePAM\s+' ~ ssh_use_pam)
        fail_msg: "UsePAM is not set to '{{ ssh_use_pam }}'"
        success_msg: "UsePAM correctly set to '{{ ssh_use_pam }}'"

    - name: Assert KbdInteractiveAuthentication
      ansible.builtin.assert:
        that: _ssh_verify_sshd_content is regex('KbdInteractiveAuthentication\s+' ~ ssh_kbd_interactive_authentication)
        fail_msg: "KbdInteractiveAuthentication is not set to '{{ ssh_kbd_interactive_authentication }}'"
        success_msg: "KbdInteractiveAuthentication correctly set to '{{ ssh_kbd_interactive_authentication }}'"

    # ---- Forwarding and tunnels ----

    - name: Assert X11Forwarding
      ansible.builtin.assert:
        that: _ssh_verify_sshd_content is regex('X11Forwarding\s+' ~ ssh_x11_forwarding)
        fail_msg: "X11Forwarding is not set to '{{ ssh_x11_forwarding }}'"
        success_msg: "X11Forwarding correctly set to '{{ ssh_x11_forwarding }}'"

    - name: Assert AllowTcpForwarding
      ansible.builtin.assert:
        that: _ssh_verify_sshd_content is regex('AllowTcpForwarding\s+' ~ ssh_allow_tcp_forwarding)
        fail_msg: "AllowTcpForwarding is not set to '{{ ssh_allow_tcp_forwarding }}'"
        success_msg: "AllowTcpForwarding correctly set to '{{ ssh_allow_tcp_forwarding }}'"

    - name: Assert AllowAgentForwarding
      ansible.builtin.assert:
        that: _ssh_verify_sshd_content is regex('AllowAgentForwarding\s+' ~ ssh_allow_agent_forwarding)
        fail_msg: "AllowAgentForwarding is not set to '{{ ssh_allow_agent_forwarding }}'"
        success_msg: "AllowAgentForwarding correctly set to '{{ ssh_allow_agent_forwarding }}'"

    - name: Assert PermitTunnel
      ansible.builtin.assert:
        that: _ssh_verify_sshd_content is regex('PermitTunnel\s+' ~ ssh_permit_tunnel)
        fail_msg: "PermitTunnel is not set to '{{ ssh_permit_tunnel }}'"
        success_msg: "PermitTunnel correctly set to '{{ ssh_permit_tunnel }}'"

    - name: Assert GatewayPorts
      ansible.builtin.assert:
        that: _ssh_verify_sshd_content is regex('GatewayPorts\s+' ~ ssh_gateway_ports)
        fail_msg: "GatewayPorts is not set to '{{ ssh_gateway_ports }}'"
        success_msg: "GatewayPorts correctly set to '{{ ssh_gateway_ports }}'"

    # ---- Logging ----

    - name: Assert LogLevel
      ansible.builtin.assert:
        that: _ssh_verify_sshd_content is regex('LogLevel\s+' ~ ssh_log_level)
        fail_msg: "LogLevel is not set to '{{ ssh_log_level }}'"
        success_msg: "LogLevel correctly set to '{{ ssh_log_level }}'"

    - name: Assert SyslogFacility
      ansible.builtin.assert:
        that: _ssh_verify_sshd_content is regex('SyslogFacility\s+' ~ ssh_syslog_facility)
        fail_msg: "SyslogFacility is not set to '{{ ssh_syslog_facility }}'"
        success_msg: "SyslogFacility correctly set to '{{ ssh_syslog_facility }}'"

    # ---- Network ----

    - name: Assert UseDNS
      ansible.builtin.assert:
        that: _ssh_verify_sshd_content is regex('UseDNS\s+' ~ ssh_use_dns)
        fail_msg: "UseDNS is not set to '{{ ssh_use_dns }}'"
        success_msg: "UseDNS correctly set to '{{ ssh_use_dns }}'"

    - name: Assert Compression
      ansible.builtin.assert:
        that: _ssh_verify_sshd_content is regex('Compression\s+' ~ ssh_compression)
        fail_msg: "Compression is not set to '{{ ssh_compression }}'"
        success_msg: "Compression correctly set to '{{ ssh_compression }}'"

    # ---- Session limits ----

    - name: Assert MaxAuthTries
      ansible.builtin.assert:
        that: _ssh_verify_sshd_content is regex('MaxAuthTries\s+' ~ ssh_max_auth_tries | string)
        fail_msg: "MaxAuthTries is not set to {{ ssh_max_auth_tries }}"
        success_msg: "MaxAuthTries correctly set to {{ ssh_max_auth_tries }}"

    - name: Assert MaxStartups
      ansible.builtin.assert:
        that: _ssh_verify_sshd_content is regex('MaxStartups\s+' ~ ssh_max_startups)
        fail_msg: "MaxStartups is not set to '{{ ssh_max_startups }}'"
        success_msg: "MaxStartups correctly set to '{{ ssh_max_startups }}'"

    - name: Assert LoginGraceTime
      ansible.builtin.assert:
        that: _ssh_verify_sshd_content is regex('LoginGraceTime\s+' ~ ssh_login_grace_time | string)
        fail_msg: "LoginGraceTime is not set to {{ ssh_login_grace_time }}"
        success_msg: "LoginGraceTime correctly set to {{ ssh_login_grace_time }}"

    - name: Assert ClientAliveInterval
      ansible.builtin.assert:
        that: _ssh_verify_sshd_content is regex('ClientAliveInterval\s+' ~ ssh_client_alive_interval | string)
        fail_msg: "ClientAliveInterval is not set to {{ ssh_client_alive_interval }}"
        success_msg: "ClientAliveInterval correctly set to {{ ssh_client_alive_interval }}"

    - name: Assert ClientAliveCountMax
      ansible.builtin.assert:
        that: _ssh_verify_sshd_content is regex('ClientAliveCountMax\s+' ~ ssh_client_alive_count_max | string)
        fail_msg: "ClientAliveCountMax is not set to {{ ssh_client_alive_count_max }}"
        success_msg: "ClientAliveCountMax correctly set to {{ ssh_client_alive_count_max }}"

    - name: Assert TCPKeepAlive
      ansible.builtin.assert:
        that: _ssh_verify_sshd_content is regex('TCPKeepAlive\s+' ~ ssh_tcp_keepalive)
        fail_msg: "TCPKeepAlive is not set to '{{ ssh_tcp_keepalive }}'"
        success_msg: "TCPKeepAlive correctly set to '{{ ssh_tcp_keepalive }}'"

    - name: Assert PrintMotd
      ansible.builtin.assert:
        that: _ssh_verify_sshd_content is regex('PrintMotd\s+' ~ ssh_print_motd)
        fail_msg: "PrintMotd is not set to '{{ ssh_print_motd }}'"
        success_msg: "PrintMotd correctly set to '{{ ssh_print_motd }}'"

    - name: Assert PrintLastLog
      ansible.builtin.assert:
        that: _ssh_verify_sshd_content is regex('PrintLastLog\s+' ~ ssh_print_last_log)
        fail_msg: "PrintLastLog is not set to '{{ ssh_print_last_log }}'"
        success_msg: "PrintLastLog correctly set to '{{ ssh_print_last_log }}'"

    - name: Assert MaxSessions
      ansible.builtin.assert:
        that: _ssh_verify_sshd_content is regex('MaxSessions\s+' ~ ssh_max_sessions | string)
        fail_msg: "MaxSessions is not set to {{ ssh_max_sessions }}"
        success_msg: "MaxSessions correctly set to {{ ssh_max_sessions }}"

    - name: Assert AcceptEnv configured
      ansible.builtin.assert:
        that: _ssh_verify_sshd_content is regex('AcceptEnv\s+LANG')
        fail_msg: "AcceptEnv LANG LC_* not configured"
        success_msg: "AcceptEnv LANG LC_* is configured"

    # ---- Cryptography -- negative checks ----

    - name: Extract Ciphers line
      ansible.builtin.set_fact:
        _ssh_verify_ciphers_line: >-
          {{ _ssh_verify_sshd_content | regex_search('Ciphers\s+(.+)', '\1') | first | default('') }}

    - name: Assert no weak ciphers
      ansible.builtin.assert:
        that:
          - "'cbc' not in _ssh_verify_ciphers_line"
          - "'arcfour' not in _ssh_verify_ciphers_line"
          - "'3des' not in _ssh_verify_ciphers_line"
        fail_msg: "Weak ciphers detected in Ciphers line: {{ _ssh_verify_ciphers_line }}"
        success_msg: "No weak ciphers found (cbc, arcfour, 3des absent)"

    - name: Extract MACs line
      ansible.builtin.set_fact:
        _ssh_verify_macs_line: >-
          {{ _ssh_verify_sshd_content | regex_search('MACs\s+(.+)', '\1') | first | default('') }}

    - name: Assert no weak MACs
      ansible.builtin.assert:
        that:
          - "'md5' not in _ssh_verify_macs_line"
          - "'umac-64' not in _ssh_verify_macs_line"
        fail_msg: "Weak MACs detected in MACs line: {{ _ssh_verify_macs_line }}"
        success_msg: "No weak MACs found (md5, umac-64 absent)"

    - name: Extract KexAlgorithms line
      ansible.builtin.set_fact:
        _ssh_verify_kex_line: >-
          {{ _ssh_verify_sshd_content | regex_search('KexAlgorithms\s+(.+)', '\1') | first | default('') }}

    - name: Assert no weak KEX
      ansible.builtin.assert:
        that:
          - "'group1-sha1' not in _ssh_verify_kex_line"
          - "'group14-sha1' not in _ssh_verify_kex_line"
        fail_msg: "Weak KEX algorithm detected in KexAlgorithms line: {{ _ssh_verify_kex_line }}"
        success_msg: "No weak KEX algorithms found (group1-sha1, group14-sha1 absent)"

    # ---- Cryptography -- positive checks ----

    - name: Assert chacha20-poly1305 in ciphers
      ansible.builtin.assert:
        that: "'chacha20-poly1305@openssh.com' in _ssh_verify_ciphers_line"
        fail_msg: "chacha20-poly1305 not in Ciphers"
        success_msg: "chacha20-poly1305@openssh.com present in Ciphers"

    - name: Assert curve25519-sha256 in KEX
      ansible.builtin.assert:
        that: "'curve25519-sha256' in _ssh_verify_kex_line"
        fail_msg: "curve25519-sha256 not in KexAlgorithms"
        success_msg: "curve25519-sha256 present in KexAlgorithms"

    - name: Assert ssh-ed25519 in HostKeyAlgorithms
      ansible.builtin.assert:
        that: _ssh_verify_sshd_content is regex('HostKeyAlgorithms\s+.*ssh-ed25519')
        fail_msg: "ssh-ed25519 not in HostKeyAlgorithms"
        success_msg: "ssh-ed25519 present in HostKeyAlgorithms"

    - name: Assert RekeyLimit configured with correct value
      ansible.builtin.assert:
        that: _ssh_verify_sshd_content is regex('RekeyLimit\s+' ~ ssh_rekey_limit | regex_escape)
        fail_msg: "RekeyLimit is not set to '{{ ssh_rekey_limit }}'"
        success_msg: "RekeyLimit correctly set to '{{ ssh_rekey_limit }}'"

    - name: Assert hmac-sha2-512-etm in MACs
      ansible.builtin.assert:
        that: "'hmac-sha2-512-etm@openssh.com' in _ssh_verify_macs_line"
        fail_msg: "hmac-sha2-512-etm not in MACs"
        success_msg: "hmac-sha2-512-etm@openssh.com present in MACs"

    # ================================================================
    #  Host keys -- existence and permissions
    # ================================================================

    - name: Stat ed25519 host key (private)
      ansible.builtin.stat:
        path: /etc/ssh/ssh_host_ed25519_key
      register: _ssh_verify_ed25519_key

    - name: Assert ed25519 host key exists with correct permissions
      ansible.builtin.assert:
        that:
          - _ssh_verify_ed25519_key.stat.exists
          - _ssh_verify_ed25519_key.stat.mode == '0600'
        fail_msg: >-
          /etc/ssh/ssh_host_ed25519_key missing or wrong permissions
          (expected 0600, got {{ _ssh_verify_ed25519_key.stat.mode | default('missing') }})
        success_msg: "ed25519 private key exists with correct permissions (0600)"

    - name: Stat ed25519 host key (public)
      ansible.builtin.stat:
        path: /etc/ssh/ssh_host_ed25519_key.pub
      register: _ssh_verify_ed25519_pub

    - name: Assert ed25519 public key exists with correct permissions
      ansible.builtin.assert:
        that:
          - _ssh_verify_ed25519_pub.stat.exists
          - _ssh_verify_ed25519_pub.stat.mode == '0644'
        fail_msg: >-
          /etc/ssh/ssh_host_ed25519_key.pub missing or wrong permissions
          (expected 0644, got {{ _ssh_verify_ed25519_pub.stat.mode | default('missing') }})
        success_msg: "ed25519 public key exists with correct permissions (0644)"

    - name: Stat RSA host key (private)
      ansible.builtin.stat:
        path: /etc/ssh/ssh_host_rsa_key
      register: _ssh_verify_rsa_key

    - name: Assert RSA host key exists with correct permissions
      ansible.builtin.assert:
        that:
          - _ssh_verify_rsa_key.stat.exists
          - _ssh_verify_rsa_key.stat.mode == '0600'
        fail_msg: >-
          /etc/ssh/ssh_host_rsa_key missing or wrong permissions
          (expected 0600, got {{ _ssh_verify_rsa_key.stat.mode | default('missing') }})
        success_msg: "RSA private key exists with correct permissions (0600)"

    - name: Stat RSA host key (public)
      ansible.builtin.stat:
        path: /etc/ssh/ssh_host_rsa_key.pub
      register: _ssh_verify_rsa_pub

    - name: Assert RSA public key exists with correct permissions
      ansible.builtin.assert:
        that:
          - _ssh_verify_rsa_pub.stat.exists
          - _ssh_verify_rsa_pub.stat.mode == '0644'
        fail_msg: >-
          /etc/ssh/ssh_host_rsa_key.pub missing or wrong permissions
          (expected 0644, got {{ _ssh_verify_rsa_pub.stat.mode | default('missing') }})
        success_msg: "RSA public key exists with correct permissions (0644)"

    - name: Stat DSA host key (should be absent)
      ansible.builtin.stat:
        path: /etc/ssh/ssh_host_dsa_key
      register: _ssh_verify_dsa_key

    - name: Assert no DSA host key
      ansible.builtin.assert:
        that: not _ssh_verify_dsa_key.stat.exists
        fail_msg: "Weak DSA host key still present at /etc/ssh/ssh_host_dsa_key"
        success_msg: "DSA host key correctly absent"

    - name: Stat ECDSA host key (should be absent)
      ansible.builtin.stat:
        path: /etc/ssh/ssh_host_ecdsa_key
      register: _ssh_verify_ecdsa_key

    - name: Assert no ECDSA host key
      ansible.builtin.assert:
        that: not _ssh_verify_ecdsa_key.stat.exists
        fail_msg: "Weak ECDSA host key still present at /etc/ssh/ssh_host_ecdsa_key"
        success_msg: "ECDSA host key correctly absent"

    # ================================================================
    #  /etc/ssh/ directory permissions
    # ================================================================

    - name: Stat /etc/ssh directory
      ansible.builtin.stat:
        path: /etc/ssh
      register: _ssh_verify_ssh_dir

    - name: Assert /etc/ssh directory permissions
      ansible.builtin.assert:
        that:
          - _ssh_verify_ssh_dir.stat.exists
          - _ssh_verify_ssh_dir.stat.isdir
          - _ssh_verify_ssh_dir.stat.pw_name == 'root'
        fail_msg: "/etc/ssh directory missing or wrong ownership"
        success_msg: "/etc/ssh directory exists with correct ownership (root)"

    # ================================================================
    #  Banner
    # ================================================================

    - name: Stat banner file
      ansible.builtin.stat:
        path: /etc/issue.net
      register: _ssh_verify_banner
      when: inventory_hostname is search('systemd') or inventory_hostname in ['arch-vm', 'ubuntu-base']

    - name: Assert banner file exists
      ansible.builtin.assert:
        that: _ssh_verify_banner.stat.exists
        fail_msg: "/etc/issue.net not found (ssh_banner_enabled was true in converge)"
        success_msg: "/etc/issue.net exists"
      when: inventory_hostname is search('systemd') or inventory_hostname in ['arch-vm', 'ubuntu-base']

    - name: Assert Banner directive in sshd_config
      ansible.builtin.assert:
        that: _ssh_verify_sshd_content is regex('Banner\s+/etc/issue.net')
        fail_msg: "Banner directive not found in sshd_config"
        success_msg: "Banner directive present in sshd_config pointing to /etc/issue.net"
      when: inventory_hostname is search('systemd') or inventory_hostname in ['arch-vm', 'ubuntu-base']

    - name: Read banner file content
      ansible.builtin.slurp:
        src: /etc/issue.net
      register: _ssh_verify_banner_content
      when: inventory_hostname is search('systemd') or inventory_hostname in ['arch-vm', 'ubuntu-base']

    - name: Assert banner file contains warning content
      ansible.builtin.assert:
        that: "'====' in (_ssh_verify_banner_content.content | b64decode)"
        fail_msg: "Banner /etc/issue.net does not contain expected warning content (missing '====')"
        success_msg: "Banner /etc/issue.net contains expected warning content"
      when: inventory_hostname is search('systemd') or inventory_hostname in ['arch-vm', 'ubuntu-base']

    # ================================================================
    #  SFTP subsystem
    # ================================================================

    - name: Assert SFTP subsystem configured
      ansible.builtin.assert:
        that: _ssh_verify_sshd_content is regex('Subsystem\s+sftp\s+internal-sftp')
        fail_msg: "SFTP subsystem not configured (expected 'Subsystem sftp internal-sftp')"
        success_msg: "SFTP subsystem configured (Subsystem sftp internal-sftp)"

    # ================================================================
    #  DH moduli cleanup verification (systemd + vagrant platforms)
    # ================================================================

    - name: Check for weak DH moduli after cleanup
      ansible.builtin.command:
        cmd: awk '$5 < 3072 { print }' /etc/ssh/moduli
      register: _ssh_verify_weak_moduli
      changed_when: false
      failed_when: _ssh_verify_weak_moduli.rc != 0
      when: inventory_hostname is search('systemd') or inventory_hostname in ['arch-vm', 'ubuntu-base']

    - name: Assert no weak DH moduli remain
      ansible.builtin.assert:
        that: _ssh_verify_weak_moduli.stdout == ''
        fail_msg: "Weak DH moduli still present (< 3072 bits):\n{{ _ssh_verify_weak_moduli.stdout | truncate(500) }}"
        success_msg: "No weak DH moduli remain (all >= 3072 bits)"
      when: inventory_hostname is search('systemd') or inventory_hostname in ['arch-vm', 'ubuntu-base']

    # ================================================================
    #  Config syntax validation and runtime verification
    # ================================================================

    - name: Validate sshd configuration (sshd -t)
      ansible.builtin.command:
        cmd: sshd -t
      changed_when: false
      register: _ssh_verify_sshd_t
      failed_when: _ssh_verify_sshd_t.rc != 0

    - name: "Runtime: dump effective sshd config (sshd -T)"
      ansible.builtin.command:
        cmd: sshd -T
      changed_when: false
      register: _ssh_verify_sshd_T
      failed_when: _ssh_verify_sshd_T.rc != 0

    - name: Assert sshd runtime config includes expected port
      ansible.builtin.assert:
        that: _ssh_verify_sshd_T.stdout is search('port ' ~ ssh_port | string)
        fail_msg: "sshd -T output does not contain 'port {{ ssh_port }}'"
        success_msg: "sshd -T confirms port {{ ssh_port }}"

    # ================================================================
    #  Managed header
    # ================================================================

    - name: Assert Ansible managed comment present
      ansible.builtin.assert:
        that: "'Ansible managed' in _ssh_verify_sshd_content"
        fail_msg: "Ansible managed comment not found in sshd_config"
        success_msg: "Ansible managed comment present in sshd_config"

    # ================================================================
    #  Access control (AllowGroups absent when ssh_allow_groups is empty)
    # ================================================================

    - name: Assert AllowGroups absent when ssh_allow_groups is empty
      ansible.builtin.assert:
        that: _ssh_verify_sshd_content is not search('AllowGroups\s+')
        fail_msg: >-
          AllowGroups directive is present in sshd_config but ssh_allow_groups
          was set to [] in converge — template is not respecting empty list
        success_msg: "AllowGroups correctly absent (ssh_allow_groups is empty)"
      when: not (inventory_hostname is search('access-control'))

    # ================================================================
    #  Access control directives (access-control platforms)
    # ================================================================

    - name: Assert AllowGroups sshusers in config (access-control)
      ansible.builtin.assert:
        that: _ssh_verify_sshd_content is regex('AllowGroups\s+sshusers\\b')
        fail_msg: "AllowGroups sshusers not found in sshd_config"
        success_msg: "AllowGroups sshusers present in sshd_config"
      when: inventory_hostname is search('access-control')

    - name: Assert AllowUsers root in config (access-control)
      ansible.builtin.assert:
        that: _ssh_verify_sshd_content is regex('AllowUsers\s+root\\b')
        fail_msg: "AllowUsers root not found in sshd_config"
        success_msg: "AllowUsers root present in sshd_config"
      when: inventory_hostname is search('access-control')

    - name: Assert DenyGroups badgroup in config (access-control)
      ansible.builtin.assert:
        that: _ssh_verify_sshd_content is regex('DenyGroups\s+badgroup\\b')
        fail_msg: "DenyGroups badgroup not found in sshd_config"
        success_msg: "DenyGroups badgroup present in sshd_config"
      when: inventory_hostname is search('access-control')

    - name: Assert DenyUsers baduser in config (access-control)
      ansible.builtin.assert:
        that: _ssh_verify_sshd_content is regex('DenyUsers\s+baduser\\b')
        fail_msg: "DenyUsers baduser not found in sshd_config"
        success_msg: "DenyUsers baduser present in sshd_config"
      when: inventory_hostname is search('access-control')

    # ================================================================
    #  Features directives (features platforms)
    # ================================================================

    - name: Assert ListenAddress 127.0.0.1 in config (features)
      ansible.builtin.assert:
        that: _ssh_verify_sshd_content is regex('ListenAddress\s+127\.0\.0\.1\\b')
        fail_msg: "ListenAddress 127.0.0.1 not found in sshd_config"
        success_msg: "ListenAddress 127.0.0.1 present in sshd_config"
      when: inventory_hostname is search('features')

    - name: Assert TrustedUserCAKeys directive in config (features)
      ansible.builtin.assert:
        that: _ssh_verify_sshd_content is regex('TrustedUserCAKeys\s+/etc/ssh/teleport_user_ca\.pub')
        fail_msg: "TrustedUserCAKeys /etc/ssh/teleport_user_ca.pub not found in sshd_config"
        success_msg: "TrustedUserCAKeys /etc/ssh/teleport_user_ca.pub present in sshd_config"
      when: inventory_hostname is search('features')

    - name: Assert SFTP chroot Match Group block in config (features)
      ansible.builtin.assert:
        that: _ssh_verify_sshd_content is regex('Match\s+Group\s+sftponly')
        fail_msg: "Match Group sftponly block not found in sshd_config"
        success_msg: "Match Group sftponly block present in sshd_config"
      when: inventory_hostname is search('features')

    - name: Assert ChrootDirectory in config (features)
      ansible.builtin.assert:
        that: _ssh_verify_sshd_content is regex('ChrootDirectory\s+/home/%u')
        fail_msg: "ChrootDirectory /home/%u not found in sshd_config"
        success_msg: "ChrootDirectory /home/%u present in sshd_config"
      when: inventory_hostname is search('features')

    # ================================================================
    #  Diagnostic
    # ================================================================

    - name: Show verify result
      ansible.builtin.debug:
        msg: >-
          SSH verify passed on {{ inventory_hostname }}: packages installed, service enabled+running,
          sshd_config correct (0600 root, all security directives verified, Port+AddressFamily checked),
          host keys correct (ed25519+RSA present with correct perms, DSA/ECDSA absent),
          cryptography validated (ciphers, MACs, KEX),
          AllowGroups absent (or platform-specific for access-control/features),
          banner checked (systemd+vagrant platforms), moduli verified (systemd+vagrant platforms),
          sshd -t passed, sshd -T runtime check passed.
