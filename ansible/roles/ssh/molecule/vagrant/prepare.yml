---
- name: Bootstrap Vagrant VM
  ansible.builtin.import_playbook: ../../../../molecule/shared/prepare-vagrant.yml

- name: Prepare (role-specific)
  hosts: all
  become: true
  gather_facts: true
  tasks:
    - name: Ensure privilege separation directory exists
      ansible.builtin.file:
        path: /run/sshd
        state: directory
        mode: "0755"
