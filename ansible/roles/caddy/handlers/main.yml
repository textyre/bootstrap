---
- name: Restart caddy
  community.docker.docker_compose_v2:
    project_src: "{{ caddy_base_dir }}"
    state: restarted
  listen: Restart caddy
  when:
    - ansible_facts['virtualization_type'] | default('') != 'docker'
    - caddy_enabled | default(true) | bool

- name: Update CA trust
  ansible.builtin.command:
    cmd: "{{ _caddy_update_ca_trust_cmd }}"
  changed_when: true
  listen: Update CA trust
