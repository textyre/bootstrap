---
- name: Deploy Caddy Compose project
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ caddy_base_dir }}/docker-compose.yml"
    owner: root
    group: root
    mode: '0644'
  vars:
    _caddy_configuration_checksum: >-
      {{ lookup('ansible.builtin.template', 'Caddyfile.j2') | hash('sha256') }}
