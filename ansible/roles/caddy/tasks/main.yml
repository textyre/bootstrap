---
# === Reverse Proxy (Caddy) ===
# Развёртывание Caddy в Docker с автоматическим TLS
# Validate → Network → Directories → Config → Service → CA trust → Browser trust → Verify → Report

- name: Caddy role
  when: caddy_enabled | bool
  tags: ['caddy']
  block:

    # ======================================================================
    # ---- Валидация ----
    # ======================================================================

    - name: Validate Caddy configuration
      ansible.builtin.include_tasks: validate.yml
      tags: ['caddy']

    # ======================================================================
    # ---- Docker network ----
    # ======================================================================

    - name: Create Docker network for proxy
      community.docker.docker_network:
        name: "{{ caddy_docker_network }}"
        state: present
      when: caddy_manage_network | bool
      tags: ['caddy', 'proxy', 'configure']

    # ======================================================================
    # ---- Создание директорий ----
    # ======================================================================

    - name: Create Caddy directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        owner: root
        group: root
        mode: '0755'
      loop:
        - "{{ caddy_base_dir }}"
        - "{{ caddy_base_dir }}/sites"
        - "{{ caddy_base_dir }}/data"
        - "{{ caddy_base_dir }}/config"
      tags: ['caddy', 'proxy', 'configure']

    # ======================================================================
    # ---- Конфигурация ----
    # ======================================================================

    - name: Deploy Caddyfile
      ansible.builtin.template:
        src: Caddyfile.j2
        dest: "{{ caddy_base_dir }}/Caddyfile"
        owner: root
        group: root
        mode: '0644'
      notify: Restart caddy
      tags: ['caddy', 'proxy', 'configure']

    - name: Deploy docker-compose.yml
      ansible.builtin.template:
        src: docker-compose.yml.j2
        dest: "{{ caddy_base_dir }}/docker-compose.yml"
        owner: root
        group: root
        mode: '0644'
      notify: Restart caddy
      tags: ['caddy', 'proxy', 'configure']

    # ======================================================================
    # ---- Сервис ----
    # ======================================================================

    - name: Start Caddy with docker compose
      community.docker.docker_compose_v2:
        project_src: "{{ caddy_base_dir }}"
        state: present
      tags: ['caddy', 'proxy', 'service']

    # ======================================================================
    # ---- Доверие к локальному CA (при tls internal) ----
    # ======================================================================

    - name: Deploy Caddy root CA to system trust store
      when:
        - caddy_tls_mode == "internal"
        - caddy_manage_certs | bool
      tags: ['caddy', 'proxy', 'configure']
      block:

        - name: Extract Caddy root CA from container
          ansible.builtin.command:
            cmd: >-
              docker cp caddy:/data/caddy/pki/authorities/local/root.crt
              {{ _caddy_ca_trust_dir[ansible_facts['os_family']] }}/{{ _caddy_ca_cert_filename }}
          register: _caddy_cp_result
          changed_when: false
          failed_when: _caddy_cp_result.rc != 0

        - name: Ensure Caddy root CA has correct permissions
          ansible.builtin.file:
            path: "{{ _caddy_ca_trust_dir[ansible_facts['os_family']] }}/{{ _caddy_ca_cert_filename }}"
            mode: '0644'

        - name: Detect if CA trust store needs updating
          ansible.builtin.stat:
            path: "{{ _caddy_ca_trust_dir[ansible_facts['os_family']] }}/{{ _caddy_ca_cert_filename }}"
          register: _caddy_ca_stat

        - name: Update system CA trust
          ansible.builtin.command:
            cmd: "{{ _caddy_update_ca_trust_cmd[ansible_facts['os_family']] }}"
          register: _caddy_update_ca_result
          changed_when: false
          failed_when: _caddy_update_ca_result.rc != 0

    # ======================================================================
    # ---- Доверие к CA в браузерах ----
    # ======================================================================

    - name: Configure browser enterprise root trust
      when:
        - caddy_tls_mode == "internal"
        - caddy_manage_browser_trust | bool
      tags: ['caddy', 'proxy', 'configure']
      block:

        - name: Check if Zen Browser is installed
          ansible.builtin.stat:
            path: "{{ _caddy_browser_policy_dir[ansible_facts['os_family']] | dirname }}"
          register: _caddy_zen_check

        - name: Deploy Zen Browser enterprise root policy
          when: _caddy_zen_check.stat.exists
          block:

            - name: Create Zen Browser distribution directory
              ansible.builtin.file:
                path: "{{ _caddy_browser_policy_dir[ansible_facts['os_family']] }}"
                state: directory
                owner: root
                group: root
                mode: '0755'

            - name: Configure Zen Browser to trust system CA
              ansible.builtin.copy:
                dest: "{{ _caddy_browser_policy_dir[ansible_facts['os_family']] }}/policies.json"
                content: '{"policies":{"Certificates":{"ImportEnterpriseRoots":true}}}'
                owner: root
                group: root
                mode: '0644'

        - name: Report Zen Browser not installed (skipping browser trust)
          ansible.builtin.debug:
            msg: >-
              Zen Browser not found at {{ _caddy_browser_policy_dir[ansible_facts['os_family']] | dirname }}.
              Skipping browser enterprise root trust configuration.
          when: not _caddy_zen_check.stat.exists

    # ======================================================================
    # ---- Проверка ----
    # ======================================================================

    - name: Flush handlers before verification
      ansible.builtin.meta: flush_handlers
      tags: ['caddy']

    - name: Verify Caddy
      ansible.builtin.include_tasks: verify.yml
      tags: ['caddy']

    # ======================================================================
    # ---- Логирование (ROLE-008) ----
    # ======================================================================

    - name: "Report: Caddy"
      ansible.builtin.include_role:
        name: common
        tasks_from: report_phase.yml
      vars:
        common_rpt_fact: "_caddy_phases"
        common_rpt_phase: "Configure Caddy"
        common_rpt_detail: >-
          tls={{ caddy_tls_mode }}
          network={{ caddy_docker_network }}
          ports={{ caddy_http_port }},{{ caddy_https_port }}
      tags: ['caddy', 'report']

    - name: "Caddy -- Execution Report"
      ansible.builtin.include_role:
        name: common
        tasks_from: report_render.yml
      vars:
        common_rpt_fact: "_caddy_phases"
        common_rpt_title: "caddy"
      tags: ['caddy', 'report']
