---
# validate -> configure -> service -> trust -> report

- name: Validate Caddy role inputs
  ansible.builtin.include_tasks:
    file: validate.yml

- name: Configure Caddy deployment
  ansible.builtin.include_tasks:
    file: configure/main.yml

- name: Apply Caddy runtime state
  ansible.builtin.include_tasks:
    file: service/main.yml

- name: Configure Caddy certificate trust
  ansible.builtin.include_tasks:
    file: trust/main.yml

- name: Render Caddy execution report
  ansible.builtin.include_tasks:
    file: report.yml
