---
# === Caddy — preflight validation ===
# Called at the beginning of main.yml before any actions

- name: Assert OS is supported by Caddy role
  ansible.builtin.assert:
    that:
      - ansible_facts['os_family'] in _caddy_supported_os
    fail_msg: >-
      Caddy role is not supported on {{ ansible_facts['os_family'] }}.
      Supported: {{ _caddy_supported_os | join(', ') }}.
  tags: ['caddy']

- name: Assert caddy_tls_mode is valid
  ansible.builtin.assert:
    that:
      - caddy_tls_mode in ['internal', 'acme']
    fail_msg: >-
      caddy_tls_mode must be 'internal' or 'acme'.
      Current value: {{ caddy_tls_mode }}.
  tags: ['caddy']

- name: Assert caddy_tls_email is set when using ACME
  ansible.builtin.assert:
    that:
      - caddy_tls_email | length > 0
    fail_msg: >-
      caddy_tls_email is required when caddy_tls_mode is 'acme'.
      Set caddy_tls_email to a valid email address.
  when: caddy_tls_mode == "acme"
  tags: ['caddy']
