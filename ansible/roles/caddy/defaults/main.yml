---
# Host directory containing compose configuration, sites, data, and state.
caddy_base_dir: /opt/caddy

# Host UID/GID mapped to container root when Docker userns-remap is "default".
# Use 0 when Docker user namespace remapping is disabled.
caddy_container_uid: 100000

# Host ports published by the Caddy container.
caddy_https_port: 443
caddy_http_port: 80

# Certificate issuer mode. Allowed: internal, acme.
caddy_tls_mode: internal

# ACME account email. Required when caddy_tls_mode is acme.
caddy_tls_email: ""

# External Docker network shared with proxied application containers.
caddy_docker_network: proxy

# Caddy container image pinned to a deterministic patch release.
caddy_docker_image: caddy:2.11.4-alpine
