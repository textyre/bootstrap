---
driver:
  name: vagrant
  provider:
    name: libvirt

platforms:
  - name: arch-vm
    box: arch-base
    box_url: https://github.com/textyre/arch-images/releases/latest/download/arch-base.box
    memory: 2048
    cpus: 2
  - name: ubuntu-base
    box: ubuntu-base
    box_url: https://github.com/textyre/ubuntu-images/releases/latest/download/ubuntu-base.box
    memory: 2048
    cpus: 2

provisioner:
  name: ansible
  options:
    skip-tags: report
  env:
    ANSIBLE_ROLES_PATH: "${MOLECULE_PROJECT_DIRECTORY}/../"
  config_options:
    defaults:
      callbacks_enabled: profile_tasks
  inventory:
    group_vars:
      all:
        # CI-safe docker overrides: these apply to all plays (including TEST-011
        # edge-case play) so the docker dependency doesn't rewrite daemon.json
        # with incompatible defaults on the second role invocation.
        docker_log_driver: "json-file"
        docker_userns_remap: ""
        docker_icc: true
        docker_live_restore: false
        docker_no_new_privileges: false
        docker_storage_driver: ""
  playbooks:
    prepare: prepare.yml

verifier:
  name: ansible

scenario:
  test_sequence:
    - syntax
    - create
    - prepare
    - converge
    - idempotence
    - verify
    - destroy
