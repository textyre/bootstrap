---
- name: Bootstrap Vagrant VM
  ansible.builtin.import_playbook: ../../../../molecule/shared/prepare-vagrant.yml

- name: Prepare (role-specific -- install Docker prerequisite)
  hosts: all
  become: true
  gather_facts: true
  tasks:
    - name: Install Docker (Arch)
      community.general.pacman:
        name: docker
        state: present
      when: ansible_facts['os_family'] == 'Archlinux'

    - name: Install Docker prerequisites (Ubuntu)
      ansible.builtin.apt:
        name:
          - ca-certificates
          - curl
          - gnupg
        state: present
        update_cache: true
      when: ansible_facts['os_family'] == 'Debian'

    - name: Add Docker GPG key (Ubuntu)
      ansible.builtin.shell:
        cmd: |
          install -m 0755 -d /etc/apt/keyrings
          curl -fsSL https://download.docker.com/linux/ubuntu/gpg -o /etc/apt/keyrings/docker.asc
          chmod a+r /etc/apt/keyrings/docker.asc
        creates: /etc/apt/keyrings/docker.asc
      when: ansible_facts['os_family'] == 'Debian'

    - name: Add Docker repository (Ubuntu)
      ansible.builtin.shell:
        cmd: |
          echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu $(. /etc/os-release && echo "$VERSION_CODENAME") stable" > /etc/apt/sources.list.d/docker.list
        creates: /etc/apt/sources.list.d/docker.list
      when: ansible_facts['os_family'] == 'Debian'

    - name: Install Docker (Ubuntu)
      ansible.builtin.apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-compose-plugin
        state: present
        update_cache: true
      when: ansible_facts['os_family'] == 'Debian'

    - name: Ensure Docker service is started
      ansible.builtin.service:
        name: docker
        state: started
        enabled: true
