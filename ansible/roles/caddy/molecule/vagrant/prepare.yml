---
- name: Bootstrap Vagrant VM
  ansible.builtin.import_playbook: ../../../../molecule/shared/prepare-vagrant.yml

- name: Prepare (role-specific -- install Docker prerequisite)
  hosts: all
  become: true
  gather_facts: true
  tasks:
    # ---- Arch Linux ----

    - name: Install Docker (Arch)
      community.general.pacman:
        name:
          - docker
          - docker-compose
        state: present
      when: ansible_facts['os_family'] == 'Archlinux'

    # ---- Debian/Ubuntu ----

    - name: Install Docker (Debian)
      ansible.builtin.apt:
        name:
          - docker.io
          - docker-compose-v2
        state: present
      when: ansible_facts['os_family'] == 'Debian'

    # ---- Common ----

    - name: Enable and start Docker service
      ansible.builtin.service:
        name: docker
        enabled: true
        state: started

    - name: Wait for Docker daemon to be ready
      ansible.builtin.command:
        cmd: docker info
      register: _prepare_docker_info
      retries: 10
      delay: 3
      until: _prepare_docker_info.rc == 0
      changed_when: false
