---
- name: Converge
  hosts: all
  become: true
  gather_facts: true

  vars:
    # Docker role overrides for molecule VMs:
    # - journald log driver is incompatible with max-size/max-file log-opts
    docker_log_driver: "json-file"

  roles:
    - role: "{{ lookup('env', 'MOLECULE_PROJECT_DIRECTORY') | basename }}"

# TEST-011: Edge case — caddy_enabled: false (skip path)
- name: Converge — disabled role
  hosts: all
  become: true
  gather_facts: true

  roles:
    - role: "{{ lookup('env', 'MOLECULE_PROJECT_DIRECTORY') | basename }}"
      vars:
        caddy_enabled: false
