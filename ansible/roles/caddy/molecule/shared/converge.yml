---
- name: Converge
  hosts: all
  become: true
  gather_facts: true

  vars:
    # Disable userns-remap in test -- requires subuid/subgid setup
    # that is not available in fresh molecule VMs.
    # Must be play-level to propagate to docker dependency via meta.
    docker_userns_remap: ""

  roles:
    - role: caddy
