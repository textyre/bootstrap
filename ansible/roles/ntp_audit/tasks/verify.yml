---
# === ntp_audit — post-deploy verification ===

- name: Assert ntp-audit zipapp exists and is executable
  ansible.builtin.stat:
    path: /usr/local/bin/ntp-audit
  register: _ntp_audit_verify_script
  tags: ['ntp_audit', 'ntp_audit_verify']

- name: Verify ntp-audit zipapp
  ansible.builtin.assert:
    that:
      - _ntp_audit_verify_script.stat.exists
      - _ntp_audit_verify_script.stat.executable
    fail_msg: "/usr/local/bin/ntp-audit missing or not executable"
  tags: ['ntp_audit', 'ntp_audit_verify']

- name: Assert audit log directory exists
  ansible.builtin.stat:
    path: "{{ ntp_audit_log_dir }}"
  register: _ntp_audit_verify_logdir
  tags: ['ntp_audit', 'ntp_audit_verify']

- name: Verify log directory
  ansible.builtin.assert:
    that:
      - _ntp_audit_verify_logdir.stat.exists
      - _ntp_audit_verify_logdir.stat.isdir
    fail_msg: "{{ ntp_audit_log_dir }} missing"
  tags: ['ntp_audit', 'ntp_audit_verify']

- name: Assert audit log file was written
  ansible.builtin.stat:
    path: "{{ ntp_audit_log_file }}"
  register: _ntp_audit_verify_logfile
  tags: ['ntp_audit', 'ntp_audit_verify']

- name: Verify audit log not empty
  ansible.builtin.assert:
    that:
      - _ntp_audit_verify_logfile.stat.exists
      - _ntp_audit_verify_logfile.stat.size > 0
    fail_msg: "{{ ntp_audit_log_file }} missing or empty — first run failed"
  tags: ['ntp_audit', 'ntp_audit_verify']

- name: Read last line of audit log
  ansible.builtin.command:
    cmd: tail -n 1 "{{ ntp_audit_log_file }}"
  register: _ntp_audit_verify_last_line
  changed_when: false
  tags: ['ntp_audit', 'ntp_audit_verify']

- name: Assert audit log contains valid JSON with required keys
  ansible.builtin.assert:
    that:
      - (_ntp_audit_verify_last_line.stdout | from_json).timestamp is defined
      - (_ntp_audit_verify_last_line.stdout | from_json).sync_status is defined
      - (_ntp_audit_verify_last_line.stdout | from_json).stratum is defined
      - (_ntp_audit_verify_last_line.stdout | from_json).current_correction is defined
      - (_ntp_audit_verify_last_line.stdout | from_json).ntp_conflict is defined
      - (_ntp_audit_verify_last_line.stdout | from_json).ntp_phc_status is defined
    fail_msg: "audit.log last line missing required JSON keys"
  tags: ['ntp_audit', 'ntp_audit_verify']

- name: Assert sync_status is not in error state
  ansible.builtin.assert:
    that:
      - (_ntp_audit_verify_last_line.stdout | from_json).sync_status != 'error'
    fail_msg: >-
      sync_status is 'error': chrony may not be installed, running, or accessible.
      Check: systemctl status chrony, systemctl status ntp-audit.timer
    success_msg: "sync_status is '{{ (_ntp_audit_verify_last_line.stdout | from_json).sync_status }}'"
  tags: ['ntp_audit', 'ntp_audit_verify']

- name: Check ntp-audit.timer is-enabled (systemd)
  ansible.builtin.command:
    cmd: systemctl is-enabled ntp-audit.timer
  register: _ntp_audit_verify_timer_enabled
  changed_when: false
  when: ansible_facts['service_mgr'] == 'systemd'
  tags: ['ntp_audit', 'ntp_audit_verify']

- name: Check ntp-audit.timer is-active (systemd)
  ansible.builtin.command:
    cmd: systemctl is-active ntp-audit.timer
  register: _ntp_audit_verify_timer_active
  changed_when: false
  when: ansible_facts['service_mgr'] == 'systemd'
  tags: ['ntp_audit', 'ntp_audit_verify']

- name: Verify ntp-audit.timer is enabled and active
  ansible.builtin.assert:
    that:
      - _ntp_audit_verify_timer_enabled.stdout | trim == 'enabled'
      - _ntp_audit_verify_timer_active.stdout | trim == 'active'
    fail_msg: "ntp-audit.timer not enabled or not active"
  when: ansible_facts['service_mgr'] == 'systemd'
  tags: ['ntp_audit', 'ntp_audit_verify']

- name: Assert logrotate config deployed
  ansible.builtin.stat:
    path: /etc/logrotate.d/ntp-audit
  register: _ntp_audit_verify_logrotate
  tags: ['ntp_audit', 'ntp_audit_verify']

- name: Verify logrotate config
  ansible.builtin.assert:
    that:
      - _ntp_audit_verify_logrotate.stat.exists
      - _ntp_audit_verify_logrotate.stat.size > 0
    fail_msg: "/etc/logrotate.d/ntp-audit missing"
  tags: ['ntp_audit', 'ntp_audit_verify']

- name: Assert Python source staging directory exists
  ansible.builtin.stat:
    path: /usr/local/src/ntp-audit
  register: _ntp_audit_verify_src
  tags: ['ntp_audit', 'ntp_audit_verify']

- name: Verify staging directory
  ansible.builtin.assert:
    that:
      - _ntp_audit_verify_src.stat.exists
      - _ntp_audit_verify_src.stat.isdir
    fail_msg: "/usr/local/src/ntp-audit staging directory missing"
  tags: ['ntp_audit', 'ntp_audit_verify']

- name: Assert Alloy config fragment deployed
  ansible.builtin.stat:
    path: "{{ ntp_audit_alloy_config_dir }}/ntp-audit.alloy"
  register: _ntp_audit_verify_alloy
  when:
    - ntp_audit_alloy_enabled | bool
    - ntp_audit_alloy_config_dir | length > 0
  tags: ['ntp_audit', 'ntp_audit_verify']

- name: Verify Alloy fragment
  ansible.builtin.assert:
    that:
      - _ntp_audit_verify_alloy.stat.exists
      - _ntp_audit_verify_alloy.stat.size > 0
    fail_msg: "{{ ntp_audit_alloy_config_dir }}/ntp-audit.alloy missing"
  when:
    - ntp_audit_alloy_enabled | bool
    - ntp_audit_alloy_config_dir | length > 0
  tags: ['ntp_audit', 'ntp_audit_verify']

- name: Assert Loki rules deployed
  ansible.builtin.stat:
    path: "{{ ntp_audit_loki_rules_dir }}/ntp-audit-rules.yaml"
  register: _ntp_audit_verify_loki
  when:
    - ntp_audit_loki_enabled | bool
    - ntp_audit_loki_rules_dir | length > 0
  tags: ['ntp_audit', 'ntp_audit_verify']

- name: Verify Loki rules
  ansible.builtin.assert:
    that:
      - _ntp_audit_verify_loki.stat.exists
      - _ntp_audit_verify_loki.stat.size > 0
    fail_msg: "{{ ntp_audit_loki_rules_dir }}/ntp-audit-rules.yaml missing"
  when:
    - ntp_audit_loki_enabled | bool
    - ntp_audit_loki_rules_dir | length > 0
  tags: ['ntp_audit', 'ntp_audit_verify']
