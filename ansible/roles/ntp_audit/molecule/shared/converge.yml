---
- name: Converge
  hosts: all
  become: true
  gather_facts: true

  pre_tasks:
    - name: Update apt cache (Ubuntu/Debian)
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600
      when: ansible_facts['os_family'] == 'Debian'

    - name: Ensure chrony is installed (ntp_audit depends on chronyc)
      ansible.builtin.package:
        name: chrony
        state: present

    - name: Set chrony service name per distribution
      ansible.builtin.set_fact:
        _ntp_audit_chrony_service: >-
          {{ 'chrony' if ansible_facts['os_family'] == 'Debian' else 'chronyd' }}

    - name: Ensure chrony is running
      ansible.builtin.service:
        name: "{{ _ntp_audit_chrony_service }}"
        state: started
        enabled: true

    - name: Wait for chronyd socket to be ready
      ansible.builtin.wait_for:
        path: /run/chrony/chronyd.sock
        state: present
        timeout: 30

    # chrony needs time to sync with NTP servers after start.
    # Without this, audit script reports sync_status='error' (correct but premature).
    # Pattern: ntp role uses same waitsync in tasks/verify.yml:51-55.
    - name: Wait for chronyd to synchronize (up to 60s)
      ansible.builtin.command:
        cmd: chronyc waitsync 30 0 0 2
      changed_when: false

  roles:
    - role: ntp_audit
