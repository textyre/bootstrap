---
# === Внутренние маппинги chezmoi (не для пользователя) ===
# Правила редактирования: только при добавлении нового дистро или метода установки.

# Пакет chezmoi по OS family.
# Arch: доступен в официальных репозиториях.
# Остальные дистро: нет пакета — используй chezmoi_install_method: script.
_chezmoi_packages:
  Archlinux: chezmoi
  Debian: ~
  RedHat: ~
  Void: ~
  Gentoo: ~

# chezmoi не управляет системными сервисами.
# Диспетчеризация init-систем (ROLE-002) не применима к этой роли.
