---
# === Деплой дотфайлов через chezmoi ===
# Установка, инициализация, применение
# preflight → paths → install → validate-source → wallpapers → apply → verify → report

# ======================================================================
# ---- Preflight (ROLE-003) ----
# ======================================================================

- name: Assert supported operating system
  ansible.builtin.assert:
    that:
      - ansible_facts['os_family'] in _chezmoi_supported_os
    fail_msg: >-
      OS family '{{ ansible_facts['os_family'] }}' is not supported.
      Supported: {{ _chezmoi_supported_os | join(', ') }}
    success_msg: "OS family '{{ ansible_facts['os_family'] }}' is supported"
  tags: ['chezmoi', 'dotfiles']

# ======================================================================
# ---- Resolve paths (нужно до install для script метода) ----
# ======================================================================

- name: Get user home directory
  ansible.builtin.getent:
    database: passwd
    key: "{{ chezmoi_user }}"
  tags: ['chezmoi', 'dotfiles']

- name: Set user home fact
  ansible.builtin.set_fact:
    chezmoi_user_home: "{{ getent_passwd[chezmoi_user][4] }}"
  tags: ['chezmoi', 'dotfiles']

# ======================================================================
# ---- Установка chezmoi (OS-specific) ----
# ======================================================================

- name: Install chezmoi (OS-specific)
  ansible.builtin.include_tasks: "install-{{ ansible_facts['os_family'] | lower }}.yml"
  tags: ['chezmoi', 'dotfiles', 'install']

- name: Resolve chezmoi binary path
  ansible.builtin.set_fact:
    _chezmoi_bin: >-
      {{ '/usr/bin/chezmoi'
         if chezmoi_install_method == 'pacman'
         else chezmoi_user_home ~ '/.local/bin/chezmoi' }}
  tags: ['chezmoi', 'dotfiles']

# ======================================================================
# ---- Validate source ----
# ======================================================================

- name: Resolve chezmoi source directory
  ansible.builtin.stat:
    path: "{{ chezmoi_source_dir }}"
  register: chezmoi_source_stat
  tags: ['chezmoi', 'dotfiles']

- name: Assert chezmoi source directory exists
  ansible.builtin.assert:
    that:
      - chezmoi_source_stat.stat.exists
      - chezmoi_source_stat.stat.isdir
    fail_msg: "Директория с дотфайлами не найдена: {{ chezmoi_source_dir }}"
  tags: ['chezmoi', 'dotfiles']

# ======================================================================
# ---- Подготовка: обои ----
# ======================================================================

- name: Check wallpapers source directory
  ansible.builtin.stat:
    path: "{{ chezmoi_source_dir }}/wallpapers"
  register: chezmoi_wallpapers_dir
  tags: ['chezmoi', 'dotfiles']

- name: Ensure wallpapers directory exists
  ansible.builtin.file:
    path: "{{ chezmoi_user_home }}/.local/share/wallpapers"
    state: directory
    owner: "{{ chezmoi_user }}"
    group: "{{ chezmoi_user }}"
    mode: '0755'
  when: chezmoi_wallpapers_dir.stat.exists
  tags: ['chezmoi', 'dotfiles']

- name: Deploy wallpapers
  ansible.builtin.copy:
    src: "{{ chezmoi_source_dir }}/wallpapers/"
    dest: "{{ chezmoi_user_home }}/.local/share/wallpapers/"
    owner: "{{ chezmoi_user }}"
    group: "{{ chezmoi_user }}"
    mode: '0644'
    remote_src: true
  when: chezmoi_wallpapers_dir.stat.exists
  tags: ['chezmoi', 'dotfiles']

# ======================================================================
# ---- Инициализация и применение (idempotent) ----
# ======================================================================

- name: Check if chezmoi config already exists (idempotence guard)
  ansible.builtin.stat:
    path: "{{ chezmoi_user_home }}/.config/chezmoi/chezmoi.toml"
  register: _chezmoi_config_stat
  tags: ['chezmoi', 'dotfiles']

- name: Initialize chezmoi from local source (first run)
  become: true
  become_user: "{{ chezmoi_user }}"
  ansible.builtin.command: >-
    {{ _chezmoi_bin }} init
    --source {{ chezmoi_source_dir }}
    --promptChoice "Choose color theme={{ chezmoi_theme_name }}"
    --apply
  args:
    chdir: "{{ chezmoi_user_home }}"
  register: _chezmoi_init
  changed_when: true
  when: not _chezmoi_config_stat.stat.exists
  tags: ['chezmoi', 'dotfiles']

- name: Apply chezmoi dotfiles (subsequent runs)
  become: true
  become_user: "{{ chezmoi_user }}"
  ansible.builtin.command: >-
    {{ _chezmoi_bin }} apply --source {{ chezmoi_source_dir }}
  args:
    chdir: "{{ chezmoi_user_home }}"
  register: _chezmoi_apply
  changed_when: _chezmoi_apply.stdout | length > 0
  when: _chezmoi_config_stat.stat.exists
  tags: ['chezmoi', 'dotfiles']

- name: Verify no nested chezmoidata (guard against stale theme data)
  become: true
  become_user: "{{ chezmoi_user }}"
  ansible.builtin.command:
    cmd: find {{ chezmoi_source_dir }} -mindepth 2 -name '.chezmoidata' -type d
  register: _chezmoi_nested_check
  changed_when: false
  failed_when: _chezmoi_nested_check.stdout | length > 0
  tags: ['chezmoi', 'dotfiles']

# ======================================================================
# ---- Проверка (ROLE-005) ----
# ======================================================================

- name: Verify chezmoi deployment
  ansible.builtin.include_tasks: verify.yml
  tags: ['chezmoi', 'dotfiles']

# ======================================================================
# ---- Логирование (ROLE-008) ----
# ======================================================================

- name: "Report: chezmoi install"
  ansible.builtin.include_role:
    name: common
    tasks_from: report_phase.yml
  vars:
    common_rpt_fact: "_chezmoi_phases"
    common_rpt_phase: "Install chezmoi"
    common_rpt_detail: >-
      method={{ chezmoi_install_method }}
      bin={{ _chezmoi_bin }}
  tags: ['chezmoi', 'report']

- name: "Report: chezmoi apply"
  ansible.builtin.include_role:
    name: common
    tasks_from: report_phase.yml
  vars:
    common_rpt_fact: "_chezmoi_phases"
    common_rpt_phase: "Apply dotfiles"
    common_rpt_detail: >-
      user={{ chezmoi_user }}
      source={{ chezmoi_source_dir }}
  tags: ['chezmoi', 'report']

- name: "Report: chezmoi verify"
  ansible.builtin.include_role:
    name: common
    tasks_from: report_phase.yml
  vars:
    common_rpt_fact: "_chezmoi_phases"
    common_rpt_phase: "Verify"
    common_rpt_detail: >-
      bin={{ _chezmoi_bin }}
      ver={{ _chezmoi_verify_version.stdout | default('unknown') | trim }}
  tags: ['chezmoi', 'report']

- name: "chezmoi — Execution Report"
  ansible.builtin.include_role:
    name: common
    tasks_from: report_render.yml
  vars:
    common_rpt_fact: "_chezmoi_phases"
    common_rpt_title: "chezmoi"
  tags: ['chezmoi', 'report']
