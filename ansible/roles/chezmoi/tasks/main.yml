---
- name: Detect target account
  ansible.builtin.include_tasks:
    file: detect/main.yml

- name: Configure user dotfiles
  ansible.builtin.include_tasks:
    file: configure/main.yml

- name: Record dotfiles deployment
  ansible.builtin.include_role:
    name: common
    tasks_from: report_phase.yml
  vars:
    common_rpt_fact: "_chezmoi_phases"
    common_rpt_phase: "Configure"
    common_rpt_detail: >-
      user={{ target_user }}
      source={{ dotfiles_base_dir }}
      theme={{ chezmoi_theme_name }}

- name: Render chezmoi execution report
  ansible.builtin.include_role:
    name: common
    tasks_from: report_render.yml
  vars:
    common_rpt_fact: "_chezmoi_phases"
    common_rpt_title: "chezmoi"
