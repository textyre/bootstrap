---
_packages_debian_package_map:
  git: [git]
  curl: [curl]
  htop: [htop]
  tmux: [tmux]
  unzip: [unzip]
  rsync: [rsync]
  openssh: [openssh-client, openssh-server]
  chezmoi: []
  nftables: [nftables]
  cronie: [cron]
  sqlite: [sqlite3]
  logrotate: [logrotate]
  vim: [vim]
  neovim: [neovim]
  docker: [docker.io]
  docker-compose: [docker-compose-v2]
  python-requests: [python3-requests]
  xorg: [xorg]
  xorg-apps: [x11-apps, x11-utils, x11-xserver-utils, xauth]
  xorg-xinit: [xinit]
  xorg-drivers: [xserver-xorg-video-all, xserver-xorg-input-all]
  picom: [picom]
  dmenu: [suckless-tools]
  rofi: [rofi]
  dunst: [dunst]
  feh: [feh]
  flameshot: [flameshot]
  gsimplecal: [gsimplecal]
  thunar: [thunar]
  thunar-volman: [thunar-volman]
  tumbler: [tumbler]
  gvfs: [gvfs]
  networkmanager: [network-manager]
  network-manager-applet: [network-manager-gnome]
  playerctl: [playerctl]
  pamixer: [pamixer]
  brightnessctl: [brightnessctl]
  xdg-utils: [xdg-utils]
  xdg-user-dirs: [xdg-user-dirs]
  xss-lock: [xss-lock]
  maim: [maim]
  imagemagick: [imagemagick]
  lxappearance: [lxappearance]
  arandr: [arandr]
  mesa: [mesa-utils, libgl1-mesa-dri]
  lightdm: [lightdm]
  alacritty: [alacritty]
  starship: []
  ttf-jetbrains-mono-nerd: [fonts-jetbrains-mono-web]
  ttf-firacode-nerd: [fonts-firacode]
  ttf-hack-nerd: [fonts-hack]
  ttf-iosevka-nerd: []
  ttf-nerd-fonts-symbols: []
  ttf-font-awesome: [fonts-font-awesome]
  noto-fonts: [fonts-noto]
  terminus-font: [xfonts-terminus]
  papirus-icon-theme: [papirus-icon-theme]
  fzf: [fzf]
  ripgrep: [ripgrep]
  bat: [bat]
  jq: [jq]

_packages_backend_official_all: >-
  {{ ((_packages_common_all | map('extract', _packages_debian_package_map) | flatten)
      + packages_distro.get(ansible_facts['os_family'], []))
     | unique
     | list }}

_packages_backend_verify_all: "{{ _packages_backend_official_all }}"

_packages_backend_verify_argv:
  - dpkg-query
  - "-W"
  - "-f=${Status}"

_packages_backend_verify_success_text: "install ok installed"
