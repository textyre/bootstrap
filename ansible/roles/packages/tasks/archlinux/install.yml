---
- name: Install packages (pacman)
  ansible.builtin.package:
    name: "{{ _packages_official_all }}"
    state: present
  retries: 3
  delay: 5
  register: _packages_install_result
  until: _packages_install_result is succeeded
  tags: ['packages', 'install']

- name: Apply AUR transport proxy workaround layer
  ansible.builtin.include_role:
    name: aur_transport_proxy
    apply:
      tags:
        - packages
        - install
        - aur
  when:
    - is_packages_archlinux_aur
    - packages_aur_transport_proxy_enabled | bool
  tags: ['packages', 'install', 'aur']

- name: Install AUR packages
  ansible.builtin.include_role:
    name: yay
    apply:
      tags:
        - packages
        - install
        - aur
  vars:
    yay_manage_setup: false
    yay_manage_aur_packages: true
    yay_packages_aur: "{{ _packages_archlinux_aur }}"
    yay_packages_aur_remove_conflicts: "{{ packages_aur_remove_conflicts }}"
    yay_packages_official: "{{ _packages_official_all }}"
  when: is_packages_archlinux_aur
  tags: ['packages', 'install', 'aur']
