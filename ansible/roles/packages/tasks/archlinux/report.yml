---
- name: "Report: Package installation"
  ansible.builtin.include_role:
    name: common
    tasks_from: report_phase.yml
  vars:
    common_rpt_fact: "_packages_phases"
    common_rpt_phase: "Install packages"
    common_rpt_detail: >-
      {{ _packages_archlinux_official_count }} official +
      {{ _packages_archlinux_aur_count }} AUR on {{ ansible_facts['os_family'] }}
  tags: ['packages', 'report']

- name: "Report: Package verification"
  ansible.builtin.include_role:
    name: common
    tasks_from: report_phase.yml
  vars:
    common_rpt_fact: "_packages_phases"
    common_rpt_phase: "Verify packages"
    common_rpt_detail: >-
      {{ _packages_archlinux_verify_count }} installed package names verified
      from {{ _packages_archlinux_official_count }} official install IDs +
      {{ _packages_archlinux_aur_count }} AUR IDs on {{ ansible_facts['os_family'] }}
  tags: ['packages', 'report']
