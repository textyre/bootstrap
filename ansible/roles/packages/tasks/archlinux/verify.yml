---
- name: Verify Arch package installed (pacman -Q)
  ansible.builtin.command:
    cmd: "pacman -Q {{ item }}"
  register: _packages_verify_pacman
  changed_when: false
  failed_when: _packages_verify_pacman.rc != 0
  loop: "{{ _packages_verify_all }}"
  loop_control:
    label: "{{ item }}"
  tags: ['packages']
