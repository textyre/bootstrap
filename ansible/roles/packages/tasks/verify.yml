---
# === In-role verification: check official + AUR packages are installed ===
# Called from tasks/main.yml after installation. Skipped when package lists are empty.

# Technique 2: runtime check via native package manager
- name: Verify package installed (pacman -Q)
  ansible.builtin.command:
    cmd: "pacman -Q {{ item }}"
  register: _packages_verify_pacman
  changed_when: false
  failed_when: _packages_verify_pacman.rc != 0
  loop: "{{ packages_verify_all }}"
  loop_control:
    label: "{{ item }}"
  when:
    - packages_verify_all | length > 0
    - ansible_facts['os_family'] == 'Archlinux'
  tags: ['packages']

- name: Verify package installed (dpkg-query)
  ansible.builtin.command:
    cmd: "dpkg-query -W -f='${Status}' {{ item }}"
  register: _packages_verify_dpkg
  changed_when: false
  failed_when: >-
    _packages_verify_dpkg.rc != 0 or
    'install ok installed' not in _packages_verify_dpkg.stdout
  loop: "{{ packages_verify_all }}"
  loop_control:
    label: "{{ item }}"
  when:
    - packages_verify_all | length > 0
    - ansible_facts['os_family'] == 'Debian'
  tags: ['packages']

# Technique 3: state assertion via package_facts
- name: Gather package facts
  ansible.builtin.package_facts:
    manager: auto
  changed_when: false
  tags: ['packages']

- name: Assert all packages are installed
  ansible.builtin.assert:
    that:
      - item in ansible_facts.packages
    fail_msg: >-
      Package '{{ item }}' is not installed on {{ ansible_facts['distribution'] }}.
      Check that the package name is correct for this OS family ({{ ansible_facts['os_family'] }}).
    success_msg: "Package '{{ item }}' is installed"
    quiet: true
  loop: "{{ packages_verify_all }}"
  loop_control:
    label: "{{ item }}"
  when: packages_verify_all | length > 0
  tags: ['packages']

- name: Report verification result
  ansible.builtin.debug:
    msg: >-
      packages verify passed:
      {{ packages_verify_all | length }} total
      ({{ packages_all | length }} official +
      {{ packages_aur_all | length }} AUR) packages confirmed installed
      on {{ ansible_facts['distribution'] }} {{ ansible_facts['distribution_version'] }}
  tags: ['packages']
