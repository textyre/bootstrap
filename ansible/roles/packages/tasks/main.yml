---
# === Workstation package installation ===
# Official packages install through the OS backend. Platform extras stay hidden
# behind the OS-specific task file.

- name: Packages role
  when: packages_enabled | bool
  tags: ['packages']
  block:

    - name: Install packages (OS-specific)
      ansible.builtin.include_tasks: "{{ ansible_facts['os_family'] | lower }}/install.yml"
      tags: ['packages', 'install']

    - name: Verify packages
      ansible.builtin.include_tasks: "{{ ansible_facts['os_family'] | lower }}/verify.yml"
      tags: ['packages']

    - name: Report package phases
      ansible.builtin.include_tasks: "{{ ansible_facts['os_family'] | lower }}/report.yml"
      tags: ['packages', 'report']

    - name: "Packages -- Execution Report"
      ansible.builtin.include_role:
        name: common
        tasks_from: report_render.yml
      vars:
        common_rpt_fact: "_packages_phases"
        common_rpt_title: "packages"
      tags: ['packages', 'report']
