---
- name: Verify Debian package installed
  ansible.builtin.command:
    argv: "{{ _packages_backend_verify_argv + [item] }}"
  register: _packages_verify_package
  changed_when: false
  failed_when: >-
    _packages_verify_package.rc != 0 or
    (_packages_backend_verify_success_text | default('') | length > 0 and
     _packages_backend_verify_success_text not in _packages_verify_package.stdout)
  loop: "{{ _packages_verify_all }}"
  loop_control:
    label: "{{ item }}"
  tags: ['packages']
