---
- name: "Report: Package installation"
  ansible.builtin.include_role:
    name: common
    tasks_from: report_phase.yml
  vars:
    common_rpt_fact: "_packages_phases"
    common_rpt_phase: "Install packages"
    common_rpt_detail: >-
      {{ _packages_debian_official_count }} official on {{ ansible_facts['os_family'] }}
  tags: ['packages', 'report']

- name: "Report: Package verification"
  ansible.builtin.include_role:
    name: common
    tasks_from: report_phase.yml
  vars:
    common_rpt_fact: "_packages_phases"
    common_rpt_phase: "Verify packages"
    common_rpt_detail: >-
      {{ _packages_debian_verify_count }} official packages verified on {{ ansible_facts['os_family'] }}
  tags: ['packages', 'report']
