---
# cache_valid_time requires ansible.builtin.apt (no generic equivalent in ansible.builtin.package)
- name: Update apt cache (Debian/Ubuntu)
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600
  tags: ['packages', 'install']

- name: Install packages (apt)
  ansible.builtin.apt:
    name: "{{ _packages_official_all }}"
    state: present
  retries: 3
  delay: 5
  register: _packages_install_result
  until: _packages_install_result is succeeded
  tags: ['packages', 'install']

- name: Assert dpkg package database has no pending configuration
  ansible.builtin.command:
    cmd: dpkg --audit
  register: _packages_dpkg_audit
  changed_when: false
  failed_when: >-
    _packages_dpkg_audit.rc != 0 or
    (_packages_dpkg_audit.stdout | trim | length > 0) or
    (_packages_dpkg_audit.stderr | trim | length > 0)
  tags: ['packages', 'install']
