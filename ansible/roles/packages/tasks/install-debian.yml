---
# Debian/Ubuntu: install packages only

# Устанавливаем подготовленный список Debian/Ubuntu пакетов.
# Обновление apt package index выполняет package_manager до этой роли.
- name: Install packages (apt)
  ansible.builtin.apt:
    name: "{{ packages_all }}"
    state: present
  retries: 3
  delay: 5
  register: _packages_install_result
  until: _packages_install_result is succeeded
  when:
    - packages_all | length > 0
  tags: ['packages', 'install']

# Проверяем, что dpkg не оставил незавершенную конфигурацию пакетов.
# Это ловит поломанное состояние после установки, а не занимается обновлением системы.
- name: Assert dpkg package database has no pending configuration
  ansible.builtin.command:
    cmd: dpkg --audit
  register: _packages_dpkg_audit
  changed_when: false
  failed_when: >-
    _packages_dpkg_audit.rc != 0 or
    (_packages_dpkg_audit.stdout | trim | length > 0) or
    (_packages_dpkg_audit.stderr | trim | length > 0)
  when:
    - packages_all | length > 0
  tags: ['packages', 'install']
