---
# Verification categories covered: installed package state
# Verification categories skipped:
#   config files  — role does not write any configuration files
#   services      — role does not manage any service units
#   runtime       — role does not start any daemons or network interfaces
#   permissions   — role does not create files with specific ownership or mode

- name: Verify packages role
  hosts: all
  become: true
  gather_facts: true
  vars_files:
    - "{{ lookup('env', 'MOLECULE_PROJECT_DIRECTORY') }}/../../inventory/group_vars/all/packages.yml"
    - "{{ lookup('env', 'MOLECULE_PROJECT_DIRECTORY') }}/../../inventory/group_vars/all/packages_archlinux.yml"
    - "{{ lookup('env', 'MOLECULE_PROJECT_DIRECTORY') }}/../../inventory/group_vars/all/packages_ubuntu.yml"
    - "{{ lookup('env', 'MOLECULE_PROJECT_DIRECTORY') }}/vars/main.yml"

  tasks:

    - name: Assert package inventory produced expected packages
      ansible.builtin.assert:
        that:
          - _packages_verify_all | length > 0
        fail_msg: "Package inventory produced an empty expected package list"
        success_msg: "Package inventory produced {{ _packages_verify_all | length }} expected packages"
        quiet: true

    - name: Gather installed package facts
      ansible.builtin.package_facts:
        manager: auto
      changed_when: false

    - name: Assert expected packages are installed
      ansible.builtin.assert:
        that:
          - item in ansible_facts.packages
        fail_msg: >-
          Package '{{ item }}' is not installed on
          {{ ansible_facts['distribution'] }} {{ ansible_facts['distribution_version'] }}.
        success_msg: "Package '{{ item }}' is installed"
        quiet: true
      loop: "{{ _packages_verify_all }}"
      loop_control:
        label: "{{ item }}"
