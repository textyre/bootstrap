---
# Verification categories covered: installed package state
# Verification categories skipped:
#   config files  — role does not write any configuration files
#   services      — role does not manage any service units
#   runtime       — role does not start any daemons or network interfaces
#   permissions   — role does not create files with specific ownership or mode

- name: Verify packages role
  hosts: all
  become: true
  gather_facts: true
  vars_files:
    - "{{ lookup('env', 'MOLECULE_PROJECT_DIRECTORY') }}/../../inventory/group_vars/all/packages.yml"
    - "{{ lookup('env', 'MOLECULE_PROJECT_DIRECTORY') }}/vars/main.yml"

  tasks:

    - name: Include package backend variables
      ansible.builtin.include_vars: "{{ item }}"
      with_first_found:
        - files:
            - "{{ ansible_facts['os_family'] | lower }}.yml"
          paths:
            - "{{ lookup('env', 'MOLECULE_PROJECT_DIRECTORY') }}/vars"
          skip: true

    - name: Assert package inventory produced expected packages
      ansible.builtin.assert:
        that:
          - _packages_verify_all | length > 0
          - _packages_backend_verify_argv is defined
          - (_packages_backend_verify_argv | default([])) | length > 0
        fail_msg: "Package backend produced an empty package list or verify command"
        success_msg: "Package inventory produced {{ _packages_verify_all | length }} expected packages"
        quiet: true

    - name: Verify expected package installed through backend
      ansible.builtin.command:
        argv: "{{ _packages_backend_verify_argv + [item] }}"
      register: _packages_molecule_verify_package
      changed_when: false
      failed_when: >-
        _packages_molecule_verify_package.rc != 0 or
        (_packages_backend_verify_success_text | default('') | length > 0 and
         _packages_backend_verify_success_text not in _packages_molecule_verify_package.stdout)
      loop: "{{ _packages_verify_all }}"
      loop_control:
        label: "{{ item }}"
