---
# Monitor mode used by Xorg.
# "auto" leaves mode selection to the monitor/virtual display and Xorg.
# Set an advertised mode such as "2560x1440" to select it explicitly.
xorg_monitor_mode: auto

# Xorg video driver used only when xorg_monitor_mode is not "auto".
# Use the driver that owns the display device, for example modesetting or nvidia.
xorg_monitor_driver: modesetting

# Optional timing values for a mode not advertised by the monitor.
# Example for 2560x1440_60.00:
# "312.25 2560 2752 3024 3488 1440 1443 1448 1493 -hsync +vsync"
xorg_monitor_modeline: ""
