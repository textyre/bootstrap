---
- name: Prepare Xorg configuration source
  hosts: all
  become: true
  gather_facts: false
  tasks:
    - name: Create test dotfiles directory
      ansible.builtin.file:
        path: /tmp/xorg_test_dotfiles/etc/X11/xorg.conf.d
        state: directory
        mode: "0755"

    - name: Copy repository Xorg configuration into the test host
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../../../../../dotfiles/etc/X11/xorg.conf.d/"
        dest: /tmp/xorg_test_dotfiles/etc/X11/xorg.conf.d/
        mode: "0644"
