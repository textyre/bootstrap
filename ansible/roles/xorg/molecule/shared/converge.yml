---
- name: Converge
  hosts: all
  become: true
  gather_facts: true

  tasks:
    - name: Import shared converge tasks
      ansible.builtin.import_tasks: converge_apply_tasks.yml

- name: Negative test — invalid xorg_source_dir
  hosts: all
  become: true
  gather_facts: true

  tasks:
    - name: Import shared negative converge tasks
      ansible.builtin.import_tasks: converge_negative_tasks.yml
