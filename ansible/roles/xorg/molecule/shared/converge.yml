---
- name: Converge
  hosts: all
  become: true
  gather_facts: true

  tasks:
    - name: Import shared converge tasks
      ansible.builtin.import_tasks: tasks/converge_apply.yml

- name: Negative test — invalid xorg_source_dir
  hosts: all
  become: true
  gather_facts: true

  tasks:
    - name: Import shared negative converge tasks
      ansible.builtin.import_tasks: tasks/converge_negative.yml
