---
- name: Prepare
  hosts: all
  become: true
  gather_facts: false

  tasks:
    - name: Detect OS release for bootstrap
      ansible.builtin.raw: cat /etc/os-release
      register: _xorg_vagrant_os_release
      changed_when: false

    - name: Ensure Python is available on Archlinux guests
      ansible.builtin.raw: pacman -Sy --noconfirm python
      changed_when: false
      when: "'ID=arch' in _xorg_vagrant_os_release.stdout"

    - name: Gather facts after Python bootstrap
      ansible.builtin.setup:

    - name: Create dotfiles source directory structure
      ansible.builtin.file:
        path: /tmp/xorg_test_dotfiles/etc/X11/xorg.conf.d
        state: directory
        mode: '0755'

    - name: Create 00-keyboard.conf in test dotfiles
      ansible.builtin.copy:
        dest: /tmp/xorg_test_dotfiles/etc/X11/xorg.conf.d/00-keyboard.conf
        content: |
          # /etc/X11/xorg.conf.d/00-keyboard.conf
          # Keyboard layout: US + RU, toggle with Ctrl+Space

          Section "InputClass"
              Identifier "keyboard-layout"
              MatchIsKeyboard "on"
              Option "XkbLayout" "us,ru"
              Option "XkbOptions" "grp:ctrl_space_toggle"
          EndSection
        mode: '0644'

    - name: Create 10-monitor.conf in test dotfiles
      ansible.builtin.copy:
        dest: /tmp/xorg_test_dotfiles/etc/X11/xorg.conf.d/10-monitor.conf
        content: |
          # /etc/X11/xorg.conf.d/10-monitor.conf
          # Xorg monitor configuration example

          Section "Monitor"
              Identifier "Monitor0"
              Modeline "2560x1440_60.00"  312.25  2560 2752 3024 3488  1440 1443 1448 1493 -hsync +vsync
              Option "PreferredMode" "2560x1440_60.00"
          EndSection

          Section "Device"
              Identifier "Card0"
              Driver "modesetting"
          EndSection

          Section "Screen"
              Identifier "Screen0"
              Device "Card0"
              Monitor "Monitor0"

              SubSection "Display"
                  Depth 24
                  Modes "2560x1440_60.00"
              EndSubSection
          EndSection
        mode: '0644'
