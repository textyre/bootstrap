---
# === Xorg system configuration ===
# configure -> report

- name: Configure Xorg
  ansible.builtin.include_tasks:
    file: configure/main.yml

- name: Record Xorg configuration
  ansible.builtin.include_role:
    name: common
    tasks_from: report_phase.yml
  vars:
    common_rpt_fact: "_xorg_phases"
    common_rpt_phase: "Configure"
    common_rpt_detail: >-
      files={{ (_xorg_system_files | length) + 1 }}
      monitor={{ xorg_monitor_mode }}

- name: Render Xorg execution report
  ansible.builtin.include_role:
    name: common
    tasks_from: report_render.yml
  vars:
    common_rpt_fact: "_xorg_phases"
    common_rpt_title: "xorg"
