---
- name: Verify timezone role
  hosts: all
  become: true
  gather_facts: true
  vars_files:
    - >-
      {{ (lookup('env', 'REPO_ROOT') ~ '/ansible/inventory/group_vars/all/system.yml')
         if (lookup('env', 'REPO_ROOT') | length > 0)
         else (lookup('env', 'MOLECULE_PROJECT_DIRECTORY') ~ '/../../inventory/group_vars/all/system.yml') }}

  tasks:

    - name: Load timezone OS-specific variables
      ansible.builtin.include_vars: >-
        {{ (lookup('env', 'REPO_ROOT') ~ '/ansible/roles/timezone/vars/' ~ (ansible_facts['os_family'] | lower) ~ '.yml')
           if (lookup('env', 'REPO_ROOT') | length > 0)
           else (lookup('env', 'MOLECULE_PROJECT_DIRECTORY') ~ '/vars/' ~ (ansible_facts['os_family'] | lower) ~ '.yml') }}

    # ---- /etc/localtime is a symlink ----

    - name: Stat /etc/localtime
      ansible.builtin.stat:
        path: /etc/localtime
      register: _timezone_verify_localtime_stat

    - name: Assert /etc/localtime exists and is a symlink
      ansible.builtin.assert:
        that:
          - _timezone_verify_localtime_stat.stat.exists
          - _timezone_verify_localtime_stat.stat.islnk
        fail_msg: "/etc/localtime does not exist or is not a symlink"

    # ---- /etc/localtime points to correct timezone ----

    - name: Read /etc/localtime symlink target
      ansible.builtin.command: readlink -f /etc/localtime
      register: _timezone_verify_localtime_target
      changed_when: false
      failed_when: _timezone_verify_localtime_target.rc != 0

    - name: Assert /etc/localtime points to expected timezone
      ansible.builtin.assert:
        that:
          - _timezone_verify_localtime_target.stdout == '/usr/share/zoneinfo/' ~ timezone_name
        fail_msg: >-
          Expected '/usr/share/zoneinfo/{{ timezone_name }}',
          got '{{ _timezone_verify_localtime_target.stdout }}'

    # ---- timedatectl (systemd hosts only) ----

    - name: Check timezone via timedatectl (systemd)
      ansible.builtin.command: timedatectl show --property=Timezone --value
      register: _timezone_verify_timedatectl
      changed_when: false
      failed_when: false
      when: ansible_facts['service_mgr'] == 'systemd'

    - name: Assert timedatectl reports expected timezone (systemd)
      ansible.builtin.assert:
        that:
          - _timezone_verify_timedatectl.rc == 0
          - _timezone_verify_timedatectl.stdout == timezone_name
        fail_msg: >-
          timedatectl failed or reported a different timezone:
          rc={{ _timezone_verify_timedatectl.rc }},
          stdout='{{ _timezone_verify_timedatectl.stdout }}',
          stderr='{{ _timezone_verify_timedatectl.stderr }}',
          expected='{{ timezone_name }}'
      when: ansible_facts['service_mgr'] == 'systemd'

    # ---- tzdata package installed ----

    - name: Gather package facts
      ansible.builtin.package_facts:
        manager: auto

    - name: Assert tzdata package is installed
      ansible.builtin.assert:
        that:
          - >-
            _timezone_tzdata_package in ansible_facts.packages or
            (_timezone_tzdata_package | regex_replace('^.*/', '')) in ansible_facts.packages
        fail_msg: "Timezone database package '{{ _timezone_tzdata_package }}' not found in installed packages"

    # ---- cron restart: service running when present ----
    # Docker: cron on Arch (restart path can run), absent on Ubuntu (skip path)
    # Vagrant/default: cron may or may not be installed — assertion conditional

    - name: Gather service facts for cron check
      ansible.builtin.service_facts:

    - name: Determine expected cron service name
      ansible.builtin.set_fact:
        _timezone_verify_cron_name: >-
          {{ _timezone_cron_service.get(
               ansible_facts['service_mgr'],
               _timezone_cron_service.get('default', 'cron')
             ) }}

    - name: Assert cron service is running (when present)
      ansible.builtin.assert:
        that:
          - >-
            ansible_facts.services[_timezone_verify_cron_name ~ '.service']['state'] == 'running'
        fail_msg: >-
          Cron service '{{ _timezone_verify_cron_name }}' expected running,
          got {{ ansible_facts.services.get(_timezone_verify_cron_name ~ '.service', {}).get('state', 'not found') }}
      when:
        - (_timezone_verify_cron_name ~ '.service') in ansible_facts.services

    - name: Show cron restart skip (when absent)
      ansible.builtin.debug:
        msg: "Cron service '{{ _timezone_verify_cron_name }}' not installed; restart skip path confirmed"
      when:
        - (_timezone_verify_cron_name ~ '.service') not in ansible_facts.services
        - _timezone_verify_cron_name not in ansible_facts.services

    # ---- /etc/timezone file (Debian/Ubuntu, non-systemd only) ----
    # NOTE: community.general.timezone on systemd hosts uses timedatectl
    # which updates /etc/localtime but does NOT update /etc/timezone.
    # We verify /etc/timezone only on non-systemd hosts where the module
    # manages it directly. On systemd, timedatectl assertion above covers this.

    - name: Stat /etc/timezone
      ansible.builtin.stat:
        path: /etc/timezone
      register: _timezone_verify_etc_timezone_stat
      when: ansible_facts['service_mgr'] != 'systemd'

    - name: Read /etc/timezone content
      ansible.builtin.slurp:
        src: /etc/timezone
      register: _timezone_verify_etc_timezone_raw
      when:
        - ansible_facts['service_mgr'] != 'systemd'
        - _timezone_verify_etc_timezone_stat.stat.exists | default(false)

    - name: Assert /etc/timezone matches expected value (Debian/Ubuntu, non-systemd)
      ansible.builtin.assert:
        that:
          - "'content' in _timezone_verify_etc_timezone_raw"
          - (_timezone_verify_etc_timezone_raw.content | b64decode | trim) == timezone_name
        fail_msg: >-
          /etc/timezone expected '{{ timezone_name }}',
          got '{{ _timezone_verify_etc_timezone_raw.content | b64decode | trim }}'
      when:
        - ansible_facts['service_mgr'] != 'systemd'
        - _timezone_verify_etc_timezone_stat.stat.exists | default(false)

    # ---- date command confirms timezone offset ----

    - name: Get current date output
      ansible.builtin.command: date +%Z
      register: _timezone_verify_date_output
      changed_when: false
      failed_when: _timezone_verify_date_output.rc != 0

    - name: Show timezone abbreviation from date
      ansible.builtin.debug:
        msg: "System date reports timezone abbreviation: {{ _timezone_verify_date_output.stdout }}"

    # ---- timezone name validation ----

    - name: Assert timezone zone file exists in tz database
      ansible.builtin.stat:
        path: "/usr/share/zoneinfo/{{ timezone_name }}"
      register: _timezone_verify_zoneinfo

    - name: Assert timezone_name is valid
      ansible.builtin.assert:
        that:
          - _timezone_verify_zoneinfo.stat.exists
        fail_msg: "Timezone '{{ timezone_name }}' not found in /usr/share/zoneinfo/"

    # ---- negative test: invalid timezone rejected ----
    # No check_mode — module validates timezone name against tz database
    # and fails BEFORE making any state change. Invalid name does not
    # exist in /usr/share/zoneinfo/ so module fails at validation,
    # never touching /etc/localtime.

    - name: Attempt to set invalid timezone (negative test)
      block:
        - name: Set invalid timezone candidate
          community.general.timezone:
            name: "Invalid/NotATimezone"
      rescue:
        - name: Record invalid timezone rejection
          ansible.builtin.set_fact:
            _timezone_verify_invalid_rejected: true

    - name: Assert invalid timezone is rejected
      ansible.builtin.assert:
        that:
          - _timezone_verify_invalid_rejected | default(false) | bool
        fail_msg: "Invalid timezone was NOT rejected by the timezone module"

    # ---- Summary ----

    - name: Show verify result
      ansible.builtin.debug:
        msg: >-
          timezone verify passed on
          {{ ansible_facts['distribution'] }} {{ ansible_facts['distribution_version'] }}:
          /etc/localtime -> {{ _timezone_verify_localtime_target.stdout }},
          {{ _timezone_tzdata_package }} installed,
          date TZ={{ _timezone_verify_date_output.stdout }}
