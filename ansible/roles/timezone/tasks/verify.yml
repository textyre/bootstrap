---
# === Таймзона — in-role verification (ROLE-005) ===

- name: Verify /etc/localtime target
  ansible.builtin.include_tasks: verify/localtime.yml
  tags: ['timezone']

- name: Verify timezone through timedatectl
  ansible.builtin.include_tasks: verify/systemd/main.yml
  when: ansible_facts['service_mgr'] == 'systemd'
  tags: ['timezone']

- name: Verify timezone database package
  ansible.builtin.include_tasks: verify/tzdata.yml
  tags: ['timezone']
