---
# === Configure additional users ===

- name: Configure additional user accounts
  ansible.builtin.user:
    name: "{{ item.name }}"
    shell: "{{ item.shell | default('/bin/bash') }}"
    groups: "{{ item.groups | default([]) }}"
    append: true
    create_home: true
    password: "{{ item.password_hash if item.password_hash | default('') | length > 0 else omit }}"
    update_password: "{{ item.update_password | default('on_create') }}"
  loop: "{{ user_additional_users }}"
  loop_control:
    label: "{{ item.name }}"
  no_log: true
  tags: [user]

- name: Grant administrative access to additional users
  ansible.builtin.user:
    name: "{{ item.name }}"
    groups: "{{ _user_sudo_group }}"
    append: true
  loop: "{{ user_additional_users }}"
  loop_control:
    label: "{{ item.name }}"
  when: item.sudo | default(false) | bool
  tags: [user]

- name: Configure additional user password expiration
  ansible.builtin.user:
    name: "{{ item.name }}"
    password_expire_max: "{{ item.password_max_age | default(omit) }}"
    password_expire_min: "{{ item.password_min_age | default(omit) }}"
    password_expire_warn: "{{ item.password_warn_age | default(7) }}"
  loop: "{{ user_additional_users }}"
  loop_control:
    label: "{{ item.name }}"
  when: user_manage_password_aging | bool
  tags: [user, cis_5.4.1, cis_5.5.1, cis_5.5.2]

- name: Configure additional user umask
  ansible.builtin.template:
    src: user_umask.sh.j2
    dest: "/etc/profile.d/umask-{{ item.name }}.sh"
    owner: root
    group: root
    mode: "0644"
  vars:
    umask_user: "{{ item.name }}"
    umask_value: "{{ item.umask | default('077') }}"
  loop: "{{ user_additional_users }}"
  loop_control:
    label: "{{ item.name }}"
  when: user_manage_umask | bool
  tags: [user, cis_5.4.2]

- name: "Report: Configure additional users"
  ansible.builtin.include_role:
    name: common
    tasks_from: report_phase.yml
  vars:
    common_rpt_fact: "_user_phases"
    common_rpt_phase: "Additional users"
    common_rpt_detail: "count={{ user_additional_users | length }}"
    common_rpt_status: "{{ 'done' if user_additional_users | length > 0 else 'skip' }}"
