---
# === In-role verification (ROLE-005) ===
# Uses read-only checks: getent, command with changed_when: false, stat.
# Must not modify state.

# ------------------------------------------------------------------
# Owner user — existence and groups
# ------------------------------------------------------------------

- name: "Verify owner user exists in passwd"
  ansible.builtin.getent:
    database: passwd
    key: "{{ user_owner.name }}"
  register: _user_verify_owner
  changed_when: false
  tags: [user]

- name: "Verify owner is in sudo group"
  ansible.builtin.command:
    cmd: "groups {{ user_owner.name }}"
  register: _user_verify_groups
  changed_when: false
  failed_when: user_sudo_group not in _user_verify_groups.stdout
  when: user_sudo_group in (user_owner.groups | default([]))
  tags: [user]

# ------------------------------------------------------------------
# Sudoers file — existence, syntax, permissions
# ------------------------------------------------------------------

- name: "Verify sudoers file exists"
  ansible.builtin.stat:
    path: "/etc/sudoers.d/{{ user_sudo_group }}"
  register: _user_verify_sudoers_stat
  failed_when: not _user_verify_sudoers_stat.stat.exists
  tags: [user]

- name: "Verify sudoers file syntax"
  ansible.builtin.command:
    cmd: "/usr/sbin/visudo -cf /etc/sudoers.d/{{ user_sudo_group }}"
  register: _user_verify_sudoers_syntax
  changed_when: false
  failed_when: _user_verify_sudoers_syntax.rc != 0
  tags: [user]

- name: "Verify sudoers file content"
  ansible.builtin.slurp:
    src: "/etc/sudoers.d/{{ user_sudo_group }}"
  register: _user_verify_sudoers_raw
  tags: [user]

- name: "Assert sudoers contains expected directives"
  ansible.builtin.assert:
    that:
      - "'%' ~ user_sudo_group ~ ' ALL=(ALL:ALL) ALL' in (_user_verify_sudoers_raw.content | b64decode)"
      - "'timestamp_timeout=' in (_user_verify_sudoers_raw.content | b64decode)"
      - "'logfile=' in (_user_verify_sudoers_raw.content | b64decode)"
    fail_msg: "Sudoers file missing required directives (group rule, timestamp_timeout, or logfile)"
    success_msg: "Sudoers file contains all required directives"
  tags: [user]

# ------------------------------------------------------------------
# Umask profile — owner
# ------------------------------------------------------------------

- name: "Verify umask profile deployed for owner"
  ansible.builtin.stat:
    path: "/etc/profile.d/umask-{{ user_owner.name }}.sh"
  register: _user_verify_umask
  failed_when: not _user_verify_umask.stat.exists
  when: user_manage_umask | bool
  tags: [user]

# ------------------------------------------------------------------
# Password aging — owner (CIS 5.5.1, 5.5.2)
# ------------------------------------------------------------------

- name: "Verify owner password aging via shadow"
  ansible.builtin.getent:
    database: shadow
    key: "{{ user_owner.name }}"
  register: _user_verify_owner_shadow
  changed_when: false
  no_log: true
  when: user_manage_password_aging | bool
  tags: [user, cis_5.5.1, cis_5.5.2]

- name: "Assert owner password_max_age is set"
  ansible.builtin.assert:
    that:
      - _user_verify_owner_shadow.ansible_facts.getent_shadow[user_owner.name][3] | int == (user_owner.password_max_age | default(365))
    fail_msg: >-
      Owner password_max_age mismatch: expected {{ user_owner.password_max_age | default(365) }},
      got {{ _user_verify_owner_shadow.ansible_facts.getent_shadow[user_owner.name][3] }}
    success_msg: "Owner password_max_age is correct"
  when: user_manage_password_aging | bool
  tags: [user, cis_5.5.1]

- name: "Assert owner password_min_age is set"
  ansible.builtin.assert:
    that:
      - _user_verify_owner_shadow.ansible_facts.getent_shadow[user_owner.name][2] | int == (user_owner.password_min_age | default(1))
    fail_msg: >-
      Owner password_min_age mismatch: expected {{ user_owner.password_min_age | default(1) }},
      got {{ _user_verify_owner_shadow.ansible_facts.getent_shadow[user_owner.name][2] }}
    success_msg: "Owner password_min_age is correct"
  when: user_manage_password_aging | bool
  tags: [user, cis_5.5.2]

# ------------------------------------------------------------------
# Root lock (CIS 5.4.3)
# ------------------------------------------------------------------

- name: "Verify root account lock status"
  ansible.builtin.getent:
    database: shadow
    key: root
  register: _user_verify_root_shadow
  changed_when: false
  no_log: true
  when: user_verify_root_lock | bool
  tags: [user, security, cis_5.4.3]

- name: "Assert root password is locked"
  ansible.builtin.assert:
    that:
      - _user_verify_root_shadow.ansible_facts.getent_shadow['root'][0] is regex('^[!*]')
    fail_msg: "CIS 5.4.3 FAIL: root account has a usable password"
    success_msg: "CIS 5.4.3 PASS: root account is locked"
  when: user_verify_root_lock | bool
  tags: [user, security, cis_5.4.3]

# ------------------------------------------------------------------
# Logrotate for sudo.log
# ------------------------------------------------------------------

- name: "Verify logrotate config for sudo.log"
  ansible.builtin.stat:
    path: /etc/logrotate.d/sudo
  register: _user_verify_logrotate
  failed_when: not _user_verify_logrotate.stat.exists
  when:
    - user_sudo_logrotate_enabled | bool
    - user_sudo_logfile | length > 0
  tags: [user]

# ------------------------------------------------------------------
# Absent users removed
# ------------------------------------------------------------------

- name: "Verify absent users are removed"
  ansible.builtin.command:
    cmd: "getent passwd {{ item.name }}"
  register: _user_verify_absent
  changed_when: false
  failed_when: _user_verify_absent.rc == 0
  loop: >-
    {{ (accounts | default([]))
       | selectattr('state', 'defined')
       | selectattr('state', 'equalto', 'absent')
       | list }}
  loop_control:
    label: "{{ item.name }}"
  tags: [user, security]

# ------------------------------------------------------------------
# Report
# ------------------------------------------------------------------

- name: "Report: verification"
  ansible.builtin.include_role:
    name: common
    tasks_from: report_phase.yml
  vars:
    common_rpt_fact: "_user_phases"
    common_rpt_phase: "Verify"
    common_rpt_detail: >-
      owner={{ user_owner.name }}
      sudoers=ok
      umask={{ 'ok' if user_manage_umask | bool else 'skip' }}
      aging={{ 'ok' if user_manage_password_aging | bool else 'skip' }}
      root_lock={{ 'ok' if user_verify_root_lock | bool else 'skip' }}
      logrotate={{ 'ok' if (user_sudo_logrotate_enabled | bool and user_sudo_logfile | length > 0) else 'skip' }}
      absent={{ (accounts | default([]))
                | selectattr('state', 'defined')
                | selectattr('state', 'equalto', 'absent')
                | list | length }}
  tags: [user, report]
