---
# === user: security phase ===

- name: "CIS 5.4.3 | Lock root password (enforce no direct root login)"
  ansible.builtin.user:
    name: root
    password_lock: true
  when: user_manage_root_lock | bool
  tags: [user, security, cis_5.4.3]

- name: "Report: Configure account security"
  ansible.builtin.include_role:
    name: common
    tasks_from: report_phase.yml
  vars:
    common_rpt_fact: "_user_phases"
    common_rpt_phase: "Account security"
    common_rpt_detail: "root_lock={{ user_manage_root_lock | bool }}"
    common_rpt_status: "{{ 'done' if user_manage_root_lock | bool else 'skip' }}"
