---
# === Configure the primary user ===

- name: Configure primary user account
  ansible.builtin.user:
    name: "{{ user_owner.name }}"
    shell: "{{ user_owner.shell }}"
    groups: "{{ user_owner.groups }}"
    append: true
    create_home: true
    password: "{{ user_owner.password_hash if user_owner.password_hash | length > 0 else omit }}"
    update_password: "{{ user_owner.update_password }}"
  no_log: true
  tags: [user]

- name: Configure primary user password expiration
  ansible.builtin.user:
    name: "{{ user_owner.name }}"
    password_expire_max: "{{ user_owner.password_max_age }}"
    password_expire_min: "{{ user_owner.password_min_age }}"
    password_expire_warn: "{{ user_owner.password_warn_age }}"
  when: user_manage_password_aging | bool
  tags: [user, cis_5.4.1, cis_5.5.1, cis_5.5.2]

- name: Configure primary user umask
  ansible.builtin.template:
    src: user_umask.sh.j2
    dest: "/etc/profile.d/umask-{{ user_owner.name }}.sh"
    owner: root
    group: root
    mode: "0644"
  vars:
    umask_user: "{{ user_owner.name }}"
    umask_value: "{{ user_owner.umask }}"
  when: user_manage_umask | bool
  tags: [user, cis_5.4.2]

- name: "Report: Configure primary user"
  ansible.builtin.include_role:
    name: common
    tasks_from: report_phase.yml
  vars:
    common_rpt_fact: "_user_phases"
    common_rpt_phase: "Primary user"
    common_rpt_detail: >-
      user={{ user_owner.name }},
      shell={{ user_owner.shell }},
      aging={{ user_manage_password_aging | bool }},
      umask={{ user_manage_umask | bool }}
