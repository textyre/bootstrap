---
# === user — local accounts and sudo policy ===
# validate -> load vars -> owner -> additional users -> sudo -> security -> report

- name: Configure local accounts and sudo policy
  tags: ['user']
  block:
    - name: Validate user role prerequisites
      ansible.builtin.include_tasks:
        file: validate/main.yml

    - name: Load user platform variables
      ansible.builtin.include_tasks:
        file: load/main.yml

    - name: Configure owner account
      ansible.builtin.include_tasks:
        file: owner.yml

    - name: Configure additional accounts
      ansible.builtin.include_tasks:
        file: additional_users.yml

    - name: Configure sudo policy
      ansible.builtin.include_tasks:
        file: sudo.yml

    - name: Configure account security state
      ansible.builtin.include_tasks:
        file: security.yml

    - name: Render user execution report
      ansible.builtin.include_tasks:
        file: report/main.yml
