---
- name: Verify user role behavior
  hosts: all
  become: true
  gather_facts: false

  tasks:
    - name: Verify administrative user is allowed to run commands through sudo
      ansible.builtin.command:
        argv:
          - /usr/bin/sudo
          - -U
          - testuser_with_sudo
          - -l
          - /usr/bin/true
      changed_when: false

    - name: Verify regular user is denied access to sudo
      ansible.builtin.command:
        argv:
          - /usr/bin/sudo
          - -U
          - testuser_extra
          - -l
          - /usr/bin/true
      register: _user_sudo_denied
      changed_when: false
      failed_when: _user_sudo_denied.rc not in [0, 1]

    - name: Assert regular user is denied access to sudo
      ansible.builtin.assert:
        that:
          - _user_sudo_denied.rc == 1
        fail_msg: testuser_extra unexpectedly has sudo access

    - name: Read umask from managed user login sessions
      ansible.builtin.command:
        argv:
          - /usr/bin/su
          - "-"
          - "{{ item.name }}"
          - -c
          - umask
      loop:
        - name: testuser_owner
          umask: "0027"
        - name: testuser_extra
          umask: "0077"
        - name: testuser_with_sudo
          umask: "0077"
      loop_control:
        label: "{{ item.name }}"
      register: _user_login_umasks
      changed_when: false

    - name: Assert managed umasks apply in login sessions
      ansible.builtin.assert:
        that:
          - item.stdout | trim == item.item.umask
        fail_msg: >-
          {{ item.item.name }} login umask is {{ item.stdout | trim }},
          expected {{ item.item.umask }}
      loop: "{{ _user_login_umasks.results }}"
      loop_control:
        label: "{{ item.item.name }}"
