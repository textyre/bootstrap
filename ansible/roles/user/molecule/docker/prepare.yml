---
- name: Prepare
  hosts: all
  become: true
  gather_facts: true
  tasks:
    - name: Ensure video group exists (required by testuser_extra)
      ansible.builtin.group:
        name: video
        state: present

    - name: Ensure logrotate is installed (for sudo logrotate test)
      ansible.builtin.package:
        name: logrotate
        state: present

    - name: Create testuser_toberemoved (will be removed by role during converge)
      ansible.builtin.user:
        name: testuser_toberemoved
        state: present
        create_home: false
