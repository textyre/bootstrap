---
# === user role — defaults ===

# --- Primary owner (always one, admin of the machine) ---
user_owner:
  # Primary local administrator account. Defaults to the project target user when set.
  name: "{{ user_name | default(ansible_facts['env']['SUDO_USER'] | default(ansible_facts['user_id'])) }}"
  # Login shell for the owner account. The shell role owns shell package/config setup.
  shell: "{{ user_shell | default('/bin/bash') }}"
  # Supplementary groups. Defaults to the platform sudo group.
  groups: "{{ user_groups | default([_user_sudo_group]) }}"
  # Empty hash means no direct password login until a vaulted password hash is supplied.
  password_hash: ""
  # Keep password idempotent when a hash is supplied.
  update_password: on_create
  # CIS 5.4.2: restrictive default umask for the owner login shell.
  umask: "027"
  # CIS 5.5.1: maximum password age in days.
  password_max_age: 365
  # CIS 5.5.2: minimum password age in days.
  password_min_age: 1
  # Password expiry warning age in days.
  password_warn_age: 7

# --- Additional users (family, guests, etc.) ---
# Each entry supports the same fields as user_owner, plus:
#   sudo: true/false  — whether to add to the platform sudo group
user_additional_users: []
# Example:
# user_additional_users:
#   - name: alice
#     shell: /bin/bash
#     groups: [video, audio]
#     sudo: false
#     password_hash: "{{ vault_alice_password }}"
#     update_password: on_create
#     umask: "077"
#     password_max_age: 90
#     password_min_age: 0
#     password_warn_age: 7

# --- Feature toggles ---
user_manage_password_aging: true  # Set password max/min/warn ages.
user_manage_umask: true           # Deploy login-shell umask profiles for managed users.
user_manage_root_lock: true       # CIS 5.4.3: lock direct root password login.

# timestamp_timeout: profile-aware
# developer profile -> 15 min (comfortable for local workstation development)
# security profile  -> 0 min (re-enter password every time)
# default           -> 5 min (CIS 5.3.4 baseline)
user_sudo_timestamp_timeout: >-
  {{ 0 if 'security' in (workstation_profiles | default([]))
     else 15 if 'developer' in (workstation_profiles | default([]))
     else 5 }}

user_sudo_use_pty: true                # CIS 5.3.5: allocate a PTY for sudo sessions.
user_sudo_logfile: "/var/log/sudo.log" # CIS 5.3.7: audit trail for sudo commands.
user_sudo_log_input: false             # Record stdin of sudo sessions; can capture sensitive input.
user_sudo_log_output: false            # Record stdout/stderr of sudo sessions; can grow quickly.
user_sudo_passwd_timeout: 1            # Minutes allowed to enter a sudo password prompt.

# --- ROLE-010: User-provided sudo config overrides ---
# Additional sudoers directives merged into the template.
# Each key is a Defaults directive name, value is the directive value.
# Example: { env_reset: true, secure_path: "/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin" }
user_sudo_config_overwrite: {}

# Logrotate for sudo.log
user_sudo_logrotate_enabled: true      # Deploy sudo.log rotation policy.
user_sudo_logrotate_frequency: "weekly"
user_sudo_logrotate_rotate: 13         # 13 weeks is roughly 90 days of weekly sudo logs.
