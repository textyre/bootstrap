---
- name: Converge
  hosts: all
  become: true
  gather_facts: true

  pre_tasks:
    - name: Ensure /dev/input exists (mock for GPM in container)
      ansible.builtin.file:
        path: /dev/input
        state: directory
        mode: '0755'
      when: ansible_facts['virtualization_type'] | default('') in ['docker', 'container', '']

  roles:
    - role: vconsole
