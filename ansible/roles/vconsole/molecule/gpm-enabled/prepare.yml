---
- name: Prepare -- set up container for vconsole GPM testing
  hosts: all
  become: true
  gather_facts: true

  tasks:
    - name: Update pacman package cache (Arch)
      community.general.pacman:
        update_cache: true
      when: ansible_facts['os_family'] == 'Archlinux'

    - name: Ensure kbd package is present (Arch -- provides loadkeys/setfont)
      community.general.pacman:
        name: kbd
        state: present
      when: ansible_facts['os_family'] == 'Archlinux'

    - name: Create /dev/input directory for GPM testing
      ansible.builtin.file:
        path: /dev/input
        state: directory
        mode: '0755'
