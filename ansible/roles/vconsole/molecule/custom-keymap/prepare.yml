---
- name: Prepare -- set up container for vconsole custom keymap testing
  hosts: all
  become: true
  gather_facts: true

  tasks:
    - name: Update pacman package cache (Arch)
      community.general.pacman:
        update_cache: true
      when: ansible_facts['os_family'] == 'Archlinux'

    - name: Ensure kbd package is present (Arch)
      community.general.pacman:
        name: kbd
        state: present
      when: ansible_facts['os_family'] == 'Archlinux'

    - name: Create files directory for custom keymap
      ansible.builtin.file:
        path: /tmp/molecule/files
        state: directory
        mode: '0755'

    - name: Create dummy custom keymap file
      ansible.builtin.copy:
        content: |
          # Custom test keymap
          # Based on US keymap with modifications
          include "qwerty/us"
        dest: /tmp/molecule/files/custom-test.map
        mode: '0644'
