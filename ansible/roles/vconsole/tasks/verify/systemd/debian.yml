---
# === Verify console keymap: systemd on Debian/Ubuntu ===

- name: Check keyboard-setup.service exists  # noqa: command-instead-of-module
  ansible.builtin.command: systemctl cat keyboard-setup.service
  changed_when: false
  tags: ['vconsole']

- name: Get current kernel console keymap
  ansible.builtin.command: dumpkeys --keys-only --console=/dev/tty0
  register: _vconsole_debian_dumpkeys_output
  changed_when: false
  tags: ['vconsole']

- name: Assert console keymap was applied (Debian family)
  ansible.builtin.assert:
    that:
      - >-
        _vconsole_debian_dumpkeys_output.stdout is search(
          '(?m)^keycode\\s+16\\s+=\\s+\\+?q\\s*$'
        )
      - >-
        _vconsole_debian_dumpkeys_output.stdout is search(
          '(?m)^keycode\\s+30\\s+=\\s+\\+?a\\s*$'
        )
      - >-
        _vconsole_debian_dumpkeys_output.stdout is search(
          '(?m)^keycode\\s+44\\s+=\\s+\\+?z\\s*$'
        )
    fail_msg: >-
      Keymap '{{ vconsole_console }}' was not found in the running kernel
      console keymap. dumpkeys output: {{ _vconsole_debian_dumpkeys_output.stdout }}
    quiet: true
  when: vconsole_console == 'us'
  tags: ['vconsole']
