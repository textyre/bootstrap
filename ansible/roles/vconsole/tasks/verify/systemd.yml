---
# Verify keymap (systemd) — runtime check via localectl

- name: Check if systemd-vconsole-setup.service exists  # noqa: command-instead-of-module
  ansible.builtin.command: systemctl cat systemd-vconsole-setup.service
  register: _vconsole_service_check
  changed_when: false
  failed_when: false
  tags: ['vconsole']

- name: Inspect systemd-vconsole-setup.service metadata  # noqa: command-instead-of-module
  ansible.builtin.command: >-
    systemctl show systemd-vconsole-setup.service
    --property=LoadState
    --property=FragmentPath
    --property=UnitFileState
    --property=ActiveState
    --property=SubState
    --no-pager
  register: _vconsole_service_show
  changed_when: false
  failed_when: false
  tags: ['vconsole']

- name: Inspect systemd-vconsole-setup.service unit file paths
  ansible.builtin.stat:
    path: "{{ item }}"
  loop:
    - /usr/lib/systemd/system/systemd-vconsole-setup.service
    - /lib/systemd/system/systemd-vconsole-setup.service
    - /etc/systemd/system/systemd-vconsole-setup.service
  register: _vconsole_unit_paths
  tags: ['vconsole']

- name: Normalize systemd-vconsole unit path diagnostics
  ansible.builtin.set_fact:
    _vconsole_unit_path_stats: >-
      {{ _vconsole_unit_paths.results | map(attribute='stat') | list }}
  tags: ['vconsole']

- name: Report systemd-vconsole diagnostics
  ansible.builtin.debug:
    msg:
      distribution: "{{ ansible_facts['distribution'] }}"
      distribution_version: "{{ ansible_facts['distribution_version'] }}"
      os_family: "{{ ansible_facts['os_family'] }}"
      service_mgr: "{{ ansible_facts['service_mgr'] }}"
      virtualization_type: "{{ ansible_facts['virtualization_type'] | default('') }}"
      systemctl_cat_rc: "{{ _vconsole_service_check.rc }}"
      systemctl_cat_stdout: "{{ _vconsole_service_check.stdout }}"
      systemctl_cat_stderr: "{{ _vconsole_service_check.stderr }}"
      systemctl_show_rc: "{{ _vconsole_service_show.rc }}"
      systemctl_show_stdout: "{{ _vconsole_service_show.stdout }}"
      systemctl_show_stderr: "{{ _vconsole_service_show.stderr }}"
      unit_paths: "{{ _vconsole_unit_path_stats }}"
  tags: ['vconsole']

- name: Fail when systemd-vconsole runtime verification cannot run
  ansible.builtin.fail:
    msg: |-
      systemd-vconsole-setup.service is unavailable to systemctl cat, so
      localectl runtime verification cannot run.
      distribution={{ ansible_facts['distribution'] }}
      distribution_version={{ ansible_facts['distribution_version'] }}
      os_family={{ ansible_facts['os_family'] }}
      service_mgr={{ ansible_facts['service_mgr'] }}
      virtualization_type={{ ansible_facts['virtualization_type'] | default('') }}
      systemctl_cat_rc={{ _vconsole_service_check.rc }}
      systemctl_cat_stdout={{ _vconsole_service_check.stdout }}
      systemctl_cat_stderr={{ _vconsole_service_check.stderr }}
      systemctl_show_rc={{ _vconsole_service_show.rc }}
      systemctl_show_stdout={{ _vconsole_service_show.stdout }}
      systemctl_show_stderr={{ _vconsole_service_show.stderr }}
      unit_paths={{ _vconsole_unit_path_stats }}
  when: _vconsole_service_check.rc != 0
  tags: ['vconsole']

- name: Get current keymap from localectl
  ansible.builtin.command: localectl status
  register: _vconsole_localectl_output
  changed_when: false
  failed_when: false
  tags: ['vconsole']

- name: Report localectl diagnostics
  ansible.builtin.debug:
    msg:
      localectl_rc: "{{ _vconsole_localectl_output.rc }}"
      localectl_stdout: "{{ _vconsole_localectl_output.stdout }}"
      localectl_stderr: "{{ _vconsole_localectl_output.stderr }}"
  tags: ['vconsole']

- name: Fail when localectl runtime verification command fails
  ansible.builtin.fail:
    msg: |-
      localectl status failed, so keymap runtime verification cannot be
      trusted.
      localectl_rc={{ _vconsole_localectl_output.rc }}
      localectl_stdout={{ _vconsole_localectl_output.stdout }}
      localectl_stderr={{ _vconsole_localectl_output.stderr }}
  when: _vconsole_localectl_output.rc != 0
  tags: ['vconsole']

- name: Assert keymap was applied to running console
  ansible.builtin.assert:
    that:
      - "vconsole_console in _vconsole_localectl_output.stdout"
    fail_msg: >-
      Expected keymap '{{ vconsole_console }}' not found in localectl output.
      stdout={{ _vconsole_localectl_output.stdout }}
      stderr={{ _vconsole_localectl_output.stderr }}
    quiet: true
  tags: ['vconsole']
