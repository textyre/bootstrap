---
# === Validate vconsole configuration ===

- name: Assert supported operating system
  ansible.builtin.assert:
    that:
      - ansible_facts['os_family'] in _vconsole_supported_os
    fail_msg: >-
      OS family '{{ ansible_facts['os_family'] }}' is not supported.
      Supported: {{ _vconsole_supported_os | join(', ') }}
    success_msg: "OS family '{{ ansible_facts['os_family'] }}' is supported"
  tags: ['vconsole']

- name: Assert supported init system
  ansible.builtin.assert:
    that:
      - ansible_facts['service_mgr'] in vconsole_supported_inits
    fail_msg: >-
      Init system '{{ ansible_facts['service_mgr'] }}' is not supported.
      Supported: {{ vconsole_supported_inits | join(', ') }}
    success_msg: "Init system '{{ ansible_facts['service_mgr'] }}' is supported"
  tags: ['vconsole']

- name: Assert vconsole_console is defined and non-empty
  ansible.builtin.assert:
    that:
      - vconsole_console is defined
      - vconsole_console | length > 0
    fail_msg: >-
      vconsole_console must be set to a valid keymap name (e.g. 'us', 'ru').
      Current value: '{{ vconsole_console | default("") }}'
  tags: ['vconsole']

- name: Assert vconsole_console_map_src file exists if provided
  ansible.builtin.assert:
    that:
      - vconsole_console_map_src is file
    fail_msg: >-
      vconsole_console_map_src is set to '{{ vconsole_console_map_src }}' but the file does not exist.
      Provide a valid path to a .map file in your repository.
  when: _vconsole_has_custom_keymap
  tags: ['vconsole']
