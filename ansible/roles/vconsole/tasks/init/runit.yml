---
# === Console keymap: runit ===
# /etc/rc.conf KEYMAP= (Void Linux)

- name: Set console keymap (runit)
  ansible.builtin.lineinfile:
    path: /etc/rc.conf
    regexp: '^#?\s*KEYMAP='
    line: "KEYMAP={{ vconsole_value }}"
    create: true
    owner: root
    group: root
    mode: '0644'
  register: _vconsole_keymap
  tags: ['vconsole']

- name: Set console font (runit)
  ansible.builtin.lineinfile:
    path: /etc/rc.conf
    regexp: '^#?\s*FONT='
    line: "FONT={{ vconsole_console_font }}"
    create: true
    owner: root
    group: root
    mode: '0644'
  register: _vconsole_font
  tags: ['vconsole']

- name: Apply keymap (runit)
  ansible.builtin.command: "loadkeys {{ vconsole_value }}"
  changed_when: false
  when: _vconsole_keymap.changed  # noqa: no-handler
  tags: ['vconsole']

- name: Apply font (runit)
  ansible.builtin.command: "setfont {{ vconsole_console_font }}"
  changed_when: false
  when: _vconsole_font.changed  # noqa: no-handler
  tags: ['vconsole']
