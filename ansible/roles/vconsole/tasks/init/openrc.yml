---
# === Console keymap: OpenRC ===
# /etc/conf.d/keymaps (Gentoo, Alpine)

- name: Set console keymap (OpenRC)
  ansible.builtin.lineinfile:
    path: /etc/conf.d/keymaps
    regexp: '^#?\s*keymap='
    line: 'keymap="{{ vconsole_value }}"'
    create: true
    owner: root
    group: root
    mode: '0644'
  register: _vconsole_keymap
  tags: ['vconsole']

- name: Set console font (OpenRC)
  ansible.builtin.lineinfile:
    path: /etc/conf.d/consolefont
    regexp: '^#?\s*CONSOLEFONT='
    line: 'CONSOLEFONT="{{ vconsole_console_font }}"'
    create: true
    owner: root
    group: root
    mode: '0644'
  register: _vconsole_font
  tags: ['vconsole']

- name: Apply keymap (OpenRC)
  ansible.builtin.command: "loadkeys {{ vconsole_value }}"
  changed_when: false
  when: _vconsole_keymap.changed
  tags: ['vconsole']

- name: Apply font (OpenRC)
  ansible.builtin.command: "setfont {{ vconsole_console_font }}"
  changed_when: false
  when: _vconsole_font.changed
  tags: ['vconsole']
