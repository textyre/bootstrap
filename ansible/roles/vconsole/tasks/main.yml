---
# === Console keymap — orchestrator ===
# validate → keymap → font → configure → verify → report

- name: Vconsole role
  tags: ['vconsole']
  block:

    # ---- Validate ----

    - name: Validate vconsole configuration
      ansible.builtin.include_tasks: validate/main.yml
      tags: ['vconsole']

    # ---- Load distro-specific variables ----

    - name: Include distro-specific package variables
      ansible.builtin.include_vars: "{{ ansible_facts['os_family'] | lower }}.yml"
      tags: ['vconsole']

    # ---- Prepare (custom keymap + font) ----

    - name: Prepare custom keymap
      ansible.builtin.include_tasks: keymap.yml
      tags: ['vconsole']

    - name: Install console font
      ansible.builtin.include_tasks: font.yml
      tags: ['vconsole']

    # ---- Configure keymap (init-specific) ----

    - name: "Configure console keymap ({{ ansible_facts['service_mgr'] }})"
      ansible.builtin.include_tasks: "init/{{ ansible_facts['service_mgr'] }}.yml"
      tags: ['vconsole']

    # ---- GPM (mouse in TTY) ----

    - name: Configure GPM
      ansible.builtin.include_tasks: gpm/main.yml
      when: not _vconsole_is_container
      tags: ['vconsole']

    # ---- Verify ----

    - name: "Verify keymap ({{ ansible_facts['service_mgr'] }})"
      ansible.builtin.include_tasks: "verify/{{ ansible_facts['service_mgr'] }}.yml"
      tags: ['vconsole']

    - name: Verify GPM service
      ansible.builtin.include_tasks: gpm/verify.yml
      when: not _vconsole_is_container
      tags: ['vconsole']

    # ---- Report ----

    - name: "Vconsole — Execution Report"
      ansible.builtin.include_role:
        name: common
        tasks_from: report_render.yml
      vars:
        common_rpt_fact: "_vconsole_phases"
        common_rpt_title: "vconsole"
      tags: ['vconsole', 'report']
