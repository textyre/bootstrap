---
# configure -> report

- name: Configure Zen Browser
  ansible.builtin.include_tasks:
    file: configure/main.yml

- name: Record Zen Browser configuration
  ansible.builtin.include_role:
    name: common
    tasks_from: report_phase.yml
  vars:
    common_rpt_fact: "_zen_browser_phases"
    common_rpt_phase: "Configure"
    common_rpt_detail: "user={{ target_user }} handler={{ _zen_browser_desktop_file }}"

- name: Render Zen Browser execution report
  ansible.builtin.include_role:
    name: common
    tasks_from: report_render.yml
  vars:
    common_rpt_fact: "_zen_browser_phases"
    common_rpt_title: "zen_browser"
