---
- name: Prepare Zen Browser configuration target
  hosts: all
  become: true
  gather_facts: false
  tasks:
    - name: Install Zen Browser test prerequisites
      ansible.builtin.package:
        name:
          - acl
          - xdg-utils
        state: present

    - name: Create target user
      ansible.builtin.user:
        name: testuser
        create_home: true
        shell: /bin/bash
