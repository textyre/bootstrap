---
# === sysctl: load platform variables ===

- name: Include OS-specific sysctl variables
  ansible.builtin.include_vars: "{{ ansible_facts['os_family'] | lower }}/main.yml"

- name: "Report: Load sysctl variables"
  ansible.builtin.include_role:
    name: common
    tasks_from: report_phase.yml
  vars:
    common_rpt_fact: "_sysctl_phases"
    common_rpt_phase: "Load variables"
    common_rpt_detail: "{{ ansible_facts['os_family'] | lower }}/main.yml"
