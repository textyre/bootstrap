---
# === sysctl — kernel parameter tuning ===
# validate -> load vars -> detect -> install -> service -> configure -> report

- name: Sysctl role
  tags: ['sysctl']
  block:
    - name: Validate sysctl role inputs
      ansible.builtin.include_tasks:
        file: validate/main.yml

    - name: Load sysctl platform variables
      ansible.builtin.include_tasks:
        file: load/main.yml

    - name: Detect sysctl runtime environment
      ansible.builtin.include_tasks:
        file: detect/main.yml

    - name: Install sysctl package dependencies
      ansible.builtin.include_tasks:
        file: install/main.yml

    - name: Manage services that conflict with sysctl hardening
      ansible.builtin.include_tasks:
        file: service/main.yml

    - name: Configure kernel parameter drop-in
      ansible.builtin.include_tasks:
        file: configure/main.yml

    - name: Render sysctl execution report
      ansible.builtin.include_role:
        name: common
        tasks_from: report_render.yml
      vars:
        common_rpt_fact: "_sysctl_phases"
        common_rpt_title: "sysctl"
        common_rpt_footer_rows:
          - >-
            | {{ '%-26s' | format('Config file') }}
            | {{ '%-10s' | format('+ done') }}
            | {{ '%-24s' | format(_sysctl_config_file | truncate(24, True)) }} |
