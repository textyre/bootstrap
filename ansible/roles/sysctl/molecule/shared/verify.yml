---
- name: Verify sysctl role
  hosts: all
  become: true
  gather_facts: true

  vars:
    # Expected values derived from defaults/main.yml — not hardcoded.
    # Override these via molecule provisioner extra_vars when testing non-default profiles.
    _sysctl_expected_vm_swappiness: "{{ sysctl_vm_swappiness | default(10) }}"
    _sysctl_expected_vm_vfs_cache_pressure: "{{ sysctl_vm_vfs_cache_pressure | default(50) }}"
    _sysctl_expected_vm_dirty_ratio: "{{ sysctl_vm_dirty_ratio | default(10) }}"
    _sysctl_expected_vm_dirty_background_ratio: "{{ sysctl_vm_dirty_background_ratio | default(5) }}"
    _sysctl_expected_fs_inotify_max_user_watches: "{{ sysctl_fs_inotify_max_user_watches | default(524288) }}"
    _sysctl_expected_fs_inotify_max_user_instances: "{{ sysctl_fs_inotify_max_user_instances | default(1024) }}"
    _sysctl_expected_fs_file_max: "{{ sysctl_fs_file_max | default(2097152) }}"
    _sysctl_expected_net_core_somaxconn: "{{ sysctl_net_core_somaxconn | default(4096) }}"
    _sysctl_expected_net_ipv4_tcp_fastopen: "{{ sysctl_net_ipv4_tcp_fastopen | default(3) }}"
    _sysctl_expected_ptrace_scope: >-
      {{ sysctl_kernel_yama_ptrace_scope | default(
         0 if 'gaming' in (workstation_profiles | default([]))
         else (2 if 'security' in (workstation_profiles | default([]))
         else 1)) }}

    # Parameters verified in all scenarios (loop-based, Tier 2)
    _sysctl_perf_params:
      - { param: "vm.swappiness", expected: "{{ _sysctl_expected_vm_swappiness }}" }
      - { param: "vm.vfs_cache_pressure", expected: "{{ _sysctl_expected_vm_vfs_cache_pressure }}" }
      - { param: "vm.dirty_ratio", expected: "{{ _sysctl_expected_vm_dirty_ratio }}" }
      - { param: "vm.dirty_background_ratio", expected: "{{ _sysctl_expected_vm_dirty_background_ratio }}" }
      - { param: "fs.inotify.max_user_watches", expected: "{{ _sysctl_expected_fs_inotify_max_user_watches }}" }
      - { param: "fs.inotify.max_user_instances", expected: "{{ _sysctl_expected_fs_inotify_max_user_instances }}" }
      - { param: "fs.file-max", expected: "{{ _sysctl_expected_fs_file_max }}" }
      - { param: "net.core.somaxconn", expected: "{{ _sysctl_expected_net_core_somaxconn }}" }
      - { param: "net.ipv4.tcp_fastopen", expected: "{{ _sysctl_expected_net_ipv4_tcp_fastopen }}" }

    _sysctl_kernel_hardening_params:
      - { param: "kernel.randomize_va_space", expected: "2" }
      - { param: "kernel.kptr_restrict", expected: "2" }
      - { param: "kernel.dmesg_restrict", expected: "1" }
      - { param: "kernel.yama.ptrace_scope", expected: "{{ _sysctl_expected_ptrace_scope | trim }}" }
      - { param: "kernel.perf_event_paranoid", expected: "3" }
      - { param: "kernel.unprivileged_bpf_disabled", expected: "1" }
      - { param: "dev.tty.ldisc_autoload", expected: "0" }
      - { param: "vm.unprivileged_userfaultfd", expected: "0" }
      - { param: "vm.mmap_min_addr", expected: "65536" }

    _sysctl_network_hardening_params:
      - { param: "net.core.bpf_jit_harden", expected: "2" }
      - { param: "net.ipv4.conf.all.rp_filter", expected: "1" }
      - { param: "net.ipv4.tcp_syncookies", expected: "1" }
      - { param: "net.ipv4.tcp_rfc1337", expected: "1" }
      - { param: "net.ipv4.conf.all.accept_redirects", expected: "0" }
      - { param: "net.ipv4.conf.all.send_redirects", expected: "0" }
      - { param: "net.ipv4.conf.all.accept_source_route", expected: "0" }
      - { param: "net.ipv4.conf.all.log_martians", expected: "1" }
      - { param: "net.ipv4.icmp_echo_ignore_broadcasts", expected: "1" }
      - { param: "net.ipv4.icmp_ignore_bogus_error_responses", expected: "1" }
      - { param: "net.ipv4.tcp_timestamps", expected: "0" }
      - { param: "net.ipv4.tcp_tw_reuse", expected: "0" }
      - { param: "net.ipv4.conf.all.arp_filter", expected: "1" }
      - { param: "net.ipv4.conf.all.arp_ignore", expected: "1" }
      - { param: "net.ipv4.conf.all.drop_gratuitous_arp", expected: "0" }
      - { param: "net.ipv6.conf.all.accept_redirects", expected: "0" }
      - { param: "net.ipv6.conf.all.accept_source_route", expected: "0" }
      - { param: "net.ipv6.conf.all.accept_ra", expected: "1" }

    _sysctl_filesystem_hardening_params:
      - { param: "fs.protected_hardlinks", expected: "1" }
      - { param: "fs.protected_symlinks", expected: "1" }
      - { param: "fs.protected_fifos", expected: "2" }
      - { param: "fs.protected_regular", expected: "2" }
      - { param: "fs.suid_dumpable", expected: "0" }

  tasks:
    # =====================================================================
    # Container detection
    # =====================================================================
    - name: Detect if running inside a container
      ansible.builtin.set_fact:
        _sysctl_in_container: "{{ ansible_virtualization_type | default('') == 'docker' }}"

    # =====================================================================
    # Tier 1: File deployment checks (run in ALL scenarios)
    # =====================================================================
    - name: Stat sysctl drop-in file
      ansible.builtin.stat:
        path: /etc/sysctl.d/99-z-ansible.conf
      register: _sysctl_verify_stat

    - name: Assert drop-in file exists
      ansible.builtin.assert:
        that: _sysctl_verify_stat.stat.exists
        fail_msg: "/etc/sysctl.d/99-z-ansible.conf does not exist"
        success_msg: "drop-in file exists"

    - name: Assert drop-in file ownership and permissions
      ansible.builtin.assert:
        that:
          - _sysctl_verify_stat.stat.pw_name == 'root'
          - _sysctl_verify_stat.stat.gr_name == 'root'
          - _sysctl_verify_stat.stat.mode == '0644'
        fail_msg: >-
          /etc/sysctl.d/99-z-ansible.conf has wrong ownership or mode:
          owner={{ _sysctl_verify_stat.stat.pw_name }}
          group={{ _sysctl_verify_stat.stat.gr_name }}
          mode={{ _sysctl_verify_stat.stat.mode }}
        success_msg: "drop-in file ownership and mode correct"

    - name: Read drop-in file content
      ansible.builtin.slurp:
        src: /etc/sysctl.d/99-z-ansible.conf
      register: _sysctl_verify_content_raw
      failed_when: false

    - name: Assert slurp succeeded (content key present)
      ansible.builtin.assert:
        that: "'content' in _sysctl_verify_content_raw"
        fail_msg: "slurp failed — /etc/sysctl.d/99-z-ansible.conf could not be read"
        success_msg: "drop-in file content read successfully"

    - name: Set config content fact
      ansible.builtin.set_fact:
        _sysctl_verify_content: "{{ _sysctl_verify_content_raw.content | b64decode }}"
      when: "'content' in _sysctl_verify_content_raw"

    - name: Assert performance parameters present in config
      ansible.builtin.assert:
        that:
          - "'vm.swappiness = ' ~ _sysctl_expected_vm_swappiness | string in _sysctl_verify_content"
          - "'vm.vfs_cache_pressure = ' ~ _sysctl_expected_vm_vfs_cache_pressure | string in _sysctl_verify_content"
          - "'vm.dirty_ratio = ' ~ _sysctl_expected_vm_dirty_ratio | string in _sysctl_verify_content"
          - "'vm.dirty_background_ratio = ' ~ _sysctl_expected_vm_dirty_background_ratio | string in _sysctl_verify_content"
          - "'fs.inotify.max_user_watches = ' ~ _sysctl_expected_fs_inotify_max_user_watches | string in _sysctl_verify_content"
          - "'fs.inotify.max_user_instances = ' ~ _sysctl_expected_fs_inotify_max_user_instances | string in _sysctl_verify_content"
          - "'fs.file-max = ' ~ _sysctl_expected_fs_file_max | string in _sysctl_verify_content"
          - "'net.core.somaxconn = ' ~ _sysctl_expected_net_core_somaxconn | string in _sysctl_verify_content"
          - "'net.ipv4.tcp_fastopen = ' ~ _sysctl_expected_net_ipv4_tcp_fastopen | string in _sysctl_verify_content"
          - "'net.ipv4.tcp_tw_reuse = 0' in _sysctl_verify_content"
        fail_msg: "Required performance parameters missing from config file"
        success_msg: "Performance parameters present in config with correct values"
      when: _sysctl_verify_content is defined

    - name: Assert security kernel hardening parameters present in config
      ansible.builtin.assert:
        that:
          - "'kernel.randomize_va_space = 2' in _sysctl_verify_content"
          - "'kernel.kptr_restrict = 2' in _sysctl_verify_content"
          - "'kernel.dmesg_restrict = 1' in _sysctl_verify_content"
          - "'kernel.yama.ptrace_scope = ' ~ _sysctl_expected_ptrace_scope | trim | string in _sysctl_verify_content"
          - "'kernel.perf_event_paranoid = 3' in _sysctl_verify_content"
          - "'kernel.unprivileged_bpf_disabled = 1' in _sysctl_verify_content"
          - "'dev.tty.ldisc_autoload = 0' in _sysctl_verify_content"
          - "'vm.unprivileged_userfaultfd = 0' in _sysctl_verify_content"
          - "'vm.mmap_min_addr = 65536' in _sysctl_verify_content"
        fail_msg: "Security kernel hardening parameters missing from config file"
        success_msg: "Security kernel hardening parameters present in config with correct values"
      when: _sysctl_verify_content is defined

    - name: Assert security network hardening parameters present in config
      ansible.builtin.assert:
        that:
          - "'net.core.bpf_jit_harden = 2' in _sysctl_verify_content"
          - "'net.ipv4.conf.all.rp_filter = 1' in _sysctl_verify_content"
          - "'net.ipv4.tcp_syncookies = 1' in _sysctl_verify_content"
          - "'net.ipv4.tcp_rfc1337 = 1' in _sysctl_verify_content"
          - "'net.ipv4.conf.all.accept_redirects = 0' in _sysctl_verify_content"
          - "'net.ipv4.conf.all.send_redirects = 0' in _sysctl_verify_content"
          - "'net.ipv4.conf.all.accept_source_route = 0' in _sysctl_verify_content"
          - "'net.ipv4.conf.all.log_martians = 1' in _sysctl_verify_content"
          - "'net.ipv4.icmp_echo_ignore_broadcasts = 1' in _sysctl_verify_content"
          - "'net.ipv4.icmp_ignore_bogus_error_responses = 1' in _sysctl_verify_content"
          - "'net.ipv4.tcp_timestamps = 0' in _sysctl_verify_content"
          - "'net.ipv4.conf.all.arp_filter = 1' in _sysctl_verify_content"
          - "'net.ipv4.conf.all.arp_ignore = 1' in _sysctl_verify_content"
          - "'net.ipv6.conf.all.accept_redirects = 0' in _sysctl_verify_content"
          - "'net.ipv6.conf.all.accept_source_route = 0' in _sysctl_verify_content"
          - "'net.ipv6.conf.all.accept_ra = 1' in _sysctl_verify_content"
        fail_msg: "Security network hardening parameters missing from config file"
        success_msg: "Security network hardening parameters present in config with correct values"
      when: _sysctl_verify_content is defined

    - name: Assert filesystem hardening parameters present in config
      ansible.builtin.assert:
        that:
          - "'fs.protected_hardlinks = 1' in _sysctl_verify_content"
          - "'fs.protected_symlinks = 1' in _sysctl_verify_content"
          - "'fs.protected_fifos = 2' in _sysctl_verify_content"
          - "'fs.protected_regular = 2' in _sysctl_verify_content"
          - "'fs.suid_dumpable = 0' in _sysctl_verify_content"
        fail_msg: "Filesystem hardening parameters missing from config file"
        success_msg: "Filesystem hardening parameters present in config with correct values"
      when: _sysctl_verify_content is defined

    - name: Assert IPv6 disable directives NOT present when toggle is false (default)
      ansible.builtin.assert:
        that:
          - "'net.ipv6.conf.all.disable_ipv6' not in _sysctl_verify_content"
        fail_msg: "IPv6 disable is in config but sysctl_security_ipv6_disable is false"
        success_msg: "IPv6 disable directives correctly absent"
      when: _sysctl_verify_content is defined

    - name: Gather package facts
      ansible.builtin.package_facts:
        manager: auto

    - name: Assert procps-ng installed (Arch)
      ansible.builtin.assert:
        that: "'procps-ng' in ansible_facts.packages"
        fail_msg: "procps-ng is not installed on Arch Linux"
        success_msg: "procps-ng installed"
      when: ansible_facts['os_family'] == 'Archlinux'

    - name: Assert procps installed (Debian)
      ansible.builtin.assert:
        that: "'procps' in ansible_facts.packages"
        fail_msg: "procps is not installed on Debian/Ubuntu"
        success_msg: "procps installed"
      when: ansible_facts['os_family'] == 'Debian'

    - name: Gather service facts (Debian — check apport)
      ansible.builtin.service_facts:
      when:
        - ansible_facts['os_family'] == 'Debian'
        - not _sysctl_in_container

    - name: Assert apport is disabled (overrides fs.suid_dumpable after boot)
      ansible.builtin.assert:
        that: >-
          'apport.service' not in ansible_facts.services
          or ansible_facts.services['apport.service']['status'] == 'disabled'
        fail_msg: >-
          apport.service is enabled — it resets fs.suid_dumpable=2 after boot,
          defeating suid_dumpable hardening (expected {{ sysctl_fs_suid_dumpable | default(0) }})
        success_msg: "apport.service disabled — fs.suid_dumpable hardening persists after reboot"
      when:
        - ansible_facts['os_family'] == 'Debian'
        - not _sysctl_in_container
        - sysctl_security_filesystem_hardening | default(true) | bool
        - sysctl_fs_suid_dumpable | default(0) | int != 2

    # =====================================================================
    # Tier 2: Live value verification (skip in container)
    # =====================================================================
    - name: Read live performance sysctl values
      ansible.builtin.command: "sysctl -n {{ item.param }}"
      register: _sysctl_verify_perf_live
      changed_when: false
      failed_when: false
      loop: "{{ _sysctl_perf_params }}"
      loop_control:
        label: "{{ item.param }}"
      when: not _sysctl_in_container

    - name: Log failed performance sysctl reads
      ansible.builtin.debug:
        msg: "WARNING: sysctl -n {{ item.item.param }} failed (rc={{ item.rc }}): {{ item.stderr | default('') }}"
      loop: "{{ _sysctl_verify_perf_live.results }}"
      loop_control:
        label: "{{ item.item.param }}"
      when:
        - not _sysctl_in_container
        - item.rc is defined
        - item.rc != 0

    - name: Assert live performance sysctl values match expected
      ansible.builtin.assert:
        that: item.stdout | string == item.item.expected | string
        fail_msg: "{{ item.item.param }}: expected={{ item.item.expected }} got={{ item.stdout }}"
        success_msg: "{{ item.item.param }}={{ item.stdout }} OK"
      loop: "{{ _sysctl_verify_perf_live.results }}"
      loop_control:
        label: "{{ item.item.param }}"
      when:
        - not _sysctl_in_container
        - item.rc == 0

    - name: Read live kernel hardening sysctl values
      ansible.builtin.command: "sysctl -n {{ item.param }}"
      register: _sysctl_verify_kernel_live
      changed_when: false
      failed_when: false
      loop: "{{ _sysctl_kernel_hardening_params }}"
      loop_control:
        label: "{{ item.param }}"
      when: not _sysctl_in_container

    - name: Log failed kernel hardening sysctl reads
      ansible.builtin.debug:
        msg: "WARNING: sysctl -n {{ item.item.param }} failed (rc={{ item.rc }}): {{ item.stderr | default('') }}"
      loop: "{{ _sysctl_verify_kernel_live.results }}"
      loop_control:
        label: "{{ item.item.param }}"
      when:
        - not _sysctl_in_container
        - item.rc is defined
        - item.rc != 0

    - name: Assert live kernel hardening sysctl values match expected
      ansible.builtin.assert:
        that: item.stdout | string == item.item.expected | string
        fail_msg: "{{ item.item.param }}: expected={{ item.item.expected }} got={{ item.stdout }}"
        success_msg: "{{ item.item.param }}={{ item.stdout }} OK"
      loop: "{{ _sysctl_verify_kernel_live.results }}"
      loop_control:
        label: "{{ item.item.param }}"
      when:
        - not _sysctl_in_container
        - item.rc == 0

    - name: Read live network hardening sysctl values
      ansible.builtin.command: "sysctl -n {{ item.param }}"
      register: _sysctl_verify_network_live
      changed_when: false
      failed_when: false
      loop: "{{ _sysctl_network_hardening_params }}"
      loop_control:
        label: "{{ item.param }}"
      when: not _sysctl_in_container

    - name: Log failed network hardening sysctl reads
      ansible.builtin.debug:
        msg: "WARNING: sysctl -n {{ item.item.param }} failed (rc={{ item.rc }}): {{ item.stderr | default('') }}"
      loop: "{{ _sysctl_verify_network_live.results }}"
      loop_control:
        label: "{{ item.item.param }}"
      when:
        - not _sysctl_in_container
        - item.rc is defined
        - item.rc != 0

    - name: Assert live network hardening sysctl values match expected
      ansible.builtin.assert:
        that: item.stdout | string == item.item.expected | string
        fail_msg: "{{ item.item.param }}: expected={{ item.item.expected }} got={{ item.stdout }}"
        success_msg: "{{ item.item.param }}={{ item.stdout }} OK"
      loop: "{{ _sysctl_verify_network_live.results }}"
      loop_control:
        label: "{{ item.item.param }}"
      when:
        - not _sysctl_in_container
        - item.rc == 0

    - name: Read live filesystem hardening sysctl values
      ansible.builtin.command: "sysctl -n {{ item.param }}"
      register: _sysctl_verify_fs_live
      changed_when: false
      failed_when: false
      loop: "{{ _sysctl_filesystem_hardening_params }}"
      loop_control:
        label: "{{ item.param }}"
      when: not _sysctl_in_container

    - name: Log failed filesystem hardening sysctl reads
      ansible.builtin.debug:
        msg: "WARNING: sysctl -n {{ item.item.param }} failed (rc={{ item.rc }}): {{ item.stderr | default('') }}"
      loop: "{{ _sysctl_verify_fs_live.results }}"
      loop_control:
        label: "{{ item.item.param }}"
      when:
        - not _sysctl_in_container
        - item.rc is defined
        - item.rc != 0

    - name: Assert live filesystem hardening sysctl values match expected
      ansible.builtin.assert:
        that: item.stdout | string == item.item.expected | string
        fail_msg: "{{ item.item.param }}: expected={{ item.item.expected }} got={{ item.stdout }}"
        success_msg: "{{ item.item.param }}={{ item.stdout }} OK"
      loop: "{{ _sysctl_verify_fs_live.results }}"
      loop_control:
        label: "{{ item.item.param }}"
      when:
        - not _sysctl_in_container
        - item.rc == 0

    # =====================================================================
    # Tier 2b: Boot persistence (skipped in Docker containers)
    # Reboots the VM so systemd-sysctl.service runs for real, then re-asserts
    # all security values. Catches file-ordering bugs: if our sysctl.d file
    # sorts before a system-provided file (e.g. Ubuntu's 99-sysctl.conf),
    # systemd-sysctl overwrites our settings at every real boot.
    # =====================================================================
    - name: "Boot persistence | reboot VM to trigger real systemd-sysctl"
      ansible.builtin.reboot:
        reboot_timeout: 300
        connect_timeout: 30
        pre_reboot_delay: 2
        post_reboot_delay: 10
      when: not _sysctl_in_container

    - name: "Boot persistence | read kernel hardening values after boot simulation"
      ansible.builtin.command: "sysctl -n {{ item.param }}"
      register: _sysctl_verify_kernel_boot
      changed_when: false
      failed_when: false
      loop: "{{ _sysctl_kernel_hardening_params }}"
      loop_control:
        label: "{{ item.param }}"
      when: not _sysctl_in_container

    - name: "Boot persistence | log failed kernel hardening reads after boot"
      ansible.builtin.debug:
        msg: "WARNING: [BOOT] sysctl -n {{ item.item.param }} failed (rc={{ item.rc }}): {{ item.stderr | default('') }}"
      loop: "{{ _sysctl_verify_kernel_boot.results }}"
      loop_control:
        label: "{{ item.item.param }}"
      when:
        - not _sysctl_in_container
        - item.rc is defined
        - item.rc != 0

    - name: "Boot persistence | assert kernel hardening values survive reboot"
      ansible.builtin.assert:
        that: item.stdout | string == item.item.expected | string
        fail_msg: >-
          [BOOT] {{ item.item.param }}: expected={{ item.item.expected }}
          got={{ item.stdout }} — value overwritten at boot by a later sysctl.d file
        success_msg: "[BOOT] {{ item.item.param }}={{ item.stdout }} OK"
      loop: "{{ _sysctl_verify_kernel_boot.results }}"
      loop_control:
        label: "{{ item.item.param }}"
      when:
        - not _sysctl_in_container
        - item.rc == 0

    - name: "Boot persistence | read network hardening values after boot simulation"
      ansible.builtin.command: "sysctl -n {{ item.param }}"
      register: _sysctl_verify_network_boot
      changed_when: false
      failed_when: false
      loop: "{{ _sysctl_network_hardening_params }}"
      loop_control:
        label: "{{ item.param }}"
      when: not _sysctl_in_container

    - name: "Boot persistence | log failed network hardening reads after boot"
      ansible.builtin.debug:
        msg: "WARNING: [BOOT] sysctl -n {{ item.item.param }} failed (rc={{ item.rc }}): {{ item.stderr | default('') }}"
      loop: "{{ _sysctl_verify_network_boot.results }}"
      loop_control:
        label: "{{ item.item.param }}"
      when:
        - not _sysctl_in_container
        - item.rc is defined
        - item.rc != 0

    - name: "Boot persistence | assert network hardening values survive reboot"
      ansible.builtin.assert:
        that: item.stdout | string == item.item.expected | string
        fail_msg: >-
          [BOOT] {{ item.item.param }}: expected={{ item.item.expected }}
          got={{ item.stdout }} — value overwritten at boot by a later sysctl.d file
        success_msg: "[BOOT] {{ item.item.param }}={{ item.stdout }} OK"
      loop: "{{ _sysctl_verify_network_boot.results }}"
      loop_control:
        label: "{{ item.item.param }}"
      when:
        - not _sysctl_in_container
        - item.rc == 0

    - name: "Boot persistence | read filesystem hardening values after boot simulation"
      ansible.builtin.command: "sysctl -n {{ item.param }}"
      register: _sysctl_verify_fs_boot
      changed_when: false
      failed_when: false
      loop: "{{ _sysctl_filesystem_hardening_params }}"
      loop_control:
        label: "{{ item.param }}"
      when: not _sysctl_in_container

    - name: "Boot persistence | log failed filesystem hardening reads after boot"
      ansible.builtin.debug:
        msg: "WARNING: [BOOT] sysctl -n {{ item.item.param }} failed (rc={{ item.rc }}): {{ item.stderr | default('') }}"
      loop: "{{ _sysctl_verify_fs_boot.results }}"
      loop_control:
        label: "{{ item.item.param }}"
      when:
        - not _sysctl_in_container
        - item.rc is defined
        - item.rc != 0

    - name: "Boot persistence | assert filesystem hardening values survive reboot"
      ansible.builtin.assert:
        that: item.stdout | string == item.item.expected | string
        fail_msg: >-
          [BOOT] {{ item.item.param }}: expected={{ item.item.expected }}
          got={{ item.stdout }} — value overwritten at boot by a later sysctl.d file
        success_msg: "[BOOT] {{ item.item.param }}={{ item.stdout }} OK"
      loop: "{{ _sysctl_verify_fs_boot.results }}"
      loop_control:
        label: "{{ item.item.param }}"
      when:
        - not _sysctl_in_container
        - item.rc == 0

    # =====================================================================
    # Tier 3: Cross-platform checks (architecture-specific)
    # =====================================================================
    - name: Assert kernel.unprivileged_userns_clone present in config (Arch only)
      ansible.builtin.assert:
        that: "'kernel.unprivileged_userns_clone' in _sysctl_verify_content"
        fail_msg: "kernel.unprivileged_userns_clone missing from config on Arch Linux"
        success_msg: "kernel.unprivileged_userns_clone present in config (Arch)"
      when: ansible_facts['distribution'] == 'Archlinux'

    # =====================================================================
    # Tier 4: Gaming profile edge-case test (TEST-011)
    # Re-applies the role with gaming profile settings, then verifies
    # profile-dependent values (ptrace_scope=0, custom swappiness).
    # =====================================================================
    - name: "Gaming profile | apply role with gaming profile"
      ansible.builtin.include_role:
        name: "{{ lookup('env', 'MOLECULE_PROJECT_DIRECTORY') | basename }}"
      vars:
        workstation_profiles:
          - gaming
        sysctl_vm_swappiness: 30
        sysctl_kernel_yama_ptrace_scope: 0

    - name: "Gaming profile | read drop-in file after gaming apply"
      ansible.builtin.slurp:
        src: /etc/sysctl.d/99-z-ansible.conf
      register: _sysctl_verify_gaming_raw

    - name: "Gaming profile | set gaming config content fact"
      ansible.builtin.set_fact:
        _sysctl_verify_gaming_content: "{{ _sysctl_verify_gaming_raw.content | b64decode }}"

    - name: "Gaming profile | assert ptrace_scope=0 in config"
      ansible.builtin.assert:
        that: "'kernel.yama.ptrace_scope = 0' in _sysctl_verify_gaming_content"
        fail_msg: "Gaming profile: ptrace_scope should be 0 but is not in config"
        success_msg: "Gaming profile: ptrace_scope=0 correctly deployed"

    - name: "Gaming profile | assert swappiness=30 in config"
      ansible.builtin.assert:
        that: "'vm.swappiness = 30' in _sysctl_verify_gaming_content"
        fail_msg: "Gaming profile: vm.swappiness should be 30 but is not in config"
        success_msg: "Gaming profile: vm.swappiness=30 correctly deployed"

    - name: "Gaming profile | restore default profile"
      ansible.builtin.include_role:
        name: "{{ lookup('env', 'MOLECULE_PROJECT_DIRECTORY') | basename }}"

    - name: Show verify summary
      ansible.builtin.debug:
        msg: >-
          sysctl verify complete.
          Container mode: {{ _sysctl_in_container }}.
          Live value checks: {{ 'skipped' if _sysctl_in_container else 'performed' }}.
          Gaming profile edge-case: tested.
