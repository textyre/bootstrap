---
- name: Verify Vaultwarden application behavior
  hosts: all
  become: true
  gather_facts: false
  tasks:
    - name: Request Vaultwarden web application through Caddy
      ansible.builtin.uri:
        url: https://vault.local/
        validate_certs: true
        return_content: true
        status_code: 200
      register: _vaultwarden_test_web

    - name: Verify Vaultwarden security response headers
      ansible.builtin.assert:
        that:
          - >-
            'nosniff' in
            (_vaultwarden_test_web.x_content_type_options | default('') | lower)
          - >-
            'sameorigin' in
            (_vaultwarden_test_web.x_frame_options | default('') | lower)
          - >-
            'max-age=31536000' in
            (_vaultwarden_test_web.strict_transport_security | default('') | lower)
        fail_msg: Vaultwarden was not served with the configured security headers.

    - name: Execute Vaultwarden backup
      ansible.builtin.command:
        argv:
          - /opt/vaultwarden/backup.sh
      changed_when: true

    - name: Find generated Vaultwarden database backup
      ansible.builtin.find:
        paths: /opt/vaultwarden/backups
        patterns: 'db-*.sqlite3'
        file_type: file
      register: _vaultwarden_test_backups

    - name: Check generated Vaultwarden database backup
      ansible.builtin.command:
        argv:
          - sqlite3
          - "{{ (_vaultwarden_test_backups.files | sort(attribute='mtime') | last).path }}"
          - PRAGMA integrity_check;
      register: _vaultwarden_test_backup_integrity
      changed_when: false
      when: _vaultwarden_test_backups.matched > 0

    - name: Confirm Vaultwarden backup is usable
      ansible.builtin.assert:
        that:
          - _vaultwarden_test_backups.matched > 0
          - (_vaultwarden_test_backup_integrity.stdout | default('')) == 'ok'
        fail_msg: Vaultwarden backup did not create a SQLite database copy.
