---
- name: Bootstrap Vagrant VM
  ansible.builtin.import_playbook: ../../../../molecule/shared/prepare-vagrant.yml

- name: Prepare Vagrant VM
  hosts: all
  become: true
  gather_facts: true

  tasks:
    # ---- Arch Linux ----

    - name: Install Docker and prerequisites (Arch)
      community.general.pacman:
        name:
          - docker
          - docker-compose
          - openssl
          - cronie
          - sqlite3
        state: present
      when: ansible_facts['os_family'] == 'Archlinux'

    # ---- Debian/Ubuntu ----

    - name: Install Docker and prerequisites (Debian)
      ansible.builtin.apt:
        name:
          - docker.io
          - docker-compose-v2
          - openssl
          - cron
          - sqlite3
        state: present
      when: ansible_facts['os_family'] == 'Debian'

    # ---- Common ----

    - name: Enable and start Docker service
      ansible.builtin.service:
        name: docker
        enabled: true
        state: started

    - name: Wait for Docker daemon to be ready
      ansible.builtin.command:
        cmd: docker info
      register: _prepare_docker_info
      retries: 10
      delay: 3
      until: _prepare_docker_info.rc == 0
      changed_when: false

    - name: Create Docker proxy network
      community.docker.docker_network:
        name: proxy
        state: present

    - name: Create Caddy directories (stub for caddy role)
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        owner: root
        group: root
        mode: '0755'
      loop:
        - /opt/caddy
        - /opt/caddy/sites
