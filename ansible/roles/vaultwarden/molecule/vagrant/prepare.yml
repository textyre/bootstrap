---
- name: Prepare Vaultwarden virtual machines
  ansible.builtin.import_playbook: ../../../../molecule/shared/prepare-vagrant.yml

- name: Install Vaultwarden runtime test prerequisite
  hosts: all
  become: true
  gather_facts: true
  vars:
    _vaultwarden_test_docker_packages:
      Archlinux:
        - docker
        - docker-compose
        - python-requests
        - ca-certificates
      Debian:
        - docker.io
        - docker-compose-v2
        - python3-requests
        - ca-certificates
  tasks:
    - name: Install Docker Engine and Compose
      ansible.builtin.package:
        name: "{{ _vaultwarden_test_docker_packages[ansible_facts['os_family']] }}"
        state: present

    - name: Configure Vaultwarden Docker runtime prerequisite
      ansible.builtin.include_role:
        name: docker
