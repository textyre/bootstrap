---
- name: Bootstrap Docker container
  ansible.builtin.import_playbook: ../../../../molecule/shared/prepare-docker.yml

- name: Prepare Vaultwarden test prerequisites
  hosts: all
  become: true
  gather_facts: true
  vars:
    _vaultwarden_test_packages:
      Archlinux:
        - docker
        - docker-compose
        - python-requests
        - ca-certificates
        - openssl
        - cronie
      Debian:
        - docker.io
        - docker-compose-v2
        - python3-requests
        - ca-certificates
        - openssl
        - cron

  tasks:
    - name: Install Vaultwarden test prerequisites
      ansible.builtin.package:
        name: "{{ _vaultwarden_test_packages[ansible_facts['os_family']] }}"
        state: present
