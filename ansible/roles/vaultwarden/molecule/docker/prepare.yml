---
- name: Bootstrap Docker container
  ansible.builtin.import_playbook: ../../../../molecule/shared/prepare-docker.yml

- name: Prepare Vaultwarden test prerequisites
  hosts: all
  become: true
  gather_facts: true
  vars:
    _vaultwarden_test_packages:
      Archlinux:
        - docker
        - openssl
        - cronie
      Debian:
        - docker.io
        - openssl
        - cron

  tasks:
    - name: Install Vaultwarden test prerequisites
      ansible.builtin.package:
        name: "{{ _vaultwarden_test_packages[ansible_facts['os_family']] }}"
        state: present

    - name: Create Caddy directories (stub for caddy role)
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        owner: root
        group: root
        mode: '0755'
      loop:
        - /opt/caddy
        - /opt/caddy/sites
