---
# Docker-specific converge uses an explicit include so this scenario can exercise
# its disabled-role path separately. Role dependencies still execute normally.
- name: Converge
  hosts: all
  become: true
  gather_facts: true

  pre_tasks:
    - name: Set test admin token (no vault needed in molecule)
      ansible.builtin.set_fact:
        vault_vaultwarden_admin_token: "molecule-test-token-not-for-production"

  tasks:
    - name: Include vaultwarden role (without meta dependencies)
      ansible.builtin.include_role:
        name: "{{ lookup('env', 'MOLECULE_PROJECT_DIRECTORY') | basename }}"

# TEST-011: Edge case — vaultwarden_enabled: false (skip path)
- name: Converge — disabled role
  hosts: all
  become: true
  gather_facts: true

  tasks:
    - name: Include vaultwarden role disabled (without meta dependencies)
      ansible.builtin.include_role:
        name: "{{ lookup('env', 'MOLECULE_PROJECT_DIRECTORY') | basename }}"
      vars:
        vaultwarden_enabled: false
