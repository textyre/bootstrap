---
- name: Read Caddy published HTTPS port
  ansible.builtin.command:
    argv:
      - docker
      - port
      - caddy
      - 443/tcp
  register: _vaultwarden_caddy_https_port
  changed_when: false
  failed_when: false

- name: Read host listening sockets
  ansible.builtin.command:
    argv:
      - ss
      - -lntp
  register: _vaultwarden_host_sockets
  changed_when: false
  failed_when: false

- name: Request Vaultwarden from Caddy container
  ansible.builtin.command:
    argv:
      - docker
      - exec
      - caddy
      - wget
      - -S
      - -O
      - /dev/null
      - http://vaultwarden/alive
  register: _vaultwarden_caddy_backend
  changed_when: false
  failed_when: false

- name: Inspect shared Docker network
  ansible.builtin.command:
    argv:
      - docker
      - network
      - inspect
      - proxy
  register: _vaultwarden_proxy_network
  changed_when: false
  failed_when: false

- name: Read Caddy network state
  ansible.builtin.command:
    argv:
      - docker
      - exec
      - caddy
      - ip
      - "{{ item }}"
  loop:
    - address
    - route
    - neighbor
  register: _vaultwarden_caddy_network_state
  changed_when: false
  failed_when: false

- name: Read Docker bridge ports
  ansible.builtin.command:
    argv:
      - bridge
      - link
      - show
  register: _vaultwarden_bridge_ports
  changed_when: false
  failed_when: false

- name: Read nftables forwarding rules
  ansible.builtin.command:
    argv:
      - nft
      - list
      - ruleset
  register: _vaultwarden_firewall_rules
  changed_when: false
  failed_when: false

- name: Read Caddy runtime log
  ansible.builtin.command:
    argv:
      - docker
      - logs
      - --tail
      - "50"
      - caddy
  register: _vaultwarden_caddy_log
  changed_when: false
  failed_when: false

- name: Read Vaultwarden runtime log
  ansible.builtin.command:
    argv:
      - docker
      - logs
      - --tail
      - "50"
      - vaultwarden
  register: _vaultwarden_application_log
  changed_when: false
  failed_when: false

- name: Fail Vaultwarden runtime contract
  ansible.builtin.fail:
    msg: |-
      Vaultwarden HTTPS health check failed:
      {{ _vaultwarden_runtime_health.msg | default('unknown error') }}

      Published HTTPS port:
      {{ _vaultwarden_caddy_https_port.stdout | default('') }}
      {{ _vaultwarden_caddy_https_port.stderr | default('') }}

      Host listening sockets:
      {{ _vaultwarden_host_sockets.stdout | default('') }}
      {{ _vaultwarden_host_sockets.stderr | default('') }}

      Caddy to Vaultwarden request:
      {{ _vaultwarden_caddy_backend.stdout | default('') }}
      {{ _vaultwarden_caddy_backend.stderr | default('') }}

      Shared Docker network:
      {{ _vaultwarden_proxy_network.stdout | default('') }}
      {{ _vaultwarden_proxy_network.stderr | default('') }}

      Caddy network state:
      {% for result in _vaultwarden_caddy_network_state.results | default([]) %}
      {{ result.item }}:
      {{ result.stdout | default('') }}
      {{ result.stderr | default('') }}
      {% endfor %}

      Docker bridge ports:
      {{ _vaultwarden_bridge_ports.stdout | default('') }}
      {{ _vaultwarden_bridge_ports.stderr | default('') }}

      nftables ruleset:
      {{ _vaultwarden_firewall_rules.stdout | default('') }}
      {{ _vaultwarden_firewall_rules.stderr | default('') }}

      Caddy log:
      {{ _vaultwarden_caddy_log.stdout | default('') }}
      {{ _vaultwarden_caddy_log.stderr | default('') }}

      Vaultwarden log:
      {{ _vaultwarden_application_log.stdout | default('') }}
      {{ _vaultwarden_application_log.stderr | default('') }}
