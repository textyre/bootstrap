---
- name: Read Caddy published HTTPS port
  ansible.builtin.command:
    argv:
      - docker
      - port
      - caddy
      - 443/tcp
  register: _vaultwarden_caddy_https_port
  changed_when: false
  failed_when: false

- name: Read host listening sockets
  ansible.builtin.command:
    argv:
      - ss
      - -lntp
  register: _vaultwarden_host_sockets
  changed_when: false
  failed_when: false

- name: Request Vaultwarden from Caddy container
  ansible.builtin.command:
    argv:
      - docker
      - exec
      - caddy
      - wget
      - -S
      - -O
      - /dev/null
      - http://vaultwarden/alive
  register: _vaultwarden_caddy_backend
  changed_when: false
  failed_when: false

- name: Read Caddy runtime log
  ansible.builtin.command:
    argv:
      - docker
      - logs
      - --tail
      - "50"
      - caddy
  register: _vaultwarden_caddy_log
  changed_when: false
  failed_when: false

- name: Read Vaultwarden runtime log
  ansible.builtin.command:
    argv:
      - docker
      - logs
      - --tail
      - "50"
      - vaultwarden
  register: _vaultwarden_application_log
  changed_when: false
  failed_when: false

- name: Fail Vaultwarden runtime contract
  ansible.builtin.fail:
    msg: |-
      Vaultwarden HTTPS health check failed:
      {{ _vaultwarden_runtime_health.msg | default('unknown error') }}

      Published HTTPS port:
      {{ _vaultwarden_caddy_https_port.stdout | default('') }}
      {{ _vaultwarden_caddy_https_port.stderr | default('') }}

      Host listening sockets:
      {{ _vaultwarden_host_sockets.stdout | default('') }}
      {{ _vaultwarden_host_sockets.stderr | default('') }}

      Caddy to Vaultwarden request:
      {{ _vaultwarden_caddy_backend.stdout | default('') }}
      {{ _vaultwarden_caddy_backend.stderr | default('') }}

      Caddy log:
      {{ _vaultwarden_caddy_log.stdout | default('') }}
      {{ _vaultwarden_caddy_log.stderr | default('') }}

      Vaultwarden log:
      {{ _vaultwarden_application_log.stdout | default('') }}
      {{ _vaultwarden_application_log.stderr | default('') }}
