---
- name: Validate Vaultwarden platform support
  ansible.builtin.assert:
    that:
      - ansible_facts['os_family'] in _vaultwarden_supported_os
      - >-
        not (vaultwarden_backup_enabled | bool)
        or ansible_facts['service_mgr'] in _vaultwarden_supported_service_managers
    fail_msg: >-
      Vaultwarden supports {{ _vaultwarden_supported_os | join(', ') }} and
      backup scheduling through
      {{ _vaultwarden_supported_service_managers | join(', ') }}.

- name: Require running Docker runtime
  community.docker.docker_host_info:

- name: Inspect Caddy container
  community.docker.docker_container_info:
    name: caddy
  register: _vaultwarden_caddy_container

- name: Inspect shared Docker network
  community.docker.docker_network_info:
    name: "{{ vaultwarden_docker_network }}"
  register: _vaultwarden_proxy_network

- name: Validate Vaultwarden proxy prerequisites
  ansible.builtin.assert:
    that:
      - _vaultwarden_caddy_container.exists
      - _vaultwarden_caddy_container.container.State.Running
      - _vaultwarden_proxy_network.exists
    fail_msg: >-
      Vaultwarden requires a running Caddy container and the
      {{ vaultwarden_docker_network }} Docker network.
