---
# === Vaultwarden (Self-hosted Bitwarden) ===
# Self-hosted password and secrets manager
# Validate -> OS vars -> Directories -> DNS -> Admin token -> Docker Compose -> Caddy -> Start -> Backup -> Verify -> Report

- name: Vaultwarden role
  when: vaultwarden_enabled | bool
  tags: ['vaultwarden']
  block:

    # ======================================================================
    # ---- Validate (ROLE-003) ----
    # ======================================================================

    - name: Validate vaultwarden configuration
      ansible.builtin.include_tasks: validate.yml
      tags: ['vaultwarden']

    # ======================================================================
    # ---- OS-specific variables (ROLE-001) ----
    # ======================================================================

    - name: Include OS-specific variables
      ansible.builtin.include_vars: "{{ ansible_facts['os_family'] | lower }}.yml"
      tags: ['vaultwarden']

    # ---- Merge security config with user overrides (ROLE-010) ----

    - name: Merge security configuration with user overrides
      ansible.builtin.set_fact:
        _vaultwarden_security_merged: >-
          {{ vaultwarden_security | combine(vaultwarden_security_overwrite, recursive=True) }}
      tags: ['vaultwarden']

    - name: "Report: Validate"
      ansible.builtin.include_role:
        name: common
        tasks_from: report_phase.yml
      vars:
        common_rpt_fact: "_vaultwarden_phases"
        common_rpt_phase: "Validate"
        common_rpt_detail: >-
          os={{ ansible_facts['os_family'] }}
      tags: ['vaultwarden', 'report']

    # ======================================================================
    # ---- Directories ----
    # ======================================================================

    - name: Create Vaultwarden base directory
      ansible.builtin.file:
        path: "{{ vaultwarden_base_dir }}"
        state: directory
        owner: root
        group: root
        mode: '0755'
      tags: ['vaultwarden', 'secrets']

    - name: Create Vaultwarden data directory (owned by userns-remapped root)
      ansible.builtin.file:
        path: "{{ vaultwarden_base_dir }}/data"
        state: directory
        owner: "{{ vaultwarden_container_uid }}"
        group: "{{ vaultwarden_container_uid }}"
        mode: '0700'
      tags: ['vaultwarden', 'secrets']

    - name: Create Vaultwarden backup directory
      ansible.builtin.file:
        path: "{{ vaultwarden_backup_dir }}"
        state: directory
        owner: root
        group: root
        mode: '0755'
      when: vaultwarden_backup_enabled | bool
      tags: ['vaultwarden', 'secrets']

    - name: "Report: Directories"
      ansible.builtin.include_role:
        name: common
        tasks_from: report_phase.yml
      vars:
        common_rpt_fact: "_vaultwarden_phases"
        common_rpt_phase: "Directories"
        common_rpt_detail: >-
          base={{ vaultwarden_base_dir }}
          backup={{ vaultwarden_backup_enabled | string | lower }}
      tags: ['vaultwarden', 'report']

    # ======================================================================
    # ---- DNS (local access) ----
    # ======================================================================

    - name: Add Vaultwarden domain to /etc/hosts
      ansible.builtin.lineinfile:
        path: /etc/hosts
        regexp: '.*\s{{ vaultwarden_domain | regex_escape }}$'
        line: "127.0.0.1 {{ vaultwarden_domain }}"
        state: present
        unsafe_writes: true
      tags: ['vaultwarden', 'secrets']

    - name: "Report: DNS"
      ansible.builtin.include_role:
        name: common
        tasks_from: report_phase.yml
      vars:
        common_rpt_fact: "_vaultwarden_phases"
        common_rpt_phase: "DNS"
        common_rpt_detail: >-
          domain={{ vaultwarden_domain }}
      tags: ['vaultwarden', 'report']

    # ======================================================================
    # ---- Admin token (ROLE-011: Ansible-native generation) ----
    # ======================================================================

    - name: Check if admin token file exists
      ansible.builtin.stat:
        path: "{{ vaultwarden_base_dir }}/.admin_token"
      register: _vaultwarden_token_file
      when: vaultwarden_admin_enabled | bool
      tags: ['vaultwarden', 'secrets']

    - name: Generate admin token (Ansible-native)
      when:
        - vaultwarden_admin_enabled | bool
        - not (_vaultwarden_token_file.stat.exists | default(false))
      tags: ['vaultwarden', 'secrets']
      block:
        - name: Generate random bytes for admin token
          ansible.builtin.command:
            cmd: openssl rand -base64 48
          register: _vaultwarden_token_generated
          changed_when: false

        - name: Write admin token file
          ansible.builtin.copy:
            content: "{{ _vaultwarden_token_generated.stdout }}"
            dest: "{{ vaultwarden_base_dir }}/.admin_token"
            owner: root
            group: root
            mode: '0600'

    - name: Restrict admin token file permissions
      ansible.builtin.file:
        path: "{{ vaultwarden_base_dir }}/.admin_token"
        owner: root
        group: root
        mode: '0600'
      when: vaultwarden_admin_enabled | bool
      tags: ['vaultwarden', 'secrets']

    - name: Read admin token
      ansible.builtin.slurp:
        src: "{{ vaultwarden_base_dir }}/.admin_token"
      register: _vaultwarden_admin_token_raw
      when: vaultwarden_admin_enabled | bool
      tags: ['vaultwarden', 'secrets']

    - name: Set admin token fact
      ansible.builtin.set_fact:
        _vaultwarden_admin_token: "{{ _vaultwarden_admin_token_raw.content | b64decode | trim }}"
      when: vaultwarden_admin_enabled | bool
      tags: ['vaultwarden', 'secrets']

    - name: "Report: Admin token"
      ansible.builtin.include_role:
        name: common
        tasks_from: report_phase.yml
      vars:
        common_rpt_fact: "_vaultwarden_phases"
        common_rpt_phase: "Admin token"
        common_rpt_detail: >-
          enabled={{ vaultwarden_admin_enabled | string | lower }}
      tags: ['vaultwarden', 'report']

    # ======================================================================
    # ---- Docker Compose ----
    # ======================================================================

    - name: Deploy Vaultwarden docker-compose.yml
      ansible.builtin.template:
        src: docker-compose.yml.j2
        dest: "{{ vaultwarden_base_dir }}/docker-compose.yml"
        owner: root
        group: root
        mode: '0644'
      notify: Restart vaultwarden
      tags: ['vaultwarden', 'secrets']

    - name: "Report: Docker Compose"
      ansible.builtin.include_role:
        name: common
        tasks_from: report_phase.yml
      vars:
        common_rpt_fact: "_vaultwarden_phases"
        common_rpt_phase: "Docker Compose"
        common_rpt_detail: >-
          network={{ vaultwarden_docker_network }}
      tags: ['vaultwarden', 'report']

    # ======================================================================
    # ---- Caddy site config ----
    # ======================================================================

    - name: Deploy Vaultwarden Caddy site config
      ansible.builtin.template:
        src: vault.caddy.j2
        dest: "{{ caddy_base_dir | default('/opt/caddy') }}/sites/vault.caddy"
        owner: root
        group: root
        mode: '0644'
      notify: Reload caddy
      tags: ['vaultwarden', 'secrets']

    - name: "Report: Caddy"
      ansible.builtin.include_role:
        name: common
        tasks_from: report_phase.yml
      vars:
        common_rpt_fact: "_vaultwarden_phases"
        common_rpt_phase: "Caddy"
        common_rpt_detail: >-
          site={{ vaultwarden_domain }}
      tags: ['vaultwarden', 'report']

    # ======================================================================
    # ---- Start ----
    # ======================================================================

    - name: Start Vaultwarden containers
      community.docker.docker_compose_v2:
        project_src: "{{ vaultwarden_base_dir }}"
        state: present
      tags: ['vaultwarden', 'secrets', 'molecule-notest']

    - name: "Report: Start"
      ansible.builtin.include_role:
        name: common
        tasks_from: report_phase.yml
      vars:
        common_rpt_fact: "_vaultwarden_phases"
        common_rpt_phase: "Start"
        common_rpt_detail: >-
          compose={{ vaultwarden_base_dir }}
      tags: ['vaultwarden', 'report']

    # ======================================================================
    # ---- Backup ----
    # ======================================================================

    - name: Deploy Vaultwarden backup script
      ansible.builtin.template:
        src: vaultwarden-backup.sh.j2
        dest: "{{ vaultwarden_base_dir }}/backup.sh"
        owner: root
        group: root
        mode: '0700'
      when: vaultwarden_backup_enabled | bool
      tags: ['vaultwarden', 'secrets']

    - name: Ensure cron service is enabled
      ansible.builtin.service:
        name: "{{ _vaultwarden_cron_service }}"
        enabled: true
        state: started
      when: vaultwarden_backup_enabled | bool
      tags: ['vaultwarden', 'secrets', 'molecule-notest']

    - name: Configure Vaultwarden backup cron job
      ansible.builtin.cron:
        name: "Vaultwarden backup"
        hour: "{{ vaultwarden_backup_cron_hour }}"
        minute: "{{ vaultwarden_backup_cron_minute }}"
        job: "{{ vaultwarden_base_dir }}/backup.sh"
        user: root
      when: vaultwarden_backup_enabled | bool
      tags: ['vaultwarden', 'secrets']

    - name: "Report: Backup"
      ansible.builtin.include_role:
        name: common
        tasks_from: report_phase.yml
      vars:
        common_rpt_fact: "_vaultwarden_phases"
        common_rpt_phase: "Backup"
        common_rpt_detail: >-
          enabled={{ vaultwarden_backup_enabled | string | lower }}
          keep={{ vaultwarden_backup_keep_days }}d
      tags: ['vaultwarden', 'report']

    # ======================================================================
    # ---- Verify (ROLE-005) ----
    # ======================================================================

    - name: Verify vaultwarden
      ansible.builtin.include_tasks: verify.yml
      tags: ['vaultwarden']

    - name: "Report: Verify"
      ansible.builtin.include_role:
        name: common
        tasks_from: report_phase.yml
      vars:
        common_rpt_fact: "_vaultwarden_phases"
        common_rpt_phase: "Verify"
        common_rpt_detail: >-
          in-role checks passed
      tags: ['vaultwarden', 'report']

    # ======================================================================
    # ---- Report (ROLE-008) ----
    # ======================================================================

    - name: "Vaultwarden -- Execution Report"
      ansible.builtin.include_role:
        name: common
        tasks_from: report_render.yml
      vars:
        common_rpt_fact: "_vaultwarden_phases"
        common_rpt_title: "vaultwarden"
      tags: ['vaultwarden', 'report']
