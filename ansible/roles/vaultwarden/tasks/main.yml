---
# === vaultwarden — password manager ===
# validate -> load vars -> install -> configure -> service -> backup -> verify -> report

- name: Validate Vaultwarden role prerequisites
  ansible.builtin.include_tasks:
    file: validate.yml

- name: Load Vaultwarden platform variables
  ansible.builtin.include_tasks:
    file: load_vars.yml

- name: Install Vaultwarden host dependencies
  ansible.builtin.include_tasks:
    file: install/main.yml

- name: Configure Vaultwarden deployment
  ansible.builtin.include_tasks:
    file: configure/main.yml

- name: Apply Vaultwarden and Caddy runtime state
  ansible.builtin.include_tasks:
    file: service/main.yml

- name: Configure Vaultwarden backups
  ansible.builtin.include_tasks:
    file: backup/main.yml

- name: Verify Vaultwarden runtime contract
  ansible.builtin.include_tasks:
    file: verify.yml

- name: Render Vaultwarden execution report
  ansible.builtin.include_tasks:
    file: report.yml
