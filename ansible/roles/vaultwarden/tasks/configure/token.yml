---
- name: Configure Vaultwarden admin access
  when: vaultwarden_admin_enabled | bool
  no_log: true
  block:
    - name: Install supplied Vaultwarden admin token
      ansible.builtin.copy:
        content: "{{ vaultwarden_admin_token }}\n"
        dest: "{{ vaultwarden_base_dir }}/.admin_token"
        owner: root
        group: root
        mode: '0600'
      when: vaultwarden_admin_token | length > 0

    - name: Generate initial Vaultwarden admin token
      ansible.builtin.copy:
        content: >-
          {{ lookup('ansible.builtin.password', '/dev/null',
                    chars=['ascii_letters', 'digits'], length=64) }}
        dest: "{{ vaultwarden_base_dir }}/.admin_token"
        owner: root
        group: root
        mode: '0600'
        force: false
      when: vaultwarden_admin_token | length == 0

    - name: Read effective Vaultwarden admin token
      ansible.builtin.slurp:
        src: "{{ vaultwarden_base_dir }}/.admin_token"
      register: _vaultwarden_admin_token_file
