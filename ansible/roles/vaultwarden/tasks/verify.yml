---
- name: Request Vaultwarden health endpoint
  ansible.builtin.uri:
    url: "https://{{ vaultwarden_domain }}/alive"
    use_proxy: false
    validate_certs: true
    status_code: 200
  register: _vaultwarden_runtime_health
  retries: 15
  delay: 2
  until: _vaultwarden_runtime_health.status | default(0) == 200
