---
# HTTPS domain used by Vaultwarden and its Caddy virtual host. Name resolution
# for other devices belongs to the local DNS service, not this role.
vaultwarden_domain: vault.local

# Host directory containing Compose configuration and persistent data.
vaultwarden_base_dir: /opt/vaultwarden

# External Docker network shared with Caddy.
vaultwarden_docker_network: proxy

# Vaultwarden container image pinned to a deterministic release.
vaultwarden_docker_image: vaultwarden/server:1.36.0

# Enable the Vaultwarden /admin interface. Keep it enabled for initial setup;
# disable it after administration through the web panel is no longer needed.
vaultwarden_admin_enabled: true

# Existing admin token, preferably an Argon2 PHC value supplied through Ansible
# Vault. When empty, the role preserves the existing token or generates a
# random plaintext token once; Vaultwarden accepts it but reports a warning.
vaultwarden_admin_token: "{{ vault_vaultwarden_admin_token | default('') }}"

# Allow creation of new user accounts. Disable after intended accounts exist
# when the service must not accept public or household self-registration.
vaultwarden_signups_allowed: true

# Authentication hashing and endpoint rate limits passed to Vaultwarden.
# password_iterations=600000 is the upstream default. Login burst 5 is stricter
# than the upstream value 10; it still permits password plus 2FA requests.
vaultwarden_security:
  password_iterations: 600000
  login_ratelimit_max_burst: 5
  login_ratelimit_seconds: 60
  admin_ratelimit_max_burst: 3
  admin_ratelimit_seconds: 60

# Install backup dependencies and schedule daily SQLite backups.
vaultwarden_backup_enabled: true

# Host directory containing generated backups.
vaultwarden_backup_dir: /opt/vaultwarden/backups

# Remove backup artifacts older than this number of days.
vaultwarden_backup_keep_days: 30

# Daily backup schedule in host-local time.
vaultwarden_backup_cron_hour: "3"
vaultwarden_backup_cron_minute: "0"

# Host UID/GID mapped to container root when Docker userns-remap is "default".
# Use 0 when Docker user namespace remapping is disabled.
vaultwarden_container_uid: 100000
