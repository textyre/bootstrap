---
# Runtime hostctl postconditions are verified by the role itself.
# Molecule keeps regression checks outside the role's direct contract.

- name: Verify
  hosts: all
  become: true
  gather_facts: false

  tasks:

    - name: Read /etc/hosts
      ansible.builtin.slurp:
        src: /etc/hosts
      register: _hostctl_verify_hosts_raw

    - name: Assert localhost entry is preserved in /etc/hosts
      ansible.builtin.assert:
        that:
          - "'127.0.0.1' in _hostctl_verify_hosts_text"
          - "'localhost' in _hostctl_verify_hosts_text"
        fail_msg: >-
          /etc/hosts is missing the 127.0.0.1 localhost entry.
          Actual content:
          {{ _hostctl_verify_hosts_text }}
      vars:
        _hostctl_verify_hosts_text: "{{ _hostctl_verify_hosts_raw.content | b64decode }}"
