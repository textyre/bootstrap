---
- name: Converge
  hosts: all
  become: true
  gather_facts: true

  roles:
    - role: hostctl
      vars:
        hostctl_version: "1.1.4"
        hostctl_verify_checksum: true
        hostctl_profiles:
          dev:
            state: present
            entries:
              - { ip: "127.0.0.1", host: "app.local" }
              - { ip: "127.0.0.1", host: "api.local" }
          registry:
            state: absent
          staging:
            state: disabled
            entries:
              - { ip: "10.0.0.1", host: "staging.local" }
