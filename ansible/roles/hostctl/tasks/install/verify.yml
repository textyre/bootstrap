---
# === hostctl binary verification ===

- name: Verify hostctl command runs
  ansible.builtin.command: "{{ hostctl_install_dir }}/hostctl --version"
  register: _hostctl_verify_version
  changed_when: false
  failed_when: _hostctl_verify_version.rc != 0
  tags: ['hostctl', 'hostctl:install']

- name: Assert pinned hostctl version is installed
  ansible.builtin.assert:
    that:
      - hostctl_version == 'latest' or _hostctl_expected_version_output == _hostctl_verify_version.stdout
    fail_msg: "Expected {{ _hostctl_expected_version_output }}, got {{ _hostctl_verify_version.stdout }}"
    quiet: true
  vars:
    _hostctl_expected_version_output: "hostctl version {{ hostctl_version }}"
  tags: ['hostctl', 'hostctl:install']
