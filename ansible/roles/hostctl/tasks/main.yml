---
# === hostctl — install binary + manage /etc/hosts profiles ===
# validate -> install binary -> verify binary -> profiles

- name: Validate hostctl role inputs
  ansible.builtin.include_tasks: validate/main.yml
  tags: ['hostctl']

- name: Install hostctl binary
  ansible.builtin.include_tasks: install.yml
  tags: ['hostctl', 'hostctl:install']

- name: Verify hostctl binary
  ansible.builtin.include_tasks: install/verify.yml
  tags: ['hostctl', 'hostctl:install']

- name: Manage hostctl profiles
  ansible.builtin.include_tasks: profiles.yml
  tags: ['hostctl', 'hostctl:profiles']
