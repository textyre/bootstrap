---
# === hostctl profile configuration ===

# Роль владеет /etc/hosts целиком. Это важно для convergence:
# чистая система получает полный файл, повторный запуск не меняет совпадающий
# файл, грязная система перезаписывается в состояние из переменных роли.
# Обычные строки hosts берутся только из hostctl_hosts_entries.
# hostctl-секции строятся только из hostctl_profiles в формате, который
# читает сам hostctl. Роль не читает переменные других ролей.
#
# В Docker /etc/hosts является mounted file: содержимое можно менять, но
# atomic rename поверх файла падает с EBUSY. Поэтому только в Docker включаем
# Ansible fallback, который пишет в существующий файл без замены inode.
- name: Configure hostctl managed hosts file
  ansible.builtin.template:
    src: hosts.j2
    dest: /etc/hosts
    owner: root
    group: root
    mode: '0644'
    unsafe_writes: "{{ ansible_virtualization_type | default('') == 'docker' }}"
  tags: ['hostctl', 'hostctl:profiles']
