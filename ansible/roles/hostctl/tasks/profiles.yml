---
# === hostctl profiles phase ===

# Фаза конфигурации описывает желаемые profile-блоки. Внутри нет
# ветвления по состояниям: роль поддерживает только активные managed profiles.
- name: Configure hostctl profiles
  ansible.builtin.include_tasks: profiles/configure.yml
  tags: ['hostctl', 'hostctl:profiles']

# Фаза проверки идет отдельно от записи: сначала роль приводит систему к
# нужному виду, затем спрашивает hostctl, видит ли он эти профили активными.
- name: Verify hostctl profiles
  ansible.builtin.include_tasks: profiles/verify.yml
  tags: ['hostctl', 'hostctl:profiles']
