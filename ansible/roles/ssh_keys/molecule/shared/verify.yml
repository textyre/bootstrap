---
- name: Verify ssh_keys role
  hosts: all
  become: true
  gather_facts: false

  vars:
    ssh_keys_verify_user: testuser
    ssh_keys_verify_key_type: ed25519
    ssh_keys_verify_expected_key_comments:
      - test@molecule
      - test2@molecule

  tasks:
    - name: Read passwd database
      ansible.builtin.getent:
        database: passwd

    - name: Stat SSH directory
      ansible.builtin.stat:
        path: "{{ getent_passwd[ssh_keys_verify_user][4] }}/.ssh"
      register: ssh_keys_verify_directory

    - name: Assert SSH directory contract
      ansible.builtin.assert:
        that:
          - ssh_keys_verify_directory.stat.exists
          - ssh_keys_verify_directory.stat.isdir
          - ssh_keys_verify_directory.stat.mode == '0700'
          - ssh_keys_verify_directory.stat.pw_name == ssh_keys_verify_user
        fail_msg: ".ssh directory does not match ownership/mode contract"
        success_msg: ".ssh directory matches ownership/mode contract"

    - name: Stat authorized_keys
      ansible.builtin.stat:
        path: "{{ getent_passwd[ssh_keys_verify_user][4] }}/.ssh/authorized_keys"
      register: ssh_keys_verify_authorized_keys

    - name: Read authorized_keys content
      ansible.builtin.slurp:
        src: "{{ getent_passwd[ssh_keys_verify_user][4] }}/.ssh/authorized_keys"
      register: ssh_keys_verify_authorized_keys_content

    - name: Assert authorized_keys contract
      ansible.builtin.assert:
        that:
          - ssh_keys_verify_authorized_keys.stat.exists
          - ssh_keys_verify_authorized_keys.stat.isreg
          - ssh_keys_verify_authorized_keys.stat.mode == '0600'
          - ssh_keys_verify_authorized_keys.stat.pw_name == ssh_keys_verify_user
          - >-
            (ssh_keys_verify_authorized_keys_content.content | b64decode).splitlines() | length
            == (ssh_keys_verify_expected_key_comments | length)
          - "'oldkey@shouldberemoved' not in (ssh_keys_verify_authorized_keys_content.content | b64decode)"
        fail_msg: "authorized_keys does not match the declared exclusive key set"
        success_msg: "authorized_keys matches the declared exclusive key set"

    - name: Assert expected keys are present
      ansible.builtin.assert:
        that:
          - item in (ssh_keys_verify_authorized_keys_content.content | b64decode)
        fail_msg: "Expected key comment '{{ item }}' not found in authorized_keys"
        success_msg: "Expected key comment '{{ item }}' found in authorized_keys"
      loop: "{{ ssh_keys_verify_expected_key_comments }}"
      loop_control:
        label: "{{ item }}"

    - name: Stat generated keypairs
      ansible.builtin.stat:
        path: "{{ getent_passwd[ssh_keys_verify_user][4] }}/.ssh/id_{{ ssh_keys_verify_key_type }}"
      register: ssh_keys_verify_keypairs

    - name: Assert generated private key exists
      ansible.builtin.assert:
        that:
          - ssh_keys_verify_keypairs.stat.exists
          - ssh_keys_verify_keypairs.stat.isreg
          - ssh_keys_verify_keypairs.stat.mode == '0600'
          - ssh_keys_verify_keypairs.stat.pw_name == ssh_keys_verify_user
        fail_msg: "Generated private key is missing or has wrong ownership/mode"
        success_msg: "Generated private key exists with mode 0600"

    - name: Stat generated public key
      ansible.builtin.stat:
        path: "{{ getent_passwd[ssh_keys_verify_user][4] }}/.ssh/id_{{ ssh_keys_verify_key_type }}.pub"
      register: ssh_keys_verify_public_key

    - name: Assert generated public key exists
      ansible.builtin.assert:
        that:
          - ssh_keys_verify_public_key.stat.exists
          - ssh_keys_verify_public_key.stat.isreg
          - ssh_keys_verify_public_key.stat.pw_name == ssh_keys_verify_user
        fail_msg: "Generated public key is missing or has wrong ownership"
        success_msg: "Generated public key exists"
