---
# ansible/roles/ssh_keys/molecule/shared/converge.yml
#
# Exercises all role features in a single idempotent play:
# - authorized_keys deployment (2 keys for testuser)
# - keygen (ed25519 keypair generation)
# - exclusive mode (only listed keys remain)
# - absent user cleanup (authorized_keys removed)

- name: Converge
  hosts: all
  become: true
  gather_facts: true

  vars:
    accounts:
      - name: "{{ ssh_keys_molecule_test_user | default('testuser') }}"
        state: present
        ssh_keys:
          - "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAITestKey1234567890abcdefghijklmnop test@molecule"
          - "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAISecondTestKey567890abcdefghijklmn test2@molecule"
      - name: absent_user
        state: absent
    ssh_keys_generate_user_keys: true
    ssh_keys_key_type: ed25519
    ssh_keys_exclusive: true

  roles:
    - role: ssh_keys
