# ansible/roles/ssh_keys/tasks/authorized_keys.yml
---
# === Deploy SSH authorized_keys from accounts[].ssh_keys ===
# .ssh directory creation is handled in main.yml (shared with keygen)

# ROLE-011 exception: ansible.posix.authorized_key — no ansible.builtin equivalent
# All keys for each user are passed at once (newline-joined) to support
# exclusive mode correctly. With with_subelements, exclusive would remove
# keys from previous iterations, causing non-idempotent behavior.
- name: "Add SSH authorized keys"
  ansible.posix.authorized_key:
    user: "{{ item.name }}"
    key: "{{ item.ssh_keys | join('\n') }}"
    manage_dir: true
    exclusive: "{{ ssh_keys_exclusive }}"
    state: present
  loop: "{{ _ssh_keys_present_users_with_keys }}"
  loop_control:
    label: "{{ item.name }}"
  no_log: true
  tags: [ssh_keys, security]

- name: "Remove authorized_keys for absent users"
  ansible.builtin.file:
    path: "{{ '/root' if item.name == 'root' else '/home/' + item.name }}/.ssh/authorized_keys"
    state: absent
  loop: "{{ _ssh_keys_absent_users }}"
  loop_control:
    label: "{{ item.name }}"
  tags: [ssh_keys, security]
