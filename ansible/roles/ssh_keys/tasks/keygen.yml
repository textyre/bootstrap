# ansible/roles/ssh_keys/tasks/keygen.yml
---
# === Generate SSH keypairs on target machines ===
# .ssh directory creation is handled in main.yml (shared with authorized_keys)

- name: "Generate SSH keypairs for present users"
  block:
    # Fetch the full passwd database so getent_passwd is populated for all users.
    # Calling getent with key: in a loop overwrites getent_passwd on each iteration
    # (only the last key survives), which breaks the path lookup for earlier users.
    - name: "Get all user home directories from passwd"
      ansible.builtin.getent:
        database: passwd
      tags: [ssh_keys]

    - name: "Generate SSH key pair ({{ ssh_keys_key_type }})"
      community.crypto.openssh_keypair:
        path: "{{ getent_passwd[item.name][4] }}/.ssh/id_{{ ssh_keys_key_type }}"
        type: "{{ ssh_keys_key_type }}"
        comment: "{{ item.name }}@{{ ansible_hostname }}"
        owner: "{{ item.name }}"
        group: "{{ item.name }}"
        mode: "0600"
      loop: "{{ _ssh_keys_present_users }}"
      loop_control:
        label: "{{ item.name }}"
      tags: [ssh_keys]
