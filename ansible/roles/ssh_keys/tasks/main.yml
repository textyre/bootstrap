---
# === ssh_keys — SSH authorized_keys and optional keypair management ===
# validate -> detect -> configure -> report

- name: Configure SSH keys
  tags: ['ssh_keys']
  block:
    - name: Validate role prerequisites
      ansible.builtin.include_tasks:
        file: validate.yml

    - name: Detect account home directories
      ansible.builtin.include_tasks:
        file: detect.yml

    - name: Configure SSH key state
      ansible.builtin.include_tasks:
        file: configure/main.yml

    - name: Render ssh_keys execution report
      ansible.builtin.include_role:
        name: common
        tasks_from: report_render.yml
      vars:
        common_rpt_fact: "_ssh_keys_phases"
        common_rpt_title: "ssh_keys"
