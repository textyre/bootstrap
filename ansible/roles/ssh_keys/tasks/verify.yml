# ansible/roles/ssh_keys/tasks/verify.yml
---
# ROLE-005: In-role verification
#
# Verification categories covered:
#   permissions  — .ssh directory mode 0700
#   config files — authorized_keys exists for present users with keys
#   runtime      — generated keypair exists when keygen enabled
#
# Verification categories skipped:
#   packages  — role does not install any packages
#   services  — role does not manage any service unit

- name: "Look up home directories for present users"
  ansible.builtin.getent:
    database: passwd
    key: "{{ item.name }}"
  loop: "{{ _ssh_keys_present_users_with_keys }}"
  loop_control:
    label: "{{ item.name }}"
  tags: [ssh_keys]

- name: "Verify .ssh directory permissions for present users"
  ansible.builtin.stat:
    path: "{{ getent_passwd[item.name][4] }}/.ssh"
  register: _ssh_keys_verify_dir
  loop: "{{ _ssh_keys_present_users_with_keys }}"
  loop_control:
    label: "{{ item.name }}"
  tags: [ssh_keys]

- name: "Assert .ssh directories have correct permissions"
  ansible.builtin.assert:
    that:
      - item.stat.exists
      - item.stat.mode == '0700'
    fail_msg: >-
      .ssh directory for {{ item.item.name }} has incorrect permissions:
      exists={{ item.stat.exists }} mode={{ item.stat.mode | default('n/a') }}
    success_msg: ".ssh directory for {{ item.item.name }} is 0700"
  loop: "{{ _ssh_keys_verify_dir.results }}"
  loop_control:
    label: "{{ item.item.name }}"
  tags: [ssh_keys]

- name: "Verify authorized_keys exists for present users with keys"
  ansible.builtin.stat:
    path: "{{ getent_passwd[item.name][4] }}/.ssh/authorized_keys"
  register: _ssh_keys_verify_authkeys
  loop: "{{ _ssh_keys_present_users_with_keys }}"
  loop_control:
    label: "{{ item.name }}"
  when: ssh_keys_manage_authorized_keys | bool
  tags: [ssh_keys]

- name: "Assert authorized_keys files exist"
  ansible.builtin.assert:
    that:
      - item.stat.exists
    fail_msg: "authorized_keys missing for {{ item.item.name }}"
    success_msg: "authorized_keys present for {{ item.item.name }}"
  loop: "{{ _ssh_keys_verify_authkeys.results | default([]) }}"
  loop_control:
    label: "{{ item.item.name }}"
  when:
    - ssh_keys_manage_authorized_keys | bool
    - item.stat is defined
  tags: [ssh_keys]

- name: "Verify generated keypair exists"
  ansible.builtin.stat:
    path: "{{ getent_passwd[item.name][4] }}/.ssh/id_{{ ssh_keys_key_type }}"
  register: _ssh_keys_verify_keypair
  loop: "{{ _ssh_keys_present_users_with_keys }}"
  loop_control:
    label: "{{ item.name }}"
  when: ssh_keys_generate_user_keys | bool
  tags: [ssh_keys]

- name: "Assert generated keypairs exist with correct permissions"
  ansible.builtin.assert:
    that:
      - item.stat.exists
      - item.stat.mode == '0600'
    fail_msg: >-
      Generated key for {{ item.item.name }} missing or wrong permissions:
      exists={{ item.stat.exists | default(false) }}
      mode={{ item.stat.mode | default('n/a') }}
    success_msg: "Generated key for {{ item.item.name }} exists with mode 0600"
  loop: "{{ _ssh_keys_verify_keypair.results | default([]) }}"
  loop_control:
    label: "{{ item.item.name }}"
  when:
    - ssh_keys_generate_user_keys | bool
    - item.stat is defined
  tags: [ssh_keys]
