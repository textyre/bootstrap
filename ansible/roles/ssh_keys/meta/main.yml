# ansible/roles/ssh_keys/meta/main.yml
---
galaxy_info:
  role_name: ssh_keys
  author: textyre
  description: SSH authorized_keys and target-local user keypair management
  license: MIT
  min_ansible_version: "2.15"
  platforms:
    - name: ArchLinux
      versions: [all]
    - name: Debian
      versions: [all]
    - name: Fedora
      versions: [all]
    - name: Void Linux
      versions: [all]
    - name: Gentoo
      versions: [all]
  galaxy_tags:
    - ssh
    - security
    - authorizedkeys
    - keys

dependencies:
  - role: common
# Collection dependencies (declared in ansible/requirements.yml):
#   - community.crypto >=2.0.0  (community.crypto.openssh_keypair)
#   - ansible.posix >=1.5.0     (ansible.posix.authorized_key)
