---
# === ssh_keys role defaults ===
# External role contract. Internal state lives in vars/main.yml.

# User whose SSH key state is managed by this role.
ssh_keys_user: "{{ target_user }}"

# Public keys allowed to log in as ssh_keys_user. Empty means authorized_keys is
# not managed by this role.
ssh_keys_authorized_keys: []

# When true, authorized_keys contains only keys declared in
# ssh_keys_authorized_keys. This removes manually added keys for ssh_keys_user.
ssh_keys_exclusive: false

# Generate ssh_keys_user's keypair on the target host.
ssh_keys_generate_user_key: true

# SSH key type passed to community.crypto.openssh_keypair for generated keypair.
# Common values: ed25519, rsa, ecdsa.
ssh_keys_user_key_type: ed25519
