---
# Allow inbound SSH on TCP port 22.
firewall_allow_ssh: true

# Rate-limit new SSH connections separately for each IPv4 and IPv6 source.
firewall_ssh_rate_limit_enabled: true

# Maximum sustained rate of new SSH connections from one source address.
firewall_ssh_rate_limit: "4/minute"

# Additional new SSH connections accepted before rate limiting takes effect.
firewall_ssh_rate_limit_burst: 2

# Allow forwarding through Docker's default and user-defined bridge interfaces.
firewall_docker_enabled: false

# Additional inbound TCP ports to allow. Example: [80, 443].
firewall_allow_tcp_ports: []

# Additional inbound UDP ports to allow. Example: [53].
firewall_allow_udp_ports: []
