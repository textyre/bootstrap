---
# === firewall — nftables workstation firewall ===
# validate -> configure -> service -> report

- name: Validate firewall role prerequisites
  ansible.builtin.include_tasks:
    file: validate.yml

- name: Configure nftables ruleset
  ansible.builtin.include_tasks:
    file: configure/main.yml

- name: Apply nftables service policy
  ansible.builtin.include_tasks:
    file: service/main.yml

- name: Render firewall execution report
  ansible.builtin.include_role:
    name: common
    tasks_from: report_render.yml
  vars:
    common_rpt_fact: "_firewall_phases"
    common_rpt_title: "firewall"
