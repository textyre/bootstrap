# Purpose: Docker-based Molecule tests. Detects changed roles and runs
#          molecule test -s docker for each in a ci-env container.
# Triggers: push/PR to master (ansible/roles/**, requirements.txt),
#           weekly schedule (Monday 06:00 UTC),
#           workflow_dispatch (role_filter: role name or "all")
# Uses:    ghcr.io/<repo>/ci-env:latest  (built by build-ci-image.yml)
#          ghcr.io/textyre/arch-base:latest
#          ghcr.io/textyre/ubuntu-base:latest
# Notes:   Only roles with molecule/docker/molecule.yml are tested here.
#          Changes to ansible/roles/common/ trigger ALL CI-ready roles.
---
name: "Molecule"

on:
  push:
    branches: [master]
    paths:
      - 'ansible/roles/**'
      - 'ansible/requirements.txt'
      - '.github/workflows/molecule.yml'
  pull_request:
    branches: [master]
    paths:
      - 'ansible/roles/**'
      - 'ansible/requirements.txt'
      - '.github/workflows/molecule.yml'
  schedule:
    - cron: '0 6 * * 1'  # Weekly Monday 06:00 UTC — drift detection
  workflow_dispatch:
    inputs:
      role_filter:
        description: 'Role to test, or "all" for all CI-ready roles'
        required: false
        default: 'all'
      runtime_tty_facts:
        description: 'Collect TTY-related runtime facts for Arch/Ubuntu images'
        required: false
        default: 'false'

concurrency:
  group: molecule-${{ github.ref }}
  cancel-in-progress: true

jobs:
  runtime-tty-facts:
    name: Runtime TTY facts
    if: github.event_name == 'workflow_dispatch' && inputs.runtime_tty_facts == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      packages: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: arch
            image: ghcr.io/textyre/arch-base:latest
            command: /usr/lib/systemd/systemd
          - platform: ubuntu
            image: ghcr.io/textyre/ubuntu-base:latest
            command: /lib/systemd/systemd
    steps:
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Start systemd runtime
        run: |
          docker run --detach --name "tty-facts-${{ matrix.platform }}" \
            --privileged --cgroupns=host \
            --volume /sys/fs/cgroup:/sys/fs/cgroup:rw \
            --tmpfs /run --tmpfs /tmp \
            "${{ matrix.image }}" "${{ matrix.command }}"
          for _ in $(seq 1 30); do
            if docker exec "tty-facts-${{ matrix.platform }}" systemctl is-system-running --wait >/tmp/system-running 2>&1; then
              break
            fi
            if grep -Eq 'running|degraded' /tmp/system-running; then
              break
            fi
            sleep 1
          done
          cat /tmp/system-running || true

      - name: Collect TTY service surface
        run: |
          set +e
          name="tty-facts-${{ matrix.platform }}"
          echo "=== platform ==="
          echo "${{ matrix.platform }}"
          echo "=== image ==="
          echo "${{ matrix.image }}"
          echo "=== os-release ==="
          docker exec "$name" sh -lc 'cat /etc/os-release'
          echo "=== systemctl is-system-running ==="
          docker exec "$name" sh -lc 'systemctl is-system-running || true'
          echo "=== tty-related active units ==="
          docker exec "$name" sh -lc 'systemctl list-units --all --no-pager --plain \
            "*tty*" "*getty*" "*console*" "*vconsole*" "*keyboard*" "*localed*" "*udev*"'
          echo "=== tty-related unit files ==="
          docker exec "$name" sh -lc 'systemctl list-unit-files --no-pager --plain \
            "*tty*" "*getty*" "*console*" "*vconsole*" "*keyboard*" "*localed*" "*udev*"'
          echo "=== specific unit states ==="
          docker exec "$name" sh -lc 'for unit in \
            systemd-vconsole-setup.service keyboard-setup.service console-setup.service \
            systemd-localed.service systemd-udevd.service getty@tty1.service getty@.service; do
              echo "--- $unit ---"
              systemctl show "$unit" -p LoadState -p ActiveState -p SubState -p FragmentPath -p UnitFileState 2>&1 || true
              systemctl cat "$unit" 2>&1 || true
            done'
          echo "=== executable surface ==="
          docker exec "$name" sh -lc 'for bin in localectl loadkeys dumpkeys setupcon kbd_mode udevadm; do
            printf "%s: " "$bin"
            command -v "$bin" || true
          done'
          echo "=== localectl status ==="
          docker exec "$name" sh -lc 'localectl status 2>&1 || true'
          echo "=== tty devices ==="
          docker exec "$name" sh -lc 'ls -l /dev/console /dev/tty /dev/tty0 /dev/tty1 2>&1 || true'

      - name: Stop runtime
        if: always()
        run: docker rm --force "tty-facts-${{ matrix.platform }}" || true

  detect:
    name: Detect changed roles
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.build.outputs.matrix }}
      empty: ${{ steps.build.outputs.empty }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get changed files
        id: changed
        if: github.event_name != 'workflow_dispatch'
        uses: tj-actions/changed-files@v46
        with:
          files: 'ansible/**'

      - name: Build role matrix
        id: build
        run: |
          # CI-ready roles = those with molecule/docker/molecule.yml
          ALL_ROLES=$(find ansible/roles -name molecule.yml -path "*/docker/molecule.yml" \
            | sed 's|ansible/roles/||;s|/molecule.*||' | sort -u)

          if [ "${{ github.event_name }}" = "workflow_dispatch" ] \
            && [ "${{ inputs.runtime_tty_facts }}" = "true" ]; then
            MATRIX="[]"
            echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"
            echo "empty=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            FILTER="${{ inputs.role_filter }}"
            if [ "$FILTER" = "all" ] || [ -z "$FILTER" ]; then
              ROLES="$ALL_ROLES"
            else
              ROLES="$FILTER"
            fi
          else
            CHANGED="${{ steps.changed.outputs.all_changed_files }}"
            # Infrastructure or common changed → run all CI-ready roles
            if echo "$CHANGED" | tr ' ' '\n' | grep -qE \
              "^ansible/roles/common/|^ansible/requirements\.txt"; then
              ROLES="$ALL_ROLES"
            else
              # Only changed roles that are CI-ready
              ROLES=$(echo "$CHANGED" | tr ' ' '\n' \
                | grep "^ansible/roles/" \
                | sed 's|ansible/roles/||;s|/.*||' \
                | sort -u \
                | while IFS= read -r role; do
                    if [ -f "ansible/roles/$role/molecule/docker/molecule.yml" ]; then
                      echo "$role"
                    fi
                  done)
            fi
          fi

          MATRIX=$(printf '%s\n' $ROLES \
            | { grep -v '^$' || true; } \
            | jq -Rsc '[split("\n")[] | select(length > 0)]')
          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"
          if [ "$MATRIX" = "[]" ]; then
            echo "empty=true" >> "$GITHUB_OUTPUT"
          else
            echo "empty=false" >> "$GITHUB_OUTPUT"
          fi

  lint:
    needs: detect
    if: needs.detect.outputs.empty == 'false'
    name: "${{ matrix.role }} (lint)"
    runs-on: ubuntu-latest
    strategy:
      matrix:
        role: ${{ fromJSON(needs.detect.outputs.matrix) }}
      fail-fast: false
    container:
      image: ghcr.io/${{ github.repository }}/ci-env:latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run yamllint
        run: yamllint -c ansible/.yamllint ansible/roles/${{ matrix.role }}/

      - name: Run ansible-lint
        working-directory: ansible
        run: ansible-lint roles/${{ matrix.role }}/
        env:
          ANSIBLE_ROLES_PATH: roles

  test-docker:
    needs: detect
    if: needs.detect.outputs.empty == 'false'
    name: "${{ matrix.role }} (test-docker/${{ matrix.platform }})"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      matrix:
        role: ${{ fromJSON(needs.detect.outputs.matrix) }}
        platform: [arch, ubuntu]
      fail-fast: false
    container:
      image: ghcr.io/${{ github.repository }}/ci-env:latest
      options: --volume /var/run/docker.sock:/var/run/docker.sock
    env:
      PY_COLORS: "1"
      ANSIBLE_FORCE_COLOR: "1"
      MOLECULE_ARCH_IMAGE: ghcr.io/textyre/arch-base:latest
      MOLECULE_UBUNTU_IMAGE: ghcr.io/textyre/ubuntu-base:latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Molecule
        run: |
          if [ "${{ matrix.platform }}" = "arch" ]; then
            PLATFORM=Archlinux-systemd
          else
            PLATFORM=Ubuntu-systemd
          fi
          molecule test -s docker --platform-name "$PLATFORM"
        working-directory: "ansible/roles/${{ matrix.role }}"

      - name: Annotate failure
        if: failure()
        run: |
          echo "::error title=Molecule FAILED (${{ matrix.role }}/${{ matrix.platform }})::Docker scenario for role '${{ matrix.role }}' on '${{ matrix.platform }}' failed. Check the log above for details."

      - name: Annotate success
        if: success()
        run: |
          echo "::notice title=Molecule PASSED (${{ matrix.role }}/${{ matrix.platform }})::Docker scenario for role '${{ matrix.role }}' on '${{ matrix.platform }}' passed."
